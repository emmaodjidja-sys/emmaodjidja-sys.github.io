<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#08090D"/>

  <!-- The P mark: geometric, constructed from two elements -->
  <!-- Vertical stem -->
  <rect x="148" y="112" width="52" height="288" rx="4" fill="#58D5BA"/>

  <!-- Bowl of P: an open arc suggesting forward motion and continuity -->
