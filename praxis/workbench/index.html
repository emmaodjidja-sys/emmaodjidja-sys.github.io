<!-- SheetJS loaded on demand by stations that need it (Station 2 export, Station 5 export) -->
<script>
window.loadSheetJS = function() {
  if (window.XLSX) return Promise.resolve();
  return new Promise(function(resolve, reject) {
    var s = document.createElement('script');
    s.src = 'vendor/xlsx.full.min.js';
    s.onload = resolve;
    s.onerror = function() { reject(new Error('Failed to load SheetJS')); };
    document.head.appendChild(s);
  });
};
</script>

<!-- Service Worker: disabled during development. Unregister any stale SW. -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
  });
  caches.keys().then(function(names) {
    names.forEach(function(n) { caches.delete(n); });
  });
}
</script>
