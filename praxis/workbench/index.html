<!-- SheetJS loaded on demand by stations that need it (Station 2 export, Station 5 export) -->
<script>
window.loadSheetJS = (function() {
  var pending = null;
  return function() {
    if (window.XLSX) return Promise.resolve();
    if (pending) return pending;
    pending = new Promise(function(resolve, reject) {
      var s = document.createElement('script');
      s.src = 'vendor/xlsx.full.min.js';
      s.onload = resolve;
      s.onerror = function() {
        pending = null;
        reject(new Error('Failed to load SheetJS'));
      };
      document.head.appendChild(s);
    });
    return pending;
  };
})();
</script>

<div id="root">
  <!-- Static first-paint loading state. React replaces #root contents on
       mount, so this is shown only while the deferred scripts load. -->
  <style>
    #wb-boot {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: #0B1A2E; color: #E7EDF5;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }
    #wb-boot .wb-boot-mark { font-size: 13px; font-weight: 700; letter-spacing: 0.18em; color: #2EC4B6; }
    #wb-boot .wb-boot-text { font-size: 13px; color: #9FB0C6; }
    #wb-boot .wb-boot-spin {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12); border-top-color: #2EC4B6;
      animation: wb-boot-spin 0.8s linear infinite;
    }
    @keyframes wb-boot-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) { #wb-boot .wb-boot-spin { animation-duration: 2.4s; } }
  </style>
  <div id="wb-boot">
    <div class="wb-boot-mark">PRAXIS</div>
    <div class="wb-boot-spin" role="progressbar" aria-label="Loading the Evaluation Workbench"></div>
    <div class="wb-boot-text">Loading the Evaluation Workbench</div>
  </div>
</div>

<noscript>

</noscript>

<!-- No service worker ships with the workbench. This clears only the
     workbench's own prior registration and caches, scoped to this app's
     path and cache-name prefix, so it never touches the rest of this
     origin (the personal site or other PRAXIS tools). -->
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistration('/praxis/workbench/').then(function(reg) {
    if (reg) reg.unregister();
  });
}
if (window.caches && caches.keys) {
  caches.keys().then(function(names) {
    names.forEach(function(n) {
      if (n.indexOf('praxis-workbench-') === 0) caches.delete(n);
    });
  });
}
</script>
