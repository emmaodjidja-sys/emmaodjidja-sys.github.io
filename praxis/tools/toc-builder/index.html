<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theory of Change Builder — PRAXIS Evaluation Toolkit</title>
<meta name="description" content="Free, interactive Theory of Change builder. Create, annotate, and export publication-ready causal diagrams with evidence mapping and assumption tracking.">
<link rel="icon" type="image/svg+xml" href="../../logo.svg">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--wb-navy:#0B1A2E;--navy:var(--wb-navy,#0B1A2E);--navy-mid:#122240;--navy-light:#1a3050;--teal:#2EC4B6;--teal-dark:#1a9e92;--teal-light:#d0f0ed;--teal-glow:rgba(46,196,182,0.15);--slate:#64748B;--slate-light:#94A3B8;--bg:#F1F5F9;--surface:#FFFFFF;--border:#E2E8F0;--text:#0F172A;--text-muted:#64748B;--amber:#F59E0B;--amber-light:#FEF3C7;--red:#EF4444;--red-light:#FEE2E2;--green:#10B981;--green-light:#D1FAE5;--blue:#3B82F6;--blue-light:#DBEAFE;--purple:#8B5CF6;--purple-light:#EDE9FE}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
button{font-family:inherit;cursor:pointer}input,textarea,select{font-family:inherit}
.app{display:flex;flex-direction:column;height:100vh}

/* ── Top bar ──────────────── */
.top-bar{height:48px;background:var(--navy);display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;z-index:100}
.brand{display:flex;align-items:center;gap:8px;margin-right:12px}
.brand-badge{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--teal);text-transform:uppercase}
.brand-360{font-size:9px;font-weight:700;color:var(--teal);border:1px solid var(--teal);border-radius:4px;padding:1px 4px;margin-left:2px;letter-spacing:.05em}
.brand-sep{color:rgba(136,153,170,.4);font-weight:300;font-size:13px}
.brand-page{color:#CBD5E1;font-size:12px;font-weight:500}
.tb-div{width:1px;height:24px;background:rgba(255,255,255,.1);margin:0 6px}
.tb-group{display:flex;align-items:center;gap:1px}
.tb{display:flex;align-items:center;gap:4px;padding:5px 8px;border-radius:5px;border:none;font-size:11px;font-weight:600;color:#CBD5E1;background:transparent;transition:all .15s;white-space:nowrap}
.tb:hover{background:rgba(255,255,255,.08);color:#fff}
.tb.active{background:var(--teal);color:var(--navy)}
.tb svg{width:14px;height:14px;flex-shrink:0}
.spacer{flex:1}
.zoom-display{font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;color:var(--slate-light);min-width:36px;text-align:center}
.stats{display:flex;gap:10px;align-items:center;margin-right:6px}
.stat{font-size:10px;color:var(--slate-light);font-family:'DM Sans',sans-serif;font-weight:600}
.undo-btn{opacity:.4;pointer-events:none}
.undo-btn.can{opacity:1;pointer-events:auto}

/* ── Main layout ──────────── */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* ── Left sidebar ─────────── */
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-tab{flex:1;padding:10px 0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;text-align:center;border:none;background:transparent;color:var(--slate);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.sidebar-tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.sidebar-tab:hover:not(.active){color:var(--text)}
.sidebar-body{flex:1;overflow-y:auto;padding:14px}
.sb-section{margin-bottom:14px}
.sb-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);margin-bottom:6px}
.sb-input{width:100%;padding:7px 9px;border-radius:5px;border:1.5px solid var(--border);font-size:12px;background:var(--surface);color:var(--text);transition:border-color .15s}
.sb-input:focus{outline:none;border-color:var(--teal)}
.sb-textarea{width:100%;padding:7px 9px;border-radius:5px;border:1.5px solid var(--border);font-size:11px;line-height:1.5;background:var(--surface);color:var(--text);resize:vertical;min-height:60px;transition:border-color .15s}
.sb-textarea:focus{outline:none;border-color:var(--teal)}
.palette-node{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:7px;border:1.5px dashed var(--border);cursor:pointer;transition:all .15s;background:var(--surface);margin-bottom:4px}
.palette-node:hover{border-color:var(--teal);background:var(--teal-glow)}
.palette-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.palette-node-name{font-size:12px;font-weight:600}
.palette-node-hint{font-size:9px;color:var(--text-muted);margin-top:1px}
.legend-row{display:flex;align-items:center;gap:7px;padding:2px 0;padding-left:4px}
.legend-row span{font-size:10px;color:var(--text-muted)}
.legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.shortcut-box{font-size:10px;color:var(--text-muted);line-height:1.6;padding:8px;background:var(--bg);border-radius:6px}
.shortcut-box kbd{display:inline-block;padding:1px 4px;border-radius:3px;font-size:9px;font-family:'DM Sans',sans-serif;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text)}
/* System assumption in sidebar */
.sys-assumption{display:flex;gap:5px;align-items:flex-start;padding:6px;border-radius:5px;background:var(--bg);border:1px solid var(--border);margin-bottom:4px}
.sys-assumption input{flex:1;border:none;background:transparent;font-size:11px;font-family:inherit;color:var(--text);outline:none}
.sys-assumption-status{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;cursor:pointer;transition:transform .1s}
.sys-assumption-status:hover{transform:scale(1.4)}
.sys-remove{width:18px;height:18px;border:none;background:transparent;color:var(--slate-light);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;flex-shrink:0}
.sys-remove:hover{background:var(--red-light);color:var(--red)}
.add-btn{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:5px;border:1.5px dashed var(--border);background:transparent;font-size:11px;font-weight:600;color:var(--text-muted);transition:all .15s;width:100%}
.add-btn:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-glow)}
.back-link{font-size:10px;color:var(--teal);text-decoration:none;font-weight:600;padding:10px 14px;border-top:1px solid var(--border);display:block;flex-shrink:0}

/* ── Canvas ───────────────── */
.canvas-vp{flex:1;overflow:hidden;cursor:grab;position:relative;background:var(--bg);touch-action:none}
.canvas-vp.grabbing{cursor:grabbing}
.canvas-vp.connecting{cursor:crosshair}
.canvas-inner{position:absolute;top:0;left:0;transform-origin:0 0;width:6000px;height:4000px}
.canvas-grid{position:absolute;inset:0;pointer-events:none;background-image:radial-gradient(circle,#CBD5E1 .6px,transparent .6px);background-size:24px 24px;opacity:.4}
.level-lane{position:absolute;left:0;right:0;border-bottom:1px dashed rgba(0,0,0,.05)}
.level-lane-label{position:absolute;left:14px;top:6px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;opacity:.3;pointer-events:none;user-select:none}

/* ── Snap guides ──────────── */
.snap-guide-h,.snap-guide-v{position:absolute;background:var(--teal);opacity:.5;z-index:8;pointer-events:none}
.snap-guide-h{height:1px;left:0;right:0}
.snap-guide-v{width:1px;top:0;bottom:0}

/* ── Nodes ────────────────── */
.toc-node{position:absolute;width:200px;min-height:56px;border-radius:9px;background:var(--surface);border:2px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.05);user-select:none;z-index:5;touch-action:none}
.toc-node.animating{transition:left .3s ease,top .3s ease}
.toc-node:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.toc-node.selected{border-color:var(--teal);box-shadow:0 0 0 3px var(--teal-glow),0 4px 12px rgba(0,0,0,.1)}
.toc-node.in-selection{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,.15)}
.toc-node.connect-source{border-color:var(--amber);box-shadow:0 0 0 3px rgba(245,158,11,.2)}
.toc-node.connect-target:hover{border-color:var(--green);box-shadow:0 0 0 3px rgba(16,185,129,.2)}
.toc-node.dragging{z-index:20;box-shadow:0 8px 24px rgba(0,0,0,.15);transition:none!important}
.node-stripe{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:9px 0 0 9px}
.node-body{padding:8px 10px 8px 14px}
.node-level-tag{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.65}
.node-title{font-size:12px;font-weight:600;line-height:1.3;word-break:break-word}
.node-desc{font-size:10px;color:var(--text-muted);margin-top:2px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.node-meta{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap;align-items:center}
.node-time-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600;background:var(--purple-light);color:#6D28D9}
.node-ind-badge{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600;background:var(--bg);color:var(--slate)}
.node-assumption-count{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;background:var(--amber-light);color:#92400E}
.node-port{position:absolute;width:11px;height:11px;border-radius:50%;background:var(--surface);border:2px solid var(--border);transition:all .15s;z-index:6;cursor:crosshair}
.node-port:hover{background:var(--teal);border-color:var(--teal);transform:scale(1.3)}
.node-port-top{top:-5px;left:50%;margin-left:-5px}
.node-port-bottom{bottom:-5px;left:50%;margin-left:-5px}
.node-port-left{left:-5px;top:50%;margin-top:-5px}
.node-port-right{right:-5px;top:50%;margin-top:-5px}
.node-trace-code{position:absolute;top:-16px;left:0;font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;color:#94A3B8;pointer-events:none;white-space:nowrap}

/* ── SVG connections ──────── */
.conn-svg{position:absolute;inset:0;pointer-events:none;z-index:3}
.conn-path{pointer-events:stroke;cursor:pointer}
.conn-hit{stroke:transparent;stroke-width:18;pointer-events:stroke;cursor:pointer}
.conn-selected{filter:drop-shadow(0 0 4px rgba(46,196,182,.5))}
.evidence-dot,.assumption-count-badge{pointer-events:auto;cursor:pointer}

/* ── Batch toolbar ────────── */
.batch-bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--navy);border-radius:8px;padding:4px 8px;display:flex;gap:4px;align-items:center;z-index:30;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.batch-bar .tb{font-size:10px;padding:4px 8px}
.batch-count{font-size:10px;color:var(--teal);font-weight:700;padding:0 6px;font-family:'DM Sans',sans-serif}

/* ── Detail panel ─────────── */
.detail-panel{width:310px;background:var(--surface);border-left:1px solid var(--border);flex-shrink:0;overflow-y:auto;display:flex;flex-direction:column;z-index:10}
.dp-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.dp-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--slate)}
.dp-close{width:24px;height:24px;border-radius:5px;border:none;background:transparent;display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:14px;transition:all .15s}
.dp-close:hover{background:var(--bg);color:var(--text)}
.dp-body{padding:12px 14px;display:flex;flex-direction:column;gap:12px;flex:1}
.dp-field{display:flex;flex-direction:column;gap:3px}
.dp-label{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.05em}
.dp-label-sub{font-weight:400;margin-left:5px;font-size:9px;color:var(--text-muted);text-transform:none;letter-spacing:0}
.dp-input{padding:6px 8px;border-radius:5px;border:1.5px solid var(--border);font-size:12px;background:var(--surface);color:var(--text);transition:border-color .15s}
.dp-input:focus{outline:none;border-color:var(--teal)}
.dp-textarea{padding:6px 8px;border-radius:5px;border:1.5px solid var(--border);font-size:11px;background:var(--surface);color:var(--text);resize:vertical;min-height:48px;line-height:1.5;transition:border-color .15s}
.dp-textarea:focus{outline:none;border-color:var(--teal)}
.dp-select{padding:6px 8px;border-radius:5px;border:1.5px solid var(--border);font-size:12px;background:var(--surface);color:var(--text)}
.dp-select:focus{outline:none;border-color:var(--teal)}
.dp-muted{font-size:10px;color:var(--slate-light);font-weight:500}
.ev-row{display:flex;gap:3px;flex-wrap:wrap}
.ev-btn{flex:1;padding:5px 3px;border-radius:5px;border:1.5px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;background:var(--surface);color:var(--text-muted);text-align:center;transition:all .15s;min-width:0}
.ev-btn:hover{border-color:var(--slate-light)}
.ev-btn.a-strong{background:var(--green-light);border-color:var(--green);color:#065F46}
.ev-btn.a-moderate{background:var(--blue-light);border-color:var(--blue);color:#1E40AF}
.ev-btn.a-weak{background:var(--amber-light);border-color:var(--amber);color:#92400E}
.ev-btn.a-none{background:var(--red-light);border-color:var(--red);color:#991B1B}
.ev-btn.a-contested{background:#FEF3C7;border-color:#D97706;color:#92400E}
.assumption-item{display:flex;gap:5px;align-items:flex-start;padding:6px;border-radius:5px;background:var(--bg);border:1px solid var(--border);margin-bottom:3px}
.assumption-item input{flex:1;border:none;background:transparent;font-size:11px;font-family:inherit;color:var(--text);outline:none}
.dp-actions{padding:12px 14px;border-top:1px solid var(--border)}
.delete-btn{width:100%;padding:7px;border-radius:5px;border:1.5px solid var(--red);background:transparent;color:var(--red);font-size:11px;font-weight:700;transition:all .15s}
.delete-btn:hover{background:var(--red);color:#fff}
.pathway-summary{padding:8px 10px;border-radius:6px;background:var(--bg);font-size:11px;line-height:1.5}
.pathway-summary strong{font-weight:700}
.pathway-direction{display:flex;gap:3px;margin-top:6px}
.dir-btn{flex:1;padding:4px;border-radius:4px;border:1.5px solid var(--border);font-size:9px;font-weight:700;text-align:center;background:var(--surface);color:var(--text-muted);transition:all .15s}
.dir-btn.active{border-color:var(--teal);background:var(--teal-glow);color:var(--teal)}

/* ── Knowledge Source ────── */
.ks-line{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:5px;background:var(--bg);border:1px solid var(--border);font-size:10px;color:var(--text-muted);cursor:pointer;transition:all .15s}
.ks-line:hover{border-color:var(--teal)}
.ks-line-set{color:var(--text)}
.ks-inline{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-size:10px;flex-shrink:0;transition:all .15s;background:var(--surface)}
.ks-inline:hover{border-color:var(--teal);background:var(--teal-glow)}
.ks-popover{position:absolute;z-index:60;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:10px;min-width:200px}
.ks-popover select,.ks-popover input{font-size:11px;padding:4px 6px;border-radius:4px;border:1px solid var(--border);width:100%;margin-top:3px}

/* ── Import zone ─────────── */
.import-zone{border:2px dashed var(--border);border-radius:8px;padding:14px 10px;text-align:center;font-size:11px;color:var(--text-muted);transition:all .2s;cursor:pointer;margin-bottom:8px}
.import-zone:hover,.import-zone.drag-over{border-color:var(--teal);background:var(--teal-glow);color:var(--teal)}

/* ── Modal ────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(2px)}
.modal-card{background:var(--surface);border-radius:12px;box-shadow:0 16px 48px rgba(0,0,0,.15);max-width:720px;width:95%;max-height:90vh;display:flex;flex-direction:column}
.modal-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:14px;font-weight:700}
.modal-body{padding:18px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.modal-btn{padding:7px 16px;border-radius:6px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s}
.modal-btn:hover{border-color:var(--teal);color:var(--teal)}
.modal-btn.primary{background:var(--teal);color:var(--navy);border-color:var(--teal)}
.modal-btn.primary:hover{background:var(--teal-dark);color:#fff}

/* ── Foundation popover ──── */
.foundation-popover{position:absolute;z-index:55;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--teal);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.1);padding:12px 14px;max-width:280px;font-size:11px;line-height:1.5;color:var(--text)}
.foundation-popover .fp-actions{display:flex;gap:6px;margin-top:8px}
.foundation-popover .fp-btn{padding:4px 10px;border-radius:5px;font-size:10px;font-weight:700;border:1px solid var(--teal);background:var(--teal-glow);color:var(--teal);cursor:pointer}
.foundation-popover .fp-link{font-size:9px;color:var(--text-muted);cursor:pointer;text-decoration:underline;padding:4px 0;display:flex;align-items:center}

/* ── Sensitivity banners ─── */
.sens-banner{padding:6px 14px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sens-banner.sensitive{background:var(--amber-light);color:#92400E;border-bottom:1px solid #F59E0B}
.sens-banner.highly-sensitive{background:var(--red-light);color:#991B1B;border-bottom:1px solid var(--red)}

/* ── Template icons ────────── */
.tpl-icon{width:20px;height:20px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center}
.tpl-icon svg{width:18px;height:18px}

/* ── Welcome ──────────────── */
.welcome-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:50;background:rgba(241,245,249,.92);backdrop-filter:blur(4px)}
.welcome-card{background:var(--surface);border-radius:14px;padding:32px;box-shadow:0 16px 48px rgba(0,0,0,.1);max-width:640px;width:95%}
.welcome-icon{display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.welcome-icon svg{width:48px;height:48px}
.welcome-title{font-size:20px;font-weight:800;text-align:center;margin-bottom:6px;color:var(--navy)}
.welcome-sub{font-size:13px;color:var(--text-muted);line-height:1.6;text-align:center;margin-bottom:20px}
.welcome-section-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--slate);margin-bottom:6px}
.welcome-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.welcome-btn{padding:9px 14px;border-radius:7px;font-size:12px;font-weight:700;border:none;transition:all .15s;text-align:left}
.welcome-btn-primary{background:var(--teal);color:var(--navy)}
.welcome-btn-primary:hover{background:var(--teal-dark);color:#fff}
.welcome-btn-secondary{background:var(--bg);color:var(--text);border:1.5px solid var(--border);flex:1 1 140px}
.welcome-btn-secondary:hover{border-color:var(--teal);color:var(--teal)}
.welcome-btn-info{font-size:9px;color:var(--text-muted);font-weight:500;margin-top:2px}
.welcome-actions{display:flex;gap:6px;justify-content:center}

/* ── Export dropdown ────────── */
.export-dropdown{position:absolute;top:44px;right:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:110;min-width:180px;padding:4px 0}
.export-dropdown-item{display:flex;align-items:center;gap:8px;padding:7px 14px;font-size:11px;font-weight:600;color:var(--text);cursor:pointer;transition:background .1s;border:none;background:none;width:100%;text-align:left}
.export-dropdown-item:hover{background:var(--bg)}
.export-dropdown-sep{height:1px;background:var(--border);margin:4px 0}

/* ── Bulk source popover ──── */
.bulk-source-popover{position:absolute;z-index:60;background:var(--surface);border:1px solid var(--border);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.12);padding:12px;min-width:240px}

/* ── Toast ─────────────────── */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:8px 18px;border-radius:7px;font-size:12px;font-weight:600;z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.2);animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* ── Mode indicator ───────── */
.mode-indicator{position:absolute;top:10px;left:50%;transform:translateX(-50%);padding:5px 14px;border-radius:7px;font-size:11px;font-weight:700;z-index:25;display:flex;align-items:center;gap:6px}
.mode-indicator.connect-mode{background:#FEF3C7;border:1px solid #F59E0B;color:#92400E}
.mode-indicator.connect-active{background:#DBEAFE;border:1px solid #3B82F6;color:#1E40AF}
.mode-cancel{cursor:pointer;text-decoration:underline}

/* ── Scrollbar ─────────────── */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--slate-light)}

/* ── Print ──────────────────── */
@media print{.top-bar,.sidebar,.detail-panel,.welcome-overlay,.batch-bar,.mode-indicator,.toast,.sens-banner{display:none!important}.canvas-vp{overflow:visible!important}.canvas-inner{transform:none!important;width:auto!important;height:auto!important}}

// ═══════════════════════════════════════════════════════════════
function computeNextCodes(nodes,connections){
  let maxN=0,maxC=0;
  (nodes||[]).forEach(n=>{if(n.traceability_code){const m=n.traceability_code.match(/^n(\d+)$/);if(m)maxN=Math.max(maxN,parseInt(m[1]));}});
  (connections||[]).forEach(c=>{if(c.traceability_code){const m=c.traceability_code.match(/^c(\d+)$/);if(m)maxC=Math.max(maxC,parseInt(m[1]));}});
  return{nextNode:maxN+1,nextConn:maxC+1};
}

const LEVEL_KEYWORDS={

  intermediate:['intermediate','intermediate outcome','enabling condition','precondition','early outcome','medium-term','bridging','mediating','pathway','enabling factor','stepping stone'],
  output:['output','deliverable','product','service delivered','direct result','tangible result','produced','milestone','target','result','completion'],
  activity:['activity','intervention','action','task','training','workshop','procurement','technical assistance','campaign','mobilisation','implementation','process','conduct','deliver','facilitate','support','provide','establish'],
};

function detectLevel(text){
  const t=text.toLowerCase();
  for(const[level,keywords]of Object.entries(LEVEL_KEYWORDS)){
    for(const kw of keywords){if(t.includes(kw))return level;}
  }
  return 'output';
}

function parseTextToNodes(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const nodes=[];let nc=1;
  lines.forEach((line)=>{
    const cleaned=line.replace(/^[\d\.\-\*\#\>\s]+/,'').trim();
    if(!cleaned)return;
    const level=detectLevel(cleaned);
    const lv=LEVELS.find(l=>l.id===level);
    const sameLevel=nodes.filter(n=>n.level===level);
    nodes.push({id:uid('n'),title:cleaned,description:'',level,x:snap(300+sameLevel.length*240),y:snap((lv?.y||1340)+40),indicators:[],assumptions:[],timeframe:'',knowledge_source:defaultKS(),traceability_code:'n'+(nc++)});
  });
  return nodes;
}

function parseCSV(text){
  const rows=[];let current='';let inQuote=false;const lines=text.split('\n');
  lines.forEach(line=>{
    if(inQuote){current+='\n'+line;const qCount=(line.match(/"/g)||[]).length;if(qCount%2===1){inQuote=false;rows.push(current);current='';}}
    else{const qCount=(line.match(/"/g)||[]).length;if(qCount%2===1){inQuote=true;current=line;}else{rows.push(line);}}
  });
  if(current)rows.push(current);
  const parsed=rows.map(row=>{const cells=[];let cell='';let q=false;
    for(let i=0;i<row.length;i++){const ch=row[i];if(q){if(ch==='"'&&row[i+1]==='"'){cell+='"';i++;}else if(ch==='"'){q=false;}else{cell+=ch;}}else{if(ch==='"'){q=true;}else if(ch===','){cells.push(cell.trim());cell='';}else{cell+=ch;}}}
    cells.push(cell.trim());return cells;});
  if(parsed.length<2)return[];
  const header=parsed[0].map(h=>h.toLowerCase());
  const titleIdx=header.findIndex(h=>h.includes('title')||h.includes('name')||h.includes('result')||h.includes('description'));
  const levelIdx=header.findIndex(h=>h.includes('level')||h.includes('type')||h.includes('tier'));
  if(titleIdx===-1)return parsed.slice(1).map(r=>r.join(' ')).filter(Boolean).map(t=>({title:t,level:detectLevel(t)}));
  return parsed.slice(1).filter(r=>r[titleIdx]).map(r=>{
    const title=r[titleIdx]||'';
    let level=levelIdx>=0?(r[levelIdx]||'').toLowerCase():'';
    if(!LEVELS.find(l=>l.id===level))level=detectLevel(title);
    return{title,level};
  });
}

// SVG BUILDER [N1]
// ═══════════════════════════════════════════════════════════════
function buildSVGString(state, stakeholder){
  const nodes=state.nodes;const conns=state.connections;
  if(!nodes.length)return null;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(n=>{minX=Math.min(minX,n.x);minY=Math.min(minY,n.y);maxX=Math.max(maxX,n.x+NODE_W);maxY=Math.max(maxY,n.y+120);});
  const pad=60;minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  const W=maxX-minX,H=maxY-minY;
  let svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="${minX} ${minY} ${W} ${H}" width="${W}" height="${H}" font-family="DM Sans,sans-serif">`;
  svg+=`<rect x="${minX}" y="${minY}" width="${W}" height="${H}" fill="#F8FAFC"/>`;
  if(stakeholder){
    svg+=`<defs><marker id="a-sh" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#CBD5E1"/></marker></defs>`;
    conns.forEach(c=>{
      const src=nodes.find(n=>n.id===c.sourceId),tgt=nodes.find(n=>n.id===c.targetId);if(!src||!tgt)return;
      const ep=getConnEndpoints(src,tgt);
      svg+=`<path d="${bezier(ep.sx,ep.sy,ep.tx,ep.ty)}" fill="none" stroke="#CBD5E1" stroke-width="1.5" marker-end="url(#a-sh)" opacity="0.7"/>`;
    });
    nodes.forEach(n=>{
      const lv=LEVELS.find(l=>l.id===n.level);const h=50;
      svg+=`<rect x="${n.x}" y="${n.y}" width="${NODE_W}" height="${h}" rx="8" fill="white" stroke="${lv?.color||'#ccc'}" stroke-width="1.5"/>`;
      svg+=`<text x="${n.x+10}" y="${n.y+30}" font-size="11" font-weight="600" fill="#0F172A">${n.title.length>30?n.title.slice(0,30)+'...':n.title}</text>`;
    });
    svg+=`<text x="${minX+W/2}" y="${maxY-10}" text-anchor="middle" font-size="9" fill="#94A3B8" opacity="0.6">Created with PRAXIS 360\u00B0</text>`;
  }else{
    svg+=`<defs>${Object.entries(EV_STRENGTH).map(([k,v])=>`<marker id="a-${k}" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="${v.color}"/></marker>`).join('')}</defs>`;
    conns.forEach(c=>{
      const src=nodes.find(n=>n.id===c.sourceId),tgt=nodes.find(n=>n.id===c.targetId);if(!src||!tgt)return;
      const ep=getConnEndpoints(src,tgt);const st=EV_STRENGTH[c.evidence?.strength||'none'];
      const p=bezier(ep.sx,ep.sy,ep.tx,ep.ty);
      svg+=`<path d="${p}" fill="none" stroke="${st.color}" stroke-width="${st.w}" stroke-dasharray="${st.dash}" marker-end="url(#a-${c.evidence?.strength||'none'})"${c.bidirectional?` marker-start="url(#a-${c.evidence?.strength||'none'})"`:''} opacity="0.85"/>`;
    });
    nodes.forEach(n=>{
      const lv=LEVELS.find(l=>l.id===n.level);const h=70;
      const ks=n.knowledge_source||{};const st=getSourceType(ks.source_type);
      svg+=`<g><rect x="${n.x}" y="${n.y}" width="${NODE_W}" height="${h}" rx="8" fill="white" stroke="${lv?.color||'#ccc'}" stroke-width="2"/>`;
      svg+=`<rect x="${n.x}" y="${n.y}" width="3" height="${h}" rx="1.5" fill="${st.color}"/>`;
      svg+=`<text x="${n.x+14}" y="${n.y+16}" font-size="8" font-weight="700" fill="${lv?.color}" letter-spacing="0.08em">${(lv?.label||'').toUpperCase()}</text>`;
      svg+=`<text x="${n.x+14}" y="${n.y+32}" font-size="12" font-weight="600" fill="#0F172A">${n.title.length>28?n.title.slice(0,28)+'...':n.title}</text>`;
      if(n.timeframe)svg+=`<text x="${n.x+14}" y="${n.y+48}" font-size="8" fill="#8B5CF6" font-weight="600">${n.timeframe}</text>`;
      svg+=`</g>`;
    });
  }
  if(state.title)svg+=`<text x="${minX+20}" y="${minY+24}" font-size="16" font-weight="800" fill="#0B1A2E">${state.title}</text>`;
  svg+=`</svg>`;
  return svg;
}

function coreReducer(s,a){

    const connsRaw=t.connections.map((c,i)=>{const cn={...c,id:c.id||uid('c'),evidence:c.evidence||{strength:'none',type:'',transferability:'unknown',notes:''},assumptions:ensureAssumptionKS(c.assumptions||[]),bidirectional:c.bidirectional||false};if(!cn.traceability_code)cn.traceability_code='c'+(i+1);return cn;});
    const codes=computeNextCodes(nodesRaw,connsRaw);
    const sysA=ensureAssumptionKS(t.narrative?.systemAssumptions||[]);
    return{...s,title:t.name==='Blank Canvas'?'':t.name+' -- Theory of Change',narrative:{description:t.narrative?.description||'',context:t.narrative?.context||'',theory:t.narrative?.theory||'',systemAssumptions:sysA},nodes:nodesRaw,connections:connsRaw,showWelcome:false,selectedIds:[],selectedType:null,sidebarTab:'build',_nextNodeCode:codes.nextNode,_nextConnectionCode:codes.nextConn};}
  case 'ADD_NODE':{const lv=LEVELS.find(l=>l.id===a.level);const same=s.nodes.filter(n=>n.level===a.level);const x=300+same.length*240;const tc='n'+s._nextNodeCode;const nd={id:uid('n'),title:'New '+lv.label.replace(/s$/,''),description:'',level:a.level,x:snap(x),y:snap(lv.y+40),indicators:[],assumptions:[],timeframe:'',knowledge_source:defaultKS(),traceability_code:tc};return{...s,nodes:[...s.nodes,nd],selectedIds:[nd.id],selectedType:'node',showWelcome:false,_nextNodeCode:s._nextNodeCode+1};}
  case 'UPDATE_NODE':return{...s,nodes:s.nodes.map(n=>n.id===a.id?{...n,...a.u}:n)};
  case 'MOVE_NODE':return{...s,nodes:s.nodes.map(n=>n.id===a.id?{...n,x:a.x,y:a.y}:n)};
  case 'MOVE_NODE_FINAL':return{...s,nodes:s.nodes.map(n=>n.id===a.id?{...n,x:a.x,y:a.y}:n)};
  case 'BATCH_MOVE':return{...s,nodes:s.nodes.map(n=>{const d=a.deltas[n.id];return d?{...n,x:n.x+d.dx,y:n.y+d.dy}:n;})};
  case 'DELETE_NODE':return{...s,nodes:s.nodes.filter(n=>n.id!==a.id),connections:s.connections.filter(c=>c.sourceId!==a.id&&c.targetId!==a.id),selectedIds:[],selectedType:null};
  case 'BATCH_DELETE':{const ids=new Set(a.ids);return{...s,nodes:s.nodes.filter(n=>!ids.has(n.id)),connections:s.connections.filter(c=>!ids.has(c.id)&&!ids.has(c.sourceId)&&!ids.has(c.targetId)),selectedIds:[],selectedType:null};}
  case 'ADD_CONNECTION':{if(a.sourceId===a.targetId)return s;const ex=s.connections.find(c=>(c.sourceId===a.sourceId&&c.targetId===a.targetId)||(c.sourceId===a.targetId&&c.targetId===a.sourceId));if(ex)return{...s,connectSourceId:null,mode:'select',toast:'Connection already exists'};const tc='c'+s._nextConnectionCode;const cn={id:uid('c'),sourceId:a.sourceId,targetId:a.targetId,evidence:{strength:'none',type:'',transferability:'unknown',notes:''},assumptions:[],bidirectional:false,traceability_code:tc};return{...s,connections:[...s.connections,cn],connectSourceId:null,mode:'select',selectedIds:[cn.id],selectedType:'connection',_nextConnectionCode:s._nextConnectionCode+1};}
  case 'UPDATE_CONNECTION':return{...s,connections:s.connections.map(c=>c.id===a.id?{...c,...a.u}:c)};
  case 'DELETE_CONNECTION':return{...s,connections:s.connections.filter(c=>c.id!==a.id),selectedIds:[],selectedType:null};
  case 'SELECT':return{...s,selectedIds:a.add?[...s.selectedIds.filter(x=>x!==a.id),a.id]:[a.id],selectedType:a.selType};
  case 'TOGGLE_SELECT':{const has=s.selectedIds.includes(a.id);return{...s,selectedIds:has?s.selectedIds.filter(x=>x!==a.id):[...s.selectedIds,a.id],selectedType:a.selType};}
  case 'DESELECT':return{...s,selectedIds:[],selectedType:null};
  case 'SET_MODE':return{...s,mode:a.mode,connectSourceId:null};
  case 'SET_CONNECT_SOURCE':return{...s,connectSourceId:a.id,mode:'connect'};
  case 'SET_ZOOM':return{...s,zoom:Math.max(.15,Math.min(2.5,a.zoom))};
  case 'SET_PAN':return{...s,panX:a.x,panY:a.y};
  case 'TOGGLE_ASSUMPTIONS':return{...s,showAssumptions:!s.showAssumptions};
  case 'TOGGLE_EVIDENCE':return{...s,showEvidence:!s.showEvidence};
  case 'TOGGLE_CODES':return{...s,showCodes:!s.showCodes};
  case 'SET_TITLE':return{...s,title:a.title};
  case 'UPDATE_NARRATIVE':return{...s,narrative:{...s.narrative,...a.u}};
  case 'SET_TOAST':return{...s,toast:a.msg};
  case 'SET_TAB':return{...s,sidebarTab:a.tab};
  case 'SET_ANIMATING':return{...s,animating:a.v};
  case 'APPLY_BULK_SOURCE':{const ks={contributed_by:a.contributed_by||'',source_type:a.source_type||'unset',date:a.date||''};return{...s,nodes:s.nodes.map(n=>({...n,knowledge_source:ks}))};}
  case 'NEW':return{...INIT};
  case 'IMPORT':{try{const d=typeof a.json==='string'?JSON.parse(a.json):a.json;
    const rawNodes=(d.nodes||[]).map(n=>ensureKS({...n,assumptions:ensureAssumptionKS(n.assumptions||[]),timeframe:n.timeframe||'',indicators:n.indicators||[]}));
    const rawConns=(d.connections||[]).map(c=>({...c,evidence:c.evidence||{strength:'none',type:'',transferability:'unknown',notes:''},assumptions:ensureAssumptionKS(c.assumptions||[]),bidirectional:c.bidirectional||false}));
    // Ensure traceability codes
    const usedN=new Set();const usedC=new Set();
    rawNodes.forEach(n=>{if(n.traceability_code)usedN.add(n.traceability_code);});
    rawConns.forEach(c=>{if(c.traceability_code)usedC.add(c.traceability_code);});
    let nc=1,cc=1;
    rawNodes.forEach(n=>{if(!n.traceability_code){while(usedN.has('n'+nc))nc++;n.traceability_code='n'+nc;usedN.add('n'+nc);nc++;}});
    rawConns.forEach(c=>{if(!c.traceability_code){while(usedC.has('c'+cc))cc++;c.traceability_code='c'+cc;usedC.add('c'+cc);cc++;}});
    const codes=computeNextCodes(rawNodes,rawConns);
    const sysA=ensureAssumptionKS(d.narrative?.systemAssumptions||[]);
    return{...s,title:d.title||'',narrative:{description:d.narrative?.description||'',context:d.narrative?.context||'',theory:d.narrative?.theory||'',systemAssumptions:sysA},nodes:rawNodes,connections:rawConns,showWelcome:false,selectedIds:[],selectedType:null,_nextNodeCode:codes.nextNode,_nextConnectionCode:codes.nextConn};}catch(e){return{...s,toast:'Invalid file'};}}
  default:return s;
}}

function useUndoReducer(){
  const[history,setHistory]=useState({past:[],present:INIT,future:[]});
  const dispatch=useCallback((action)=>{
    setHistory(h=>{
      const next=coreReducer(h.present,action);
      if(UNDOABLE.has(action.type)){return{past:[...h.past.slice(-40),h.present],present:next,future:[]};}
      return{...h,present:next};
    });
  },[]);
  const undo=useCallback(()=>{
    setHistory(h=>{if(!h.past.length)return h;const prev=h.past[h.past.length-1];return{past:h.past.slice(0,-1),present:prev,future:[h.present,...h.future.slice(0,40)]};});
  },[]);
  const redo=useCallback(()=>{
    setHistory(h=>{if(!h.future.length)return h;const next=h.future[0];return{past:[...h.past,h.present],present:next,future:h.future.slice(1)};});
  },[]);
  return[history.present,dispatch,undo,redo,history.past.length>0,history.future.length>0];
}

function bezier(sx,sy,tx,ty){const dy=ty-sy;const cp=Math.max(50,Math.abs(dy)*.4);return`M${sx},${sy} C${sx},${sy-cp} ${tx},${ty+cp} ${tx},${ty}`;}
function bezierMid(sx,sy,tx,ty){const cp=Math.max(50,Math.abs(ty-sy)*.4);const t=.5,m=1-t;return{x:m*m*m*sx+3*m*m*t*sx+3*m*t*t*tx+t*t*t*tx,y:m*m*m*sy+3*m*m*t*(sy-cp)+3*m*t*t*(ty+cp)+t*t*t*ty};}

function getConnEndpoints(source,target){
  const sel=document.getElementById(source.id),tel=document.getElementById(target.id);
  const sh=sel?sel.offsetHeight:60,th=tel?tel.offsetHeight:60;
  if(source.y>target.y+th){return{sx:source.x+NODE_W/2,sy:source.y,tx:target.x+NODE_W/2,ty:target.y+th};}
  if(source.y+sh<target.y){return{sx:source.x+NODE_W/2,sy:source.y+sh,tx:target.x+NODE_W/2,ty:target.y};}
  const lr=source.x<target.x;return{sx:source.x+(lr?NODE_W:0),sy:source.y+sh/2,tx:target.x+(lr?0:NODE_W),ty:target.y+th/2};
}

function exportJSON(s){
  // Compute knowledge_sources dictionary
  const ksd={};
  const addKS=(ks)=>{if(ks&&ks.source_type&&ks.source_type!=='unset'){if(!ksd[ks.source_type])ksd[ks.source_type]=[];if(ks.contributed_by&&!ksd[ks.source_type].includes(ks.contributed_by))ksd[ks.source_type].push(ks.contributed_by);}};
  s.nodes.forEach(n=>{addKS(n.knowledge_source);(n.assumptions||[]).forEach(a=>addKS(a.knowledge_source));});
  s.connections.forEach(c=>{(c.assumptions||[]).forEach(a=>addKS(a.knowledge_source));});
  (s.narrative.systemAssumptions||[]).forEach(a=>addKS(a.knowledge_source));
  const d={title:s.title,narrative:s.narrative,nodes:s.nodes,connections:s.connections,knowledge_sources:ksd,exportedAt:new Date().toISOString(),tool:'PRAXIS 360 Theory of Change Builder v3'};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=(s.title||'theory-of-change').replace(/[^a-zA-Z0-9\-_ ]/g,'').replace(/\s+/g,'-').toLowerCase()+'.json';a.click();URL.revokeObjectURL(u);
}

function doExportPNG(state,stakeholder){
  const svg=buildSVGString(state,stakeholder);if(!svg)return;
  const parser=new DOMParser();const doc=parser.parseFromString(svg,'image/svg+xml');const svgEl=doc.documentElement;
  const W=parseFloat(svgEl.getAttribute('width'))||1200;const H=parseFloat(svgEl.getAttribute('height'))||800;
  const img=new Image();
  img.onload=()=>{const c=document.createElement('canvas');c.width=W*2;c.height=H*2;const ctx=c.getContext('2d');ctx.drawImage(img,0,0,W*2,H*2);c.toBlob(blob=>{const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=(state.title||'toc')+(stakeholder?'-stakeholder':'')+'.png';a.click();URL.revokeObjectURL(u);},'image/png');};

}

// ── Connection (memo'd) ──────────────────────────────────────
const ConnectionPath=memo(function ConnectionPath({conn,source,target,selected,showA,showE,onSelect}){
  if(!source||!target)return null;
  const ep=getConnEndpoints(source,target);
  const st=EV_STRENGTH[conn.evidence?.strength||'none'];
  const sameH=Math.abs(source.y-target.y)<10;
  const path=sameH?`M${ep.sx},${ep.sy} C${ep.sx+(ep.tx-ep.sx)*.4},${ep.sy-50} ${ep.tx-(ep.tx-ep.sx)*.4},${ep.ty-50} ${ep.tx},${ep.ty}`:bezier(ep.sx,ep.sy,ep.tx,ep.ty);
  const mid=bezierMid(ep.sx,ep.sy,ep.tx,ep.ty);
  const aC=conn.assumptions?.length||0;
  const evType=EV_TYPES.find(t=>t.id===conn.evidence?.type);
  const isContested=conn.evidence?.strength==='contested';
  const sym=isContested?'\u2260':conn.evidence?.strength==='strong'?'\u2713':conn.evidence?.strength==='moderate'?'~':conn.evidence?.strength==='weak'?'!':'?';

  return(
    <g className={selected?'conn-selected':''}>

      {selected&&<path d={path} fill="none" stroke={st.color} strokeWidth={st.w+2} strokeDasharray={st.dash} strokeLinecap="round" opacity=".3"/>}
      {conn.bidirectional&&<g><circle cx={mid.x-14} cy={mid.y} r={6} fill="none" stroke={st.color} strokeWidth="1.5"/><path d={`M${mid.x-17} ${mid.y-3} l3 3-3 3`} fill="none" stroke={st.color} strokeWidth="1.5"/></g>}
      {showE&&<g className="evidence-dot" onClick={()=>onSelect(conn.id)}>

        {evType&&<text x={mid.x} y={mid.y+16} textAnchor="middle" fontSize="7" fontFamily="DM Sans" fontWeight="600" fill={st.color} opacity=".8">{evType.lbl}</text>}

      </g>}
    </g>);
});

// ── Node Card (memo'd, pointer events, snap) ─────────────────
const NodeCard=memo(function NodeCard({node,selected,inSelection,isSource,isConnecting,connectMode,connectSourceId,dispatch,zoom,animating,showCodes}){
  const level=LEVELS.find(l=>l.id===node.level);
  const nodeRef=useRef(null);
  const dragRef=useRef({active:false,sx:0,sy:0,nx:0,ny:0,moved:false,raf:0});
  const ks=node.knowledge_source||{};
  const ksSt=getSourceType(ks.source_type);

  const onPointerDown=useCallback((e)=>{
    if(e.target.closest('.node-port'))return;
    e.stopPropagation();
    if(connectMode||isConnecting)return;
    nodeRef.current?.setPointerCapture?.(e.pointerId);
    const r=dragRef.current;r.active=true;r.moved=false;r.sx=e.clientX;r.sy=e.clientY;r.nx=node.x;r.ny=node.y;
  },[node,connectMode,isConnecting]);

  const onPointerMove=useCallback((e)=>{
    const r=dragRef.current;if(!r.active)return;
    r.moved=true;
    cancelAnimationFrame(r.raf);
    r.raf=requestAnimationFrame(()=>{
      const dx=(e.clientX-r.sx)/zoom,dy=(e.clientY-r.sy)/zoom;
      const nx=snap(Math.max(0,r.nx+dx)),ny=snap(Math.max(0,r.ny+dy));
      dispatch({type:'MOVE_NODE',id:node.id,x:nx,y:ny});
    });
  },[node,zoom,dispatch]);

  const onPointerUp=useCallback((e)=>{
    const r=dragRef.current;
    if(r.active&&r.moved){
      cancelAnimationFrame(r.raf);
      const dx=(e.clientX-r.sx)/zoom,dy=(e.clientY-r.sy)/zoom;
      const nx=snap(Math.max(0,r.nx+dx)),ny=snap(Math.max(0,r.ny+dy));
      dispatch({type:'MOVE_NODE_FINAL',id:node.id,x:nx,y:ny});
    }
    r.active=false;
  },[node,zoom,dispatch]);

  const onClick=useCallback((e)=>{
    e.stopPropagation();
    if(dragRef.current.moved){dragRef.current.moved=false;return;}
    if(isConnecting){
      dispatch({type:'ADD_CONNECTION',sourceId:connectSourceId,targetId:node.id});
    }else if(connectMode){
      dispatch({type:'SET_CONNECT_SOURCE',id:node.id});
    }else if(e.shiftKey){
      dispatch({type:'TOGGLE_SELECT',id:node.id,selType:'node'});
    }else{
      dispatch({type:'SELECT',id:node.id,selType:'node'});
    }
  },[node,isConnecting,connectMode,connectSourceId,dispatch]);

  const onPortClick=useCallback((e)=>{
    e.stopPropagation();dispatch({type:'SET_CONNECT_SOURCE',id:node.id});
  },[node,dispatch]);

  const aC=(node.assumptions||[]).length;

  return(
    <div id={node.id} ref={nodeRef}
      className={`toc-node ${selected?'selected':''} ${inSelection?'in-selection':''} ${isSource?'connect-source':''} ${isConnecting&&!isSource?'connect-target':''} ${dragRef.current.active?'dragging':''} ${animating?'animating':''}`}
      style={{left:node.x,top:node.y}}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onClick={onClick}>
      {showCodes&&node.traceability_code&&<div className="node-trace-code">{node.traceability_code}</div>}
      <div className="node-stripe" style={{background:ksSt.color}} title={ksSt.id!=='unset'?ksSt.label:'No source set'}/>
      <div className="node-body">
        <div className="node-level-tag" style={{color:level?.color}}>{level?.label}</div>
        <div className="node-title">{node.title}</div>
        {node.description&&<div className="node-desc">{node.description}</div>}
        <div className="node-meta">
          {node.timeframe&&<span className="node-time-badge">{node.timeframe}</span>}
          {aC>0&&<span className="node-assumption-count">{aC} assumption{aC>1?'s':''}</span>}
          {(node.indicators||[]).slice(0,2).map((ind,i)=><span key={i} className="node-ind-badge">{ind.length>25?ind.slice(0,25)+'...':ind}</span>)}
        </div>
      </div>
      <div className="node-port node-port-top" onClick={onPortClick}/>
      <div className="node-port node-port-bottom" onClick={onPortClick}/>
      <div className="node-port node-port-left" onClick={onPortClick}/>
      <div className="node-port node-port-right" onClick={onPortClick}/>
    </div>);
});

// TOC BUILDER COMPONENT [E3]
// ═══════════════════════════════════════════════════════════════
function ToCBuilder({sensitivity,experienceTier,initialData,onDataChange,fromStation0,embedded}){
  const[s,dispatch,undo,redo,canUndo,canRedo]=useUndoReducer();
  const vpRef=useRef(null);const canRef=useRef(null);const fileRef=useRef();
  const[ghost,setGhost]=useState(null);
  const panRef=useRef({active:false,sx:0,sy:0,px:0,py:0,pid:null});
  const[exportOpen,setExportOpen]=useState(false);
  const[stakeholderModal,setStakeholderModal]=useState(null);
  const[textImportOpen,setTextImportOpen]=useState(false);
  const[bulkSourceOpen,setBulkSourceOpen]=useState(false);
  const[dragOver,setDragOver]=useState(false);
  const[foundationTips,setFoundationTips]=useState({suppressed:false,shown:{}});
  const dataChangeRef=useRef(null);
  const initialLoadedRef=useRef(false);

  // Load initial data
  useEffect(()=>{
    if(initialData&&!initialLoadedRef.current){
      initialLoadedRef.current=true;
      dispatch({type:'IMPORT',json:initialData});
    }
  },[initialData,dispatch]);

  // Debounced onDataChange callback
  useEffect(()=>{
    if(!onDataChange)return;
    if(dataChangeRef.current)clearTimeout(dataChangeRef.current);
    dataChangeRef.current=setTimeout(()=>{
      onDataChange({title:s.title,narrative:s.narrative,nodes:s.nodes,connections:s.connections});
    },500);
    return()=>{if(dataChangeRef.current)clearTimeout(dataChangeRef.current);};
  },[s.title,s.narrative,s.nodes,s.connections,onDataChange]);

  // Foundation tier tips
  const showFoundationTip=useCallback((key,content)=>{
    if(experienceTier!=='foundation'||foundationTips.suppressed||foundationTips.shown[key])return null;
    return <FoundationPopover content={content} onDismiss={()=>setFoundationTips(prev=>({...prev,shown:{...prev.shown,[key]:true}}))} onSuppress={()=>setFoundationTips(prev=>({...prev,suppressed:true}))}/>;
  },[experienceTier,foundationTips]);

  // ── Pointer-tracking zoom ────────────────────────────────
  const onWheel=useCallback((e)=>{
    e.preventDefault();
    const vp=vpRef.current;if(!vp)return;
    const rect=vp.getBoundingClientRect();
    const mx=e.clientX-rect.left,my=e.clientY-rect.top;
    const wx=(mx-s.panX)/s.zoom,wy=(my-s.panY)/s.zoom;
    const delta=e.deltaY>0?-0.08:0.08;
    const newZoom=Math.max(.15,Math.min(2.5,s.zoom+delta));
    const newPanX=mx-wx*newZoom,newPanY=my-wy*newZoom;
    dispatch({type:'SET_ZOOM',zoom:newZoom});
    dispatch({type:'SET_PAN',x:newPanX,y:newPanY});
  },[s.zoom,s.panX,s.panY,dispatch]);

  useEffect(()=>{
    const vp=vpRef.current;if(vp)vp.addEventListener('wheel',onWheel,{passive:false});
    return()=>{if(vp)vp.removeEventListener('wheel',onWheel);};
  },[onWheel]);

  // ── Pan (pointer events for touch) ───────────────────────
  const onVpPointerDown=useCallback((e)=>{
    const t=e.target;
    if(t!==vpRef.current&&!t.classList.contains('canvas-grid')&&!t.classList.contains('level-lane')&&!t.classList.contains('level-lane-label')&&!t.classList.contains('canvas-inner'))return;
    if(s.mode==='connect'){dispatch({type:'SET_MODE',mode:'select'});return;}
    dispatch({type:'DESELECT'});
    const r=panRef.current;r.active=true;r.sx=e.clientX;r.sy=e.clientY;r.px=s.panX;r.py=s.panY;r.pid=e.pointerId;
    vpRef.current?.setPointerCapture?.(e.pointerId);
    vpRef.current?.classList.add('grabbing');
  },[s.panX,s.panY,s.mode,dispatch]);

  const onVpPointerMove=useCallback((e)=>{
    const r=panRef.current;if(!r.active)return;
    dispatch({type:'SET_PAN',x:r.px+e.clientX-r.sx,y:r.py+e.clientY-r.sy});
  },[dispatch]);

  const onVpPointerUp=useCallback(()=>{
    panRef.current.active=false;
    vpRef.current?.classList.remove('grabbing');
  },[]);

  // ── Ghost connection line ────────────────────────────────
  useEffect(()=>{
    if(!s.connectSourceId){setGhost(null);return;}
    const src=s.nodes.find(n=>n.id===s.connectSourceId);if(!src)return;
    const onMove=(e)=>{
      const vp=vpRef.current;if(!vp)return;
      const rect=vp.getBoundingClientRect();
      const mx=(e.clientX-rect.left-s.panX)/s.zoom,my=(e.clientY-rect.top-s.panY)/s.zoom;
      setGhost({sx:src.x+NODE_W/2,sy:src.y,tx:mx,ty:my});
    };
    window.addEventListener('pointermove',onMove);
    return()=>window.removeEventListener('pointermove',onMove);
  },[s.connectSourceId,s.nodes,s.zoom,s.panX,s.panY]);

  // ── Fit view ─────────────────────────────────────────────
  const fitView=useCallback(()=>{
    if(!s.nodes.length)return;const vp=vpRef.current;if(!vp)return;
    const vpW=vp.clientWidth,vpH=vp.clientHeight;
    let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
    s.nodes.forEach(n=>{x0=Math.min(x0,n.x);y0=Math.min(y0,n.y);x1=Math.max(x1,n.x+NODE_W);y1=Math.max(y1,n.y+100);});
    const w=x1-x0+160,h=y1-y0+160;
    const z=Math.min(vpW/w,vpH/h,1.2);
    dispatch({type:'SET_ZOOM',zoom:z});
    dispatch({type:'SET_PAN',x:(vpW-w*z)/2-x0*z+80*z,y:(vpH-h*z)/2-y0*z+80*z});
  },[s.nodes,dispatch]);

  // ── Auto-layout (animated) ───────────────────────────────
  const autoLayout=useCallback(()=>{
    dispatch({type:'SET_ANIMATING',v:true});
    LEVELS.forEach(lv=>{
      const inLv=s.nodes.filter(n=>n.level===lv.id);if(!inLv.length)return;
      const tw=inLv.length*NODE_W+(inLv.length-1)*50;
      const sx=Math.max(60,(2200-tw)/2);
      inLv.forEach((n,i)=>dispatch({type:'MOVE_NODE',id:n.id,x:sx+i*(NODE_W+50),y:lv.y+40}));
    });
    setTimeout(()=>{dispatch({type:'SET_ANIMATING',v:false});fitView();},350);
  },[s.nodes,fitView,dispatch]);

  // ── Auto-fit on template load ────────────────────────────
  const prevWelcome=useRef(s.showWelcome);
  useEffect(()=>{if(prevWelcome.current&&!s.showWelcome&&s.nodes.length>0)setTimeout(fitView,80);prevWelcome.current=s.showWelcome;},[s.showWelcome,s.nodes.length,fitView]);

  // ── Keyboard shortcuts ───────────────────────────────────
  useEffect(()=>{
    const onKey=(e)=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
      if((e.metaKey||e.ctrlKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();undo();}
      if((e.metaKey||e.ctrlKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();redo();}
      if(e.key==='Delete'||e.key==='Backspace'){
        if(s.selectedIds.length>1){dispatch({type:'BATCH_DELETE',ids:s.selectedIds});}
        else if(s.selectedType==='node'&&s.selectedIds[0])dispatch({type:'DELETE_NODE',id:s.selectedIds[0]});
        else if(s.selectedType==='connection'&&s.selectedIds[0])dispatch({type:'DELETE_CONNECTION',id:s.selectedIds[0]});
      }
      if(e.key==='Escape'){dispatch({type:'DESELECT'});dispatch({type:'SET_MODE',mode:'select'});setExportOpen(false);}
      if(e.key==='c'&&!e.metaKey&&!e.ctrlKey)dispatch({type:'SET_MODE',mode:s.mode==='connect'?'select':'connect'});
      if(e.key==='f'&&!e.metaKey&&!e.ctrlKey)fitView();
    };
    window.addEventListener('keydown',onKey);return()=>window.removeEventListener('keydown',onKey);
  },[s.selectedIds,s.selectedType,s.mode,undo,redo,fitView,dispatch]);

  // ── File import handler ───────────────────────────────────
  const onImport=(e)=>{
    const f=e.target.files[0];if(!f)return;
    const ext=f.name.split('.').pop().toLowerCase();
    if(ext==='json'){
      const r=new FileReader();r.onload=(ev)=>{if(s.nodes.length&&!confirm('Replace current canvas with imported data?'))return;dispatch({type:'IMPORT',json:ev.target.result});};r.readAsText(f);
    }else if(ext==='csv'){
      const r=new FileReader();r.onload=(ev)=>{
        const parsed=parseCSV(ev.target.result);
        if(!parsed.length){dispatch({type:'SET_TOAST',msg:'Could not parse CSV'});return;}
        const nodes=parsed.map((p,i)=>{const lv=LEVELS.find(l=>l.id===p.level)||LEVELS[3];const sameLevel=parsed.slice(0,i).filter(pp=>pp.level===p.level);return{id:uid('n'),title:p.title||'',description:'',level:p.level||'output',x:snap(300+sameLevel.length*240),y:snap((lv?.y||1340)+40),indicators:[],assumptions:[],timeframe:'',knowledge_source:defaultKS(),traceability_code:'n'+(i+1)};});
        if(s.nodes.length&&!confirm('Replace current canvas with imported data?'))return;
        dispatch({type:'IMPORT',json:JSON.stringify({nodes,connections:[]})});
      };r.readAsText(f);
    }else if(ext==='xlsx'||ext==='xls'){
      dispatch({type:'SET_TOAST',msg:'Loading XLSX support...'});
      const script=document.createElement('script');
      script.src='https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js';
      script.onload=()=>{
        const r=new FileReader();r.onload=(ev)=>{
          try{
            const wb=window.XLSX.read(ev.target.result,{type:'array'});
            const ws=wb.Sheets[wb.SheetNames[0]];
            const csv=window.XLSX.utils.sheet_to_csv(ws);
            const parsed=parseCSV(csv);
            if(!parsed.length){dispatch({type:'SET_TOAST',msg:'Could not parse XLSX'});return;}
            const nodes=parsed.map((p,i)=>{const lv=LEVELS.find(l=>l.id===p.level)||LEVELS[3];const sameLevel=parsed.slice(0,i).filter(pp=>pp.level===p.level);return{id:uid('n'),title:p.title||'',description:'',level:p.level||'output',x:snap(300+sameLevel.length*240),y:snap((lv?.y||1340)+40),indicators:[],assumptions:[],timeframe:'',knowledge_source:defaultKS(),traceability_code:'n'+(i+1)};});
            if(s.nodes.length&&!confirm('Replace current canvas with imported data?'))return;
            dispatch({type:'IMPORT',json:JSON.stringify({nodes,connections:[]})});
          }catch(err){dispatch({type:'SET_TOAST',msg:'Error reading XLSX file'});}
        };r.readAsArrayBuffer(f);
      };
      script.onerror=()=>dispatch({type:'SET_TOAST',msg:'Could not load XLSX library'});
      document.head.appendChild(script);
    }else if(f.type&&f.type.startsWith('image/')){
      dispatch({type:'SET_TOAST',msg:'Image files are supported via the AI Skill, not direct import.'});
    }else{
      dispatch({type:'SET_TOAST',msg:'Unsupported file type. Use .json, .csv, or .xlsx'});
    }
    e.target.value='';
  };

  // ── Drop zone handler ─────────────────────────────────────
  const onDrop=useCallback((e)=>{
    e.preventDefault();setDragOver(false);
    const files=e.dataTransfer?.files;if(!files||!files.length)return;
    const fakeEvt={target:{files,value:''}};
    onImport(fakeEvt);
  },[s.nodes,dispatch]);

  // ── Toast auto-dismiss ───────────────────────────────────
  useEffect(()=>{if(s.toast){const t=setTimeout(()=>dispatch({type:'SET_TOAST',msg:null}),2500);return()=>clearTimeout(t);}},[s.toast]);

  // ── Close export dropdown on outside click ────────────────
  useEffect(()=>{if(!exportOpen)return;const h=()=>setExportOpen(false);setTimeout(()=>document.addEventListener('click',h),0);return()=>document.removeEventListener('click',h);},[exportOpen]);

  // ── Derived ──────────────────────────────────────────────
  const selNode=s.selectedType==='node'&&s.selectedIds.length===1?s.nodes.find(n=>n.id===s.selectedIds[0]):null;
  const selConn=s.selectedType==='connection'&&s.selectedIds.length===1?s.connections.find(c=>c.id===s.selectedIds[0]):null;
  const multiSel=s.selectedIds.length>1;
  const totalAssumptions=s.connections.reduce((t,c)=>t+(c.assumptions?.length||0),0)+s.nodes.reduce((t,n)=>t+(n.assumptions?.length||0),0)+(s.narrative.systemAssumptions?.length||0);
  const isSensitive=sensitivity==='sensitive';
  const isHighlySensitive=sensitivity==='highly_sensitive';

  // ── Narrative panel (Theory tab) ─────────────────────────
  const addSysA=()=>dispatch({type:'UPDATE_NARRATIVE',u:{systemAssumptions:[...s.narrative.systemAssumptions,{id:uid('sa'),text:'',status:'untested',knowledge_source:defaultKS()}]}});
  const updSysA=(aId,u)=>dispatch({type:'UPDATE_NARRATIVE',u:{systemAssumptions:s.narrative.systemAssumptions.map(a=>a.id===aId?{...a,...u}:a)}});
  const rmSysA=(aId)=>dispatch({type:'UPDATE_NARRATIVE',u:{systemAssumptions:s.narrative.systemAssumptions.filter(a=>a.id!==aId)}});

  // Text import handler
  const handleTextImport=(nodes)=>{
    if(s.nodes.length&&!confirm('Replace current canvas with imported data?'))return;
    dispatch({type:'IMPORT',json:JSON.stringify({nodes,connections:[]})});
  };

  return(
    <div className="app">
      {/* ── Sensitivity Banners [6.4] ──────────── */}
      {isSensitive&&<div className="sens-banner sensitive">&#9888; Sensitive programme data -- avoid including personally identifiable information in node descriptions.</div>}
      {isHighlySensitive&&<div className="sens-banner highly-sensitive">&#9888; Highly sensitive data -- AI features disabled. Do not include identifying details of beneficiaries or locations.</div>}

      {/* ── Toolbar ────────────────────────────── */}
      {!embedded&&<div className="top-bar">
        <div className="brand"><a href="../../" style={{textDecoration:'none',display:'flex',alignItems:'center',gap:8}}><span className="brand-badge">PRAXIS</span><span className="brand-360">360&deg;</span></a><span className="brand-sep">|</span><span className="brand-page">Theory of Change</span></div>
        <div className="tb-div"/>
        <div className="tb-group">
          <button className={`tb undo-btn ${canUndo?'can':''}`} onClick={undo} title="Undo (Ctrl+Z)">{I.undo}</button>
          <button className={`tb undo-btn ${canRedo?'can':''}`} onClick={redo} title="Redo (Ctrl+Y)">{I.redo}</button>
        </div>
        <div className="tb-div"/>
        <div className="tb-group">
          <button className={`tb ${s.mode==='select'?'active':''}`} onClick={()=>dispatch({type:'SET_MODE',mode:'select'})} title="Select (V)">{I.pointer} <span>Select</span></button>
          <button className={`tb ${s.mode==='connect'?'active':''}`} onClick={()=>dispatch({type:'SET_MODE',mode:s.mode==='connect'?'select':'connect'})} title="Connect (C)">{I.link} <span>Connect</span></button>
        </div>
        <div className="tb-div"/>
        <div className="tb-group">
          <button className={`tb ${s.showAssumptions?'active':''}`} onClick={()=>dispatch({type:'TOGGLE_ASSUMPTIONS'})}>{s.showAssumptions?I.eye:I.eyeOff} <span>Assumptions</span></button>
          <button className={`tb ${s.showEvidence?'active':''}`} onClick={()=>dispatch({type:'TOGGLE_EVIDENCE'})}>{s.showEvidence?I.eye:I.eyeOff} <span>Evidence</span></button>
          <button className={`tb ${s.showCodes?'active':''}`} onClick={()=>dispatch({type:'TOGGLE_CODES'})} title="Show traceability codes">{I.code} <span>Codes</span></button>
        </div>
        <div className="tb-div"/>
        <div className="tb-group">
          <button className="tb" onClick={()=>dispatch({type:'SET_ZOOM',zoom:s.zoom+.15})}>{I.zoomIn}</button>
          <span className="zoom-display">{Math.round(s.zoom*100)}%</span>
          <button className="tb" onClick={()=>dispatch({type:'SET_ZOOM',zoom:s.zoom-.15})}>{I.zoomOut}</button>
          <button className="tb" onClick={fitView} title="Fit (F)">{I.fit}</button>
          <button className="tb" onClick={autoLayout} title="Auto-arrange">{I.layout} <span>Arrange</span></button>
        </div>
        <div className="spacer"/>
        {s.nodes.length>0&&<div className="stats">
          <span className="stat">{s.nodes.length} nodes</span>
          <span className="stat">{s.connections.length} paths</span>
          <span className="stat">{totalAssumptions} assumptions</span>
          <span className="stat">{s.connections.filter(c=>c.bidirectional).length} loops</span>
        </div>}
        <div className="tb-group">
          <button className="tb" onClick={()=>{if(!s.nodes.length||confirm('New ToC? Unsaved work will be lost.'))dispatch({type:'NEW'})}} title="New">{I.plus} <span>New</span></button>
          <div style={{position:'relative'}}>
            <button className="tb" onClick={(e)=>{e.stopPropagation();setExportOpen(!exportOpen);}} title="Export">{I.dl} <span>Export</span></button>
            {exportOpen&&<div className="export-dropdown" onClick={e=>e.stopPropagation()}>
              <button className="export-dropdown-item" onClick={()=>{doExportSVG(s,false);setExportOpen(false);}}>SVG (full)</button>
              <button className="export-dropdown-item" onClick={()=>{doExportPNG(s,false);setExportOpen(false);}}>PNG (full)</button>
              <button className="export-dropdown-item" onClick={()=>{exportJSON(s);setExportOpen(false);}}>JSON</button>
              <div className="export-dropdown-sep"/>
              <button className="export-dropdown-item" onClick={()=>{setStakeholderModal('svg');setExportOpen(false);}}>SVG for stakeholders</button>
              <button className="export-dropdown-item" onClick={()=>{setStakeholderModal('png');setExportOpen(false);}}>PNG for stakeholders</button>
            </div>}
          </div>
          <button className="tb" onClick={()=>fileRef.current?.click()} title="Import">{I.ul}</button>
          <input ref={fileRef} type="file" accept=".json,.csv,.xlsx,.xls" style={{display:'none'}} onChange={onImport}/>
        </div>
      </div>}

      <div className="main">
        {/* ── Sidebar ──────────────────────────── */}
        <div className="sidebar">
          <div className="sidebar-tabs">
            <button className={`sidebar-tab ${s.sidebarTab==='build'?'active':''}`} onClick={()=>dispatch({type:'SET_TAB',tab:'build'})}>Build</button>
            <button className={`sidebar-tab ${s.sidebarTab==='theory'?'active':''}`} onClick={()=>dispatch({type:'SET_TAB',tab:'theory'})}>Theory</button>
          </div>
          <div className="sidebar-body">
            {s.sidebarTab==='build'&&<>
              <div className="sb-section">
                <div className="sb-title">ToC Title</div>
                <input className="sb-input" placeholder="Name your Theory of Change..." value={s.title} onChange={e=>dispatch({type:'SET_TITLE',title:e.target.value})}/>
              </div>
              <div className="sb-section">
                <div className="sb-title">Add Elements</div>
                {LEVELS.map(lv=>(
                  <div key={lv.id} className="palette-node" onClick={()=>dispatch({type:'ADD_NODE',level:lv.id})}>
                    <div className="palette-dot" style={{background:lv.color}}/>
                    <div><div className="palette-node-name">{lv.label}</div><div className="palette-node-hint">{lv.hint}</div></div>
                  </div>))}
              </div>
              {/* Import zone [C7] */}
              <div className="sb-section">
                <div className="sb-title">Import</div>
                <div className={`import-zone ${dragOver?'drag-over':''}`}
                  onDragOver={e=>{e.preventDefault();setDragOver(true);}}
                  onDragLeave={()=>setDragOver(false)}
                  onDrop={onDrop}
                  onClick={()=>fileRef.current?.click()}>
                  Drop .json / .csv / .xlsx here<br/>or click to browse
                </div>
                <button className="add-btn" onClick={()=>setTextImportOpen(true)} style={{justifyContent:'center'}}>Paste text</button>
              </div>
              {/* Bulk source attribution [IC2] */}
              <div className="sb-section" style={{position:'relative'}}>
                <div className="sb-title">Knowledge Source</div>
                <button className="add-btn" onClick={()=>setBulkSourceOpen(!bulkSourceOpen)}>Apply Source to All Nodes</button>
                {bulkSourceOpen&&<BulkSourcePopover onApply={(st,by)=>dispatch({type:'APPLY_BULK_SOURCE',source_type:st,contributed_by:by})} onClose={()=>setBulkSourceOpen(false)}/>}
              </div>
              <div className="sb-section">
                <div className="sb-title">Evidence Legend</div>
                {Object.entries(EV_STRENGTH).map(([k,st])=>(
                  <div key={k} className="legend-row">
                    <svg width={28} height={8}><line x1={0} y1={4} x2={28} y2={4} stroke={st.color} strokeWidth={st.w} strokeDasharray={st.dash} strokeLinecap="round"/></svg>
                    <span>{st.lbl}</span>
                  </div>))}
              </div>
              <div className="sb-section">
                <div className="sb-title">Assumption Status</div>
                {Object.entries(ASSUMPTION_COLORS).map(([k,c])=>(
                  <div key={k} className="legend-row"><div className="legend-dot" style={{background:c}}/><span style={{textTransform:'capitalize'}}>{k}</span></div>))}
              </div>
              <div className="sb-section">
                <div className="sb-title">Source Types</div>
                {SOURCE_TYPES.filter(st=>st.id!=='unset').map(st=>(
                  <div key={st.id} className="legend-row"><div className="legend-dot" style={{background:st.color}}/><span>{st.icon} {st.label}</span></div>))}
              </div>
              <div className="sb-section">
                <div className="shortcut-box">
                  <strong>Shortcuts</strong><br/>
                  <kbd>Ctrl+Z</kbd> Undo &middot; <kbd>Ctrl+Y</kbd> Redo<br/>
                  <kbd>C</kbd> Connect &middot; <kbd>F</kbd> Fit view<br/>
                  <kbd>Shift</kbd>+click Multi-select<br/>
                  <kbd>Del</kbd> Delete &middot; <kbd>Esc</kbd> Deselect<br/>
                  Scroll to zoom (tracks cursor)<br/>
                  Drag canvas to pan
                </div>
              </div>
            </>}
            {s.sidebarTab==='theory'&&<>
              {(isSensitive||isHighlySensitive)&&<div style={{padding:'8px 10px',borderRadius:6,background:'var(--amber-light)',fontSize:10,color:'#92400E',fontWeight:600,marginBottom:10}}>Remember: avoid including identifying details of individuals or specific locations in narrative descriptions.</div>}
              <div className="sb-section">
                <div className="sb-title">Programme Description</div>
                <textarea className="sb-textarea" value={s.narrative.description||''} placeholder="What is this programme? Who does it serve? What problem does it address?" style={{minHeight:80}} onChange={e=>dispatch({type:'UPDATE_NARRATIVE',u:{description:e.target.value}})}/>
              </div>
              <div className="sb-section">
                <div className="sb-title">Context & Setting</div>
                <textarea className="sb-textarea" value={s.narrative.context||''} placeholder="Describe the implementation context: political, economic, social, institutional factors..." style={{minHeight:80}} onChange={e=>dispatch({type:'UPDATE_NARRATIVE',u:{context:e.target.value}})}/>
              </div>
              <div className="sb-section">
                <div className="sb-title">Theory Narrative</div>
                <textarea className="sb-textarea" value={s.narrative.theory||''} placeholder="Articulate WHY you believe the causal logic holds. What mechanisms drive change? What is the theoretical grounding?" style={{minHeight:120}} onChange={e=>dispatch({type:'UPDATE_NARRATIVE',u:{theory:e.target.value}})}/>
              </div>
              <div className="sb-section">
                <div className="sb-title">System-Level Assumptions</div>
                <div style={{fontSize:9,color:'var(--text-muted)',marginBottom:6}}>External conditions that must hold for the entire ToC -- political stability, funding continuity, etc.</div>
                {(s.narrative.systemAssumptions||[]).map(a=>(
                  <div key={a.id} className="sys-assumption">
                    <div className="sys-assumption-status" style={{background:ASSUMPTION_COLORS[a.status]}} title={a.status} onClick={()=>updSysA(a.id,{status:STATUS_CYCLE[a.status]})}/>
                    <input value={a.text} placeholder="System assumption..." onChange={e=>updSysA(a.id,{text:e.target.value})}/>
                    <KnowledgeSourceInline ks={a.knowledge_source} onChange={(newKs)=>updSysA(a.id,{knowledge_source:newKs})}/>
                    <button className="sys-remove" onClick={()=>rmSysA(a.id)}>x</button>
                  </div>))}
                <button className="add-btn" onClick={addSysA}>{I.plus} Add system assumption</button>
              </div>
            </>}
          </div>
          {!embedded&&<a href="../" className="back-link">&larr; Back to PRAXIS Tools</a>}
        </div>

        {/* ── Canvas ───────────────────────────── */}
        <div ref={vpRef} className={`canvas-vp ${s.mode==='connect'?'connecting':''}`}
          onPointerDown={onVpPointerDown} onPointerMove={onVpPointerMove} onPointerUp={onVpPointerUp}>
          <div ref={canRef} className="canvas-inner" style={{transform:`translate(${s.panX}px,${s.panY}px) scale(${s.zoom})`}}>
            <div className="canvas-grid"/>
            {LEVELS.map(lv=>(
              <div key={lv.id} className="level-lane" style={{top:lv.y-30,height:LANE_H,background:lv.bg}}>
                <div className="level-lane-label" style={{color:lv.color}}>{lv.label}</div>
              </div>))}
            <svg className="conn-svg" width="6000" height="4000">
              <defs>
                {Object.entries(EV_STRENGTH).map(([k,v])=>(
                  <marker key={k} id={`arr-${k}`} markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill={v.color}/></marker>
                ))}
              </defs>
              {s.connections.map(c=>{
                const src=s.nodes.find(n=>n.id===c.sourceId),tgt=s.nodes.find(n=>n.id===c.targetId);
                return <ConnectionPath key={c.id} conn={c} source={src} target={tgt} selected={s.selectedIds.includes(c.id)} showA={s.showAssumptions} showE={s.showEvidence} onSelect={(id)=>dispatch({type:'SELECT',id,selType:'connection'})}/>;
              })}
              {ghost&&<path d={`M${ghost.sx},${ghost.sy} L${ghost.tx},${ghost.ty}`} fill="none" stroke="#F59E0B" strokeWidth="2" strokeDasharray="6,4" opacity=".7"/>}
            </svg>
            {s.nodes.map(n=>(
              <NodeCard key={n.id} node={n}
                selected={s.selectedIds.length===1&&s.selectedIds[0]===n.id&&s.selectedType==='node'}
                inSelection={s.selectedIds.length>1&&s.selectedIds.includes(n.id)}
                isSource={s.connectSourceId===n.id}
                isConnecting={!!s.connectSourceId&&s.connectSourceId!==n.id}
                connectMode={s.mode==='connect'&&!s.connectSourceId}
                connectSourceId={s.connectSourceId}
                dispatch={dispatch} zoom={s.zoom} animating={s.animating} showCodes={s.showCodes}/>
            ))}
          </div>

          {/* Mode indicators */}
          {s.mode==='connect'&&!s.connectSourceId&&<div className="mode-indicator connect-mode">Click a node to start a connection</div>}
          {s.connectSourceId&&<div className="mode-indicator connect-active">Click another node to connect -- <span className="mode-cancel" onClick={()=>dispatch({type:'SET_MODE',mode:'select'})}>Cancel</span></div>}

          {/* Multi-select batch bar */}
          {multiSel&&<div className="batch-bar">
            <span className="batch-count">{s.selectedIds.length} selected</span>
            <button className="tb" onClick={()=>{if(confirm(`Delete ${s.selectedIds.length} items?`))dispatch({type:'BATCH_DELETE',ids:s.selectedIds})}}>{I.trash} Delete</button>
            <button className="tb" onClick={()=>{dispatch({type:'DESELECT'})}}>{I.x} Clear</button>
          </div>}
        </div>

        {/* ── Detail panels ────────────────────── */}
        {selNode&&<NodeDetail node={selNode} dispatch={dispatch}/>}
        {selConn&&<ConnectionDetail conn={selConn} nodes={s.nodes} dispatch={dispatch}/>}
      </div>

      {s.showWelcome&&<WelcomeScreen dispatch={dispatch}/>}
      {s.toast&&<div className="toast">{s.toast}</div>}
      {textImportOpen&&<TextImportModal onImport={handleTextImport} onClose={()=>setTextImportOpen(false)}/>}
      {stakeholderModal&&<StakeholderPreviewModal state={s} onClose={()=>setStakeholderModal(null)} mode={stakeholderModal}/>}
    </div>);
}

// ═══════════════════════════════════════════════════════════════
// STANDALONE WRAPPER [E3]
// ═══════════════════════════════════════════════════════════════
function StandaloneToCBuilder(){
  return <ToCBuilder/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<StandaloneToCBuilder/>);
</script>
</body>
</html>
