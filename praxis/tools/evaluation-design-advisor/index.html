<script type="text/babel">
const { useState, useMemo, useCallback } = React;

// ── Design database ─────────────────────────────────────────────────
const DESIGNS = {
  rct: { name: "Randomised Controlled Trial", short: "RCT", family: "Experimental", strength: "Gold standard for causal attribution. Eliminates selection bias through randomisation.", when: "Phased rollout planned; more eligible than capacity; strong accountability demand.", notWhen: "Universal programmes; ethical objections; very small populations; post-hoc; volatile contexts.", threats: ["Contamination/spillover", "Attrition bias", "Hawthorne effects", "Non-compliance"], requirements: "Sufficient sample size, ethical clearance, randomisation feasibility, baseline data.", cost: 3, rigour: 5, complexity: 4, timeNeeded: 4 },
  clusterRCT: { name: "Cluster Randomised Trial", short: "Cluster RCT", family: "Experimental", strength: "Causal attribution when individual randomisation is impractical.", when: "Community or facility-level interventions; phased rollout across units.", notWhen: "Few clusters available (<15 per arm); prohibitive ICC.", threats: ["Low cluster count", "ICC inflation", "Between-cluster contamination"], requirements: "15+ clusters per arm, ICC estimate, cluster-level baseline.", cost: 4, rigour: 5, complexity: 5, timeNeeded: 4 },
  steppedWedge: { name: "Stepped-Wedge Design", short: "Stepped-Wedge", family: "Experimental", strength: "All units eventually receive intervention. Ethical when withholding is problematic.", when: "Phased rollout needed; ethical concerns about withholding; universal coverage goal.", notWhen: "Very short timeline; strong secular trends confounding time effects.", threats: ["Time trends", "Maturation confounding", "Incomplete crossover"], requirements: "Multiple measurement points, clear step timing.", cost: 4, rigour: 4, complexity: 5, timeNeeded: 5 },
  did: { name: "Difference-in-Differences", short: "DiD", family: "Quasi-Experimental", strength: "Controls for time-invariant differences. Works with routine data.", when: "Non-random placement but credible comparison group; pre/post data for both groups.", notWhen: "Parallel trends clearly violated; no credible comparison area.", threats: ["Parallel trends violation", "Compositional changes", "Anticipation effects"], requirements: "Pre and post data for both groups, testable parallel trends.", cost: 2, rigour: 4, complexity: 3, timeNeeded: 3 },
  psm: { name: "Propensity Score Matching", short: "PSM", family: "Quasi-Experimental", strength: "Reduces selection bias on observables. Can be applied post-hoc.", when: "Rich pre-treatment covariates; selection based on observable characteristics.", notWhen: "Selection driven by unobservables; poor covariate data.", threats: ["Selection on unobservables", "Common support violations", "Model dependence"], requirements: "Rich baseline covariates, sufficient propensity score overlap.", cost: 2, rigour: 3, complexity: 3, timeNeeded: 2 },
  rdd: { name: "Regression Discontinuity", short: "RDD", family: "Quasi-Experimental", strength: "Strong internal validity near threshold. Exploits existing eligibility rules.", when: "Eligibility determined by threshold on continuous variable.", notWhen: "No clear threshold; threshold easily manipulated; sparse data near cutoff.", threats: ["Running variable manipulation", "Narrow local effect", "Insufficient density"], requirements: "Clear forcing variable, no manipulation, adequate observations near cutoff.", cost: 2, rigour: 4, complexity: 4, timeNeeded: 2 },
  its: { name: "Interrupted Time Series", short: "ITS", family: "Quasi-Experimental", strength: "Works with routine monitoring data. No comparison group needed if series is long.", when: "Routine data over time (HMIS, DHIS2); clear intervention start; no comparison group.", notWhen: "Few pre-intervention points (<8); concurrent policy changes.", threats: ["Concurrent events", "Seasonality", "Autocorrelation", "Data quality shifts"], requirements: "8+ pre-intervention data points, clear intervention date.", cost: 1, rigour: 3, complexity: 3, timeNeeded: 2 },
  contributionAnalysis: { name: "Contribution Analysis", short: "Contribution Analysis", family: "Theory-Based", strength: "Builds credible contribution story through structured reasoning.", when: "Complex programmes; no comparison group; need to explain how/why change occurred.", notWhen: "Strong attribution needed; donor requires experimental evidence.", threats: ["Confirmation bias", "Weak rival explanation testing", "Subjective weighting"], requirements: "Well-articulated ToC, multiple evidence sources, stakeholder engagement.", cost: 2, rigour: 3, complexity: 3, timeNeeded: 3 },
  realist: { name: "Realist Evaluation", short: "Realist Eval.", family: "Theory-Based", strength: "Explains what works, for whom, in what circumstances, and why.", when: "Complex programmes with heterogeneous effects; need to understand mechanisms.", notWhen: "Simple interventions where average effect is the main question.", threats: ["Retroductive reasoning subjectivity", "Ad hoc CMO configs", "Resource-intensive"], requirements: "Initial programme theory, diverse implementation contexts, mixed-methods.", cost: 3, rigour: 3, complexity: 4, timeNeeded: 4 },
  processTracing: { name: "Process Tracing", short: "Process Tracing", family: "Theory-Based", strength: "Within-case causal inference through detailed mechanism evidence.", when: "Causal chain within a specific case; complex policy/governance interventions.", notWhen: "Multiple-case comparison is priority; quantitative outcome measurement needed.", threats: ["Evidence availability", "Researcher degrees of freedom"], requirements: "Detailed case knowledge, access to decision-makers and documents.", cost: 2, rigour: 3, complexity: 4, timeNeeded: 3 },
  outcomeHarvesting: { name: "Outcome Harvesting", short: "Outcome Harvesting", family: "Complexity-Responsive", strength: "Works backward from observed changes. Captures emergent outcomes.", when: "Advocacy, network, systems-change; emergent outcomes; retrospective evaluation.", notWhen: "Well-defined measurable outcomes; donor requires quantitative impact evidence.", threats: ["Social desirability", "Weak attribution claims", "Resource-intensive verification"], requirements: "Access to change agents, documentation review, substantiation process.", cost: 2, rigour: 2, complexity: 3, timeNeeded: 3 },
  msc: { name: "Most Significant Change", short: "MSC", family: "Participatory", strength: "Captures stories of change through participatory selection.", when: "Community-level programmes; participatory sense-making; diverse perspectives.", notWhen: "Quantitative coverage data needed; statistical evidence required.", threats: ["Selection bias in stories", "Panel subjectivity", "Representativeness"], requirements: "Community access, trained collectors, selection panels.", cost: 1, rigour: 2, complexity: 2, timeNeeded: 2 },
  developmental: { name: "Developmental Evaluation", short: "Developmental Eval.", family: "Complexity-Responsive", strength: "Real-time evaluative feedback for adaptive programmes.", when: "Social innovation; pilot phases; complex adaptive systems; high uncertainty.", notWhen: "Mature stable programmes; summative accountability; evaluator independence required.", threats: ["Independence compromised", "Scope creep", "Hard to demonstrate rigour externally"], requirements: "Embedded evaluator, openness to feedback, learning culture.", cost: 3, rigour: 2, complexity: 3, timeNeeded: 5 },
  prePost: { name: "Pre-Post Comparison", short: "Pre-Post", family: "Non-Experimental", strength: "Simple, low-cost. Documents change. Widely understood.", when: "No comparison group possible; descriptive evidence sufficient; baseline available.", notWhen: "Causal attribution needed; strong secular trends.", threats: ["History", "Maturation", "Regression to mean", "No counterfactual"], requirements: "Baseline data, consistent endline measurement.", cost: 1, rigour: 1, complexity: 1, timeNeeded: 2 },
  caseStudy: { name: "Qualitative Case Study", short: "Case Study", family: "Non-Experimental", strength: "Rich contextual understanding. Multiple data sources. Flexible.", when: "Process evaluation; understanding implementation; small number of sites.", notWhen: "Generalisable quantitative findings needed; large-scale measurement.", threats: ["Researcher bias", "Limited generalisability", "Selective evidence"], requirements: "Clear case boundaries, multiple data sources, analytical framework.", cost: 2, rigour: 2, complexity: 2, timeNeeded: 3 },
  rapidEval: { name: "Rapid Evaluation", short: "Rapid Eval.", family: "Non-Experimental", strength: "Quick, systematic assessment. Prioritises timeliness.", when: "Humanitarian/emergency; real-time decisions; very limited time and budget.", notWhen: "Accountability requiring rigorous evidence; long-term impact.", threats: ["Shallow analysis", "Convenience sampling", "Time pressure"], requirements: "Focused evaluation questions, rapid data collection capacity.", cost: 1, rigour: 1, complexity: 1, timeNeeded: 1 }
};

// ── Scoring engine ──────────────────────────────────────────────────
function scoreDesigns(answers) {
  const scores = {};
  Object.entries(DESIGNS).forEach(([id, d]) => {
    let score = 50, reasons = [];
    if (answers.purpose === "impact") { if (d.family === "Experimental") { score += 25; reasons.push("Experimental design strongest for impact"); } else if (d.family === "Quasi-Experimental") { score += 18; reasons.push("Quasi-experimental can address impact"); } else if (d.family === "Theory-Based") { score += 8; } else { score -= 10; } }
    if (answers.purpose === "outcome") { if (["Quasi-Experimental", "Theory-Based"].includes(d.family)) score += 15; if (id === "prePost") { score += 12; reasons.push("Standard for outcome evaluation"); } }
    if (answers.purpose === "process") { if (["caseStudy", "rapidEval"].includes(id)) { score += 20; reasons.push("Well-suited for process questions"); } if (d.family === "Experimental") score -= 15; }
    if (answers.purpose === "learning") { if (["developmental", "outcomeHarvesting", "msc", "realist"].includes(id)) { score += 20; reasons.push("Designed for learning/adaptation"); } if (d.family === "Experimental") score -= 10; }
    if (answers.causal === "attribution") { if (d.family === "Experimental") { score += 20; reasons.push("Can establish causal attribution"); } else if (d.family === "Quasi-Experimental") score += 12; else if (d.rigour <= 2) score -= 15; }
    if (answers.causal === "contribution") { if (["contributionAnalysis", "processTracing", "realist"].includes(id)) { score += 18; reasons.push("Designed for contribution claims"); } }
    if (answers.causal === "description") { if (d.rigour <= 2) score += 10; if (d.family === "Experimental") score -= 15; }
    if (answers.comparison === "randomisable") { if (d.family === "Experimental") { score += 15; reasons.push("Randomisation feasible"); } }
    if (answers.comparison === "natural") { if (["did", "psm", "its"].includes(id)) { score += 18; reasons.push("Natural comparison available"); } if (d.family === "Experimental") score -= 10; }
    if (answers.comparison === "threshold") { if (id === "rdd") { score += 30; reasons.push("Eligibility threshold makes RDD viable"); } }
    if (answers.comparison === "none") { if (d.family === "Experimental") score -= 25; if (["did", "psm", "rdd"].includes(id)) score -= 20; if (["its", "contributionAnalysis", "realist", "prePost", "caseStudy", "outcomeHarvesting", "msc"].includes(id)) { score += 10; reasons.push("Works without comparison group"); } }
    if (answers.data === "timeseries") { if (id === "its") { score += 25; reasons.push("Time series data available"); } if (id === "did") score += 8; }
    if (answers.data === "routine_only") { if (id === "its") { score += 15; reasons.push("Leverages routine data"); } if (d.family === "Experimental") score -= 10; }
    if (answers.data === "minimal") { if (d.cost >= 3) score -= 15; if (["rapidEval", "msc", "caseStudy"].includes(id)) { score += 12; reasons.push("Works with limited data"); } }
    if (answers.context === "fragile") { if (d.family === "Experimental") { score -= 20; reasons.push("Very difficult in FCV settings"); } if (["contributionAnalysis", "realist", "outcomeHarvesting", "msc", "rapidEval", "caseStudy", "developmental"].includes(id)) { score += 12; reasons.push("Adaptable to FCV settings"); } }
    if (answers.context === "humanitarian") { if (["rapidEval", "msc", "developmental"].includes(id)) { score += 18; reasons.push("Suited for emergency contexts"); } if (d.timeNeeded >= 4) score -= 15; }
    if (answers.budget === "low") { score -= d.cost * 6; if (d.cost <= 1) { score += 8; reasons.push("Low cost"); } }
    if (answers.budget === "medium") { if (d.cost >= 4) score -= 8; }
    if (answers.budget === "high") { if (d.rigour >= 4) { score += 8; reasons.push("Budget supports rigorous design"); } }
    if (answers.timeline === "short") { score -= d.timeNeeded * 5; if (d.timeNeeded <= 2) { score += 10; reasons.push("Feasible in short timeframe"); } }
    if (answers.timeline === "long") { if (d.timeNeeded >= 4) score += 5; }
    if (answers.maturity === "pilot") { if (["developmental", "realist", "caseStudy"].includes(id)) { score += 12; reasons.push("Suited for pilot/early-stage"); } }
    if (answers.maturity === "scaling") { if (["rct", "clusterRCT", "steppedWedge"].includes(id)) { score += 12; reasons.push("Scale supports experimental design"); } }
    if (answers.maturity === "completed") { if (["psm", "did", "outcomeHarvesting", "contributionAnalysis"].includes(id)) { score += 10; reasons.push("Can be applied retrospectively"); } if (d.family === "Experimental") score -= 20; }
    if (answers.complexity === "complex") { if (["realist", "contributionAnalysis", "processTracing", "developmental", "outcomeHarvesting"].includes(id)) { score += 15; reasons.push("Handles programme complexity"); } if (d.family === "Experimental") score -= 5; }
    if (answers.unit === "cluster") { if (id === "clusterRCT") { score += 15; reasons.push("Designed for cluster-level"); } if (id === "rct") score -= 15; if (id === "steppedWedge") score += 10; }
    scores[id] = { score: Math.max(0, Math.min(100, score)), reasons };
  });
  return Object.entries(scores).sort((a, b) => b[1].score - a[1].score).map(([id, data]) => ({ id, ...DESIGNS[id], ...data }));
}

// ── Questions ───────────────────────────────────────────────────────
const QUESTIONS = [
  { id: "purpose", label: "What is the primary evaluation purpose?", hint: "Determines which family of designs is most appropriate.", options: [{ value: "impact", label: "Impact", desc: "Did the programme cause the change?" }, { value: "outcome", label: "Outcome", desc: "Did the expected changes occur?" }, { value: "process", label: "Process", desc: "How was it implemented?" }, { value: "learning", label: "Learning", desc: "How should the programme adapt?" }] },
  { id: "causal", label: "What level of causal evidence do you need?", hint: "Attribution requires a counterfactual; contribution builds a plausible story.", options: [{ value: "attribution", label: "Attribution", desc: "Prove the programme caused the change" }, { value: "contribution", label: "Contribution", desc: "Show plausible contribution" }, { value: "description", label: "Description", desc: "Document what happened" }] },
  { id: "comparison", label: "Is a comparison group feasible?", hint: "Single biggest driver of design choice.", options: [{ value: "randomisable", label: "Random assignment possible", desc: "Can randomly assign programme" }, { value: "natural", label: "Natural comparison exists", desc: "Similar groups not receiving programme" }, { value: "threshold", label: "Eligibility threshold", desc: "Score/cutoff for selection" }, { value: "none", label: "No comparison group", desc: "Universal or no feasible comparison" }] },
  { id: "data", label: "What data is available?", hint: "Existing data determines viable designs.", options: [{ value: "baseline_endline", label: "Baseline + endline", desc: "Collected for both groups" }, { value: "timeseries", label: "Routine time series", desc: "Regular data over time (HMIS, DHIS2)" }, { value: "routine_only", label: "Routine data only", desc: "Admin/monitoring, no formal baseline" }, { value: "minimal", label: "Minimal / none", desc: "Need to collect from scratch" }] },
  { id: "context", label: "Operating context?", hint: "Determines feasibility and adapted methods.", options: [{ value: "stable", label: "Stable", desc: "Normal development, good access" }, { value: "fragile", label: "Fragile / conflict", desc: "Security constraints, limited access" }, { value: "humanitarian", label: "Humanitarian", desc: "Acute crisis, displacement" }] },
  { id: "budget", label: "Evaluation budget?", hint: "Constrains which designs are feasible.", options: [{ value: "low", label: "Low (<$50K)", desc: "Internal or light-touch" }, { value: "medium", label: "Medium ($50-200K)", desc: "Standard commissioned evaluation" }, { value: "high", label: "High ($200K+)", desc: "Large-scale or multi-country" }] },
  { id: "timeline", label: "Timeline?", hint: "Some designs need multiple measurement rounds.", options: [{ value: "short", label: "Short (<3 months)", desc: "Rapid assessment" }, { value: "medium", label: "Medium (3-12 months)", desc: "Standard evaluation" }, { value: "long", label: "Long (12+ months)", desc: "Multi-year evaluation" }] },
  { id: "maturity", label: "Programme stage?", hint: "Maturity affects design appropriateness.", options: [{ value: "pilot", label: "Pilot / early", desc: "Testing new approach" }, { value: "scaling", label: "Scaling up", desc: "Expanding to new areas" }, { value: "mature", label: "Mature / ongoing", desc: "Established for years" }, { value: "completed", label: "Completed", desc: "Retrospective evaluation" }] },
  { id: "complexity", label: "Programme complexity?", hint: "Complex programmes need different approaches.", options: [{ value: "simple", label: "Simple / linear", desc: "Clear causal chain" }, { value: "complicated", label: "Complicated", desc: "Multiple components, predictable" }, { value: "complex", label: "Complex / adaptive", desc: "Emergent, feedback loops" }] },
  { id: "unit", label: "Intervention level?", hint: "Cluster-level needs cluster-randomised designs.", options: [{ value: "individual", label: "Individual / household", desc: "Direct service to people" }, { value: "cluster", label: "Facility / community", desc: "Targets groups/institutions" }, { value: "system", label: "System / policy", desc: "National reform, governance" }] }
];

// ── Word export ─────────────────────────────────────────────────────
function exportAdvisorToWord(answers, results) {
  const today = new Date().toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" });
  const top5 = results.slice(0, 5);

  let contextRows = QUESTIONS.filter(q => answers[q.id]).map(q => {
    const opt = q.options.find(o => o.value === answers[q.id]);
    return "<tr><td><b>" + q.label + "</b></td><td>" + (opt ? opt.label : answers[q.id]) + "</td><td>" + (opt ? opt.desc : "") + "</td></tr>";
  }).join("");

  let designSections = top5.map((d, i) => {
    const reasonsList = d.reasons.length > 0 ? "<ul>" + d.reasons.map(r => "<li>" + r + "</li>").join("") + "</ul>" : "";
    return "<h3>" + (i + 1) + ". " + d.name + " (" + d.family + ") \u2014 Score: " + d.score + "/100</h3>" +
      "<p><b>Strength:</b> " + d.strength + "</p>" +
      "<p><b>Use when:</b> " + d.when + "</p>" +
      "<p><b>Avoid when:</b> " + d.notWhen + "</p>" +
      "<p><b>Key validity threats:</b> " + d.threats.join("; ") + "</p>" +
      "<p><b>Requirements:</b> " + d.requirements + "</p>" +
      (reasonsList ? "<p><b>Why recommended for this context:</b></p>" + reasonsList : "");
  }).join("<br/>");

  const html = '<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>Evaluation Design Recommendation</title><style>@page{size:A4;margin:2.5cm}body{font-family:Calibri,Arial,sans-serif;font-size:11pt;color:#1a1a1a;line-height:1.6}h1{font-size:18pt;color:#0B1A2E;border-bottom:2pt solid #2EC4B6;padding-bottom:6pt;margin-bottom:12pt}h2{font-size:14pt;color:#0B1A2E;margin-top:18pt;margin-bottom:8pt}h3{font-size:12pt;color:#1a3050;margin-top:14pt;margin-bottom:6pt;border-bottom:1pt solid #e8ecf0;padding-bottom:4pt}table{border-collapse:collapse;width:100%;margin:10pt 0}th{background:#0B1A2E;color:white;padding:8pt 10pt;text-align:left;font-size:10pt}td{border:1px solid #ddd;padding:6pt 10pt;font-size:10pt}tr:nth-child(even) td{background:#f8f9fa}ul{margin:4pt 0 8pt 16pt}li{margin-bottom:3pt;font-size:10pt}.note{background:#f0f4f8;border-left:3pt solid #2EC4B6;padding:8pt 12pt;margin:10pt 0;font-size:10pt}.footer{margin-top:24pt;padding-top:8pt;border-top:1pt solid #ddd;font-size:9pt;color:#888}</style></head><body>' +
    "<h1>Evaluation Design Recommendation</h1>" +
    "<p><b>Date:</b> " + today + "<br><b>Assessment completeness:</b> " + Object.keys(answers).length + "/" + QUESTIONS.length + " questions answered</p>" +
    "<h2>Evaluation Context</h2>" +
    "<table><tr><th>Question</th><th>Response</th><th>Detail</th></tr>" + contextRows + "</table>" +
    "<h2>Recommended Designs</h2>" +
    '<div class="note">Designs are ranked by fit-for-purpose given the context described above. A lower-ranked design may be more appropriate if specific constraints not captured here apply. Always consider ethics, stakeholder expectations, evaluator capacity, and intended use of findings.</div>' +
    designSections +
    '<div class="footer">Generated by PRAXIS Evaluation Design Advisor | emmanuelneneodjidja.org/praxis</div>' +
    "</body></html>";

  const blob = new Blob([html], { type: "application/msword" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "evaluation-design-recommendation.doc";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// ── Colors ──────────────────────────────────────────────────────────
const C = { navy: "#0B1A2E", navyM: "#1a3050", teal: "#2EC4B6", tealD: "#1a9e92", tealGlow: "rgba(46,196,182,0.12)", tealGlow2: "rgba(46,196,182,0.06)", slate: "#8899AA", slateL: "#A4B3C2", off: "#E8ECF0", warm: "#FAFBFC", surf: "#FFFFFF", amber: "#E8A317", amberBg: "rgba(232,163,23,0.08)", green: "#2ECC71", red: "#E74C3C" };
const familyColors = { "Experimental": { bg: "#E8F5E9", text: "#2E7D32", border: "#A5D6A7" }, "Quasi-Experimental": { bg: "#E3F2FD", text: "#1565C0", border: "#90CAF9" }, "Theory-Based": { bg: "#FFF3E0", text: "#E65100", border: "#FFCC80" }, "Complexity-Responsive": { bg: "#F3E5F5", text: "#6A1B9A", border: "#CE93D8" }, "Participatory": { bg: "#FCE4EC", text: "#AD1457", border: "#F48FB1" }, "Non-Experimental": { bg: "#ECEFF1", text: "#37474F", border: "#B0BEC5" } };

// ── Components ──────────────────────────────────────────────────────
function QuestionCard({ question, value, onChange, index, total }) {
  return (
    <div style={{ marginBottom: 24 }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 8, marginBottom: 6 }}>
        <span style={{ fontSize: 11, fontWeight: 700, color: C.teal, fontFamily: "monospace" }}>{String(index + 1).padStart(2, "0")}/{String(total).padStart(2, "0")}</span>
        <h3 style={{ fontSize: 15, fontWeight: 700, color: C.navy, margin: 0 }}>{question.label}</h3>
      </div>
      <p style={{ fontSize: 12, color: C.slate, margin: "0 0 10px", lineHeight: 1.4 }}>{question.hint}</p>
      <div style={{ display: "grid", gridTemplateColumns: question.options.length <= 3 ? "repeat(" + question.options.length + ", 1fr)" : "1fr 1fr", gap: 8 }}>
        {question.options.map((opt) => {
          const selected = value === opt.value;
          return (<button key={opt.value} onClick={() => onChange(question.id, opt.value)}
            style={{ padding: "10px 12px", textAlign: "left", cursor: "pointer", borderRadius: 8, transition: "all 0.15s", border: selected ? "2px solid " + C.teal : "1px solid " + C.off, background: selected ? C.tealGlow : C.surf, boxShadow: selected ? "0 2px 8px " + C.tealGlow : "none" }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: selected ? C.tealD : C.navy, marginBottom: 2 }}>{opt.label}</div>
            <div style={{ fontSize: 11, color: C.slate, lineHeight: 1.3 }}>{opt.desc}</div>
          </button>);
        })}
      </div>
    </div>
  );
}

function ScoreBar({ score }) {
  const color = score >= 70 ? C.green : score >= 45 ? C.amber : C.slate;
  return (<div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 2 }}>
    <div style={{ flex: 1, height: 6, background: C.off, borderRadius: 3, overflow: "hidden" }}><div style={{ width: score + "%", height: "100%", background: color, borderRadius: 3, transition: "width 0.4s ease" }} /></div>
    <span style={{ fontSize: 13, fontWeight: 700, color: color, fontFamily: "monospace", minWidth: 32 }}>{score}</span>
  </div>);
}

function DesignResult({ design, rank }) {
  const fc = familyColors[design.family] || familyColors["Non-Experimental"];
  const isTop = rank <= 3;
  return (
    <div style={{ background: C.surf, borderRadius: 12, padding: "16px 18px", border: rank === 1 ? "2px solid " + C.teal : "1px solid " + C.off, boxShadow: rank === 1 ? "0 3px 15px " + C.tealGlow : "none", marginBottom: 10, opacity: isTop ? 1 : 0.7 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            {rank <= 3 && <span style={{ fontSize: 10, fontWeight: 800, color: rank === 1 ? C.teal : C.slate, background: rank === 1 ? C.tealGlow : C.off, padding: "2px 7px", borderRadius: 4, fontFamily: "monospace" }}>{"#" + rank}</span>}
            <h4 style={{ fontSize: 15, fontWeight: 700, color: C.navy, margin: 0 }}>{design.name}</h4>
          </div>
          <span style={{ fontSize: 10, fontWeight: 600, padding: "2px 8px", borderRadius: 4, background: fc.bg, color: fc.text, border: "1px solid " + fc.border }}>{design.family}</span>
        </div>
      </div>
      <ScoreBar score={design.score} />
      {design.reasons.length > 0 && <div style={{ marginTop: 8, marginBottom: 8 }}>{design.reasons.slice(0, 4).map((r, i) => <div key={i} style={{ fontSize: 11.5, color: C.tealD, lineHeight: 1.5 }}>{"+ " + r}</div>)}</div>}
      {isTop && (
        <div style={{ fontSize: 12, color: C.navyM, lineHeight: 1.6, marginTop: 8 }}>
          <div style={{ marginBottom: 6 }}><strong style={{ color: C.navy }}>Strength: </strong>{design.strength}</div>
          <div style={{ marginBottom: 6 }}><strong style={{ color: C.green }}>Use when: </strong>{design.when}</div>
          <div style={{ marginBottom: 6 }}><strong style={{ color: C.red }}>Avoid when: </strong>{design.notWhen}</div>
          <div style={{ marginBottom: 6 }}><strong style={{ color: C.amber }}>Key threats: </strong>{design.threats.join(", ")}</div>
          <div><strong style={{ color: C.slate }}>Requirements: </strong>{design.requirements}</div>
        </div>
      )}
    </div>
  );
}

// ── Main App ────────────────────────────────────────────────────────
function App() {
  const [answers, setAnswers] = useState({});
  const [showResults, setShowResults] = useState(false);
  const handleAnswer = useCallback((qId, value) => { setAnswers((prev) => ({ ...prev, [qId]: value })); setShowResults(false); }, []);
  const answeredCount = Object.keys(answers).length;
  const allAnswered = answeredCount === QUESTIONS.length;
  const minAnswered = answeredCount >= 4;
  const results = useMemo(() => (minAnswered || allAnswered) ? scoreDesigns(answers) : [], [answers, minAnswered, allAnswered]);
  const topResults = results.slice(0, 6);

  return (
    <div style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", maxWidth: 960, margin: "0 auto", padding: "20px 16px 40px", minHeight: "100vh" }}>
      <style>{"* { box-sizing: border-box; }"}</style>

      <div style={{ marginBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
          <div style={{ background: "linear-gradient(135deg, " + C.navy + ", " + C.navyM + ")", color: C.teal, fontSize: 10.5, fontWeight: 700, letterSpacing: "0.12em", padding: "4px 10px", borderRadius: 4, textTransform: "uppercase", fontFamily: "monospace" }}>PRAXIS</div>
          <span style={{ fontSize: 11, color: C.slate, fontWeight: 500 }}>EVALUATION TOOLKIT</span>
        </div>
        <h1 style={{ fontSize: 26, fontWeight: 800, color: C.navy, margin: 0, lineHeight: 1.15 }}>Evaluation Design Advisor</h1>
        <p style={{ fontSize: 13.5, color: C.slate, margin: "5px 0 0", lineHeight: 1.5 }}>Answer the questions below about your evaluation context. The advisor recommends designs with trade-offs and justification.</p>
      </div>

      <div style={{ marginBottom: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
          <span style={{ fontSize: 11, fontWeight: 600, color: C.slate }}>{answeredCount} of {QUESTIONS.length} answered</span>
          {minAnswered && !allAnswered && <span style={{ fontSize: 11, color: C.tealD, fontWeight: 600 }}>Enough to generate recommendations</span>}
        </div>
        <div style={{ height: 4, background: C.off, borderRadius: 2 }}><div style={{ width: (answeredCount / QUESTIONS.length * 100) + "%", height: "100%", background: C.teal, borderRadius: 2, transition: "width 0.3s ease" }} /></div>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: showResults ? "1fr 1fr" : "1fr", gap: 20 }}>
        <div>
          {QUESTIONS.map((q, i) => <QuestionCard key={q.id} question={q} value={answers[q.id]} onChange={handleAnswer} index={i} total={QUESTIONS.length} />)}
          {minAnswered && (
            <button onClick={() => setShowResults(true)}
              style={{ width: "100%", padding: "14px", fontSize: 14, fontWeight: 700, background: "linear-gradient(135deg, " + C.teal + ", " + C.tealD + ")", color: "white", border: "none", borderRadius: 10, cursor: "pointer", boxShadow: "0 3px 12px " + C.tealGlow, marginTop: 8 }}>
              {allAnswered ? "Show Recommended Designs" : "Show Recommendations (" + answeredCount + "/" + QUESTIONS.length + " answered)"}
            </button>
          )}
        </div>

        {showResults && topResults.length > 0 && (
          <div style={{ position: "sticky", top: 20, maxHeight: "calc(100vh - 40px)", overflowY: "auto" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: C.teal, textTransform: "uppercase", letterSpacing: "0.1em" }}>Recommended Designs</div>
              <button onClick={() => exportAdvisorToWord(answers, results)}
                style={{ fontSize: 11, fontWeight: 700, padding: "5px 12px", borderRadius: 6, cursor: "pointer", border: "1.5px solid " + C.teal, background: C.tealGlow, color: C.tealD, transition: "all 0.15s" }}
                onMouseOver={(e) => { e.target.style.background = C.teal; e.target.style.color = "white"; }}
                onMouseOut={(e) => { e.target.style.background = C.tealGlow; e.target.style.color = C.tealD; }}>
                Export to Word
              </button>
            </div>

            {!allAnswered && <div style={{ padding: "8px 12px", background: C.amberBg, borderRadius: 8, fontSize: 11.5, color: C.amber, marginBottom: 12, borderLeft: "3px solid " + C.amber }}>Partial assessment ({answeredCount}/{QUESTIONS.length}). Answer more for refined recommendations.</div>}

            {topResults.map((d, i) => <DesignResult key={d.id} design={d} rank={i + 1} />)}

            <div style={{ padding: "12px 16px", background: "linear-gradient(135deg, " + C.navy + ", " + C.navyM + ")", borderRadius: 10, marginTop: 12, fontSize: 11, color: C.slateL, lineHeight: 1.6 }}>
              <div style={{ fontSize: 9.5, fontWeight: 700, color: C.teal, textTransform: "uppercase", letterSpacing: "0.12em", marginBottom: 4 }}>Methodology note</div>
              Scores reflect fit-for-purpose, not absolute quality. Always consider ethics, stakeholder expectations, evaluator capacity, and intended use.
              <div style={{ marginTop: 6, color: C.slate, fontSize: 9.5 }}>{"Built on PRAXIS methodology \u00B7 "}<span style={{ color: C.teal }}>emmanuelneneodjidja.org/praxis</span></div>
            </div>

            <button onClick={() => { setAnswers({}); setShowResults(false); }}
              style={{ width: "100%", marginTop: 10, padding: "10px", fontSize: 12, fontWeight: 600, background: "transparent", color: C.slate, border: "1px solid " + C.off, borderRadius: 8, cursor: "pointer" }}>Reset all answers</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── PRAXIS Workbench Bridge ──
(function() {
  if (window.self === window.top) return;

  window.parent.postMessage({ type: 'DESIGN_READY' }, '*');

  window.addEventListener('message', function(e) {
    if (!e.data || !e.data.type) return;
    if (e.data.type === 'PRAXIS_INIT' && e.data.payload && e.data.payload.answers) {
      window._praxisPrefillAnswers = e.data.payload.answers;
      window.dispatchEvent(new CustomEvent('praxis-prefill', { detail: e.data.payload.answers }));
    }
  });

  window._praxisExportDesign = function(answers, results) {
    window.parent.postMessage({
      type: 'DESIGN_EXPORT',
      payload: { answers: answers, ranked_designs: results }
    }, '*');
  };
})();

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
