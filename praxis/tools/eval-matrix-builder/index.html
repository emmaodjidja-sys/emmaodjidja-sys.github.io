<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#F8F9FA;color:#1a1a2e;line-height:1.6;}
:root{--navy:#0B1A2E;--teal:#2EC4B6;--teal-light:#E8F8F6;--teal-dark:#1FA89B;--bg:#F8F9FA;--white:#FFFFFF;--border:#E2E6EA;--text:#1a1a2e;--text-secondary:#5A6474;--shadow:0 2px 8px rgba(11,26,46,0.08);--shadow-lg:0 4px 20px rgba(11,26,46,0.12);--radius:10px;--radius-sm:6px;}

/* Top bar */
.topbar{position:sticky;top:0;z-index:9999;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:rgba(248,249,250,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);font-size:14px;}
.topbar a{text-decoration:none;color:var(--navy);font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:color 0.2s;}
.topbar a:hover{color:var(--teal-dark);}
.topbar .brand{font-weight:700;letter-spacing:0.5px;color:var(--navy);font-size:13px;opacity:0.7;}
.topbar .nav-right{display:flex;align-items:center;gap:16px;}
.topbar .nav-right a{font-size:13px;color:var(--text-secondary);}

/* Main container */
.main-container{max-width:1100px;margin:0 auto;padding:24px 20px 60px;}

/* Stepper */
.stepper{display:flex;align-items:center;gap:0;margin-bottom:32px;padding:16px 0;}
.step-item{display:flex;align-items:center;gap:8px;cursor:pointer;opacity:0.4;transition:opacity 0.3s;}
.step-item.active,.step-item.completed{opacity:1;}
.step-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;background:var(--border);color:var(--text-secondary);transition:all 0.3s;}
.step-item.active .step-num{background:var(--teal);color:#fff;}
.step-item.completed .step-num{background:var(--navy);color:#fff;}
.step-label{font-size:14px;font-weight:500;color:var(--text-secondary);}
.step-item.active .step-label{color:var(--navy);font-weight:600;}
.step-connector{width:40px;height:2px;background:var(--border);margin:0 8px;}
.step-connector.completed{background:var(--navy);}

/* Cards / Panels */
.panel{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:28px;margin-bottom:20px;box-shadow:var(--shadow);}
.panel h2{font-size:20px;font-weight:700;color:var(--navy);margin-bottom:16px;}
.panel h3{font-size:16px;font-weight:600;color:var(--navy);margin-bottom:12px;}

/* Form elements */
label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
input[type="text"],textarea,select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--white);transition:border-color 0.2s;}
input[type="text"]:focus,textarea:focus,select:focus{outline:none;border-color:var(--teal);}
textarea{resize:vertical;min-height:80px;}
select{cursor:pointer;}

/* Chips */
.chip-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.chip{display:inline-flex;align-items:center;gap:4px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--white);cursor:pointer;transition:all 0.2s;user-select:none;}
.chip:hover{border-color:var(--teal);background:var(--teal-light);}
.chip.selected{background:var(--teal);color:#fff;border-color:var(--teal);}
.chip.dac{font-weight:600;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;}
.btn-primary{background:var(--teal);color:#fff;}
.btn-primary:hover{background:var(--teal-dark);}
.btn-secondary{background:var(--white);color:var(--navy);border:1px solid var(--border);}
.btn-secondary:hover{border-color:var(--navy);background:#f5f5f5;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:#162d47;}
.btn-sm{padding:6px 12px;font-size:12px;}
.btn-danger{background:#fee;color:#c00;border:1px solid #fcc;}
.btn-danger:hover{background:#fdd;}

/* Toolbar */
.toolbar{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-bottom:20px;padding:12px 16px;background:var(--white);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);}
.toolbar-sep{width:1px;height:24px;background:var(--border);margin:0 4px;}
.view-toggle{display:inline-flex;border-radius:var(--radius-sm);overflow:hidden;border:1px solid var(--border);}
.view-toggle button{padding:6px 14px;font-size:12px;font-weight:600;border:none;cursor:pointer;background:var(--white);color:var(--text-secondary);font-family:'DM Sans',sans-serif;transition:all 0.2s;}
.view-toggle button.active{background:var(--navy);color:#fff;}

/* Stats bar */
.stats-bar{display:flex;flex-wrap:wrap;gap:16px;margin-bottom:20px;}
.stat-box{padding:10px 16px;background:var(--white);border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center;flex:1;min-width:120px;}
.stat-val{font-size:24px;font-weight:700;color:var(--navy);}
.stat-label{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;}

/* EQ Cards */
.eq-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);padding:20px;margin-bottom:16px;box-shadow:var(--shadow);transition:box-shadow 0.2s;}
.eq-card:hover{box-shadow:var(--shadow-lg);}
.eq-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.eq-num{font-size:16px;font-weight:700;color:var(--navy);}
.dac-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;color:#fff;}
.eq-section{margin-bottom:14px;}
.eq-section-label{font-size:11px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;}
.eq-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;resize:vertical;min-height:60px;line-height:1.5;}
.eq-textarea:focus{outline:none;border-color:var(--teal);}

/* Sub-question list */
.sq-list{list-style:none;padding:0;}
.sq-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;}
.sq-item:last-child{border-bottom:none;}
.sq-arrow{color:var(--teal);font-weight:700;margin-top:2px;}
.sq-text{flex:1;font-size:13px;color:var(--text);}
.sq-input{flex:1;padding:4px 8px;border:1px solid var(--border);border-radius:4px;font-family:'DM Sans',sans-serif;font-size:13px;}
.sq-input:focus{outline:none;border-color:var(--teal);}
.sq-btn{background:none;border:none;cursor:pointer;font-size:14px;color:#999;padding:2px 4px;}
.sq-btn:hover{color:#c00;}

/* Indicator tags */
.tag-group{display:flex;flex-wrap:wrap;gap:6px;}
.ind-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:500;background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE;}
.ind-tag.manual{background:#FEF3C7;color:#92400E;border-color:#FDE68A;}
.ind-tag .tag-x{cursor:pointer;font-weight:700;margin-left:2px;opacity:0.6;}
.ind-tag .tag-x:hover{opacity:1;color:#c00;}
.ind-tag .tag-prov{font-size:9px;opacity:0.6;text-transform:uppercase;}
.ds-tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;background:#F0FDF4;color:#166534;border:1px solid #BBF7D0;}
.disagg-tag{display:inline-block;padding:3px 8px;border-radius:10px;font-size:11px;background:#FDF4FF;color:#6B21A8;border:1px solid #E9D5FF;}

/* Two-col layout in card */
.eq-two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:600px){.eq-two-col{grid-template-columns:1fr;}}

/* Table view */
.matrix-table{width:100%;border-collapse:collapse;font-size:13px;}
.matrix-table th{background:var(--navy);color:#fff;padding:10px 12px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:0.5px;position:sticky;top:0;}
.matrix-table td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:top;}
.matrix-table tr:hover td{background:#f8fafc;}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(11,26,46,0.5);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:var(--white);border-radius:var(--radius);width:100%;max-width:800px;max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.modal-header h3{font-size:18px;font-weight:700;color:var(--navy);}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#999;padding:0 4px;}
.modal-close:hover{color:#333;}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1;}
.modal-search{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;margin-bottom:12px;}
.modal-search:focus{outline:none;border-color:var(--teal);}
.ind-result{padding:12px;border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;transition:all 0.2s;}
.ind-result:hover{border-color:var(--teal);background:var(--teal-light);}
.ind-result.added{border-color:#86EFAC;background:#F0FDF4;cursor:default;}
.ind-result-name{font-weight:600;font-size:14px;color:var(--navy);}
.ind-result-code{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:600;background:#EFF6FF;color:#1E40AF;margin-right:6px;}
.ind-result-def{font-size:12px;color:var(--text-secondary);margin-top:4px;}
.ind-result-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.ind-result-meta span{font-size:10px;padding:2px 6px;border-radius:8px;background:#f5f5f5;color:#666;}
.filter-section{margin-bottom:10px;}
.filter-label{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:4px;text-transform:uppercase;}
.result-count{font-size:12px;color:var(--text-secondary);margin-bottom:8px;}
.active-filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.active-filter{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:10px;font-size:11px;background:var(--teal-light);color:var(--teal-dark);cursor:pointer;}
.active-filter:hover{background:#D1FAE5;}

/* Outcome cards in step 2 */
.outcome-card{background:#F8FAFC;border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;}
.outcome-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.output-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.output-row input{flex:1;}
.remove-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:16px;}
.remove-btn:hover{color:#c00;}

/* Draft saved indicator */
.draft-saved{font-size:11px;color:#059669;font-weight:500;opacity:0.8;}

/* Footer */
.app-footer{text-align:center;padding:24px;font-size:12px;color:var(--text-secondary);border-top:1px solid var(--border);margin-top:40px;}
.app-footer a{color:var(--teal-dark);text-decoration:none;}
.app-footer a:hover{text-decoration:underline;}
.privacy-badges{display:flex;justify-content:center;gap:12px;margin-bottom:8px;}
.privacy-badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;background:var(--teal-light);color:var(--teal-dark);}

/* Print styles */
@media print{
  .topbar,.stepper,.toolbar,.btn,.sq-btn,.tag-x,.app-footer,.privacy-badges{display:none!important;}
  body{background:#fff;font-size:11px;}
  .main-container{max-width:100%;padding:0;}
  .eq-card{break-inside:avoid;border:1px solid #ccc;box-shadow:none;margin-bottom:10px;padding:12px;}
  .panel{box-shadow:none;border:1px solid #ccc;}
  @page{size:A4 landscape;margin:1.5cm;}
}

/* Responsive */
@media(max-width:768px){
  .main-container{padding:16px 12px 40px;}
  .toolbar{flex-direction:column;align-items:stretch;}
  .toolbar-sep{display:none;}
  .stats-bar{flex-direction:column;}
  .eq-two-col{grid-template-columns:1fr;}
  .stepper{flex-wrap:wrap;gap:4px;}
  .step-connector{width:20px;}
}
</style>

<script>

function generateEvaluationQuestions(toc, context, dacCriteria) {
  var questions = [];
  var eqNum = 1;
  var effSubNum = 0;
  var goalText = toc.goal || "programme objectives";
  var trunc = function(s, n) { return s && s.length > n ? s.substring(0, n) + "\u2026" : (s || ""); };
  var isHealth = context.healthAreas.some(function(a) {
    return ["hiv","tb","malaria","immunisation","rmncah","nutrition","ncd","mental_health","hss"].indexOf(a) >= 0;
  });
  var isFCV = context.operatingContext === "fragile" || context.operatingContext === "humanitarian";
  var isFormative = context.evaluationType === "formative";
  var isProcess = context.evaluationType === "process";
  var isImpact = context.evaluationType === "impact";
  var isMidterm = context.evaluationType === "midterm";

  var achievementVerb = isFormative ? "is progressing toward" : isMidterm ? "is on track to achieve" : "has achieved";
  var framingPrefix = isFormative ? "What is working, what is not, and what adjustments are needed regarding" :
    isProcess ? "How has the programme been implemented with respect to" :
    isMidterm ? "To what extent is the programme on track to achieve" :
    "To what extent has the programme achieved";

  if (dacCriteria.indexOf("relevance") >= 0) {
    questions.push({
      id: "eq_" + eqNum, criterion: "relevance",
      question: "To what extent are the programme's objectives and design responsive to the needs of the target population" + (toc.goal ? ", particularly in relation to " + trunc(goalText, 100) : "") + "?",
      subQuestions: [
        "Are programme objectives aligned with the expressed needs and priorities of beneficiaries?",
        "Is the programme design appropriate for the operating context?"
      ].concat(isHealth ? ["Are the health priorities addressed consistent with the burden of disease and health system gaps?"] : [])
       .concat(isFCV ? ["Has the programme adapted its approach to the fragile/conflict-affected context?"] : [])
       .concat(isMidterm ? ["Are any adjustments needed to the programme design based on emerging evidence?"] : []),
      rationale: "Assesses whether the intervention addresses genuine needs and remains appropriate as context evolves.",
      judgementCriteria: "",
    });
    eqNum++;
    if (toc.outcomes.length > 0) {
      var assumptions = toc.assumptions || [];
      questions.push({
        id: "eq_" + eqNum, criterion: "relevance",
        question: "To what extent does the programme's Theory of Change remain valid, and are the causal assumptions supported by evidence?",
        subQuestions: [
          "Are the key assumptions underlying the ToC still holding?",
          "Have there been changes in the context that affect the programme logic?"
        ].concat(assumptions.slice(0, 3).map(function(a) { return 'Is the assumption "' + trunc(a, 60) + '" still valid?'; })),
        rationale: "Tests the continued validity of the programme's causal model.",
        judgementCriteria: "",
      });
      eqNum++;
    }
  }

  if (dacCriteria.indexOf("coherence") >= 0) {
    questions.push({
      id: "eq_" + eqNum, criterion: "coherence",
      question: "How well does the programme fit with other interventions in the same context, and is it internally coherent?",
      subQuestions: [
        "Does the programme complement or duplicate existing interventions in the same sector?",
        "Is the programme aligned with national policies, strategies, and plans?",
        "Do the programme's components reinforce each other (internal coherence)?"
      ].concat(context.frameworks.length > 1 ? ["Is the programme coherent across donor requirements (" + context.frameworks.map(function(f) { return FRAMEWORKS[f] ? FRAMEWORKS[f].name : f; }).join(", ") + ")?"] : [])
       .concat(context.healthAreas.length > 2 ? ["Is there effective integration across the health areas addressed by the programme?"] : []),
      rationale: "Assesses fit with the broader intervention landscape and internal logic.",
      judgementCriteria: "",
    });
    eqNum++;
  }

  if (dacCriteria.indexOf("effectiveness") >= 0) {
    var effMainNum = eqNum;
    toc.outcomes.forEach(function(outcome, oi) {
      effSubNum++;
      var outcomeText = outcome.text || "Outcome " + (oi + 1);
      var outputTexts = (outcome.outputs || []).filter(function(o) { return o && (o.text || o).toString().trim(); });
      questions.push({
        id: "eq_" + effMainNum + "." + effSubNum, criterion: "effectiveness",
        question: framingPrefix + " " + trunc(outcomeText, 120) + "?",
        subQuestions: outputTexts.slice(0, 4).map(function(o) {
          var t = typeof o === "string" ? o : o.text;
          return 'To what extent has the output "' + trunc(t, 70) + '" been delivered as intended?';
        }).concat(["What are the main factors contributing to or hindering achievement of " + trunc(outcomeText, 60) + "?"])
          .concat(isFormative ? ["What adjustments are needed to improve progress on " + trunc(outcomeText, 50) + "?"] : [])
          .concat(isMidterm ? ["Is the programme on track to achieve " + trunc(outcomeText, 50) + " by endline?"] : []),
        rationale: "Outcome-specific effectiveness question for: " + trunc(outcomeText, 80),
        judgementCriteria: "",
        _outcomeText: outcomeText,
      });
    });
    if (toc.outcomes.length === 0) {
      effSubNum++;
      questions.push({
        id: "eq_" + effMainNum + "." + effSubNum, criterion: "effectiveness",
        question: framingPrefix + " its intended outcomes?",
        subQuestions: ["To what extent have the planned outputs been delivered?", "What are the main factors contributing to or hindering results?"],
        rationale: "Generic effectiveness question (no specific outcomes provided in ToC).",
        judgementCriteria: "",
      });
    }
    eqNum++;
    questions.push({
      id: "eq_" + eqNum, criterion: "effectiveness",
      question: "Are there differential results across population groups, and has the programme contributed to reducing or widening equity gaps?",
      subQuestions: [
        "How do results vary by sex, age, geography, and socioeconomic status?"
      ].concat(isHealth ? ["Is there a pro-poor or pro-equity gradient in programme coverage and outcomes?"] : [])
       .concat(["Were marginalised or hard-to-reach populations adequately served?"])
       .concat(isFCV ? ["Were conflict-affected, displaced, or hard-to-reach populations reached equitably?"] : []),
      rationale: "Equity assessment \u2014 required by OECD-DAC 2019 revision.",
      judgementCriteria: "",
      _isEquity: true,
    });
    eqNum++;
    if (!isProcess) {
      questions.push({
        id: "eq_" + eqNum, criterion: "effectiveness",
        question: "How was the programme implemented, and what explains variation in implementation quality across sites or time periods?",
        subQuestions: [
          "Was the programme implemented with fidelity to the design?",
          "What adaptations were made and were they appropriate?",
          "What were the main barriers and facilitators of implementation?"
        ].concat(isHealth ? ["Were services delivered to minimum quality standards?"] : []),
        rationale: "Process/implementation question \u2014 explains why outcomes were or were not achieved.",
        judgementCriteria: "",
      });
    } else {
      questions.push({
        id: "eq_" + eqNum, criterion: "effectiveness",
        question: "How was the programme implemented, what mechanisms drove or hindered implementation, and what explains variation across sites?",
        subQuestions: [
          "Was the programme implemented with fidelity to the design?",
          "What adaptations were made, by whom, and were they appropriate?",
          "What were the key barriers and facilitators at community, facility, district, and national levels?",
          "How did the programme interact with the existing health system and other concurrent interventions?",
          "What mechanisms explain why the programme worked differently in different settings?"
        ].concat(isFCV ? ["How did the conflict/crisis context affect implementation feasibility and quality?"] : []),
        rationale: "Primary question for a process evaluation \u2014 investigates implementation mechanisms in depth.",
        judgementCriteria: "",
      });
    }
    eqNum++;
  }

  if (dacCriteria.indexOf("efficiency") >= 0) {
    questions.push({
      id: "eq_" + eqNum, criterion: "efficiency",
      question: "How efficiently were resources used, and could the same or better results have been achieved with fewer resources or in less time?",
      subQuestions: [
        "What was the cost per unit of output or outcome?",
        "Were resources allocated optimally across programme components and geographies?",
        "Were there significant implementation delays and what caused them?"
      ].concat(isHealth ? ["How does the programme's cost-efficiency compare with benchmarks or alternative delivery models?"] : [])
       .concat(context.frameworks.indexOf("global_fund") >= 0 || context.frameworks.indexOf("world_bank") >= 0 ? ["Were financial management systems adequate and were audit findings addressed?"] : []),
      rationale: "Assesses resource use relative to results, including timeliness of delivery.",
      judgementCriteria: "",
    });
    eqNum++;
  }

  if (dacCriteria.indexOf("impact") >= 0 && !isProcess) {
    var counterfactualLang = isImpact ? ", and to what extent can observed changes be attributed to the programme compared to what would have occurred without it" : "";
    questions.push({
      id: "eq_" + eqNum, criterion: "impact",
      question: "What higher-level changes has the programme contributed to" + (toc.goal ? ", particularly in relation to " + trunc(goalText, 100) : "") + counterfactualLang + "?",
      subQuestions: [
        "What changes at the population or health system level can be observed during the programme period?",
        "To what extent can these changes be plausibly attributed or linked to the programme?",
        "Were there any unintended effects (positive or negative)?"
      ].concat(isHealth ? ["What changes in health outcomes (morbidity, mortality) or health system performance have occurred?"] : [])
       .concat(isImpact ? ["What rival explanations exist for the observed changes, and how credible are they?"] : []),
      rationale: "Assesses broader, higher-level effects beyond immediate programme outcomes.",
      judgementCriteria: "",
    });
    eqNum++;
  }

  if (dacCriteria.indexOf("sustainability") >= 0) {
    questions.push({
      id: "eq_" + eqNum, criterion: "sustainability",
      question: isFormative ?
        "What factors support or threaten the sustainability of results, and what actions are needed to enhance sustainability?" :
        "Are the programme's benefits likely to continue after external support ends, and what are the main risks to sustainability?",
      subQuestions: [
        "Is there sufficient national/local ownership and political commitment?",
        "Is the programme financially sustainable (government co-financing trajectory, domestic resource mobilisation)?",
        "Is there adequate institutional and technical capacity to sustain results?"
      ].concat(isHealth ? ["Have programme approaches been integrated into national guidelines, protocols, or health system structures?"] : [])
       .concat(["What are the main risks to sustainability and how are they being mitigated?"])
       .concat(isMidterm ? ["What actions should be taken in the remaining programme period to enhance sustainability?"] : []),
      rationale: "Assesses likelihood of continued benefits, including financial, institutional, and political sustainability.",
      judgementCriteria: "",
    });
    eqNum++;
  }

  return questions;
}

function matchIndicators(eq, context) {
  var keywordBoosts = {};
  var searchText = ((eq._outcomeText || "") + " " + eq.question).toLowerCase();
  Object.keys(KEYWORD_INDICATOR_MAP).forEach(function(keyword) {
    var pattern = new RegExp(keyword.replace(/\./g, ".?").replace(/ /g, "\\s*"), "i");
    if (pattern.test(searchText)) {
      KEYWORD_INDICATOR_MAP[keyword].forEach(function(id) { keywordBoosts[id] = true; });
    }
  });
  return INDICATOR_BANK.map(function(ind) {
    var score = 0;
    if (keywordBoosts[ind.id]) score += 35;
    if (ind.dacCriteria.indexOf(eq.criterion) >= 0) score += 25;
    var areaOverlap = ind.healthAreas.filter(function(a) { return context.healthAreas.indexOf(a) >= 0; }).length;
    score += areaOverlap * 12;
    var frameworkOverlap = ind.frameworks.filter(function(f) { return context.frameworks.indexOf(f) >= 0; }).length;
    score += frameworkOverlap * 8;
    if (ind.tier) {
      context.frameworks.forEach(function(f) {
        if (ind.tier[f] === 1) score += 10;
        else if (ind.tier[f] === 2) score += 4;
      });
    }
    if (eq.criterion === "effectiveness" && (ind.level === "output" || ind.level === "outcome")) score += 8;
    if (eq.criterion === "impact" && ind.level === "impact") score += 18;
    if (eq.criterion === "efficiency" && (ind.level === "process" || ind.level === "output")) score += 8;
    if (eq.criterion === "sustainability" && ind.dacCriteria.indexOf("sustainability") >= 0) score += 10;
    if (eq.criterion === "relevance" && ind.dacCriteria.indexOf("relevance") >= 0) score += 8;
    if (eq.criterion === "coherence" && ind.dacCriteria.indexOf("coherence") >= 0) score += 8;
    if (eq._isEquity) {
      if (ind.id === "gen_008") score += 20;
      if (ind.disaggregation && ind.disaggregation.some(function(d) { return d.indexOf("quintile") >= 0; })) score += 12;
      if (ind.crossDisagg && ind.crossDisagg.some(function(d) { return d.indexOf("quintile") >= 0; })) score += 6;
    }
    if (ind.healthAreas.indexOf("cross_cutting") >= 0) score += 2;
    return Object.assign({}, ind, { matchScore: score, source: "auto" });
  }).filter(function(i) { return i.matchScore > 20; })
    .sort(function(a, b) { return b.matchScore - a.matchScore; })
    .slice(0, 10);
}

function generateJudgementCriteria(indicators, criterion) {
  if (indicators.length === 0) return "";
  var topInd = indicators[0];
  switch (criterion) {
    case "effectiveness":
      if (topInd.level === "outcome" || topInd.level === "output")
        return '[Set target for ' + topInd.name + '] \u2014 e.g., "' + topInd.name + ' reaches [X]% by [date], with <[Y] pp gap between Q1 and Q5"';
      return "Programme achieves [X]% of planned outputs and [Y]% of intended outcome targets";
    case "efficiency":
      return "Unit cost per beneficiary is within [X]% of comparable programme benchmarks";
    case "impact":
      return '[Specify measurable change expected in ' + topInd.name + '] \u2014 e.g., "[Z]% reduction from baseline by endline"';
    case "sustainability":
      return "Government co-financing reaches [X]% by programme end; key approaches integrated into national guidelines";
    case "relevance":
      return "Programme objectives are aligned with national health sector strategy and target population's expressed priorities";
    case "coherence":
      return "Programme complements (does not duplicate) existing interventions and is aligned with national policies";
    default: return "";
  }
}

function generateMatrix(toc, context) {
  var dacCriteria = context.dacCriteria || Object.keys(OECD_DAC);
  var questions = generateEvaluationQuestions(toc, context, dacCriteria);
  return questions.map(function(eq) {
    var indicators = matchIndicators(eq, context).slice(0, 5);
    var srcSet = {};
    indicators.forEach(function(i) { (i.dataSources || []).forEach(function(s) { srcSet[s] = true; }); });
    var allSources = Object.keys(srcSet).slice(0, 6);
    var disaggSet = {};
    indicators.forEach(function(i) {
      (i.disaggregation || []).forEach(function(d) { disaggSet[d] = true; });
      (i.crossDisagg || []).forEach(function(d) { disaggSet[d] = true; });
    });
    var jc = eq.judgementCriteria || generateJudgementCriteria(indicators, eq.criterion);
    return Object.assign({}, eq, {
      indicators: indicators,
      dataSources: allSources,
      disaggregation: Object.keys(disaggSet),
      judgementCriteria: jc,
    });
  });
}

function flattenMatrixForExport(matrix) {
  return matrix.map(function(row) {
    return {
      "EQ #": row.id.replace("eq_", "EQ"),
      "OECD-DAC Criterion": OECD_DAC[row.criterion] ? OECD_DAC[row.criterion].name : row.criterion,
      "Evaluation Question": row.question,
      "Sub-Questions": (row.subQuestions || []).map(function(sq, j) { return (j+1) + ". " + sq; }).join("\n"),
      "Judgement Criteria": row.judgementCriteria || "",
      "Indicators": row.indicators.map(function(ind) { return (ind.code ? "[" + ind.code + "] " : "") + ind.name; }).join("\n"),
      "Data Sources": (row.dataSources || []).join("\n"),
      "Disaggregation": (row.disaggregation || []).join(", "),
      "Rationale": row.rationale || "",
    };
  });
}
</script>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

const LS_KEY = "praxis-eval-matrix-draft";

function loadDraft() {
  try { const d = localStorage.getItem(LS_KEY); return d ? JSON.parse(d) : null; } catch(e) { return null; }
}
function saveDraft(data) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(data)); } catch(e) {}
}

const defaultContext = {
  programmeName: "",
  sectorTemplate: "",
  healthAreas: [],
  frameworks: [],
  evaluationType: "outcome",
  operatingContext: "stable",
  dacCriteria: ["relevance","coherence","effectiveness","efficiency","impact","sustainability"],
};
const defaultToc = { goal: "", outcomes: [], assumptions: [], inputMode: "structured", freeText: "" };

function App() {
  const draft = useMemo(() => loadDraft(), []);
  const [step, setStep] = useState(draft ? (draft.matrix ? 3 : 1) : 1);
  const [context, setContext] = useState(draft?.context || {...defaultContext});
  const [toc, setToc] = useState(draft?.toc || {...defaultToc, outcomes: []});
  const [matrix, setMatrix] = useState(draft?.matrix || []);
  const [viewMode, setViewMode] = useState("card");
  const [bankOpen, setBankOpen] = useState(null); // eq id or null
  const [draftSaved, setDraftSaved] = useState(false);
  const fileInputRef = useRef(null);

  // Auto-save
  useEffect(() => {
    saveDraft({ context, toc, matrix: matrix.length > 0 ? matrix : undefined });
    setDraftSaved(true);
    const t = setTimeout(() => setDraftSaved(false), 2000);
    return () => clearTimeout(t);
  }, [context, toc, matrix]);

  const updateContext = (key, val) => setContext(prev => ({...prev, [key]: val}));

  const toggleChip = (key, val) => {
    setContext(prev => {
      const arr = prev[key];
      return {...prev, [key]: arr.includes(val) ? arr.filter(v => v !== val) : [...arr, val]};
    });
  };

  const applySectorTemplate = (templateId) => {
    const t = SECTOR_TEMPLATES[templateId];
    if (!t) return;
    setContext(prev => ({...prev, sectorTemplate: templateId, healthAreas: [...t.healthAreas], frameworks: [...t.frameworks]}));
  };

  // ToC handlers
  const updateToc = (key, val) => setToc(prev => ({...prev, [key]: val}));
  const addOutcome = () => setToc(prev => ({...prev, outcomes: [...prev.outcomes, {text:"", outputs:[{text:""}]}]}));
  const updateOutcome = (i, key, val) => setToc(prev => {
    const o = [...prev.outcomes]; o[i] = {...o[i], [key]: val}; return {...prev, outcomes: o};
  });
  const removeOutcome = (i) => setToc(prev => ({...prev, outcomes: prev.outcomes.filter((_, j) => j !== i)}));
  const addOutput = (oi) => setToc(prev => {
    const o = [...prev.outcomes]; o[oi] = {...o[oi], outputs: [...(o[oi].outputs||[]), {text:""}]}; return {...prev, outcomes: o};
  });
  const updateOutput = (oi, pi, val) => setToc(prev => {
    const o = [...prev.outcomes]; const outs = [...o[oi].outputs]; outs[pi] = {text: val}; o[oi] = {...o[oi], outputs: outs}; return {...prev, outcomes: o};
  });
  const removeOutput = (oi, pi) => setToc(prev => {
    const o = [...prev.outcomes]; o[oi] = {...o[oi], outputs: o[oi].outputs.filter((_, j) => j !== pi)}; return {...prev, outcomes: o};
  });

  // Parse free text ToC
  const parseFreeText = (text) => {
    const lines = text.split("\n").map(l => l.trim()).filter(Boolean);
    if (lines.length === 0) return { goal: "", outcomes: [] };
    const goal = lines[0];
    const outcomes = lines.slice(1).map(l => ({text: l, outputs: []}));
    return { goal, outcomes };
  };

  // Generate matrix
  const handleGenerate = () => {
    let finalToc = toc;
    if (toc.inputMode === "freetext" && toc.freeText) {
      const parsed = parseFreeText(toc.freeText);
      finalToc = {...toc, goal: parsed.goal, outcomes: parsed.outcomes};
      setToc(finalToc);
    }
    const assumptions = typeof toc.assumptions === "string" ? toc.assumptions.split("\n").filter(Boolean) : (toc.assumptions || []);
    const tocForEngine = {goal: finalToc.goal, outcomes: finalToc.outcomes, assumptions};
    const m = generateMatrix(tocForEngine, context);
    setMatrix(m);
    setStep(3);
  };

  // Matrix edit handlers
  const updateEq = (eqId, key, val) => {
    setMatrix(prev => prev.map(eq => eq.id === eqId ? {...eq, [key]: val} : eq));
  };
  const updateSubQ = (eqId, idx, val) => {
    setMatrix(prev => prev.map(eq => {
      if (eq.id !== eqId) return eq;
      const sq = [...eq.subQuestions]; sq[idx] = val; return {...eq, subQuestions: sq};
    }));
  };
  const removeSubQ = (eqId, idx) => {
    setMatrix(prev => prev.map(eq => {
      if (eq.id !== eqId) return eq;
      return {...eq, subQuestions: eq.subQuestions.filter((_, i) => i !== idx)};
    }));
  };
  const addSubQ = (eqId) => {
    setMatrix(prev => prev.map(eq => {
      if (eq.id !== eqId) return eq;
      return {...eq, subQuestions: [...eq.subQuestions, ""]};
    }));
  };
  const removeIndicator = (eqId, indId) => {
    setMatrix(prev => prev.map(eq => {
      if (eq.id !== eqId) return eq;
      const inds = eq.indicators.filter(i => i.id !== indId);
      const srcSet = {}; inds.forEach(i => (i.dataSources||[]).forEach(s => srcSet[s]=true));
      return {...eq, indicators: inds, dataSources: Object.keys(srcSet)};
    }));
  };
  const addIndicatorToEq = (eqId, indicator) => {
    setMatrix(prev => prev.map(eq => {
      if (eq.id !== eqId) return eq;
      if (eq.indicators.find(i => i.id === indicator.id)) return eq;
      const newInd = {...indicator, source: "manual", matchScore: 0};
      const inds = [...eq.indicators, newInd];
      const srcSet = {}; inds.forEach(i => (i.dataSources||[]).forEach(s => srcSet[s]=true));
      const disaggSet = {}; inds.forEach(i => { (i.disaggregation||[]).forEach(d => disaggSet[d]=true); (i.crossDisagg||[]).forEach(d => disaggSet[d]=true); });
      return {...eq, indicators: inds, dataSources: Object.keys(srcSet), disaggregation: Object.keys(disaggSet)};
    }));
  };
  const addCustomEq = () => {
    const newId = "eq_custom_" + Date.now();
    setMatrix(prev => [...prev, {
      id: newId, criterion: "effectiveness", question: "", subQuestions: [""],
      judgementCriteria: "", indicators: [], dataSources: [], disaggregation: [], rationale: "",
    }]);
  };

  // Export Excel
  const exportExcel = () => {
    const flat = flattenMatrixForExport(matrix);
    const ws1 = XLSX.utils.json_to_sheet(flat);
    const meta = [
      {Field: "Programme Name", Value: context.programmeName},
      {Field: "Evaluation Type", Value: EVAL_TYPES.find(e => e.id === context.evaluationType)?.name || context.evaluationType},
      {Field: "Health Areas", Value: context.healthAreas.map(a => HEALTH_AREAS[a]?.name||a).join(", ")},
      {Field: "Frameworks", Value: context.frameworks.map(f => FRAMEWORKS[f]?.name||f).join(", ")},
      {Field: "Operating Context", Value: context.operatingContext},
      {Field: "DAC Criteria", Value: context.dacCriteria.map(c => OECD_DAC[c]?.name||c).join(", ")},
      {Field: "Generated", Value: new Date().toISOString().split("T")[0]},
      {Field: "Tool", Value: "PRAXIS Evaluation Matrix Builder v2"},
    ];
    const ws2 = XLSX.utils.json_to_sheet(meta);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws1, "Evaluation Matrix");
    XLSX.utils.book_append_sheet(wb, ws2, "Metadata");
    // Set column widths
    ws1["!cols"] = [{wch:8},{wch:14},{wch:60},{wch:60},{wch:40},{wch:40},{wch:30},{wch:30},{wch:40}];
    XLSX.writeFile(wb, (context.programmeName || "evaluation-matrix") + ".xlsx");
  };

  // Export Word
  const exportWord = () => {
    const evalTypeName = EVAL_TYPES.find(e => e.id === context.evaluationType)?.name || context.evaluationType;
    const healthAreaNames = context.healthAreas.map(a => HEALTH_AREAS[a]?.name || a).join(", ");
    const frameworkNames = context.frameworks.map(f => FRAMEWORKS[f]?.name || f).join(", ");
    const dacNames = context.dacCriteria.map(c => OECD_DAC[c]?.name || c).join(", ");
    const dateStr = new Date().toLocaleDateString("en-GB", {day:"numeric",month:"long",year:"numeric"});
    const opCtxLabel = context.operatingContext === "fragile" ? "Fragile / Conflict-Affected" : context.operatingContext === "humanitarian" ? "Humanitarian Emergency" : "Stable";

    // Build compact matrix table (6 columns that fit landscape)
    const matrixRows = matrix.map(eq => {
      const dacName = OECD_DAC[eq.criterion]?.name || eq.criterion;
      const inds = eq.indicators.map(i => {
        const code = i.code ? "[" + i.code + "] " : "";
        return code + i.name;
      }).join("<br/>");
      const sqs = (eq.subQuestions || []).map((sq, j) => (j + 1) + ". " + sq).join("<br/>");
      return `<tr>
        <td style="width:6%;white-space:nowrap;font-weight:bold">${eq.id.replace("eq_", "EQ")}</td>
        <td style="width:10%">${dacName}</td>
        <td style="width:28%">${eq.question}</td>
        <td style="width:28%">${sqs}</td>
        <td style="width:14%">${inds}</td>
        <td style="width:14%">${(eq.dataSources || []).join("<br/>")}</td>
      </tr>`;
    }).join("");

    // Build detailed EQ sections (one per EQ, all fields)
    const eqSections = matrix.map(eq => {
      const dacName = OECD_DAC[eq.criterion]?.name || eq.criterion;
      const inds = eq.indicators.map(i => {
        const code = i.code ? "[" + i.code + "] " : "";
        const prov = i.source === "manual" ? " (manual)" : "";
        return code + i.name + prov;
      }).join("<br/>");
      const sqs = (eq.subQuestions || []).map((sq, j) => "<br/>" + (j + 1) + ". " + sq).join("");
      const ds = (eq.dataSources || []).join(", ");
      const disagg = (eq.disaggregation || []).join(", ");
      return `
      <table style="margin-bottom:14pt">
        <tr><th colspan="2" style="text-align:left;font-size:10pt">${eq.id.replace("eq_", "EQ")} \u2014 ${dacName}</th></tr>
        <tr><td style="width:160px;font-weight:bold;background:#f5f5f5">Evaluation Question</td><td>${eq.question}</td></tr>
        <tr><td style="font-weight:bold;background:#f5f5f5">Sub-Questions</td><td>${sqs}</td></tr>
        <tr><td style="font-weight:bold;background:#f5f5f5">Judgement Criteria</td><td>${eq.judgementCriteria || "\u2014"}</td></tr>
        <tr><td style="font-weight:bold;background:#f5f5f5">Indicators</td><td>${inds || "\u2014"}</td></tr>
        <tr><td style="font-weight:bold;background:#f5f5f5">Data Sources</td><td>${ds || "\u2014"}</td></tr>
        <tr><td style="font-weight:bold;background:#f5f5f5">Disaggregation</td><td>${disagg || "\u2014"}</td></tr>
        <tr><td style="font-weight:bold;background:#f5f5f5">Rationale</td><td>${eq.rationale || "\u2014"}</td></tr>
      </table>`;
    }).join("");

    // Build indicator reference annex
    const usedIndIds = new Set(matrix.flatMap(eq => eq.indicators.map(i => i.id)));
    const usedInds = INDICATOR_BANK.filter(i => usedIndIds.has(i.id));
    const indAnnexRows = usedInds.map(ind => {
      const code = ind.code || "\u2014";
      const fw = ind.frameworks.map(f => FRAMEWORKS[f]?.name || f).join(", ");
      const ha = ind.healthAreas.map(a => HEALTH_AREAS[a]?.name || a).join(", ");
      return `<tr>
        <td style="font-weight:bold">${code}</td>
        <td>${ind.name}</td>
        <td>${ind.definition}</td>
        <td>${ind.numerator}</td>
        <td>${ind.denominator}</td>
        <td>${ha}</td>
        <td>${fw}</td>
        <td>${ind.frequency}</td>
      </tr>`;
    }).join("");

    const html = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40">
<head>
<meta charset="utf-8">

  h2 { font-family: Garamond, 'Times New Roman', serif; font-size: 14pt; color: #0B1A2E; margin-top: 16pt; margin-bottom: 8pt; border-bottom: 2pt solid #2EC4B6; padding-bottom: 4pt; }
  p { font-family: Garamond, 'Times New Roman', serif; margin-bottom: 6pt; }
  table { border-collapse: collapse; width: 100%; margin-bottom: 10pt; font-family: Garamond, 'Times New Roman', serif; }
  th, td { border: 1px solid #aaa; padding: 4px 6px; vertical-align: top; font-size: 9pt; font-family: Garamond, 'Times New Roman', serif; }
  th { background: #0B1A2E; color: #fff; font-weight: bold; font-size: 8pt; text-transform: uppercase; }
  p.footer { font-size: 8pt; color: #888; margin-top: 20pt; text-align: center; border-top: 1px solid #ccc; padding-top: 6pt; }
  .subtitle { font-size: 12pt; color: #5A6474; margin-bottom: 10pt; }
</style>
</head>
<body>
<div class="Section1">

<h1>${context.programmeName || "Programme"} \u2014 Evaluation Matrix</h1>
<p class="subtitle">${evalTypeName} | ${dateStr}</p>

<h2>1. Evaluation Context</h2>
<table>
  <tr><td style="width:180px;font-weight:bold;background:#f0f0f0">Programme Name</td><td>${context.programmeName || "\u2014"}</td></tr>
  <tr><td style="font-weight:bold;background:#f0f0f0">Evaluation Type</td><td>${evalTypeName}</td></tr>
  <tr><td style="font-weight:bold;background:#f0f0f0">Health Areas</td><td>${healthAreaNames || "\u2014"}</td></tr>
  <tr><td style="font-weight:bold;background:#f0f0f0">Donor Frameworks</td><td>${frameworkNames || "\u2014"}</td></tr>
  <tr><td style="font-weight:bold;background:#f0f0f0">Operating Context</td><td>${opCtxLabel}</td></tr>
  <tr><td style="font-weight:bold;background:#f0f0f0">OECD-DAC Criteria</td><td>${dacNames}</td></tr>
  <tr><td style="font-weight:bold;background:#f0f0f0">Programme Goal</td><td>${toc.goal || "\u2014"}</td></tr>
  <tr><td style="font-weight:bold;background:#f0f0f0">Theory of Change Outcomes</td><td>${toc.outcomes.length > 0 ? toc.outcomes.map((o, i) => (i + 1) + ". " + (o.text || "")).join("<br/>") : "\u2014"}</td></tr>
  <tr><td style="font-weight:bold;background:#f0f0f0">Key Assumptions</td><td>${(() => { const a = typeof toc.assumptions === "string" ? toc.assumptions.split("\\n").filter(Boolean) : (toc.assumptions || []); return a.length > 0 ? a.join("<br/>") : "\u2014"; })()}</td></tr>
</table>

<p><strong>Summary:</strong> ${matrix.length} evaluation questions | ${usedIndIds.size} unique indicators | ${new Set(matrix.map(eq => eq.criterion)).size} DAC criteria | ${new Set(matrix.flatMap(eq => eq.dataSources || [])).size} data sources</p>

<h2>2. Evaluation Matrix Overview</h2>
<table>
  <tr>
    <th>EQ #</th>
    <th>Criterion</th>
    <th>Evaluation Question</th>
    <th>Sub-Questions</th>
    <th>Indicators</th>
    <th>Data Sources</th>
  </tr>
  ${matrixRows}
</table>

<br style="page-break-before:always" clear="all"/>

<h2>3. Detailed Evaluation Questions</h2>
<p style="font-size:9pt;color:#666">Each evaluation question with full details including judgement criteria, disaggregation, and rationale.</p>
${eqSections}

<br style="page-break-before:always" clear="all"/>

<h2>4. Indicator Reference Annex (${usedInds.length} indicators)</h2>
<p style="font-size:9pt;color:#666">Full definitions for all indicators referenced in this evaluation matrix.</p>
<table>
  <tr>
    <th>Code</th>
    <th>Name</th>
    <th>Definition</th>
    <th>Numerator</th>
    <th>Denominator</th>
    <th>Health Area</th>
    <th>Framework</th>
    <th>Frequency</th>
  </tr>
  ${indAnnexRows}
</table>

<p class="footer">Generated by PRAXIS Evaluation Matrix Builder \u00b7 ${dateStr} \u00b7 emmanuelneneodjidja.org/praxis</p>

</div>
</body>
</html>`;

    const blob = new Blob(['\ufeff' + html], {type: "application/msword"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (context.programmeName || "evaluation-matrix") + ".doc";
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // Export/Import JSON
  const exportJSON = () => {
    const data = { version: "2.0", exportedAt: new Date().toISOString(), tool: "praxis-eval-matrix-builder", context, toc, matrix };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = (context.programmeName || "evaluation-matrix") + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const importJSON = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.context) setContext(data.context);
        if (data.toc) setToc(data.toc);
        if (data.matrix) { setMatrix(data.matrix); setStep(3); }
      } catch(err) { alert("Invalid JSON file"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const clearDraft = () => {
    localStorage.removeItem(LS_KEY);
    setContext({...defaultContext});
    setToc({...defaultToc, outcomes: []});
    setMatrix([]);
    setStep(1);
  };

  // Stats
  const eqCount = matrix.length;
  const indCount = new Set(matrix.flatMap(eq => eq.indicators.map(i => i.id))).size;
  const dacCount = new Set(matrix.map(eq => eq.criterion)).size;
  const dsCount = new Set(matrix.flatMap(eq => eq.dataSources || [])).size;

  return (
    <div className="main-container">
      {/* Stepper */}
      <div className="stepper">
        {[{n:1,l:"Programme Context"},{n:2,l:"Theory of Change"},{n:3,l:"Evaluation Matrix"}].map((s, i) => (
          <React.Fragment key={s.n}>
            {i > 0 && <div className={`step-connector${step > s.n - 1 ? " completed" : ""}`}/>}
            <div className={`step-item${step === s.n ? " active" : ""}${step > s.n ? " completed" : ""}`}
                 onClick={() => { if (s.n < step || (s.n === 3 && matrix.length > 0)) setStep(s.n); }}>
              <div className="step-num">{step > s.n ? "\u2713" : s.n}</div>
              <span className="step-label">{s.l}</span>
            </div>
          </React.Fragment>
        ))}
        {draftSaved && <span className="draft-saved" style={{marginLeft:"auto"}}>Draft saved</span>}
      </div>

      {/* STEP 1 */}
      {step === 1 && (
        <div>
          <div className="panel">
            <h2>Programme Context</h2>
            <label>Programme Name</label>
            <input type="text" value={context.programmeName} onChange={e => updateContext("programmeName", e.target.value)} placeholder="e.g., Nigeria Global Fund NFM4 HIV/TB/Malaria Grant" style={{marginBottom:16}}/>

            <label>Sector Template (quick-select)</label>
            <div className="chip-group">
              {Object.entries(SECTOR_TEMPLATES).map(([k, v]) => (
                <span key={k} className={`chip${context.sectorTemplate===k?" selected":""}`} onClick={() => applySectorTemplate(k)}>{v.name}</span>
              ))}
            </div>

            <label>Health Areas</label>
            <div className="chip-group">
              {Object.entries(HEALTH_AREAS).map(([k, v]) => (
                <span key={k} className={`chip${context.healthAreas.includes(k)?" selected":""}`} onClick={() => toggleChip("healthAreas", k)}>{v.name}</span>
              ))}
            </div>

            <label>Donor Frameworks</label>
            <div className="chip-group">
              {Object.entries(FRAMEWORKS).map(([k, v]) => (
                <span key={k} className={`chip${context.frameworks.includes(k)?" selected":""}`} onClick={() => toggleChip("frameworks", k)}>{v.name}</span>
              ))}
            </div>

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
              <div>
                <label>Evaluation Type</label>
                <select value={context.evaluationType} onChange={e => updateContext("evaluationType", e.target.value)}>
                  {EVAL_TYPES.map(et => <option key={et.id} value={et.id}>{et.name}</option>)}
                </select>
              </div>
              <div>
                <label>Operating Context</label>
                <select value={context.operatingContext} onChange={e => updateContext("operatingContext", e.target.value)}>
                  <option value="stable">Stable</option>
                  <option value="fragile">Fragile / Conflict-Affected</option>
                  <option value="humanitarian">Humanitarian Emergency</option>
                </select>
              </div>
            </div>

            <label>OECD-DAC Criteria</label>
            <div className="chip-group">
              {Object.entries(OECD_DAC).map(([k, v]) => (
                <span key={k} className={`chip dac${context.dacCriteria.includes(k)?" selected":""}`}
                      style={context.dacCriteria.includes(k) ? {background:v.color,borderColor:v.color,color:"#fff"} : {}}
                      onClick={() => toggleChip("dacCriteria", k)}>{v.name}</span>
              ))}
            </div>
          </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <button className="btn btn-danger btn-sm" onClick={clearDraft}>Clear Saved Data</button>
            <button className="btn btn-primary" onClick={() => setStep(2)}>Next: Theory of Change &rarr;</button>
          </div>
        </div>
      )}

      {/* STEP 2 */}
      {step === 2 && (
        <div>
          <div className="panel">
            <h2>Theory of Change</h2>
            <div className="chip-group" style={{marginBottom:16}}>
              <span className={`chip${toc.inputMode==="structured"?" selected":""}`} onClick={() => updateToc("inputMode","structured")}>Structured Input</span>
              <span className={`chip${toc.inputMode==="freetext"?" selected":""}`} onClick={() => updateToc("inputMode","freetext")}>Free Text</span>
            </div>

            {toc.inputMode === "structured" ? (
              <div>
                <label>Programme Goal</label>
                <input type="text" value={toc.goal} onChange={e => updateToc("goal", e.target.value)} placeholder="e.g., Reduce HIV/TB/Malaria incidence and mortality in Nigeria" style={{marginBottom:16}}/>

                <label>Outcomes</label>
                {toc.outcomes.map((outcome, oi) => (
                  <div key={oi} className="outcome-card">
                    <div className="outcome-card-header">
                      <strong>Outcome {oi + 1}</strong>
                      <button className="remove-btn" onClick={() => removeOutcome(oi)}>&times;</button>
                    </div>
                    <input type="text" value={outcome.text} onChange={e => updateOutcome(oi, "text", e.target.value)}
                           placeholder="e.g., Increased ART coverage among PLHIV" style={{marginBottom:8}}/>
                    <div style={{marginLeft:16}}>
                      <span style={{fontSize:12,fontWeight:600,color:"#5A6474"}}>Outputs:</span>
                      {(outcome.outputs||[]).map((op, pi) => (
                        <div key={pi} className="output-row">
                          <span style={{color:"#2EC4B6",fontSize:12}}>&#8627;</span>
                          <input type="text" value={op.text||""} onChange={e => updateOutput(oi, pi, e.target.value)}
                                 placeholder={`Output ${pi+1}`} style={{fontSize:13}}/>
                          <button className="remove-btn" onClick={() => removeOutput(oi, pi)}>&times;</button>
                        </div>
                      ))}
                      <button className="btn btn-sm btn-secondary" onClick={() => addOutput(oi)} style={{marginTop:4}}>+ Add Output</button>
                    </div>
                  </div>
                ))}
                <button className="btn btn-secondary" onClick={addOutcome} style={{marginBottom:16}}>+ Add Outcome</button>
              </div>
            ) : (
              <div>
                <label>Paste Theory of Change (first line = goal, subsequent lines = outcomes)</label>
                <textarea rows={8} value={toc.freeText||""} onChange={e => updateToc("freeText", e.target.value)}
                          placeholder={"Reduce HIV/TB/Malaria incidence and mortality\nIncreased ART coverage among PLHIV\nImproved TB case detection and treatment success\nReduced malaria transmission through ITN scale-up"}/>
              </div>
            )}

            <div style={{marginTop:16}}>
              <label>Key Assumptions (optional, one per line)</label>
              <textarea rows={3} value={typeof toc.assumptions === "string" ? toc.assumptions : (toc.assumptions||[]).join("\n")}
                        onChange={e => updateToc("assumptions", e.target.value)}
                        placeholder="e.g., Government co-financing will increase as planned&#10;Supply chain will remain functional&#10;Political stability will be maintained"/>
            </div>
          </div>

          <div style={{display:"flex",justifyContent:"space-between"}}>
            <button className="btn btn-secondary" onClick={() => setStep(1)}>&larr; Back to Context</button>
            <button className="btn btn-primary" onClick={handleGenerate}>Generate Matrix &rarr;</button>
          </div>
        </div>
      )}

      {/* STEP 3 */}
      {step === 3 && (
        <div>
          {/* Stats */}
          <div className="stats-bar">
            <div className="stat-box"><div className="stat-val">{eqCount}</div><div className="stat-label">Evaluation Questions</div></div>
            <div className="stat-box"><div className="stat-val">{indCount}</div><div className="stat-label">Unique Indicators</div></div>
            <div className="stat-box"><div className="stat-val">{dacCount}</div><div className="stat-label">DAC Criteria</div></div>
            <div className="stat-box"><div className="stat-val">{dsCount}</div><div className="stat-label">Data Sources</div></div>
          </div>

          {/* Toolbar */}
          <div className="toolbar">
            <button className="btn btn-sm btn-secondary" onClick={() => setStep(2)}>&larr; Edit ToC</button>
            <button className="btn btn-sm btn-secondary" onClick={addCustomEq}>+ Add Question</button>
            <div className="toolbar-sep"/>
            <div className="view-toggle">
              <button className={viewMode==="card"?"active":""} onClick={() => setViewMode("card")}>Card</button>
              <button className={viewMode==="table"?"active":""} onClick={() => setViewMode("table")}>Table</button>
            </div>
            <div className="toolbar-sep"/>
            <button className="btn btn-sm btn-navy" onClick={exportExcel}>Export Excel</button>
            <button className="btn btn-sm btn-navy" onClick={exportWord}>Export Word</button>
            <button className="btn btn-sm btn-secondary" onClick={exportJSON}>Export JSON</button>
            <button className="btn btn-sm btn-secondary" onClick={() => fileInputRef.current?.click()}>Import JSON</button>
            <input type="file" ref={fileInputRef} accept=".json" style={{display:"none"}} onChange={importJSON}/>
            <button className="btn btn-sm btn-secondary" onClick={() => window.print()}>Print / PDF</button>
          </div>

          {/* Card View */}
          {viewMode === "card" && matrix.map(eq => {
            const dacInfo = OECD_DAC[eq.criterion] || {name: eq.criterion, color: "#666"};
            return (
              <div key={eq.id} className="eq-card">
                <div className="eq-card-header">
                  <span className="eq-num">{eq.id.replace("eq_","EQ")}</span>
                  <span className="dac-badge" style={{background: dacInfo.color}}>{dacInfo.name}</span>
                </div>

                <div className="eq-section">
                  <div className="eq-section-label">Evaluation Question</div>
                  <textarea className="eq-textarea" value={eq.question} onChange={e => updateEq(eq.id, "question", e.target.value)}/>
                </div>

                <div className="eq-section">
                  <div className="eq-section-label">Sub-Questions</div>
                  <ul className="sq-list">
                    {(eq.subQuestions||[]).map((sq, si) => (
                      <li key={si} className="sq-item">
                        <span className="sq-arrow">&rarr;</span>
                        <input className="sq-input" value={sq} onChange={e => updateSubQ(eq.id, si, e.target.value)}/>
                        <button className="sq-btn" onClick={() => removeSubQ(eq.id, si)}>&times;</button>
                      </li>
                    ))}
                  </ul>
                  <button className="btn btn-sm btn-secondary" onClick={() => addSubQ(eq.id)} style={{marginTop:4}}>+ Add sub-question</button>
                </div>

                <div className="eq-section">
                  <div className="eq-section-label">Judgement Criteria</div>
                  <textarea className="eq-textarea" style={{minHeight:40}} value={eq.judgementCriteria||""} onChange={e => updateEq(eq.id, "judgementCriteria", e.target.value)}/>
                </div>

                <div className="eq-section">
                  <div className="eq-section-label">Indicators</div>
                  <div className="tag-group">
                    {(eq.indicators||[]).map(ind => (
                      <span key={ind.id} className={`ind-tag${ind.source==="manual"?" manual":""}`}>
                        {ind.code ? <strong>[{ind.code}]</strong> : null} {ind.name}
                        <span className="tag-prov">{ind.source||"auto"}</span>
                        <span className="tag-x" onClick={() => removeIndicator(eq.id, ind.id)}>&times;</span>
                      </span>
                    ))}
                    <button className="btn btn-sm btn-secondary" onClick={() => setBankOpen(eq.id)}>+ Add from Indicator Bank</button>
                  </div>
                </div>

                <div className="eq-two-col">
                  <div className="eq-section">
                    <div className="eq-section-label">Data Sources</div>
                    <div className="tag-group">
                      {(eq.dataSources||[]).map(ds => <span key={ds} className="ds-tag">{ds}</span>)}
                    </div>
                  </div>
                  <div className="eq-section">
                    <div className="eq-section-label">Disaggregation</div>
                    <div className="tag-group">
                      {(eq.disaggregation||[]).map(d => <span key={d} className="disagg-tag">{d}</span>)}
                    </div>
                  </div>
                </div>

                <div className="eq-section">
                  <div className="eq-section-label">Rationale</div>
                  <textarea className="eq-textarea" style={{minHeight:36}} value={eq.rationale||""} onChange={e => updateEq(eq.id, "rationale", e.target.value)}/>
                </div>
              </div>
            );
          })}

          {/* Table View */}
          {viewMode === "table" && (
            <div style={{overflowX:"auto"}}>
              <table className="matrix-table">
                <thead>
                  <tr><th>EQ#</th><th>Criterion</th><th>Question</th><th>Indicators</th><th>Data Sources</th><th>Judgement Criteria</th></tr>
                </thead>
                <tbody>
                  {matrix.map(eq => (
                    <tr key={eq.id}>
                      <td style={{fontWeight:600,whiteSpace:"nowrap"}}>{eq.id.replace("eq_","EQ")}</td>
                      <td><span className="dac-badge" style={{background:(OECD_DAC[eq.criterion]||{}).color||"#666",fontSize:10}}>{(OECD_DAC[eq.criterion]||{}).name||eq.criterion}</span></td>
                      <td>{eq.question}</td>
                      <td style={{fontSize:12}}>{(eq.indicators||[]).map(i => (i.code ? "["+i.code+"] " : "")+i.name).join("; ")}</td>
                      <td style={{fontSize:12}}>{(eq.dataSources||[]).join(", ")}</td>
                      <td style={{fontSize:12}}>{eq.judgementCriteria}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Indicator Bank Modal */}
      {bankOpen && <IndicatorBankModal eqId={bankOpen} matrix={matrix} context={context}
                     onAdd={(ind) => addIndicatorToEq(bankOpen, ind)} onClose={() => setBankOpen(null)}/>}

      {/* Footer */}
      <footer className="app-footer">
        <div className="privacy-badges">
          <span className="privacy-badge">FREE &middot; OPEN SOURCE</span>
          <span className="privacy-badge">Privacy First &mdash; all data stays in your browser</span>
        </div>
        <p>Generated by PRAXIS Evaluation Matrix Builder &middot; {new Date().toLocaleDateString()} &middot; <a href="https://www.emmanuelneneodjidja.org/praxis">emmanuelneneodjidja.org/praxis</a></p>
        <p style={{marginTop:4}}><a href="https://github.com/emmaodjidja-sys/emmaodjidja-sys.github.io/tree/main/praxis/tools" target="_blank">View on GitHub</a></p>
      </footer>
    </div>
  );
}

// ── Indicator Bank Modal ─────────────────────────────────────────────
function IndicatorBankModal({ eqId, matrix, context, onAdd, onClose }) {
  const [search, setSearch] = useState("");
  const [filterHA, setFilterHA] = useState([]);
  const [filterFW, setFilterFW] = useState([]);
  const [filterLevel, setFilterLevel] = useState([]);

  const eq = matrix.find(e => e.id === eqId);
  const addedIds = new Set((eq?.indicators||[]).map(i => i.id));

  const results = useMemo(() => {
    const s = search.toLowerCase();
    return INDICATOR_BANK.filter(ind => {
      if (filterHA.length > 0 && !ind.healthAreas.some(a => filterHA.includes(a))) return false;
      if (filterFW.length > 0 && !ind.frameworks.some(f => filterFW.includes(f))) return false;
      if (filterLevel.length > 0 && !filterLevel.includes(ind.level)) return false;
      if (s) {
        const text = (ind.name + " " + ind.definition + " " + (ind.code||"") + " " + ind.id + " " + ind.healthAreas.join(" ") + " " + ind.frameworks.join(" ")).toLowerCase();
        if (!text.includes(s)) return false;
      }
      return true;
    });
  }, [search, filterHA, filterFW, filterLevel]);

  const toggleFilter = (arr, setArr, val) => {
    setArr(prev => prev.includes(val) ? prev.filter(v => v !== val) : [...prev, val]);
  };

  const activeFilters = [
    ...filterHA.map(a => ({type:"ha",val:a,label:HEALTH_AREAS[a]?.name||a})),
    ...filterFW.map(f => ({type:"fw",val:f,label:FRAMEWORKS[f]?.name||f})),
    ...filterLevel.map(l => ({type:"lv",val:l,label:l})),
  ];

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="modal-header">
          <h3>Indicator Bank ({INDICATOR_BANK.length} indicators)</h3>
          <button className="modal-close" onClick={onClose}>&times;</button>
        </div>
        <div className="modal-body">
          <input className="modal-search" placeholder="Search indicators by name, code, definition, health area..." value={search} onChange={e => setSearch(e.target.value)}/>

          <div className="filter-section">
            <div className="filter-label">Health Area</div>
            <div className="chip-group">
              {Object.entries(HEALTH_AREAS).map(([k, v]) => (
                <span key={k} className={`chip${filterHA.includes(k)?" selected":""}`} style={{fontSize:11,padding:"3px 8px"}}
                      onClick={() => toggleFilter(filterHA, setFilterHA, k)}>{v.name}</span>
              ))}
            </div>
          </div>
          <div className="filter-section">
            <div className="filter-label">Framework</div>
            <div className="chip-group">
              {Object.entries(FRAMEWORKS).map(([k, v]) => (
                <span key={k} className={`chip${filterFW.includes(k)?" selected":""}`} style={{fontSize:11,padding:"3px 8px"}}
                      onClick={() => toggleFilter(filterFW, setFilterFW, k)}>{v.name}</span>
              ))}
            </div>
          </div>
          <div className="filter-section">
            <div className="filter-label">Level</div>
            <div className="chip-group">
              {["input","process","output","outcome","impact"].map(l => (
                <span key={l} className={`chip${filterLevel.includes(l)?" selected":""}`} style={{fontSize:11,padding:"3px 8px"}}
                      onClick={() => toggleFilter(filterLevel, setFilterLevel, l)}>{l}</span>
              ))}
            </div>
          </div>

          {activeFilters.length > 0 && (
            <div className="active-filters">
              {activeFilters.map(f => (
                <span key={f.type+f.val} className="active-filter" onClick={() => {
                  if (f.type==="ha") toggleFilter(filterHA, setFilterHA, f.val);
                  else if (f.type==="fw") toggleFilter(filterFW, setFilterFW, f.val);
                  else toggleFilter(filterLevel, setFilterLevel, f.val);
                }}>{f.label} &times;</span>
              ))}
            </div>
          )}

          <div className="result-count">{results.length} indicator{results.length !== 1 ? "s" : ""} matching</div>

          {results.slice(0, 50).map(ind => {
            const isAdded = addedIds.has(ind.id);
            return (
              <div key={ind.id} className={`ind-result${isAdded?" added":""}`} onClick={() => !isAdded && onAdd(ind)}>
                <div className="ind-result-name">
                  {ind.code && <span className="ind-result-code">{ind.code}</span>}
                  {ind.name}
                  {isAdded && <span style={{marginLeft:8,color:"#16a34a",fontSize:14}}>&#10003;</span>}
                </div>
                <div className="ind-result-def">{ind.definition}</div>
                <div className="ind-result-meta">
                  {ind.healthAreas.map(a => <span key={a}>{HEALTH_AREAS[a]?.name||a}</span>)}
                  <span style={{background:"#EFF6FF"}}>{ind.level}</span>
                  <span>{ind.frequency}</span>
                  <span>{ind.qualityFlag}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
