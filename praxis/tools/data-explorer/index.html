body{font-family:'DM Sans',-apple-system,sans-serif;background:#0B1A2E;color:#E8ECF0;-webkit-font-smoothing:antialiased}

/* Focus indicators */
*:focus-visible{outline:2px solid #2EC4B6;outline-offset:2px}

.topbar{position:sticky;top:0;z-index:999;display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:rgba(11,26,46,.97);backdrop-filter:blur(12px);border-bottom:1px solid rgba(46,196,182,.12);font-size:14px;flex-wrap:wrap;gap:8px}
.topbar a{text-decoration:none;color:#2EC4B6;font-weight:500;display:inline-flex;align-items:center;gap:6px}
.topbar a:hover{color:#94A3B8}
.topbar .brand{font-family:'JetBrains Mono',monospace;font-weight:700;letter-spacing:.1em;color:#2EC4B6;font-size:12px}
.topbar .nr{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar .nr a{font-size:12px;color:#94A3B8}
.topbar .nr a:hover{color:#2EC4B6}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(46,196,182,.1)}50%{box-shadow:0 0 40px rgba(46,196,182,.25)}}
.fu{animation:fadeUp .4s ease both}
.skel{background:linear-gradient(90deg,#1a3050 25%,#1f3a5c 50%,#1a3050 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:6px}

/* SearchableSelect */
.ss{position:relative}
.ss input{width:100%;padding:9px 12px;border-radius:8px;border:1px solid rgba(46,196,182,.2);font-size:12px;background:rgba(255,255,255,.04);color:#E8ECF0;outline:none;box-sizing:border-box;font-family:'DM Sans',sans-serif;transition:all .2s;min-height:36px}
.ss input:focus{border-color:#2EC4B6;box-shadow:0 0 0 3px rgba(46,196,182,.15);background:rgba(255,255,255,.06)}
.ss input::placeholder{color:#94A3B8}
.ss .dd{position:absolute;top:calc(100% + 2px);left:0;right:0;max-height:220px;overflow-y:auto;background:#0f2240;border:1px solid rgba(46,196,182,.15);border-radius:8px;box-shadow:0 12px 32px rgba(0,0,0,.4);z-index:20}
.ss .di{padding:8px 12px;font-size:12px;cursor:pointer;color:#94A3B8;border-bottom:1px solid rgba(255,255,255,.04);transition:all .1s;min-height:36px;display:flex;align-items:center;gap:6px}
.ss .di:hover,.ss .di.active{background:rgba(46,196,182,.15);color:#E8ECF0}
.ss .di.selected{color:#2EC4B6;font-weight:600}
.ss .di.selected::before{content:'✓ ';color:#2EC4B6}
.ss .di .sub{font-size:10px;color:#94A3B8;margin-left:auto}

/* Tab bar */
.tab-bar-wrapper{position:relative;background:rgba(0,0,0,.15);border-bottom:1px solid rgba(255,255,255,.06)}
.tab-bar-wrapper::before,.tab-bar-wrapper::after{content:'';position:absolute;top:0;bottom:0;width:32px;pointer-events:none;z-index:1;opacity:0;transition:opacity .2s}
.tab-bar-wrapper.scroll-left::before{left:0;background:linear-gradient(to right,rgba(11,26,46,.95),transparent);opacity:1}
.tab-bar-wrapper.scroll-right::after{right:0;background:linear-gradient(to left,rgba(11,26,46,.95),transparent);opacity:1}
.tab-bar{display:flex;overflow-x:auto;gap:0;padding:0 16px;scrollbar-width:none;-ms-overflow-style:none}
.tab-bar::-webkit-scrollbar{display:none}

.tb{background:none;border:none;padding:10px 14px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;color:#94A3B8;border-bottom:2.5px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif;min-height:44px}
.tb:hover{color:#E8ECF0}
.tb.on{color:#2EC4B6;border-bottom-color:#2EC4B6}
.tb.dim{opacity:.35}
.tb .bg{font-size:9px;padding:1px 6px;border-radius:10px;font-weight:700;background:rgba(46,196,182,.15);color:#2EC4B6;font-family:'JetBrains Mono',monospace}

.cc{cursor:pointer;transition:all .2s}.cc:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(46,196,182,.12);border-color:rgba(46,196,182,.3)!important}
.sth thead th{position:sticky;top:0;z-index:2}
.sort-th{cursor:pointer;user-select:none}.sort-th:hover{color:#2EC4B6!important}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;margin-bottom:12px}
.select-dark{padding:9px 12px;border-radius:8px;border:1px solid rgba(46,196,182,.2);font-size:12px;background:rgba(255,255,255,.04);color:#E8ECF0;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;min-height:36px}
.select-dark:focus{border-color:#2EC4B6;box-shadow:0 0 0 3px rgba(46,196,182,.15)}

/* Upload zone */
.upload-zone{border:2px dashed rgba(46,196,182,.2);border-radius:16px;padding:52px 28px;cursor:pointer;background:rgba(255,255,255,.02);transition:all .25s;animation:glow 3s ease-in-out infinite}
.upload-zone:hover,.upload-zone.dragging{border-color:rgba(46,196,182,.6);background:rgba(46,196,182,.06);animation:none}
.upload-zone:focus-visible{outline:2px solid #2EC4B6;outline-offset:4px;border-color:rgba(46,196,182,.6)}

/* Stat card grid */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-top:14px}
.stat-card{background:rgba(46,196,182,.05);border-radius:8px;padding:10px 8px;text-align:center;border:1px solid rgba(46,196,182,.1)}
.stat-card .val{font-size:17px;font-weight:700;color:#E8ECF0}
.stat-card .lbl{font-size:10px;color:#94A3B8}
.stat-card.hl .val{color:#34A853}
.stat-card.purple{background:rgba(123,97,255,.08);border-color:rgba(123,97,255,.2)}
.stat-card.purple .val{color:#7B61FF}

/* Collapsible sections */
details summary{cursor:pointer;user-select:none}
details summary:hover{color:#2EC4B6}

/* Guided prompt cards */
.guide-card{background:rgba(46,196,182,.04);border:1px solid rgba(46,196,182,.12);border-radius:8px;padding:10px 14px;cursor:pointer;transition:all .2s;font-size:12px;color:#94A3B8;display:flex;align-items:center;gap:8px}
.guide-card:hover{background:rgba(46,196,182,.1);color:#E8ECF0;border-color:rgba(46,196,182,.3)}
.guide-card .arrow{color:#2EC4B6;font-weight:700}

/* Correlation heatmap cell */
.corr-cell{cursor:pointer;transition:opacity .15s}
.corr-cell:hover{opacity:.8}

/* Mobile responsive */
@media(max-width:640px){
  .topbar{padding:8px 12px;font-size:12px}
  .topbar .nr{gap:8px}
  .tab-bar{padding:0 8px}
  .tb{padding:8px 10px;font-size:11px}
}

/* Methodological note box */
.meth-note{background:rgba(46,196,182,.04);border-left:3px solid #2EC4B6;padding:10px 14px;border-radius:0 8px 8px 0;margin:10px 0;font-size:11px;color:#94A3B8;line-height:1.5}

/* Export modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#0f2240;border:1px solid rgba(46,196,182,.2);border-radius:12px;padding:24px;max-width:440px;width:100%;max-height:80vh;overflow-y:auto;box-shadow:0 24px 64px rgba(0,0,0,.5)}

// ═══════════════════════════════════════════════════════════════════════════
// STATISTICAL ENGINE (from STATS-ENGINE-REFERENCE.js — verified implementations)
// ═══════════════════════════════════════════════════════════════════════════

function normalCDF(x){
  if(x<-8)return 0;if(x>8)return 1;
  const a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;
  const sign=x<0?-1:1,absX=Math.abs(x),t=1/(1+p*absX);
  const y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-absX*absX/2);
  return 0.5*(1+sign*y);
}
function zToP(z){return 2*(1-normalCDF(Math.abs(z)));}

function lnGamma(z){
  if(z<0.5)return Math.log(Math.PI/Math.sin(Math.PI*z))-lnGamma(1-z);
  z-=1;const g=7;
  const coef=[0.99999999999980993,676.5203681218851,-1259.1392167224028,771.32342877765313,-176.61502916214059,12.507343278686905,-0.13857109526572012,9.9843695780195716e-6,1.5056327351493116e-7];
  let x=coef[0];for(let i=1;i<g+2;i++)x+=coef[i]/(z+i);
  const t=z+g+0.5;
  return 0.5*Math.log(2*Math.PI)+(z+0.5)*Math.log(t)-t+Math.log(x);
}

function betaIncomplete(a,b,x){
  if(x<0||x>1)return NaN;if(x===0)return 0;if(x===1)return 1;
  if(x>(a+1)/(a+b+2))return 1-betaIncomplete(b,a,1-x);
  const lnBeta=lnGamma(a)+lnGamma(b)-lnGamma(a+b);
  const front=Math.exp(Math.log(x)*a+Math.log(1-x)*b-lnBeta)/a;
  const maxIter=200,eps=1e-14;let f=1,c=1,d=0;
  for(let i=0;i<=maxIter;i++){
    let m=Math.floor(i/2),num;
    if(i===0)num=1;
    else if(i%2===0)num=(m*(b-m)*x)/((a+2*m-1)*(a+2*m));
    else num=-((a+m)*(a+b+m)*x)/((a+2*m)*(a+2*m+1));
    d=1+num*d;if(Math.abs(d)<1e-30)d=1e-30;d=1/d;
    c=1+num/c;if(Math.abs(c)<1e-30)c=1e-30;
    const delta=c*d;f*=delta;
    if(Math.abs(delta-1)<eps)break;
  }
  return front*(f-1);
}

function tCDF(t,df){
  if(df<=0)return NaN;if(t===0)return 0.5;
  const x=df/(df+t*t);
  const prob=0.5*betaIncomplete(df/2,0.5,x);
  return t>0?1-prob:prob;
}
function tToP(t,df){if(df<=0)return NaN;return 2*(1-tCDF(Math.abs(t),df));}

function gammaIncomplete(a,x){
  if(x<0)return 0;if(x===0)return 0;
  if(x<a+1){
    let sum=1/a,term=1/a;
    for(let n=1;n<200;n++){term*=x/(a+n);sum+=term;if(Math.abs(term)<Math.abs(sum)*1e-14)break;}
    return sum*Math.exp(-x+a*Math.log(x)-lnGamma(a));
  }else{
    let b=x+1-a,cc=1e30,dd=1/b,h=dd;
    for(let i=1;i<=200;i++){
      const an=-i*(i-a);b+=2;
      dd=an*dd+b;if(Math.abs(dd)<1e-30)dd=1e-30;
      cc=b+an/cc;if(Math.abs(cc)<1e-30)cc=1e-30;
      dd=1/dd;const delta=dd*cc;h*=delta;
      if(Math.abs(delta-1)<1e-14)break;
    }
    return 1-Math.exp(-x+a*Math.log(x)-lnGamma(a))*h;
  }
}

function chiSquaredCDF(x,df){if(x<=0)return 0;return gammaIncomplete(df/2,x/2);}

function fCDF(x,d1,d2){
  if(x<=0)return 0;
  const z=(d1*x)/(d1*x+d2);
  return betaIncomplete(d1/2,d2/2,z);
}

function tCriticalValue(alpha,df){
  let lo=0,hi=20;
  for(let i=0;i<100;i++){
    const mid=(lo+hi)/2;
    if(1-tCDF(mid,df)>alpha)lo=mid;else hi=mid;
    if(hi-lo<1e-8)break;
  }
  return(lo+hi)/2;
}

function descriptiveStats(nums){
  if(!nums.length)return null;
  const sorted=[...nums].sort((a,b)=>a-b);const n=sorted.length;
  const sum=sorted.reduce((s,v)=>s+v,0);const mean=sum/n;
  const variance=n>1?sorted.reduce((s,v)=>s+(v-mean)**2,0)/(n-1):0;
  const sd=Math.sqrt(variance);const se=n>0?sd/Math.sqrt(n):0;
  const quantile=(arr,p)=>{if(arr.length===1)return arr[0];const h=(arr.length-1)*p;const lo=Math.floor(h),hi=Math.ceil(h);return arr[lo]+(arr[hi]-arr[lo])*(h-lo);};
  const median=quantile(sorted,0.5),q1=quantile(sorted,0.25),q3=quantile(sorted,0.75),iqr=q3-q1;
  let skewness=0;
  if(n>2&&sd>0){const m3=sorted.reduce((s,v)=>s+((v-mean)/sd)**3,0);skewness=(n*m3)/((n-1)*(n-2));}
  let kurtosis=0;
  if(n>3&&sd>0){const m4=sorted.reduce((s,v)=>s+((v-mean)/sd)**4,0);kurtosis=((n*(n+1))/((n-1)*(n-2)*(n-3)))*m4-(3*(n-1)**2)/((n-2)*(n-3));}
  return{n,mean,sd,se,variance,median,q1,q3,iqr,min:sorted[0],max:sorted[n-1],skewness,kurtosis,sorted};
}

function olsRegression(xs,ys){
  const pairs=[];
  for(let i=0;i<xs.length;i++){
    if(xs[i]!=null&&ys[i]!=null&&!isNaN(xs[i])&&!isNaN(ys[i]))pairs.push({x:Number(xs[i]),y:Number(ys[i])});
  }
  const n=pairs.length;if(n<3)return null;
  let sx=0,sy=0,sxy=0,sxx=0;
  for(const p of pairs){sx+=p.x;sy+=p.y;sxy+=p.x*p.y;sxx+=p.x*p.x;}
  const xMean=sx/n,yMean=sy/n,sxxC=sxx-n*xMean*xMean;
  if(sxxC===0)return null;
  const slope=(sxy-n*xMean*yMean)/sxxC,intercept=yMean-slope*xMean;
  const residuals=pairs.map(p=>p.y-(intercept+slope*p.x));
  const ssr=residuals.reduce((s,r)=>s+r*r,0);
  const sst=pairs.reduce((s,p)=>s+(p.y-yMean)**2,0);
  const sse=sst-ssr;
  const r2=sst>0?1-ssr/sst:0;
  const adjR2=n>2?1-(1-r2)*(n-1)/(n-2):r2;
  const mse=ssr/(n-2);const seReg=Math.sqrt(mse);
  const seSlope=Math.sqrt(mse/sxxC);
  const seIntercept=Math.sqrt(mse*(1/n+xMean*xMean/sxxC));
  const tSlope=slope/seSlope,tIntercept=intercept/seIntercept;
  const df=n-2;
  const pSlope=tToP(tSlope,df),pIntercept=tToP(tIntercept,df);
  const fStat=sst>0?(sse/1)/(ssr/(n-2)):0;
  const pF=1-fCDF(fStat,1,n-2);
  const tCrit=tCriticalValue(0.025,df);
  const ciSlope=[slope-tCrit*seSlope,slope+tCrit*seSlope];
  const ciIntercept=[intercept-tCrit*seIntercept,intercept+tCrit*seIntercept];
  let dw=0;for(let i=1;i<residuals.length;i++)dw+=(residuals[i]-residuals[i-1])**2;
  dw/=(ssr||1);
  return{type:'ols',n,df,slope,intercept,seSlope,seIntercept,seReg,tSlope,tIntercept,pSlope,pIntercept,r2,adjR2,fStat,pF,ciSlope,ciIntercept,dw,residuals,fitted:pairs.map(p=>intercept+slope*p.x),pairs};
}

function logisticRegression(xs,ys){
  const pairs=[];
  for(let i=0;i<xs.length;i++){
    if(xs[i]!=null&&ys[i]!=null&&!isNaN(xs[i])&&!isNaN(ys[i])){
      const yv=Number(ys[i]);if(yv===0||yv===1)pairs.push({x:Number(xs[i]),y:yv});
    }
  }
  const n=pairs.length;if(n<5)return null;
  const dx=pairs.map(p=>p.x),dy=pairs.map(p=>p.y);
  let b0=0,b1=0;
  for(let iter=0;iter<30;iter++){
    let g0=0,g1=0,h00=0,h01=0,h11=0;
    for(let i=0;i<n;i++){
      const z=b0+b1*dx[i];const p=1/(1+Math.exp(-Math.max(-20,Math.min(20,z))));
      const r=dy[i]-p;const w=p*(1-p)+1e-10;
      g0+=r;g1+=r*dx[i];h00+=w;h01+=w*dx[i];h11+=w*dx[i]*dx[i];
    }
    const det=h00*h11-h01*h01;if(Math.abs(det)<1e-12)break;
    const db0=(h11*g0-h01*g1)/det,db1=(h00*g1-h01*g0)/det;
    b0+=db0;b1+=db1;if(Math.abs(db0)<1e-8&&Math.abs(db1)<1e-8)break;
  }
  let h00=0,h01=0,h11=0,ll=0;const predicted=[];
  for(let i=0;i<n;i++){
    const z=b0+b1*dx[i];const p=1/(1+Math.exp(-Math.max(-20,Math.min(20,z))));
    const w=p*(1-p)+1e-10;h00+=w;h01+=w*dx[i];h11+=w*dx[i]*dx[i];
    ll+=dy[i]*Math.log(p+1e-10)+(1-dy[i])*Math.log(1-p+1e-10);
    predicted.push({x:dx[i],y:dy[i],prob:p});
  }
  const det=h00*h11-h01*h01;if(Math.abs(det)<1e-12)return null;
  const se0=Math.sqrt(h11/det),se1=Math.sqrt(h00/det);
  const z1=b1/se1;
  const pVal=zToP(z1);
  const or=Math.exp(b1),orLo=Math.exp(b1-1.96*se1),orHi=Math.exp(b1+1.96*se1);
  const yMean=dy.reduce((a,v)=>a+v,0)/n;
  const llNull=n*(yMean*Math.log(yMean+1e-10)+(1-yMean)*Math.log(1-yMean+1e-10));
  const pseudoR2=llNull!==0?1-ll/llNull:0;
  let tp=0,tn=0,fp=0,fn=0;
  for(const p of predicted){const pred=p.prob>=0.5?1:0;if(p.y===1&&pred===1)tp++;else if(p.y===0&&pred===0)tn++;else if(p.y===0&&pred===1)fp++;else fn++;}
  const accuracy=(tp+tn)/n,sensitivity=tp+fn>0?tp/(tp+fn):0,specificity=tn+fp>0?tn/(tn+fp):0;
  const pos=predicted.filter(p=>p.y===1).map(p=>p.prob),neg=predicted.filter(p=>p.y===0).map(p=>p.prob);
  let concordant=0;for(const pp of pos)for(const np of neg){if(pp>np)concordant++;else if(pp===np)concordant+=0.5;}
  const auc=pos.length>0&&neg.length>0?concordant/(pos.length*neg.length):0.5;
  return{type:'logistic',n,b0,b1,se0,se1,z:Math.abs(z1),pVal,or,orLo,orHi,ll,pseudoR2,classification:{tp,tn,fp,fn,accuracy,sensitivity,specificity},auc,predicted,pairs};
}

function chiSquareTest(observed){
  const nRows=observed.length,nCols=observed[0].length;
  const rowTotals=observed.map(r=>r.reduce((s,v)=>s+v,0));
  const colTotals=observed[0].map((_,j)=>observed.reduce((s,r)=>s+r[j],0));
  const total=rowTotals.reduce((s,v)=>s+v,0);
  if(total===0)return null;
  let chiSq=0,minExpected=Infinity,cellsBelow5=0;const expected=[];
  for(let i=0;i<nRows;i++){expected[i]=[];for(let j=0;j<nCols;j++){
    const e=(rowTotals[i]*colTotals[j])/total;expected[i][j]=e;
    if(e<5)cellsBelow5++;minExpected=Math.min(minExpected,e);
    if(e>0)chiSq+=(observed[i][j]-e)**2/e;
  }}
  const df=(nRows-1)*(nCols-1);
  const pValue=df>0?1-chiSquaredCDF(chiSq,df):1;
  const cramersV=total>0&&Math.min(nRows,nCols)>1?Math.sqrt(chiSq/(total*(Math.min(nRows,nCols)-1))):0;
  const vDf=Math.min(nRows,nCols)-1;
  let vInterp='negligible';
  if(vDf===1){if(cramersV>=0.5)vInterp='large';else if(cramersV>=0.3)vInterp='medium';else if(cramersV>=0.1)vInterp='small';}
  else if(vDf===2){if(cramersV>=0.35)vInterp='large';else if(cramersV>=0.21)vInterp='medium';else if(cramersV>=0.07)vInterp='small';}
  else{if(cramersV>=0.29)vInterp='large';else if(cramersV>=0.17)vInterp='medium';else if(cramersV>=0.06)vInterp='small';}
  const totalCells=nRows*nCols;const warnings=[];
  if(minExpected<1)warnings.push('Expected counts < 1 in some cells. Results unreliable.');
  else if(cellsBelow5/totalCells>0.2)warnings.push(`${Math.round(cellsBelow5/totalCells*100)}% of cells have expected counts < 5. Consider collapsing categories.`);
  else if(minExpected<5)warnings.push('Some expected counts < 5. Interpret with caution.');
  return{chiSq,df,pValue,cramersV,vInterp,expected,minExpected,cellsBelow5,warnings,total};
}

function fisherExact2x2(a,b,c,d){
  const n=a+b+c+d,r1=a+b,r2=c+d,c1=a+c,c2=b+d;
  const lf=[0];for(let i=1;i<=n;i++)lf[i]=lf[i-1]+Math.log(i);
  const tableP=(aa)=>{const bb=r1-aa,cc=c1-aa,dd=r2-cc;if(bb<0||cc<0||dd<0)return 0;return Math.exp(lf[r1]+lf[r2]+lf[c1]+lf[c2]-lf[n]-lf[aa]-lf[bb]-lf[cc]-lf[dd]);};
  const pObs=tableP(a);let pValue=0;
  const minA=Math.max(0,r1-c2),maxA=Math.min(r1,c1);
  for(let aa=minA;aa<=maxA;aa++){const p=tableP(aa);if(p<=pObs+1e-12)pValue+=p;}
  return Math.min(pValue,1);
}

function cronbachAlpha(items){
  const k=items.length;if(k<2)return null;
  const n=items[0].length;const validRows=[];
  for(let i=0;i<n;i++){if(items.every(item=>item[i]!=null&&!isNaN(Number(item[i]))))validRows.push(i);}
  if(validRows.length<3)return null;
  const nValid=validRows.length;
  const itemVars=items.map(item=>{const vals=validRows.map(i=>Number(item[i]));const m=vals.reduce((s,v)=>s+v,0)/nValid;return vals.reduce((s,v)=>s+(v-m)**2,0)/(nValid-1);});
  const totals=validRows.map(i=>items.reduce((s,item)=>s+Number(item[i]),0));
  const totalMean=totals.reduce((s,v)=>s+v,0)/nValid;
  const totalVar=totals.reduce((s,v)=>s+(v-totalMean)**2,0)/(nValid-1);
  if(totalVar===0)return null;
  const sumItemVars=itemVars.reduce((s,v)=>s+v,0);
  const alpha=(k/(k-1))*(1-sumItemVars/totalVar);
  let interpretation;
  if(alpha>=0.9)interpretation='Excellent';else if(alpha>=0.8)interpretation='Good';else if(alpha>=0.7)interpretation='Acceptable';else if(alpha>=0.6)interpretation='Questionable';else if(alpha>=0.5)interpretation='Poor';else interpretation='Unacceptable';
  return{alpha,k,nValid,itemVars,totalVar,interpretation};
}

function pearsonCorrelation(xs,ys){
  let n=0,sx=0,sy=0,sxy=0,sxx=0,syy=0;
  for(let i=0;i<xs.length;i++){
    if(xs[i]!=null&&ys[i]!=null&&!isNaN(Number(xs[i]))&&!isNaN(Number(ys[i]))){
      const x=Number(xs[i]),y=Number(ys[i]);n++;sx+=x;sy+=y;sxy+=x*y;sxx+=x*x;syy+=y*y;
    }
  }
  if(n<3)return null;
  const denom=Math.sqrt((n*sxx-sx*sx)*(n*syy-sy*sy));
  if(denom===0)return{r:0,t:0,p:1,n};
  const r=(n*sxy-sx*sy)/denom;
  const rClamped=Math.max(-0.9999999,Math.min(0.9999999,r));
  const t=rClamped*Math.sqrt((n-2)/(1-rClamped*rClamped));
  const p=tToP(t,n-2);
  return{r,t,p,n};
}

function histogramBins(values){
  if(!values.length)return[];
  const sorted=[...values].sort((a,b)=>a-b);const n=sorted.length;
  const min=sorted[0],max=sorted[n-1];
  if(min===max)return[{binStart:min,binEnd:max,count:n,label:String(min)}];
  const nBins=Math.max(5,Math.min(30,Math.ceil(1+3.322*Math.log10(n))));
  const binWidth=(max-min)/nBins;const bins=[];
  for(let i=0;i<nBins;i++){
    const start=min+i*binWidth;const end=i===nBins-1?max+0.001:min+(i+1)*binWidth;
    bins.push({binStart:start,binEnd:end,count:0,label:start.toFixed(1)});
  }
  for(const v of sorted){const idx=Math.min(Math.floor((v-min)/binWidth),nBins-1);bins[idx].count++;}
  return bins;
}

const norm=s=>s.replace(/[\u2018\u2019\u201A\u201B\u2032\u0060\u00B4]/g,"'");

const fmt=(n,d=1)=>typeof n==="number"?n.toFixed(d):n;
const fmtP=p=>p<0.001?"< 0.001":p.toFixed(3);

const META=[/^_id$/i,/^_uuid$/i,/^_submission_time$/i,/^_validation_status$/i,/^_notes$/i,/^_status$/i,/^_submitted_by$/i,/^_tags$/i,/^_index$/i,/^__version__$/i,/^formhub/i,/^start$/i,/^end$/i,/^today$/i,/^date$/i,/^deviceid$/i,/^phonenumber$/i,/^instanceID$/i,/^meta\//i,/_latitude$/i,/_longitude$/i,/_altitude$/i,/_precision$/i,/^latitude$/i,/^longitude$/i,/^gps$/i,/coordonn/i,/^timestamp$/i,/^event_id/i];
const isMeta=n=>META.some(p=>p.test(n));

function idKobo(h){const sl=h.filter(x=>x&&x.includes("/"));const pc=new Set();sl.forEach(x=>pc.add(x.split("/")[0].trim()));const rp=new Set(h.filter(x=>pc.has(x)));const dm=new Set();sl.forEach(x=>{if(rp.has(x.split("/")[0].trim()))dm.add(x);});return{dm,rp};}

const LEN={"strongly agree":5,"agree":4,"neutral":3,"neither agree nor disagree":3,"disagree":2,"strongly disagree":1};
const LFR=Object.entries({"tout a fait d'accord":5,"tout \u00e0 fait d'accord":5,"tres d'accord":5,"tr\u00e8s d'accord":5,"plutot d'accord":4,"plut\u00f4t d'accord":4,"d'accord":4,"ni d'accord ni pas d'accord":3,"ni d'accord ni en desaccord":3,"ni d'accord ni en d\u00e9saccord":3,"ni d'accord ni desaccord":3,"neutre":3,"plutot en desaccord":2,"plut\u00f4t en d\u00e9saccord":2,"pas d'accord":2,"desaccord":2,"d\u00e9saccord":2,"en desaccord":2,"en d\u00e9saccord":2,"tout a fait en desaccord":1,"tout \u00e0 fait en d\u00e9saccord":1,"pas du tout d'accord":1,"tres a l'aise":4,"tr\u00e8s \u00e0 l'aise":4,"plutot a l'aise":3,"plut\u00f4t \u00e0 l'aise":3,"plutot mal a l'aise":2,"plut\u00f4t mal \u00e0 l'aise":2,"tres mal a l'aise":1,"tr\u00e8s mal \u00e0 l'aise":1}).sort((a,b)=>b[0].length-a[0].length);

function detLik(v){if(v==null)return null;const r=String(v).trim();if(!r)return null;const s=norm(r).toLowerCase();const em=s.match(/\((\d)\)/);if(em)return+em[1];const lm=s.match(/^(\d)\s*[:.]/);if(lm)return+lm[1];if(LEN[s]!==undefined)return LEN[s];for(const[k,val]of LFR)if(s.includes(norm(k)))return val;const n=Number(v);if(!isNaN(n)&&n>=1&&n<=5&&Number.isInteger(n))return n;return null;}

function isLikCol(vs){const nn=vs.filter(v=>v!=null&&String(v).trim());if(nn.length<3||nn.every(v=>v===0||v===1||v==="0"||v==="1"))return false;for(const v of nn){const n=Number(v);if(!isNaN(n)&&Number.isInteger(n)&&n>5)return false;}return nn.map(detLik).filter(v=>v!==null).length/nn.length>.7;}

function scRng(vs){const p=vs.map(detLik).filter(v=>v!==null);if(!p.length)return{mn:1,mx:5,pts:5};return{mn:Math.min(...p),mx:Math.max(...p),pts:Math.max(...p)-Math.min(...p)+1};}

function pDate(v){if(v instanceof Date&&!isNaN(v))return v;const s=String(v).trim();const d1=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);if(d1){const d=new Date(+d1[3],+d1[2]-1,+d1[1]);if(!isNaN(d))return d;}const d2=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);if(d2){const d=new Date(+d2[1],+d2[2]-1,+d2[3]);if(!isNaN(d))return d;}return null;}

function isDateC(vs){const nn=vs.filter(v=>v!=null&&String(v).trim()).slice(0,50);if(nn.length<3)return false;return nn.map(pDate).filter(v=>v!==null).length/nn.length>.7;}

function dType(name,vals,dummies){
  if(isMeta(name))return"meta";if(dummies.has(name))return"kobo_dummy";
  const nn=vals.filter(v=>v!=null&&String(v).trim()!=="");if(!nn.length)return"empty";
  if(nn.slice(0,5).every(v=>v instanceof Date))return"date";
  if(nn.every(v=>v===0||v===1||v==="0"||v==="1")&&nn.length>5)return"binary";
  if(isDateC(nn))return"date";if(isLikCol(nn))return"likert";
  const nc=nn.filter(v=>!isNaN(Number(v))&&typeof v!=="boolean").length;
  if(nc/nn.length>.85){const u=new Set(nn.map(Number));if(u.size<=15&&u.size<nn.length*.3)return"ordinal_numeric";return"numeric";}
  const al=nn.reduce((s,v)=>s+String(v).length,0)/nn.length;if(al>80)return"text";
  const u=new Set(nn.map(v=>String(v).trim()));if(u.size<=1)return"constant";
  if(u.size<=30)return"categorical";if(u.size<=60&&u.size<nn.length*.5)return"categorical";return"text";
}

function freqT(vs){const c={};let t=0;vs.forEach(v=>{if(v!=null&&String(v).trim()){const k=String(v).trim();c[k]=(c[k]||0)+1;t++;}});return Object.entries(c).map(([v,n])=>({value:v,count:n,pct:t?((n/t)*100).toFixed(1):"0"})).sort((a,b)=>b.count-a.count);}

function isBinaryY(yVals){const valid=yVals.filter(v=>v!=null&&!isNaN(v));if(valid.length<5)return false;const uniq=new Set(valid.map(Number));return uniq.size===2&&uniq.has(0)&&uniq.has(1);}

function pFile(buf,fn){
  const wb=XLSX.read(buf,{type:"array",cellDates:true});
  let bs=wb.SheetNames[0],br=0;
  for(const n of wb.SheetNames){const r=XLSX.utils.decode_range(wb.Sheets[n]["!ref"]||"A1");if(r.e.r-r.s.r>br){br=r.e.r-r.s.r;bs=n;}}
  const raw=XLSX.utils.sheet_to_json(wb.Sheets[bs],{defval:null});
  if(!raw.length)return null;
  const hd=Object.keys(raw[0]);const{dm,rp}=idKobo(hd);
  const cols=hd.map(h=>{const vs=raw.map(r=>r[h]);const t=dType(h,vs,dm);const nn=vs.filter(v=>v!=null&&String(v).trim()!=="");return{name:h,type:t,values:vs,nonNull:nn.length,missing:vs.length-nn.length,missPct:(((vs.length-nn.length)/vs.length)*100).toFixed(1)};});
  const ah=hd.join(" ").toLowerCase();
  const fr=(ah.match(/\b(du|de|le|la|les|des|est|une|vous|votre|dans|avec|que|par)\b/g)||[]).length;
  return{fn,sheet:bs,sheetN:wb.SheetNames.length,rows:raw.length,colN:hd.length,cols,kbP:[...rp],lang:fr>5?"fr":"en",raw};
}

function parseWithWorker(buffer,filename){
  return new Promise((resolve,reject)=>{
    try{
      const workerCode=`
        importScripts('https://unpkg.com/xlsx/dist/xlsx.full.min.js');
        self.onmessage=function(e){
          try{
            var wb=XLSX.read(e.data.buffer,{type:"array",cellDates:true});
            var bs=wb.SheetNames[0],br=0;
            for(var i=0;i<wb.SheetNames.length;i++){var n=wb.SheetNames[i];var r=XLSX.utils.decode_range(wb.Sheets[n]["!ref"]||"A1");if(r.e.r-r.s.r>br){br=r.e.r-r.s.r;bs=n;}}
            var raw=XLSX.utils.sheet_to_json(wb.Sheets[bs],{defval:null});
            self.postMessage({raw:raw,sheet:bs,sheetN:wb.SheetNames.length,fn:e.data.fn});
          }catch(err){self.postMessage({error:err.message});}
        };
      `;
      const blob=new Blob([workerCode],{type:'application/javascript'});
      const url=URL.createObjectURL(blob);
      const worker=new Worker(url);
      worker.onmessage=function(e){
        worker.terminate();URL.revokeObjectURL(url);
        if(e.data.error){reject(new Error(e.data.error));return;}
        const raw=e.data.raw;if(!raw||!raw.length){reject(new Error('No data'));return;}
        const hd=Object.keys(raw[0]);const{dm,rp}=idKobo(hd);
        const cols=hd.map(h=>{const vs=raw.map(r=>r[h]);const t=dType(h,vs,dm);const nn=vs.filter(v=>v!=null&&String(v).trim()!=="");return{name:h,type:t,values:vs,nonNull:nn.length,missing:vs.length-nn.length,missPct:(((vs.length-nn.length)/vs.length)*100).toFixed(1)};});
        const ah=hd.join(" ").toLowerCase();
        const fr=(ah.match(/\b(du|de|le|la|les|des|est|une|vous|votre|dans|avec|que|par)\b/g)||[]).length;
        resolve({fn:e.data.fn,sheet:e.data.sheet,sheetN:e.data.sheetN,rows:raw.length,colN:hd.length,cols,kbP:[...rp],lang:fr>5?"fr":"en",raw});
      };
      worker.onerror=function(err){worker.terminate();URL.revokeObjectURL(url);reject(err);};
      worker.postMessage({buffer:buffer,fn:filename},[buffer.buffer||buffer]);
    }catch(err){
      // Fallback to main thread
      try{resolve(pFile(buffer,filename));}catch(e2){reject(e2);}
    }
  });
}

class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={hasError:false,error:null};}
  static getDerivedStateFromError(error){return{hasError:true,error};}
  componentDidCatch(error,info){console.error('PRAXIS ErrorBoundary caught:',error,info);}
  render(){
    if(this.state.hasError)return(
      <div style={{padding:40,textAlign:'center',background:'rgba(232,93,93,0.05)',borderRadius:10,border:'1px solid rgba(232,93,93,0.15)',margin:16}}>
        <div style={{fontSize:14,fontWeight:600,color:'#E85D5D',marginBottom:8}}>This analysis encountered an error</div>
        <div style={{fontSize:12,color:'#94A3B8',marginBottom:16,maxWidth:400,margin:'0 auto 16px'}}>{this.state.error?.message||'An unexpected error occurred while processing your data.'}</div>
        <button onClick={()=>this.setState({hasError:false,error:null})} style={{background:'rgba(46,196,182,0.1)',border:'1px solid rgba(46,196,182,0.3)',color:'#2EC4B6',padding:'8px 20px',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'inherit'}}>Try again</button>
      </div>

  }
}

function SearchableSelect({options,value,onChange,label,placeholder}){
  const[open,setOpen]=useState(false);const[query,setQuery]=useState('');const[activeIdx,setActiveIdx]=useState(-1);
  const ref=useRef(null);const listRef=useRef(null);const inputRef=useRef(null);
  const id=useRef('ss-'+Math.random().toString(36).substr(2,6)).current;
  const selected=options.find(o=>o.value===value);
  const filtered=useMemo(()=>{if(!query)return options;const q=query.toLowerCase();return options.filter(o=>o.label.toLowerCase().includes(q)||(o.sub&&o.sub.toLowerCase().includes(q)));},[options,query]);
  useEffect(()=>{const handler=(e)=>{if(ref.current&&!ref.current.contains(e.target)){setOpen(false);setQuery('');}};document.addEventListener('mousedown',handler);return()=>document.removeEventListener('mousedown',handler);},[]);
  useEffect(()=>{if(open&&activeIdx>=0&&listRef.current){const item=listRef.current.children[activeIdx];if(item)item.scrollIntoView({block:'nearest'});}},[activeIdx,open]);
  const handleKeyDown=(e)=>{
    if(!open){if(e.key==='ArrowDown'||e.key==='Enter'||e.key===' '){e.preventDefault();setOpen(true);setQuery('');setActiveIdx(0);}return;}
    switch(e.key){
      case'ArrowDown':e.preventDefault();setActiveIdx(prev=>Math.min(prev+1,filtered.length-1));break;
      case'ArrowUp':e.preventDefault();setActiveIdx(prev=>Math.max(prev-1,0));break;
      case'Enter':e.preventDefault();if(activeIdx>=0&&filtered[activeIdx]){onChange(filtered[activeIdx].value);setOpen(false);setQuery('');}break;
      case'Escape':e.preventDefault();setOpen(false);setQuery('');inputRef.current?.focus();break;
      case'Tab':setOpen(false);setQuery('');break;
    }
  };
  const activeDescendant=activeIdx>=0?`${id}-option-${activeIdx}`:undefined;
  return(
    <div className="ss" ref={ref}>
      <input ref={inputRef} role="combobox" aria-expanded={open} aria-haspopup="listbox" aria-controls={`${id}-listbox`} aria-activedescendant={activeDescendant} aria-label={label||placeholder||'Select'} value={open?query:(selected?selected.label:'')} placeholder={placeholder||'Select...'} onFocus={()=>{setOpen(true);setQuery('');setActiveIdx(0);}} onChange={(e)=>{setQuery(e.target.value);setActiveIdx(0);}} onKeyDown={handleKeyDown}/>
      {open&&filtered.length>0&&(
        <div className="dd" role="listbox" id={`${id}-listbox`} ref={listRef} aria-label={label||'Options'}>
          {filtered.slice(0,20).map((o,i)=>(
            <div key={o.value} id={`${id}-option-${i}`} role="option" aria-selected={o.value===value} className={`di${o.value===value?' selected':''}${i===activeIdx?' active':''}`} onMouseDown={()=>{onChange(o.value);setOpen(false);setQuery('');}} onMouseEnter={()=>setActiveIdx(i)}>
              {o.label}{o.sub&&<span className="sub">{o.sub}</span>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TabBar({tabs,activeTab,onChange}){
  const tabListRef=useRef(null);const wrapperRef=useRef(null);
  const[scrollState,setScrollState]=useState({left:false,right:false});
  useEffect(()=>{
    const el=tabListRef.current;if(!el)return;
    const check=()=>{setScrollState({left:el.scrollLeft>5,right:el.scrollLeft<el.scrollWidth-el.clientWidth-5});};
    check();el.addEventListener('scroll',check);window.addEventListener('resize',check);
    return()=>{el.removeEventListener('scroll',check);window.removeEventListener('resize',check);};
  },[]);
  const handleKeyDown=(e,idx)=>{
    const enabledTabs=tabs.filter(t=>!t.disabled);const currentIdx=enabledTabs.findIndex(t=>t.id===tabs[idx].id);let newIdx;
    switch(e.key){
      case'ArrowRight':e.preventDefault();newIdx=(currentIdx+1)%enabledTabs.length;onChange(enabledTabs[newIdx].id);tabListRef.current?.querySelector(`[data-tab="${enabledTabs[newIdx].id}"]`)?.focus();break;
      case'ArrowLeft':e.preventDefault();newIdx=(currentIdx-1+enabledTabs.length)%enabledTabs.length;onChange(enabledTabs[newIdx].id);tabListRef.current?.querySelector(`[data-tab="${enabledTabs[newIdx].id}"]`)?.focus();break;
      case'Home':e.preventDefault();onChange(enabledTabs[0].id);tabListRef.current?.querySelector(`[data-tab="${enabledTabs[0].id}"]`)?.focus();break;
      case'End':e.preventDefault();onChange(enabledTabs[enabledTabs.length-1].id);tabListRef.current?.querySelector(`[data-tab="${enabledTabs[enabledTabs.length-1].id}"]`)?.focus();break;
    }
  };
  return(
    <div ref={wrapperRef} className={`tab-bar-wrapper${scrollState.left?' scroll-left':''}${scrollState.right?' scroll-right':''}`}>
      <div role="tablist" aria-label="Analysis tabs" ref={tabListRef} className="tab-bar">
        {tabs.map((t,i)=>{const isActive=activeTab===t.id;const isEmpty=t.count!==undefined&&t.count===0;return(
          <button key={t.id} role="tab" id={`tab-${t.id}`} data-tab={t.id} aria-selected={isActive} aria-controls={`panel-${t.id}`} tabIndex={isActive?0:-1} className={`tb${isActive?' on':''}${isEmpty?' dim':''}`} onClick={()=>onChange(t.id)} onKeyDown={(e)=>handleKeyDown(e,i)}>
            {t.icon}<span>{t.label}</span>{t.count>0&&<span className="bg" aria-label={`${t.count} items`}>{t.count}</span>}
          </button>
        );})}
      </div>
    </div>
  );
}

function Empty({type,a,go}){
  const m={categorical:{t:"No categorical variables found.",s:a?.likert.length?{tab:"likert",t:`${a.likert.length} Likert items detected \u2192 Likert tab`}:null},likert:{t:"No Likert scales found.",s:a?.categorical.length?{tab:"frequencies",t:`${a.categorical.length} categorical variables \u2192 Frequencies`}:null},numeric:{t:"No numeric variables found.",s:a?.likert.length?{tab:"likert",t:`${a.likert.length} Likert items \u2192 Likert tab`}:null}};

  return(<div className="fu" style={{padding:48,textAlign:"center"}}><div style={{fontSize:14,color:C.text2,marginBottom:12}}>{d.t}</div>{d.s&&<button onClick={()=>go(d.s.tab)} style={{background:"rgba(46,196,182,.1)",border:"1px solid rgba(46,196,182,.3)",color:C.teal,padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>{d.s.t}</button>}</div>);
}

    {wm.length===0&&<div className="card" style={{background:"rgba(52,168,83,.06)",border:"1px solid rgba(52,168,83,.2)",marginBottom:12}}><div style={{fontSize:13,fontWeight:600,color:C.success}}>No missing data in analyzable variables</div></div>}

    <div className="card">
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:10}}>Variable Types <span style={{fontSize:10,fontWeight:400,color:C.text2}}>Use dropdowns to reclassify</span></div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:5}}>

// ═══════════════════════════════════════════════════════════════════════════
// TAB: LIKERT (enhanced with Cronbach's alpha, median, mode, top-2-box)
// ═══════════════════════════════════════════════════════════════════════════

function LikertTab({a,data,setTab}){
  if(a.likert.length===0)return <Empty type="likert" a={a} go={setTab}/>;
  const[showNote,setShowNote]=useState(false);
  const grp={};a.likert.forEach(c=>{const r=scRng(c.values);const k=`${r.mn}-${r.mx}`;if(!grp[k])grp[k]={r,cs:[]};grp[k].cs.push(c);});
  return(<div className="fu">
    <div className="meth-note" style={{marginBottom:12,cursor:'pointer'}} onClick={()=>setShowNote(!showNote)}>
      <strong style={{color:C.teal}}>Methodological note</strong> {showNote?'▾':'▸'}
      {showNote&&<div style={{marginTop:6}}>Likert items are ordinal. Means assume equal intervals between categories. Medians are the more conservative central tendency measure. Consider reporting both. Cronbach's alpha treats ordinal data as interval for reliability estimation.</div>}
    </div>
    {Object.entries(grp).map(([k,g])=>{
      const{r}=g;const colors=r.pts===4?C.lik4:C.lik5;
      const labels=r.pts===5?["Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"]:r.pts===4?["Very uncomfortable","Uncomfortable","Comfortable","Very comfortable"]:Array.from({length:r.pts},(_,i)=>String(i+r.mn));

      // Cronbach's alpha for this group
      const alphaResult=useMemo(()=>{
        if(g.cs.length<2)return null;
        const items=g.cs.map(c=>c.values.map(v=>{const lv=detLik(v);return lv!==null&&lv>=r.mn&&lv<=r.mx?lv:null;}));
        return cronbachAlpha(items);
      },[g.cs,r]);

      const items=g.cs.map(c=>{
        const ct={};for(let i=r.mn;i<=r.mx;i++)ct[i]=0;let tot=0,unp=0;
        c.values.forEach(v=>{if(v==null||!String(v).trim())return;const lv=detLik(v);if(lv!==null&&lv>=r.mn&&lv<=r.mx){ct[lv]++;tot++;}else unp++;});
        const mn=tot?Object.entries(ct).reduce((s,[k,v])=>s+Number(k)*v,0)/tot:0;
        // Median
        const allVals=[];for(let i=r.mn;i<=r.mx;i++)for(let j=0;j<ct[i];j++)allVals.push(i);
        allVals.sort((a,b)=>a-b);
        const median=allVals.length?allVals[Math.floor(allVals.length/2)]:0;
        // Mode (most frequent category label)
        let modeVal=r.mn,modeCount=0;for(let i=r.mn;i<=r.mx;i++){if(ct[i]>modeCount){modeCount=ct[i];modeVal=i;}}
        const modeLabel=labels[modeVal-r.mn]||String(modeVal);
        // Top-2-box and Bottom-2-box
        const top2=tot?(((ct[r.mx]||0)+(ct[r.mx-1]||0))/tot*100).toFixed(1):"0";
        const bot2=tot?(((ct[r.mn]||0)+(ct[r.mn+1]||0))/tot*100).toFixed(1):"0";
        const pc={};for(let i=r.mn;i<=r.mx;i++)pc[i]=tot?((ct[i]/tot)*100).toFixed(1):"0";
        return{nm:trunc(c.name,52),fn:c.name,tot,mn:mn.toFixed(2),median,modeLabel,top2,bot2,ct,pc,unp};
      }).sort((x,y)=>+y.mn-+x.mn);

      return(<div key={k} className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:14,fontWeight:700,color:C.text}}>{r.pts}-point Scale <span style={{fontWeight:400,color:C.text2}}>({g.cs.length} items)</span></div>
          {data.rows<30&&<div style={{fontSize:10,color:C.error,background:"rgba(232,93,93,.1)",padding:"4px 12px",borderRadius:20,fontWeight:600,border:"1px solid rgba(232,93,93,.2)"}}>Small sample (n={data.rows})</div>}
        </div>

        {alphaResult&&<div style={{background:"rgba(123,97,255,.06)",border:"1px solid rgba(123,97,255,.15)",borderRadius:8,padding:"10px 14px",marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:600,color:C.purple,marginBottom:4}}>Internal Consistency (Cronbach's \u03b1)</div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:11,color:C.text2}}>
            <span>\u03b1 = <strong style={{color:C.text,fontSize:14}}>{alphaResult.alpha.toFixed(3)}</strong></span>
            <span>Interpretation: <strong style={{color:alphaResult.alpha>=0.7?C.success:alphaResult.alpha>=0.6?C.warning:C.error}}>{alphaResult.interpretation}</strong></span>
            <span>k = {alphaResult.k}</span>
            <span>n (listwise) = {alphaResult.nValid}</span>
          </div>
        </div>}

        {items.map((it,idx)=><div key={idx} style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4,gap:8}}>
            <div style={{fontSize:11,color:C.text2,fontWeight:500,flex:1,lineHeight:1.4}} title={it.fn}>{it.nm}</div>
            <div style={{display:"flex",gap:8,alignItems:"center",whiteSpace:"nowrap",flexShrink:0}}>
              <span style={{fontSize:10,color:C.text2}}>n={it.tot}</span>
              <span style={{fontSize:10,color:C.text2}}>Mdn={it.median}</span>
              <span style={{fontSize:12,color:C.teal,fontWeight:700}}>M={it.mn}</span>
              <span style={{fontSize:10,color:C.success}}>\u2191{it.top2}%</span>
            </div>
          </div>
          <div style={{display:"flex",height:22,borderRadius:4,overflow:"hidden",background:"rgba(255,255,255,.05)"}}>
            {Array.from({length:r.mx-r.mn+1},(_,i)=>i+r.mn).map((v,vi)=>{const p=parseFloat(it.pc[v]);if(!p)return null;return <div key={v} title={`${labels[vi]}: ${p}% (n=${it.ct[v]})`} style={{width:`${p}%`,background:colors[vi],display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:vi===2&&r.pts===5?"#0B1A2E":"#fff",fontWeight:600,transition:"width .5s ease"}}>{p>=9?`${p}%`:""}</div>;})}
          </div>
          {it.unp>0&&<div style={{fontSize:9,color:C.warning,marginTop:2}}>{it.unp} excluded (NA/refuse)</div>}
        </div>)}

        <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>{labels.map((l,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:colors[i]}}/><span style={{fontSize:10,color:C.text2}}>{l}</span></div>)}</div>

        <details style={{marginTop:10}}><summary style={{fontSize:11,color:C.tealD,cursor:"pointer",fontWeight:600}}>Summary Table</summary>
          <table style={{width:"100%",fontSize:10,borderCollapse:"collapse",marginTop:6}}>
            <thead><tr style={{borderBottom:`1px solid ${C.offB}`}}><th style={{textAlign:"left",padding:"4px 6px",color:C.text2,background:C.navy}}>Item</th><th style={{textAlign:"center",padding:"4px 6px",color:C.text2,background:C.navy}}>n</th><th style={{textAlign:"center",padding:"4px 6px",color:C.text2,background:C.navy}}>Mean</th><th style={{textAlign:"center",padding:"4px 6px",color:C.text2,background:C.navy}}>Mdn</th><th style={{textAlign:"center",padding:"4px 6px",color:C.text2,background:C.navy}}>Mode</th><th style={{textAlign:"center",padding:"4px 6px",color:C.text2,background:C.navy}}>Top-2</th><th style={{textAlign:"center",padding:"4px 6px",color:C.text2,background:C.navy}}>Bot-2</th></tr></thead>
            <tbody>{items.map((it,j)=><tr key={j} style={{borderBottom:`1px solid ${C.off}`}}><td style={{padding:"3px 6px",color:C.text2}} title={it.fn}>{it.nm}</td><td style={{textAlign:"center",padding:"3px 6px",color:C.text2}}>{it.tot}</td><td style={{textAlign:"center",padding:"3px 6px",fontWeight:600,color:C.teal}}>{it.mn}</td><td style={{textAlign:"center",padding:"3px 6px",color:C.text2}}>{it.median}</td><td style={{textAlign:"center",padding:"3px 6px",color:C.text2,fontSize:9}}>{it.modeLabel}</td><td style={{textAlign:"center",padding:"3px 6px",color:C.success}}>{it.top2}%</td><td style={{textAlign:"center",padding:"3px 6px",color:C.error}}>{it.bot2}%</td></tr>)}</tbody>
          </table>
        </details>
      </div>);
    })}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════════

          <td style={{textAlign:"center",padding:"4px 6px",color:Math.abs(s.kurtosis)>2?C.warning:C.text2}}>{s.kurtosis.toFixed(2)}</td>

        <div style={{fontSize:10,color:C.text2,marginBottom:4}}>n={s.n} | M={s.mean.toFixed(2)} | Mdn={s.median.toFixed(2)}</div>

// ═══════════════════════════════════════════════════════════════════════════
// TAB: CROSS-TAB (enhanced with chi-square, Cramér's V, Fisher's exact)
// ═══════════════════════════════════════════════════════════════════════════

function CrossTabTab({cols,a}){
  const[oc,setOc]=useState("");const[dc,setDc]=useState("");
  const[viewType,setViewType]=useState("row_pct");
  const az=cols.filter(c=>["categorical","likert","ordinal_numeric"].includes(c.type));
  const dOpts=a.categorical.filter(c=>new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim())).size>1);

  const res=useMemo(()=>{
    if(!oc||!dc)return null;
    const o=cols.find(c=>c.name===oc),d=cols.find(c=>c.name===dc);
    if(!o||!d)return null;
    const tb={},dV=new Set(),oV=new Set();
    for(let i=0;i<o.values.length;i++){
      const ov=o.values[i]!=null?String(o.values[i]).trim():null,dv=d.values[i]!=null?String(d.values[i]).trim():null;
      if(!ov||!dv)continue;dV.add(dv);oV.add(ov);
      if(!tb[dv])tb[dv]={};tb[dv][ov]=(tb[dv][ov]||0)+1;
    }
    const dArr=[...dV].sort(),oArr=[...oV].sort();
    // Build observed matrix for chi-square
    const observed=dArr.map(dv=>oArr.map(ov=>(tb[dv]?.[ov]||0)));
    const chi=observed.length>1&&observed[0].length>1?chiSquareTest(observed):null;
    // Fisher for 2x2
    const fisher=(chi&&dArr.length===2&&oArr.length===2)?fisherExact2x2(observed[0][0],observed[0][1],observed[1][0],observed[1][1]):null;
    return{tb,dV:dArr,oV:oArr,observed,chi,fisher};
  },[oc,dc,cols]);

  const cd=useMemo(()=>{
    if(!res)return[];
    return res.dV.map(dv=>{const r={name:trunc(dv,20)};let t=0;res.oV.forEach(ov=>{t+=(res.tb[dv]?.[ov]||0);});
      res.oV.forEach(ov=>{const raw=res.tb[dv]?.[ov]||0;
        if(viewType==='row_pct')r[ov]=t?parseFloat((raw/t*100).toFixed(1)):0;
        else if(viewType==='counts')r[ov]=raw;
        else if(viewType==='col_pct'){const colT=res.dV.reduce((s,d2)=>s+(res.tb[d2]?.[ov]||0),0);r[ov]=colT?parseFloat((raw/colT*100).toFixed(1)):0;}
      });return r;});
  },[res,viewType]);

  return(<div className="fu card">
    <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>Cross-tabulation</div>
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:180}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Outcome</label><SearchableSelect options={az.map(c=>({value:c.name,label:trunc(c.name,42)}))} value={oc} onChange={setOc} label="Outcome variable"/></div>
      <div style={{flex:1,minWidth:180}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Disaggregate by</label><SearchableSelect options={dOpts.map(c=>({value:c.name,label:trunc(c.name,38),sub:`${new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim())).size}`}))} value={dc} onChange={setDc} label="Disaggregation variable"/></div>
      <div style={{minWidth:100}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Display</label>
        <select className="select-dark" value={viewType} onChange={e=>setViewType(e.target.value)} style={{width:'100%'}}><option value="row_pct">Row %</option><option value="counts">Counts</option><option value="col_pct">Column %</option></select>
      </div>
    </div>

    {res&&res.dV.length>1&&<>
      <ResponsiveContainer width="100%" height={Math.max(180,cd.length*35+50)}>
        <BarChart data={cd} layout="vertical" margin={{left:10,right:20,top:5,bottom:5}}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.off} horizontal={false}/>
          <XAxis type="number" domain={viewType!=='counts'?[0,100]:undefined} tick={{fontSize:10,fill:C.text2}} unit={viewType!=='counts'?'%':''}/>
          <YAxis type="category" dataKey="name" width={120} tick={{fontSize:10,fill:C.text2}}/>
          <Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f2240",border:`1px solid ${C.offB}`}} formatter={v=>[viewType!=='counts'?`${v}%`:v]}/>
          <Legend wrapperStyle={{fontSize:10}}/>
          {res.oV.map((ov,i)=><Bar key={ov} dataKey={ov} stackId={viewType!=='counts'?"a":undefined} fill={C.pal[i%C.pal.length]}/>)}
        </BarChart>
      </ResponsiveContainer>

      {/* Chi-square results */}
      {res.chi&&<div style={{background:"rgba(123,97,255,.06)",border:"1px solid rgba(123,97,255,.15)",borderRadius:8,padding:"12px 14px",marginTop:12}}>
        <div style={{fontSize:12,fontWeight:600,color:C.purple,marginBottom:6}}>Chi-square Test of Independence</div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap",fontSize:11,color:C.text2}}>
          <span>\u03c7\u00b2 = <strong style={{color:C.text}}>{res.chi.chiSq.toFixed(3)}</strong></span>
          <span>df = {res.chi.df}</span>
          <span>p = <strong style={{color:res.chi.pValue<0.05?C.success:C.text2}}>{fmtP(res.chi.pValue)}</strong></span>
          <span>Cram\u00e9r's V = <strong style={{color:C.text}}>{res.chi.cramersV.toFixed(3)}</strong> ({res.chi.vInterp})</span>
        </div>
        {res.chi.pValue<0.05&&<div style={{fontSize:11,color:C.success,marginTop:4}}>The association is statistically significant (p &lt; 0.05).</div>}
        {res.chi.pValue>=0.05&&<div style={{fontSize:11,color:C.text2,marginTop:4}}>No statistically significant association detected.</div>}
        {res.chi.warnings.map((w,i)=><div key={i} style={{fontSize:10,color:C.warning,marginTop:3}}>\u26a0 {w}</div>)}
        {res.fisher!=null&&<div style={{fontSize:11,color:C.text2,marginTop:4}}>Fisher's exact test (2\u00d72): p = <strong style={{color:C.text}}>{fmtP(res.fisher)}</strong></div>}
        <div style={{fontSize:10,color:C.textTertiary,marginTop:4}}>Cram\u00e9r's V interpretation: small ({'>'}0.1), medium ({'>'}0.3), large ({'>'}0.5) for 2\u00d72 tables.</div>
      </div>}
    </>}
    {res&&res.dV.length<=1&&<div style={{padding:12,color:C.warning,fontSize:12}}>Only one category in this disaggregator.</div>}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB: CORRELATION (NEW - heatmap + scatterplot drill-down)
// ═══════════════════════════════════════════════════════════════════════════

function CorrelationTab({a}){
  const numVars=useMemo(()=>[...a.numeric,...a.likert].slice(0,25),[a]);
  const[selected,setSelected]=useState(null);

  const matrix=useMemo(()=>{
    if(numVars.length<2)return null;
    const m=[];
    for(let i=0;i<numVars.length;i++){
      m[i]=[];
      for(let j=0;j<numVars.length;j++){
        if(i===j)m[i][j]={r:1,p:0,n:numVars[i].nonNull};
        else if(j<i)m[i][j]=m[j][i];
        else{
          const xv=numVars[i].values.map(v=>v!=null?Number(v):null);
          const yv=numVars[j].values.map(v=>v!=null?Number(v):null);
          m[i][j]=pearsonCorrelation(xv,yv)||{r:0,p:1,n:0};
        }
      }
    }
    return m;
  },[numVars]);

  const corrColor=(r)=>{
    if(r>0)return `rgba(46,196,182,${Math.abs(r)*0.8+0.1})`;
    if(r<0)return `rgba(232,93,93,${Math.abs(r)*0.8+0.1})`;
    return C.navyMid;
  };

  const drillPts=useMemo(()=>{
    if(!selected)return[];
    const xv=numVars[selected[0]].values,yv=numVars[selected[1]].values;
    const pts=[];
    for(let i=0;i<xv.length;i++){
      if(xv[i]!=null&&yv[i]!=null&&!isNaN(Number(xv[i]))&&!isNaN(Number(yv[i])))pts.push({x:Number(xv[i]),y:Number(yv[i])});
    }
    return pts.length>500?pts.filter((_,i)=>i%Math.ceil(pts.length/500)===0):pts;
  },[selected,numVars]);

  if(numVars.length<2)return <div className="fu" style={{padding:48,textAlign:"center",color:C.text2}}>Need at least 2 numeric/Likert variables for correlation analysis.</div>;

  const cellSize=Math.min(44,Math.max(28,380/numVars.length));

  return(<div className="fu card">
    <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>Correlation Matrix <span style={{fontWeight:400,color:C.text2}}>({numVars.length} variables)</span></div>
    <div style={{fontSize:10,color:C.text2,marginBottom:8}}>Click a cell to see the scatterplot. Bold = significant at p &lt; 0.05.</div>

    <div style={{overflowX:'auto',marginBottom:16}}>
      <table style={{borderCollapse:'collapse',fontSize:9}}>
        <thead><tr><th style={{padding:2}}></th>{numVars.map((v,j)=><th key={j} style={{padding:2,maxWidth:cellSize,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:C.text2,fontWeight:500,transform:'rotate(-45deg)',transformOrigin:'left bottom',height:60}} title={v.name}>{trunc(v.name,12)}</th>)}</tr></thead>
        <tbody>{numVars.map((v,i)=><tr key={i}>
          <td style={{padding:'2px 4px',color:C.text2,fontWeight:500,whiteSpace:'nowrap',maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',fontSize:9}} title={v.name}>{trunc(v.name,14)}</td>
          {numVars.map((v2,j)=>{
            if(!matrix)return <td key={j}></td>;
            const cell=matrix[i][j];
            const isSig=cell.p<0.05;
            const isLower=j<=i;
            return <td key={j} className={isLower&&i!==j?"corr-cell":""} onClick={isLower&&i!==j?()=>setSelected([Math.min(i,j),Math.max(i,j)]):undefined} style={{width:cellSize,height:cellSize,textAlign:'center',background:i===j?C.navyMid:corrColor(cell.r),color:Math.abs(cell.r)>0.5?'#fff':C.text2,fontWeight:isSig?700:400,fontSize:9,border:`1px solid ${C.navy}`,cursor:isLower&&i!==j?'pointer':'default'}} title={i!==j?`r=${cell.r.toFixed(3)}, p=${fmtP(cell.p)}, n=${cell.n}`:v.name}>
              {i===j?'1':(isLower?cell.r.toFixed(2):'')}
            </td>;
          })}
        </tr>)}</tbody>
      </table>
    </div>

    <div style={{display:'flex',gap:12,fontSize:10,color:C.text2,marginBottom:12}}>
      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:12,height:12,background:'rgba(46,196,182,.6)',borderRadius:2,display:'inline-block'}}/> Positive</span>
      <span style={{display:'flex',alignItems:'center',gap:4}}><span style={{width:12,height:12,background:'rgba(232,93,93,.6)',borderRadius:2,display:'inline-block'}}/> Negative</span>
      <span><strong>Bold</strong> = p &lt; 0.05</span>
    </div>

    {selected&&matrix&&<div style={{background:'rgba(255,255,255,.02)',border:`1px solid ${C.off}`,borderRadius:8,padding:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:12,fontWeight:600,color:C.text}}>
          {trunc(numVars[selected[0]].name,25)} vs {trunc(numVars[selected[1]].name,25)}
        </div>
        <button onClick={()=>setSelected(null)} style={{background:'none',border:'none',color:C.text2,cursor:'pointer',fontSize:14}}>&times;</button>
      </div>
      <div style={{fontSize:11,color:C.text2,marginBottom:8}}>
        r = {matrix[selected[0]][selected[1]].r.toFixed(4)} | p = {fmtP(matrix[selected[0]][selected[1]].p)} | n = {matrix[selected[0]][selected[1]].n}
        {Math.abs(matrix[selected[0]][selected[1]].r)>=0.7&&<span style={{color:C.success,marginLeft:6}}>Strong</span>}
        {Math.abs(matrix[selected[0]][selected[1]].r)>=0.3&&Math.abs(matrix[selected[0]][selected[1]].r)<0.7&&<span style={{color:C.warning,marginLeft:6}}>Moderate</span>}
        {Math.abs(matrix[selected[0]][selected[1]].r)<0.3&&<span style={{color:C.text2,marginLeft:6}}>Weak</span>}
      </div>
      {drillPts.length>0&&<ResponsiveContainer width="100%" height={250}>
        <ScatterChart margin={{left:10,right:20,top:10,bottom:10}}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.off}/>
          <XAxis type="number" dataKey="x" tick={{fontSize:10,fill:C.text2}} name={numVars[selected[0]].name}/>
          <YAxis type="number" dataKey="y" tick={{fontSize:10,fill:C.text2}} name={numVars[selected[1]].name}/>
          <Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f2240",border:`1px solid ${C.offB}`}}/>
          <Scatter data={drillPts} fill={C.teal} fillOpacity={.5} r={3}/>
        </ScatterChart>
      </ResponsiveContainer>}
      <div style={{fontSize:10,color:C.textTertiary,marginTop:4}}>R\u00b2 = {(matrix[selected[0]][selected[1]].r**2).toFixed(4)} \u2014 {(matrix[selected[0]][selected[1]].r**2*100).toFixed(1)}% of variance explained.</div>
    </div>}
  </div>);
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB: REGRESSION (enhanced OLS diagnostics + fixed logistic)
// ═══════════════════════════════════════════════════════════════════════════

function RegressionTab({cols,a}){
  const[xc,setXc]=useState("");const[yc,setYc]=useState("");const[forceModel,setForceModel]=useState("auto");
  const[showDiag,setShowDiag]=useState(false);
  const nc=[...a.numeric,...a.likert];
  const yOpts=useMemo(()=>{
    const opts=nc.map(c=>({value:c.name,label:trunc(c.name,42),sub:"numeric"}));
    a.categorical.forEach(c=>{const uniq=[...new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim()))].sort();if(uniq.length===2)opts.push({value:c.name,label:trunc(c.name,42),sub:"binary: "+uniq.join(" / ")});});
    cols.filter(c=>c.type==="binary").forEach(c=>{opts.push({value:c.name,label:trunc(c.name,42),sub:"binary (0/1)"});});
    return opts;
  },[nc,a,cols]);

  const yCol=useMemo(()=>cols.find(c=>c.name===yc),[yc,cols]);
  const yLabels=useMemo(()=>{
    if(!yCol)return null;
    if(yCol.type==="categorical"){
      const uniq=[...new Set(yCol.values.filter(v=>v!=null).map(v=>String(v).trim()))].sort();
      if(uniq.length===2)return{zero:uniq[0],one:uniq[1]};
    }
    return null;
  },[yCol]);

  const yVals=useMemo(()=>{
    if(!yCol)return null;
    if(["numeric","ordinal_numeric","likert","binary"].includes(yCol.type))return yCol.values.map(v=>v!=null?Number(v):null);
    // Categorical binary: deterministic encoding (alphabetical sort)
    const uniq=[...new Set(yCol.values.filter(v=>v!=null).map(v=>String(v).trim()))].sort();
    if(uniq.length===2)return yCol.values.map(v=>v!=null?(String(v).trim()===uniq[0]?0:1):null);
    return yCol.values.map(v=>v!=null?Number(v):null);
  },[yCol]);

  const xv=useMemo(()=>xc?cols.find(c=>c.name===xc)?.values.map(v=>v!=null?Number(v):null):null,[xc,cols]);
  const isBin=useMemo(()=>yVals?isBinaryY(yVals):false,[yVals]);
  const model=forceModel==="auto"?(isBin?"logistic":"ols"):forceModel;

  const reg=useMemo(()=>{
    if(!xv||!yVals)return null;
    if(model==="logistic")return logisticRegression(xv,yVals);
    return olsRegression(xv,yVals);
  },[xv,yVals,model]);

  const pts=useMemo(()=>{
    if(!xv||!yVals)return[];
    const p=[];for(let i=0;i<xv.length;i++){if(xv[i]!=null&&!isNaN(xv[i])&&yVals[i]!=null&&!isNaN(yVals[i]))p.push({x:xv[i],y:Number(yVals[i])});}
    return p.length>500?p.filter((_,i)=>i%Math.ceil(p.length/500)===0):p;
  },[xv,yVals]);

  const sCurve=useMemo(()=>{
    if(!reg||reg.type!=='logistic'||!pts.length)return[];
    const xMin=Math.min(...pts.map(d=>d.x)),xMax=Math.max(...pts.map(d=>d.x));
    const step=(xMax-xMin)/80;const curve=[];
    for(let x=xMin;x<=xMax;x+=step){const z=reg.b0+reg.b1*x;curve.push({x,y:1/(1+Math.exp(-Math.max(-20,Math.min(20,z))))});}
    return curve;
  },[reg,pts]);

  // Residual diagnostic data
  const diagData=useMemo(()=>{
    if(!reg||reg.type!=='ols')return null;
    const resVsFit=reg.residuals.map((r,i)=>({fitted:reg.fitted[i],residual:r}));
    // QQ data
    const sortedRes=[...reg.residuals].sort((a,b)=>a-b);
    const n=sortedRes.length;
    const qq=sortedRes.map((r,i)=>{
      const p=(i+0.5)/n;
      // Inverse normal approximation (Beasley-Springer-Moro)
      let t2=p<0.5?p:1-p;t2=Math.sqrt(-2*Math.log(t2));
      const theoretical=t2-(2.515517+0.802853*t2+0.010328*t2*t2)/(1+1.432788*t2+0.189269*t2*t2+0.001308*t2*t2*t2);
      return{theoretical:p<0.5?-theoretical:theoretical,actual:r};
    });
    return{resVsFit,qq};
  },[reg]);

  return(<div className="fu card">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
      <div style={{fontSize:14,fontWeight:700,color:C.text}}>Regression Analysis</div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        {["auto","ols","logistic"].map(m=><button key={m} onClick={()=>setForceModel(m)} style={{padding:"3px 10px",borderRadius:5,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${forceModel===m?"rgba(46,196,182,.4)":C.off}`,background:forceModel===m?"rgba(46,196,182,.15)":"transparent",color:forceModel===m?C.teal:C.text2}}>{m==="auto"?"Auto-detect":m==="ols"?"OLS (linear)":"Logistic"}</button>)}
      </div>
    </div>
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:180}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>X (independent)</label><SearchableSelect options={nc.map(c=>({value:c.name,label:trunc(c.name,42)}))} value={xc} onChange={setXc} label="X variable"/></div>
      <div style={{flex:1,minWidth:180}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Y (dependent){isBin&&<span style={{color:C.purple,marginLeft:6,fontSize:10}}>Binary detected</span>}</label><SearchableSelect options={yOpts} value={yc} onChange={setYc} label="Y variable"/></div>
    </div>
    {isBin&&model==="logistic"&&yLabels&&<div style={{marginBottom:12,padding:"8px 12px",background:"rgba(123,97,255,.06)",borderRadius:8,border:"1px solid rgba(123,97,255,.15)",fontSize:11,color:C.text2}}>Logistic regression. Y encoding: <strong style={{color:C.text}}>{yLabels.zero}</strong> = 0, <strong style={{color:C.text}}>{yLabels.one}</strong> = 1 (alphabetical)</div>}

    {/* OLS Results */}
    {reg&&reg.type==="ols"&&<>
      <ResponsiveContainer width="100%" height={300}>
        <ScatterChart margin={{left:10,right:20,top:10,bottom:5}}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.off}/>
          <XAxis type="number" dataKey="x" tick={{fontSize:10,fill:C.text2}}/>
          <YAxis type="number" dataKey="y" tick={{fontSize:10,fill:C.text2}}/>
          <Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f2240",border:`1px solid ${C.offB}`}}/>
          <Scatter data={pts} fill={C.teal} fillOpacity={.5} r={3}/>
          {pts.length>0&&<ReferenceLine stroke={C.error} strokeWidth={2} strokeDasharray="5 3" segment={[{x:Math.min(...pts.map(d=>d.x)),y:reg.intercept+reg.slope*Math.min(...pts.map(d=>d.x))},{x:Math.max(...pts.map(d=>d.x)),y:reg.intercept+reg.slope*Math.max(...pts.map(d=>d.x))}]}/>}
        </ScatterChart>
      </ResponsiveContainer>

      <div style={{overflowX:'auto',marginTop:14}}>
        <table style={{width:'100%',fontSize:11,borderCollapse:'collapse'}}>
          <thead><tr style={{borderBottom:`1px solid ${C.offB}`}}>
            <th style={{textAlign:'left',padding:'6px 8px',color:C.text2,background:C.navy}}>Metric</th>
            <th style={{textAlign:'right',padding:'6px 8px',color:C.text2,background:C.navy}}>Value</th>
          </tr></thead>
          <tbody>
            {[
              ['R\u00b2',reg.r2.toFixed(4)],['Adjusted R\u00b2',reg.adjR2.toFixed(4)],
              ['F-statistic',`${reg.fStat.toFixed(2)} (p = ${fmtP(reg.pF)})`],['n',reg.n],
              ['Slope (\u03b2\u2081)',reg.slope.toFixed(4)],['95% CI (slope)',`[${reg.ciSlope[0].toFixed(4)}, ${reg.ciSlope[1].toFixed(4)}]`],
              ['SE (slope)',reg.seSlope.toFixed(4)],['t-statistic (slope)',reg.tSlope.toFixed(3)],
              ['p-value (slope)',fmtP(reg.pSlope)],
              ['Intercept (\u03b2\u2080)',reg.intercept.toFixed(4)],['95% CI (intercept)',`[${reg.ciIntercept[0].toFixed(4)}, ${reg.ciIntercept[1].toFixed(4)}]`],
              ['p-value (intercept)',fmtP(reg.pIntercept)],
              ['Durbin-Watson',reg.dw.toFixed(3)]
            ].map(([l,v],i)=><tr key={i} style={{borderBottom:`1px solid ${C.off}`}}><td style={{padding:'4px 8px',color:C.text2}}>{l}</td><td style={{textAlign:'right',padding:'4px 8px',fontWeight:600,color:l.includes('p-value')?((v.includes('<')||parseFloat(v)<0.05)?C.success:C.text2):C.text}}>{v}</td></tr>)}
          </tbody>
        </table>
      </div>

      <div style={{marginTop:12,fontSize:12,color:C.teal,background:"rgba(46,196,182,.06)",padding:"10px 14px",borderRadius:8,fontWeight:600,border:"1px solid rgba(46,196,182,.15)"}}>
        Y = {reg.intercept.toFixed(3)} + {reg.slope.toFixed(3)} \u00d7 X
        {reg.pSlope<.05?<span style={{color:C.success,marginLeft:10}}>Significant (p &lt; 0.05)</span>:<span style={{color:C.text2,marginLeft:10}}>Not significant</span>}
      </div>
      <div style={{fontSize:10,color:C.text2,marginTop:6}}>R\u00b2 = {(reg.r2*100).toFixed(1)}% of variance in Y explained by X. Durbin-Watson near 2 suggests no autocorrelation.</div>

      {/* Residual diagnostics */}
      <div style={{marginTop:12}}>
        <button onClick={()=>setShowDiag(!showDiag)} style={{background:'none',border:`1px solid ${C.off}`,color:C.text2,padding:'6px 14px',borderRadius:6,fontSize:11,cursor:'pointer',fontWeight:600,fontFamily:'inherit'}}>
          {showDiag?'\u25be':'▸'} Residual Diagnostics
        </button>
        {showDiag&&diagData&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:12}}>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:C.text2,marginBottom:4}}>Residuals vs Fitted</div>
            <ResponsiveContainer width="100%" height={180}>
              <ScatterChart margin={{left:5,right:10,top:5,bottom:5}}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.off}/>

                <ReferenceLine y={0} stroke={C.error} strokeDasharray="3 3"/>

              </ScatterChart>
            </ResponsiveContainer>
          </div>
          <div>
            <div style={{fontSize:11,fontWeight:600,color:C.text2,marginBottom:4}}>Q-Q Plot (Residuals)</div>
            <ResponsiveContainer width="100%" height={180}>
              <ScatterChart margin={{left:5,right:10,top:5,bottom:5}}>
                <CartesianGrid strokeDasharray="3 3" stroke={C.off}/>
                <XAxis type="number" dataKey="theoretical" tick={{fontSize:9,fill:C.text2}} name="Theoretical"/>
                <YAxis type="number" dataKey="actual" tick={{fontSize:9,fill:C.text2}} name="Actual"/>
                <Scatter data={diagData.qq} fill={C.purple} fillOpacity={.5} r={2}/>
              </ScatterChart>
            </ResponsiveContainer>
          </div>
        </div>}
      </div>
    </>}

    {/* Logistic Results */}
    {reg&&reg.type==="logistic"&&<>
      <ResponsiveContainer width="100%" height={300}>
        <ScatterChart margin={{left:10,right:20,top:10,bottom:5}}>
          <CartesianGrid strokeDasharray="3 3" stroke={C.off}/>

          <Scatter data={pts} fill={C.teal} fillOpacity={.4} r={3}/>
          <Scatter data={sCurve} fill="none" line={{stroke:C.purple,strokeWidth:2.5}} legendType="none" r={0}/>
        </ScatterChart>
      </ResponsiveContainer>

      <div className="stat-grid">
        {[{l:"Odds Ratio",v:reg.or.toFixed(3),cls:'purple'},{l:"OR 95% CI",v:`[${reg.orLo.toFixed(2)}, ${reg.orHi.toFixed(2)}]`},{l:"Coeff (\u03b2\u2081)",v:reg.b1.toFixed(4)},{l:"SE",v:reg.se1.toFixed(4)},{l:"z-stat",v:reg.z.toFixed(2)},{l:"p-value",v:fmtP(reg.pVal),hl:reg.pVal<.05},{l:"Pseudo R\u00b2",v:reg.pseudoR2.toFixed(4)},{l:"AUC",v:reg.auc.toFixed(3)},{l:"n",v:reg.n}].map((s,i)=>
          <div key={i} className={`stat-card${s.cls?' purple':''}${s.hl?' hl':''}`}><div className="val">{s.v}</div><div className="lbl">{s.l}</div></div>
        )}
      </div>

      {/* Classification table */}
      <div style={{marginTop:14,background:"rgba(123,97,255,.06)",border:"1px solid rgba(123,97,255,.15)",borderRadius:8,padding:"12px 14px"}}>
        <div style={{fontSize:12,fontWeight:600,color:C.purple,marginBottom:8}}>Classification Table (threshold = 0.5)</div>
        <table style={{borderCollapse:'collapse',fontSize:11,marginBottom:8}}>
          <thead><tr><th style={{padding:'4px 12px',color:C.text2,border:`1px solid ${C.off}`,background:C.navy}}></th><th style={{padding:'4px 12px',color:C.text2,border:`1px solid ${C.off}`,background:C.navy}}>Pred 0</th><th style={{padding:'4px 12px',color:C.text2,border:`1px solid ${C.off}`,background:C.navy}}>Pred 1</th></tr></thead>
          <tbody>
            <tr><td style={{padding:'4px 12px',fontWeight:600,color:C.text2,border:`1px solid ${C.off}`}}>Actual 0</td><td style={{textAlign:'center',padding:'4px 12px',color:C.success,border:`1px solid ${C.off}`}}>{reg.classification.tn}</td><td style={{textAlign:'center',padding:'4px 12px',color:C.error,border:`1px solid ${C.off}`}}>{reg.classification.fp}</td></tr>
            <tr><td style={{padding:'4px 12px',fontWeight:600,color:C.text2,border:`1px solid ${C.off}`}}>Actual 1</td><td style={{textAlign:'center',padding:'4px 12px',color:C.error,border:`1px solid ${C.off}`}}>{reg.classification.fn}</td><td style={{textAlign:'center',padding:'4px 12px',color:C.success,border:`1px solid ${C.off}`}}>{reg.classification.tp}</td></tr>
          </tbody>
        </table>
        <div style={{display:'flex',gap:14,fontSize:11,color:C.text2,flexWrap:'wrap'}}>
          <span>Accuracy: <strong style={{color:C.text}}>{(reg.classification.accuracy*100).toFixed(1)}%</strong></span>
          <span>Sensitivity: <strong style={{color:C.text}}>{(reg.classification.sensitivity*100).toFixed(1)}%</strong></span>
          <span>Specificity: <strong style={{color:C.text}}>{(reg.classification.specificity*100).toFixed(1)}%</strong></span>
          <span>AUC: <strong style={{color:C.text}}>{reg.auc.toFixed(3)}</strong></span>
        </div>
      </div>

      <div style={{marginTop:12,fontSize:12,background:"rgba(123,97,255,.06)",padding:"12px 14px",borderRadius:8,border:"1px solid rgba(123,97,255,.15)"}}>
        <div style={{color:C.purple,fontWeight:600,marginBottom:4}}>log(p / 1-p) = {reg.b0.toFixed(3)} + {reg.b1.toFixed(3)} \u00d7 X</div>
        <div style={{color:C.text2,fontSize:11}}>
          {reg.or>1?`Each unit increase in X multiplies the odds of Y=1 by ${reg.or.toFixed(2)} (${((reg.or-1)*100).toFixed(0)}% increase).`:`Each unit increase in X multiplies the odds of Y=1 by ${reg.or.toFixed(2)} (${((1-reg.or)*100).toFixed(0)}% decrease).`}
          {reg.pVal<.05?" This effect is statistically significant.":" This effect is not statistically significant."}
        </div>
      </div>
    </>}
  </div>);
}

// TAB: GROUP BY
// ═══════════════════════════════════════════════════════════════════════════

function GroupByTab({cols,a,data}){
  const[gc,setGc]=useState("");const[mc,setMc]=useState("");const[fn,setFn]=useState("mean");
  const cats=[...a.categorical,...a.date];
  const res=useMemo(()=>{
    if(!gc||!mc)return null;
    const g=cols.find(c=>c.name===gc),m=cols.find(c=>c.name===mc);if(!g||!m)return null;
    const groups={};for(let i=0;i<data.rows;i++){const gv=g.values[i],mv=m.values[i];if(gv==null||mv==null||isNaN(Number(mv)))continue;const k=String(gv).trim();if(!groups[k])groups[k]=[];groups[k].push(Number(mv));}
    return Object.entries(groups).map(([k,vs])=>({name:trunc(k,25),full:k,count:vs.length,sum:vs.reduce((a,v)=>a+v,0),mean:vs.reduce((a,v)=>a+v,0)/vs.length})).sort((a,b)=>b[fn]-a[fn]);
  },[gc,mc,fn,cols,data]);
  return(<div className="fu card">
    <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>Grouped Aggregation</div>
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:140}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Measure (numeric)</label><SearchableSelect options={a.numeric.map(c=>({value:c.name,label:trunc(c.name,42)}))} value={mc} onChange={setMc} label="Measure"/></div>
      <div style={{flex:1,minWidth:140}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Group by</label><SearchableSelect options={cats.map(c=>({value:c.name,label:trunc(c.name,42),sub:`${new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim())).size}`}))} value={gc} onChange={setGc} label="Group by"/></div>
      <div style={{minWidth:100}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Function</label><select className="select-dark" value={fn} onChange={e=>setFn(e.target.value)} style={{width:"100%"}}><option value="sum">SUM</option><option value="mean">MEAN</option><option value="count">COUNT</option></select></div>
    </div>
    {res&&<><ResponsiveContainer width="100%" height={Math.max(180,res.length*28+40)}>
      <BarChart data={res} layout="vertical" margin={{left:10,right:20,top:5,bottom:5}}>
        <CartesianGrid strokeDasharray="3 3" stroke={C.off} horizontal={false}/>
        <XAxis type="number" tick={{fontSize:10,fill:C.text2}}/>
        <YAxis type="category" dataKey="name" width={140} tick={{fontSize:10,fill:C.text2}}/>
        <Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f2240",border:`1px solid ${C.offB}`}}/>
        <Bar dataKey={fn} fill={C.teal} radius={[0,4,4,0]} barSize={18}/>
      </BarChart>
    </ResponsiveContainer>
    <div style={{overflowX:"auto",marginTop:10}}>
      <table className="sth" style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}>
        <thead><tr style={{borderBottom:`1px solid ${C.offB}`}}>{["Group","n","Sum","Mean"].map(h=><th key={h} style={{textAlign:h==="Group"?"left":"right",padding:"5px 8px",color:C.text2,fontWeight:600,background:C.navy}}>{h}</th>)}</tr></thead>
        <tbody>{res.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.off}`}}><td style={{padding:"4px 8px",fontWeight:500,color:C.text2}} title={r.full}>{r.name}</td><td style={{textAlign:"right",padding:"4px 8px",color:C.text2}}>{r.count}</td><td style={{textAlign:"right",padding:"4px 8px",fontWeight:600,color:C.teal}}>{fmt(r.sum,1)}</td><td style={{textAlign:"right",padding:"4px 8px",color:C.text2}}>{fmt(r.mean,2)}</td></tr>)}</tbody>
      </table>
    </div></>}
  </div>);
}

// TAB: TIME SERIES
// ═══════════════════════════════════════════════════════════════════════════

function TimeSeriesTab({cols,a,data}){
  const[dc,setDc]=useState("");const[mc,setMc]=useState("");const[iv,setIv]=useState("year");const[dg,setDg]=useState("");
  const dCols=[...a.date,...cols.filter(c=>c.name.toLowerCase().includes("year")&&c.type!=="meta"&&c.type!=="date")];
  const cats=a.categorical.filter(c=>new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim())).size<=10);
  const res=useMemo(()=>{
    if(!dc)return null;const d=cols.find(c=>c.name===dc),m=mc?cols.find(c=>c.name===mc):null,g=dg?cols.find(c=>c.name===dg):null;if(!d)return null;
    const bk={};for(let i=0;i<data.rows;i++){let pd2=pDate(d.values[i]),key;if(pd2){key=iv==="year"?pd2.getFullYear():iv==="month"?pd2.getFullYear()+"-"+String(pd2.getMonth()+1).padStart(2,"0"):pd2.getFullYear()+"-Q"+Math.ceil((pd2.getMonth()+1)/3);}else{const n=Number(d.values[i]);if(!isNaN(n)&&n>1900&&n<2100)key=String(Math.floor(n));else continue;}
      const gv=g?String(g.values[i]||"Other").trim():"_all";if(!bk[key])bk[key]={};if(!bk[key][gv])bk[key][gv]={c:0,s:0};bk[key][gv].c++;if(m&&m.values[i]!=null&&!isNaN(Number(m.values[i])))bk[key][gv].s+=Number(m.values[i]);}
    const gVs=dg?[...new Set(Object.values(bk).flatMap(b=>Object.keys(b)))].filter(v=>v!=="_all").sort():["_all"];
    return{sorted:Object.keys(bk).sort(),bk,gVs,hasM:!!m};
  },[dc,mc,iv,dg,cols,data]);
  const cd=useMemo(()=>{if(!res)return[];return res.sorted.map(k=>{const r={name:k};res.gVs.forEach(g=>{const b=res.bk[k]?.[g];r[g]=b?(res.hasM?b.s:b.c):0;});return r;});},[res]);
  if(!dCols.length)return <div className="fu" style={{padding:40,textAlign:"center",color:C.text2}}>No date or year columns found. Reclassify a variable on the Overview tab.</div>;
  return(<div className="fu card">
    <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>Time Series</div>
    <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
      <div style={{flex:1,minWidth:140}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Time variable</label><SearchableSelect options={dCols.map(c=>({value:c.name,label:trunc(c.name,38)}))} value={dc} onChange={setDc} label="Time variable"/></div>
      <div style={{flex:1,minWidth:140}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Measure</label><SearchableSelect options={[{value:"",label:"Event count"},...a.numeric.map(c=>({value:c.name,label:"Sum: "+trunc(c.name,28)}))]} value={mc} onChange={setMc} label="Measure"/></div>
      <div style={{minWidth:90}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Interval</label><select className="select-dark" value={iv} onChange={e=>setIv(e.target.value)} style={{width:"100%"}}><option value="year">Year</option><option value="quarter">Quarter</option><option value="month">Month</option></select></div>
      <div style={{flex:1,minWidth:140}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Disaggregate</label><SearchableSelect options={[{value:"",label:"None"},...cats.map(c=>({value:c.name,label:trunc(c.name,28)}))]} value={dg} onChange={setDg} label="Disaggregate"/></div>
    </div>
    {cd.length>0&&res&&<ResponsiveContainer width="100%" height={320}>
      <LineChart data={cd} margin={{left:10,right:20,top:10,bottom:5}}>
        <CartesianGrid strokeDasharray="3 3" stroke={C.off}/>
        <XAxis dataKey="name" tick={{fontSize:10,fill:C.text2}} angle={cd.length>20?-45:0} textAnchor={cd.length>20?"end":"middle"} height={cd.length>20?60:30}/>
        <YAxis tick={{fontSize:10,fill:C.text2}}/>
        <Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f2240",border:`1px solid ${C.offB}`}}/>
        {res.gVs.length>1&&<Legend wrapperStyle={{fontSize:10}}/>}
        {res.gVs.map((g,i)=><Line key={g} type="monotone" dataKey={g} name={g==="_all"?(res.hasM?"Sum":"Count"):g} stroke={C.pal[i%C.pal.length]} strokeWidth={2} dot={{r:2}}/>)}
      </LineChart>
    </ResponsiveContainer>}
  </div>);
}

// TAB: CODEBOOK (absorbs Preview)
// ═══════════════════════════════════════════════════════════════════════════

function CodebookTab({cols,data}){
  const[sk,setSk]=useState("idx");const[sd,setSd]=useState(1);const[showPreview,setShowPreview]=useState(false);
  const tog=k=>{if(sk===k)setSd(d=>-d);else{setSk(k);setSd(1);}};
  const rows=cols.filter(c=>!["meta","kobo_dummy","empty","binary"].includes(c.type)).map((c,i)=>{const u=new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim()));return{...c,idx:i,uC:u.size,samp:[...u].slice(0,3).map(s=>trunc(s,16))};});
  const sorted=[...rows].sort((a,b)=>{if(sk==="idx")return(a.idx-b.idx)*sd;if(sk==="type")return a.type.localeCompare(b.type)*sd;if(sk==="miss")return(parseFloat(a.missPct)-parseFloat(b.missPct))*sd;if(sk==="uniq")return(a.uC-b.uC)*sd;return 0;});
  const tc2={categorical:C.teal,likert:C.purple,numeric:C.warning,ordinal_numeric:C.warning,date:C.tealD,text:C.textTertiary,constant:"#444"};
  const th=(l,k)=><th className="sort-th" onClick={()=>tog(k)} style={{textAlign:"left",padding:"5px 8px",color:C.text2,fontWeight:600,background:C.navy}}>{l}{sk===k?(sd===1?" \u25b2":" \u25bc"):""}</th>;
  return(<div className="fu">
    <div className="card" style={{overflowX:"auto",maxHeight:500,overflow:"auto"}}>

function exportToWord(data,cols,a,sections){
