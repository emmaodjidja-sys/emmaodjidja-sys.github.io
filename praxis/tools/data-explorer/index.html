// ── Core helpers ─────────────────────────────────────────────────
const norm=s=>s.replace(/[\u2018\u2019\u201A\u201B\u2032\u0060\u00B4]/g,"'");
const trunc=(s,n=50)=>s&&s.length>n?s.substring(0,n)+"\u2026":s;
const fmt=(n,d=1)=>typeof n==="number"?n.toFixed(d):n;
const META=[/^_id$/i,/^_uuid$/i,/^_submission_time$/i,/^_validation_status$/i,/^_notes$/i,/^_status$/i,/^_submitted_by$/i,/^_tags$/i,/^_index$/i,/^__version__$/i,/^formhub/i,/^start$/i,/^end$/i,/^today$/i,/^date$/i,/^deviceid$/i,/^phonenumber$/i,/^instanceID$/i,/^meta\//i,/_latitude$/i,/_longitude$/i,/_altitude$/i,/_precision$/i,/^latitude$/i,/^longitude$/i,/^gps$/i,/coordonn/i,/^timestamp$/i,/^event_id/i];
const isMeta=n=>META.some(p=>p.test(n));
function idKobo(h){const sl=h.filter(x=>x&&x.includes("/"));const pc=new Set();sl.forEach(x=>pc.add(x.split("/")[0].trim()));const rp=new Set(h.filter(x=>pc.has(x)));const dm=new Set();sl.forEach(x=>{if(rp.has(x.split("/")[0].trim()))dm.add(x);});return{dm,rp};}
const LEN={"strongly agree":5,"agree":4,"neutral":3,"neither agree nor disagree":3,"disagree":2,"strongly disagree":1};
const LFR=Object.entries({"tout a fait d'accord":5,"tout à fait d'accord":5,"tres d'accord":5,"très d'accord":5,"plutot d'accord":4,"plutôt d'accord":4,"d'accord":4,"ni d'accord ni pas d'accord":3,"ni d'accord ni en desaccord":3,"ni d'accord ni en désaccord":3,"ni d'accord ni desaccord":3,"neutre":3,"plutot en desaccord":2,"plutôt en désaccord":2,"pas d'accord":2,"desaccord":2,"désaccord":2,"en desaccord":2,"en désaccord":2,"tout a fait en desaccord":1,"tout à fait en désaccord":1,"pas du tout d'accord":1,"tres a l'aise":4,"très à l'aise":4,"plutot a l'aise":3,"plutôt à l'aise":3,"plutot mal a l'aise":2,"plutôt mal à l'aise":2,"tres mal a l'aise":1,"très mal à l'aise":1}).sort((a,b)=>b[0].length-a[0].length);
function detLik(v){if(v==null)return null;const r=String(v).trim();if(!r)return null;const s=norm(r).toLowerCase();const em=s.match(/\((\d)\)/);if(em)return+em[1];const lm=s.match(/^(\d)\s*[:.]/);if(lm)return+lm[1];if(LEN[s]!==undefined)return LEN[s];for(const[k,val]of LFR)if(s.includes(norm(k)))return val;const n=Number(v);if(!isNaN(n)&&n>=1&&n<=5&&Number.isInteger(n))return n;return null;}
function isLikCol(vs){const nn=vs.filter(v=>v!=null&&String(v).trim());if(nn.length<3||nn.every(v=>v===0||v===1||v==="0"||v==="1"))return false;for(const v of nn){const n=Number(v);if(!isNaN(n)&&Number.isInteger(n)&&n>5)return false;}return nn.map(detLik).filter(v=>v!==null).length/nn.length>.7;}
function scRng(vs){const p=vs.map(detLik).filter(v=>v!==null);if(!p.length)return{mn:1,mx:5,pts:5};return{mn:Math.min(...p),mx:Math.max(...p),pts:Math.max(...p)-Math.min(...p)+1};}
function pDate(v){if(v instanceof Date&&!isNaN(v))return v;const s=String(v).trim();const d1=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);if(d1){const d=new Date(+d1[3],+d1[2]-1,+d1[1]);if(!isNaN(d))return d;}const d2=s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);if(d2){const d=new Date(+d2[1],+d2[2]-1,+d2[3]);if(!isNaN(d))return d;}return null;}
function isDateC(vs){const nn=vs.filter(v=>v!=null&&String(v).trim()).slice(0,50);if(nn.length<3)return false;return nn.map(pDate).filter(v=>v!==null).length/nn.length>.7;}
function dType(name,vals,dummies){if(isMeta(name))return"meta";if(dummies.has(name))return"kobo_dummy";const nn=vals.filter(v=>v!=null&&String(v).trim()!=="");if(!nn.length)return"empty";if(nn.slice(0,5).every(v=>v instanceof Date))return"date";if(nn.every(v=>v===0||v===1||v==="0"||v==="1")&&nn.length>5)return"binary";if(isDateC(nn))return"date";if(isLikCol(nn))return"likert";const nc=nn.filter(v=>!isNaN(Number(v))&&typeof v!=="boolean").length;if(nc/nn.length>.85){const u=new Set(nn.map(Number));if(u.size<=15&&u.size<nn.length*.3)return"ordinal_numeric";return"numeric";}const al=nn.reduce((s,v)=>s+String(v).length,0)/nn.length;if(al>80)return"text";const u=new Set(nn.map(v=>String(v).trim()));if(u.size<=1)return"constant";if(u.size<=30)return"categorical";if(u.size<=60&&u.size<nn.length*.5)return"categorical";return"text";}
function cStats(nums){const s=[...nums].sort((a,b)=>a-b),n=s.length;if(!n)return{n:0,mean:"-",sd:"-",med:"-",min:"-",max:"-"};const m=s.reduce((a,v)=>a+v,0)/n;const v=n>1?s.reduce((a,x)=>a+(x-m)**2,0)/(n-1):0;return{n,mean:m.toFixed(2),sd:Math.sqrt(v).toFixed(2),med:(n%2?s[Math.floor(n/2)]:(s[n/2-1]+s[n/2])/2).toFixed(1),min:s[0],max:s[n-1]};}
function freqT(vs){const c={};let t=0;vs.forEach(v=>{if(v!=null&&String(v).trim()){const k=String(v).trim();c[k]=(c[k]||0)+1;t++;}});return Object.entries(c).map(([v,n])=>({value:v,count:n,pct:t?((n/t)*100).toFixed(1):"0"})).sort((a,b)=>b.count-a.count);}
function ols(xs,ys){let n=0,sx=0,sy=0,sxy=0,sxx=0;for(let i=0;i<xs.length;i++){if(xs[i]!=null&&ys[i]!=null&&!isNaN(xs[i])&&!isNaN(ys[i])){n++;sx+=xs[i];sy+=ys[i];sxy+=xs[i]*ys[i];sxx+=xs[i]*xs[i];}}if(n<3)return null;const xm=sx/n,ym=sy/n,sl=(sxy-n*xm*ym)/(sxx-n*xm*xm),ic=ym-sl*xm;let ssr=0,sst=0;for(let i=0;i<xs.length;i++){if(xs[i]!=null&&ys[i]!=null&&!isNaN(xs[i])&&!isNaN(ys[i])){ssr+=(ys[i]-(ic+sl*xs[i]))**2;sst+=(ys[i]-ym)**2;}}const r2=sst>0?1-ssr/sst:0,se=Math.sqrt(ssr/(n-2)),seS=se/Math.sqrt(sxx-n*xm*xm),tS=Math.abs(sl/seS),p=Math.min(Math.exp(-.717*tS-.416*tS*tS),1);return{sl,ic,r2,n,seS,tS,p,type:"ols"};}

// Logistic regression via IRLS (Newton-Raphson)
function logReg(xs, ys) {
  // Filter valid pairs where y is 0 or 1
  const dx = [], dy = [];
  for (let i = 0; i < xs.length; i++) {
    if (xs[i] != null && ys[i] != null && !isNaN(xs[i]) && !isNaN(ys[i])) {
      const yv = Number(ys[i]);
      if (yv === 0 || yv === 1) { dx.push(Number(xs[i])); dy.push(yv); }
    }
  }
  const n = dx.length;
  if (n < 5) return null;
  // IRLS: b = [intercept, slope]
  let b0 = 0, b1 = 0;
  for (let iter = 0; iter < 25; iter++) {
    let g0 = 0, g1 = 0; // gradient
    let h00 = 0, h01 = 0, h11 = 0; // Hessian
    for (let i = 0; i < n; i++) {
      const z = b0 + b1 * dx[i];
      const p = 1 / (1 + Math.exp(-Math.max(-20, Math.min(20, z)))); // sigmoid with clamp
      const r = dy[i] - p;
      const w = p * (1 - p) + 1e-10;
      g0 += r; g1 += r * dx[i];
      h00 += w; h01 += w * dx[i]; h11 += w * dx[i] * dx[i];
    }
    const det = h00 * h11 - h01 * h01;
    if (Math.abs(det) < 1e-12) break;
    const db0 = (h11 * g0 - h01 * g1) / det;
    const db1 = (h00 * g1 - h01 * g0) / det;
    b0 += db0; b1 += db1;
    if (Math.abs(db0) < 1e-8 && Math.abs(db1) < 1e-8) break;
  }
  // Compute SE from final Hessian
  let h00 = 0, h01 = 0, h11 = 0, ll = 0;
  for (let i = 0; i < n; i++) {
    const z = b0 + b1 * dx[i];
    const p = 1 / (1 + Math.exp(-Math.max(-20, Math.min(20, z))));
    const w = p * (1 - p) + 1e-10;
    h00 += w; h01 += w * dx[i]; h11 += w * dx[i] * dx[i];
    ll += dy[i] * Math.log(p + 1e-10) + (1 - dy[i]) * Math.log(1 - p + 1e-10);
  }
  const det = h00 * h11 - h01 * h01;
  if (Math.abs(det) < 1e-12) return null;
  const se0 = Math.sqrt(h11 / det);
  const se1 = Math.sqrt(h00 / det);
  const z1 = Math.abs(b1 / se1);
  const pVal = Math.min(Math.exp(-.717 * z1 - .416 * z1 * z1), 1);
  const or = Math.exp(b1);
  const orLo = Math.exp(b1 - 1.96 * se1);
  const orHi = Math.exp(b1 + 1.96 * se1);
  // Pseudo R-squared (McFadden)
  const yMean = dy.reduce((a, v) => a + v, 0) / n;
  const llNull = n * (yMean * Math.log(yMean + 1e-10) + (1 - yMean) * Math.log(1 - yMean + 1e-10));
  const pseudoR2 = 1 - ll / llNull;
  return { b0, b1, se0, se1, z: z1, p: pVal, or, orLo, orHi, ll, pseudoR2, n, type: "logistic" };
}

// Detect if Y is binary (0/1) for auto model selection
function isBinaryY(yVals) {
  const valid = yVals.filter(v => v != null && !isNaN(v));
  if (valid.length < 5) return false;
  const uniq = new Set(valid.map(Number));

px",color:C.text2,fontWeight:600,background:C.navy}}>{h}</th>)}</tr></thead><tbody>{res.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.off}`}}><td style={{padding:"4px 8px",fontWeight:500,color:C.slateL}} title={r.full}>{r.name}</td><td style={{textAlign:"right",padding:"4px 8px",color:C.text2}}>{r.count}</td><td style={{textAlign:"right",padding:"4px 8px",fontWeight:600,color:C.teal}}>{fmt(r.sum,1)}</td><td style={{textAlign:"right",padding:"4px 8px",color:C.slateL}}>{fmt(r.mean,2)}</td></tr>)}</tbody></table></div></>}</div>);}

function TSTab({cols,a,data}){const[dc,setDc]=useState("");const[mc,setMc]=useState("");const[iv,setIv]=useState("year");const[dg,setDg]=useState("");const dCols=[...a.date,...cols.filter(c=>c.name.toLowerCase().includes("year")&&c.type!=="meta"&&c.type!=="date")];const cats=a.categorical.filter(c=>new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim())).size<=10);
const res=useMemo(()=>{if(!dc)return null;const d=cols.find(c=>c.name===dc),m=mc?cols.find(c=>c.name===mc):null,g=dg?cols.find(c=>c.name===dg):null;if(!d)return null;const bk={};for(let i=0;i<data.rows;i++){let pd=pDate(d.values[i]),key;if(pd){key=iv==="year"?pd.getFullYear():iv==="month"?pd.getFullYear()+"-"+String(pd.getMonth()+1).padStart(2,"0"):pd.getFullYear()+"-Q"+Math.ceil((pd.getMonth()+1)/3);}else{const n=Number(d.values[i]);if(!isNaN(n)&&n>1900&&n<2100)key=String(Math.floor(n));else continue;}const gv=g?String(g.values[i]||"Other").trim():"_all";if(!bk[key])bk[key]={};if(!bk[key][gv])bk[key][gv]={c:0,s:0};bk[key][gv].c++;if(m&&m.values[i]!=null&&!isNaN(Number(m.values[i])))bk[key][gv].s+=Number(m.values[i]);}const gVs=dg?[...new Set(Object.values(bk).flatMap(b=>Object.keys(b)))].filter(v=>v!=="_all").sort():["_all"];return{sorted:Object.keys(bk).sort(),bk,gVs,hasM:!!m};},[dc,mc,iv,dg,cols,data]);
const cd=useMemo(()=>{if(!res)return[];return res.sorted.map(k=>{const r={name:k};res.gVs.forEach(g=>{const b=res.bk[k]?.[g];r[g]=b?(res.hasM?b.s:b.c):0;});return r;});},[res]);
if(!dCols.length)return <div className="fu" style={{padding:40,textAlign:"center",color:C.text2}}>No date or year columns found. Reclassify a variable on the Overview tab.</div>;
return(<div className="fu card"><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>Time Series</div><div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}><div style={{flex:1,minWidth:150}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Time variable</label><SS options={dCols.map(c=>({value:c.name,label:trunc(c.name,38)}))} value={dc} onChange={setDc}/></div><div style={{flex:1,minWidth:150}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Measure</label><SS options={[{value:"",label:"Event count"},...a.numeric.map(c=>({value:c.name,label:"Sum: "+trunc(c.name,28)}))]} value={mc} onChange={setMc}/></div><div style={{minWidth:90}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Interval</label><select className="select-dark" value={iv} onChange={e=>setIv(e.target.value)} style={{width:"100%"}}><option value="year">Year</option><option value="quarter">Quarter</option><option value="month">Month</option></select></div><div style={{flex:1,minWidth:150}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Disaggregate</label><SS options={[{value:"",label:"None"},...cats.map(c=>({value:c.name,label:trunc(c.name,28)}))]} value={dg} onChange={setDg}/></div></div>{cd.length>0&&res&&<ResponsiveContainer width="100%" height={320}><LineChart data={cd} margin={{left:10,right:20,top:10,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke={C.off}/><XAxis dataKey="name" tick={{fontSize:10,fill:C.text2}} angle={cd.length>20?-45:0} textAnchor={cd.length>20?"end":"middle"} height={cd.length>20?60:30}/><YAxis tick={{fontSize:10,fill:C.text2}}/><Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f1f38",border:`1px solid ${C.offB}`}}/>{res.gVs.length>1&&<Legend wrapperStyle={{fontSize:10}}/>}{res.gVs.map((g,i)=><Line key={g} type="monotone" dataKey={g} name={g==="_all"?(res.hasM?"Sum":"Count"):g} stroke={C.pal[i%C.pal.length]} strokeWidth={2} dot={{r:2}}/>)}</LineChart></ResponsiveContainer>}</div>);}

function RegTab({cols,a}){
  const[xc,setXc]=useState("");
  const[yc,setYc]=useState("");
  const[forceModel,setForceModel]=useState("auto");
  const nc=[...a.numeric,...a.likert];
  // Y options: numeric + categorical with 2 levels (for logistic)
  const yOpts = useMemo(() => {
    const opts = nc.map(c => ({value:c.name,label:trunc(c.name,42),sub:"numeric"}));
    // Add binary/categorical columns with exactly 2 values
    a.categorical.forEach(c => {
      const uniq = [...new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim()))];
      if (uniq.length === 2) opts.push({value:c.name,label:trunc(c.name,42),sub:"binary: "+uniq.join(" / ")});
    });
    cols.filter(c=>c.type==="binary").forEach(c => {
      opts.push({value:c.name,label:trunc(c.name,42),sub:"binary (0/1)"});
    });
    return opts;
  }, [nc, a, cols]);

  // Prepare Y values: if categorical binary, encode as 0/1
  const yCol = useMemo(() => cols.find(c=>c.name===yc), [yc, cols]);
  const yVals = useMemo(() => {
    if (!yCol) return null;
    const vals = yCol.values;
    // If already numeric, just map
    if (["numeric","ordinal_numeric","likert","binary"].includes(yCol.type)) return vals.map(Number);
    // Categorical with 2 levels: encode
    const uniq = [...new Set(vals.filter(v=>v!=null).map(v=>String(v).trim()))];
    if (uniq.length === 2) return vals.map(v => v != null ? (String(v).trim() === uniq[0] ? 0 : 1) : null);
    return vals.map(Number);
  }, [yCol]);

  const xv = useMemo(() => xc ? cols.find(c=>c.name===xc)?.values.map(Number) : null, [xc, cols]);
  const isBin = useMemo(() => yVals ? isBinaryY(yVals) : false, [yVals]);
  const model = forceModel === "auto" ? (isBin ? "logistic" : "ols") : forceModel;

  const reg = useMemo(() => {
    if (!xv || !yVals) return null;
    if (model === "logistic") return logReg(xv, yVals);
    return ols(xv, yVals);
  }, [xv, yVals, model]);

  const pts = useMemo(() => {
    if (!xv || !yVals) return [];
    const p = [];
    for (let i = 0; i < xv.length; i++) { if (!isNaN(xv[i]) && yVals[i] != null && !isNaN(yVals[i])) p.push({x:xv[i],y:Number(yVals[i])}); }
    if (p.length > 500) { const s = Math.ceil(p.length/500); return p.filter((_,i) => i%s===0); }
    return p;
  }, [xv, yVals]);

  // For logistic: generate S-curve points
  const sCurve = useMemo(() => {
    if (!reg || reg.type !== "logistic" || !pts.length) return [];
    const xMin = Math.min(...pts.map(d=>d.x)), xMax = Math.max(...pts.map(d=>d.x));
    const step = (xMax - xMin) / 80;
    const curve = [];
    for (let x = xMin; x <= xMax; x += step) {
      const z = reg.b0 + reg.b1 * x;
      curve.push({x, y: 1/(1+Math.exp(-Math.max(-20,Math.min(20,z))))});
    }
    return curve;
  }, [reg, pts]);

  // Encode label for binary Y
  const yLabels = useMemo(() => {
    if (!yCol) return null;
    if (!isBin) return null;
    if (yCol.type === "categorical") {
      const uniq = [...new Set(yCol.values.filter(v=>v!=null).map(v=>String(v).trim()))];
      if (uniq.length === 2) return {zero: uniq[0], one: uniq[1]};
    }
    return {zero: "0", one: "1"};
  }, [yCol, isBin]);

  return (
    <div className="fu card">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text}}>Regression Analysis</div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          {["auto","ols","logistic"].map(m => (
            <button key={m} onClick={()=>setForceModel(m)} style={{padding:"3px 10px",borderRadius:5,fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:"inherit",border:`1px solid ${forceModel===m?"rgba(46,196,182,.4)":C.off}`,background:forceModel===m?"rgba(46,196,182,.15)":"transparent",color:forceModel===m?C.teal:C.text2}}>
              {m==="auto"?"Auto-detect":m==="ols"?"OLS (linear)":"Logistic"}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{flex:1,minWidth:200}}>
          <label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>X (independent)</label>
          <SS options={nc.map(c=>({value:c.name,label:trunc(c.name,42)}))} value={xc} onChange={setXc}/>
        </div>
        <div style={{flex:1,minWidth:200}}>
          <label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Y (dependent){isBin && <span style={{color:C.purple,marginLeft:6,fontSize:10}}>Binary detected</span>}</label>
          <SS options={yOpts} value={yc} onChange={setYc}/>
        </div>
      </div>
      {isBin && model === "logistic" && yLabels && (
        <div style={{marginBottom:12,padding:"8px 12px",background:"rgba(123,97,255,.06)",borderRadius:8,border:"1px solid rgba(123,97,255,.15)",fontSize:11,color:C.slateL}}>
          Logistic regression selected. Y encoding: <strong style={{color:C.text}}>{yLabels.zero}</strong> = 0, <strong style={{color:C.text}}>{yLabels.one}</strong> = 1
        </div>
      )}
      {reg && reg.type === "ols" && <>
        <ResponsiveContainer width="100%" height={300}><ScatterChart margin={{left:10,right:20,top:10,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke={C.off}/><XAxis type="number" dataKey="x" tick={{fontSize:10,fill:C.text2}}/><YAxis type="number" dataKey="y" tick={{fontSize:10,fill:C.text2}}/><Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f1f38",border:`1px solid ${C.offB}`}}/><Scatter data={pts} fill={C.teal} fillOpacity={.5} r={3}/>{pts.length>0&&<ReferenceLine stroke={C.coral} strokeWidth={2} strokeDasharray="5 3" segment={[{x:Math.min(...pts.map(d=>d.x)),y:reg.ic+reg.sl*Math.min(...pts.map(d=>d.x))},{x:Math.max(...pts.map(d=>d.x)),y:reg.ic+reg.sl*Math.max(...pts.map(d=>d.x))}]}/>}</ScatterChart></ResponsiveContainer>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginTop:14}}>{[{l:"R\u00b2",v:reg.r2.toFixed(4)},{l:"Slope (\u03b2)",v:reg.sl.toFixed(4)},{l:"Intercept",v:reg.ic.toFixed(2)},{l:"SE (slope)",v:reg.seS.toFixed(4)},{l:"t-stat",v:reg.tS.toFixed(2)},{l:"p-value",v:reg.p<.001?"<0.001":reg.p.toFixed(3),h:reg.p<.05},{l:"n",v:reg.n}].map((s,i)=><div key={i} style={{background:"rgba(46,196,182,.05)",borderRadius:8,padding:"10px 8px",textAlign:"center",border:`1px solid rgba(46,196,182,.1)`}}><div style={{fontSize:17,fontWeight:700,color:s.h?C.green:C.text}}>{s.v}</div><div style={{fontSize:10,color:C.text2}}>{s.l}</div></div>)}</div>
        <div style={{marginTop:12,fontSize:12,color:C.teal,background:"rgba(46,196,182,.06)",padding:"10px 14px",borderRadius:8,fontWeight:600,border:`1px solid rgba(46,196,182,.15)`}}>Y = {reg.ic.toFixed(3)} + {reg.sl.toFixed(3)} &times; X{reg.p<.05?<span style={{color:C.green,marginLeft:10}}>Significant (p &lt; 0.05)</span>:<span style={{color:C.text2,marginLeft:10}}>Not significant</span>}</div>
      </>}
      {reg && reg.type === "logistic" && <>
        <ResponsiveContainer width="100%" height={300}>
          <ScatterChart margin={{left:10,right:20,top:10,bottom:5}}>
            <CartesianGrid strokeDasharray="3 3" stroke={C.off}/>
            <XAxis type="number" dataKey="x" tick={{fontSize:10,fill:C.text2}}/>
            <YAxis type="number" dataKey="y" domain={[-0.05,1.05]} tick={{fontSize:10,fill:C.text2}} tickFormatter={v=>v===0||v===1?v:v.toFixed(1)}/>
            <Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f1f38",border:`1px solid ${C.offB}`}}/>
            <Scatter data={pts} fill={C.teal} fillOpacity={.4} r={3}/>
            <Scatter data={sCurve} fill="none" line={{stroke:C.purple,strokeWidth:2.5}} legendType="none" r={0}/>
          </ScatterChart>
        </ResponsiveContainer>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8,marginTop:14}}>
          {[
            {l:"Odds Ratio",v:reg.or.toFixed(3),h:reg.p<.05},
            {l:"OR 95% CI Low",v:reg.orLo.toFixed(3)},
            {l:"OR 95% CI High",v:reg.orHi.toFixed(3)},
            {l:"Coeff (\u03b2\u2081)",v:reg.b1.toFixed(4)},
            {l:"SE (coeff)",v:reg.se1.toFixed(4)},
            {l:"z-stat",v:reg.z.toFixed(2)},
            {l:"p-value",v:reg.p<.001?"<0.001":reg.p.toFixed(3),h:reg.p<.05},
            {l:"Pseudo R\u00b2",v:reg.pseudoR2.toFixed(4)},
            {l:"n",v:reg.n},
          ].map((s,i)=><div key={i} style={{background:s.l==="Odds Ratio"?"rgba(123,97,255,.08)":"rgba(46,196,182,.05)",borderRadius:8,padding:"10px 8px",textAlign:"center",border:`1px solid ${s.l==="Odds Ratio"?"rgba(123,97,255,.2)":"rgba(46,196,182,.1)"}`}}>
            <div style={{fontSize:s.l==="Odds Ratio"?20:16,fontWeight:700,color:s.h?C.green:s.l==="Odds Ratio"?C.purple:C.text}}>{s.v}</div>
            <div style={{fontSize:10,color:C.text2}}>{s.l}</div>
          </div>)}
        </div>
        <div style={{marginTop:12,fontSize:12,background:"rgba(123,97,255,.06)",padding:"12px 14px",borderRadius:8,border:"1px solid rgba(123,97,255,.15)"}}>
          <div style={{color:C.purple,fontWeight:600,marginBottom:4}}>log(p / 1-p) = {reg.b0.toFixed(3)} + {reg.b1.toFixed(3)} &times; X</div>
          <div style={{color:C.slateL,fontSize:11}}>
            {reg.or > 1
              ? `Each unit increase in X multiplies the odds of Y=1 by ${reg.or.toFixed(2)} (${((reg.or-1)*100).toFixed(0)}% increase).`
              : `Each unit increase in X multiplies the odds of Y=1 by ${reg.or.toFixed(2)} (${((1-reg.or)*100).toFixed(0)}% decrease).`}
            {reg.p < .05 ? " This effect is statistically significant." : " This effect is not statistically significant."}
          </div>
        </div>
      </>}
    </div>
  );
}

function XTab({cols,a}){const[oc,setOc]=useState("");const[dc,setDc]=useState("");const az=cols.filter(c=>["categorical","likert","ordinal_numeric"].includes(c.type));const dOpts=a.categorical.filter(c=>new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim())).size>1);const res=useMemo(()=>{if(!oc||!dc)return null;const o=cols.find(c=>c.name===oc),d=cols.find(c=>c.name===dc);if(!o||!d)return null;const tb={},dV=new Set(),oV=new Set();for(let i=0;i<o.values.length;i++){const ov=o.values[i]!=null?String(o.values[i]).trim():null,dv=d.values[i]!=null?String(d.values[i]).trim():null;if(!ov||!dv)continue;dV.add(dv);oV.add(ov);if(!tb[dv])tb[dv]={};tb[dv][ov]=(tb[dv][ov]||0)+1;}return{tb,dV:[...dV].sort(),oV:[...oV].sort()};},[oc,dc,cols]);const cd=useMemo(()=>{if(!res)return[];return res.dV.map(dv=>{const r={name:trunc(dv,20)};let t=0;res.oV.forEach(ov=>{t+=(res.tb[dv]?.[ov]||0);});res.oV.forEach(ov=>{r[ov]=t?parseFloat(((res.tb[dv]?.[ov]||0)/t*100).toFixed(1)):0;});return r;});},[res]);
return(<div className="fu card"><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:14}}>Cross-tabulation</div><div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}><div style={{flex:1,minWidth:200}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Outcome</label><SS options={az.map(c=>({value:c.name,label:trunc(c.name,42)}))} value={oc} onChange={setOc}/></div><div style={{flex:1,minWidth:200}}><label style={{fontSize:11,fontWeight:600,color:C.text2,display:"block",marginBottom:4}}>Disaggregate by</label><SS options={dOpts.map(c=>({value:c.name,label:trunc(c.name,38),sub:`${new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim())).size}`}))} value={dc} onChange={setDc}/></div></div>{res&&res.dV.length>1&&<ResponsiveContainer width="100%" height={Math.max(180,cd.length*35+50)}><BarChart data={cd} layout="vertical" margin={{left:10,right:20,top:5,bottom:5}}><CartesianGrid strokeDasharray="3 3" stroke={C.off} horizontal={false}/><XAxis type="number" domain={[0,100]} tick={{fontSize:10,fill:C.text2}} unit="%"/><YAxis type="category" dataKey="name" width={120} tick={{fontSize:10,fill:C.slateL}}/><Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f1f38",border:`1px solid ${C.offB}`}} formatter={v=>[`${v}%`]}/><Legend wrapperStyle={{fontSize:10}}/>{res.oV.map((ov,i)=><Bar key={ov} dataKey={ov} stackId="a" fill={C.pal[i%C.pal.length]}/>)}</BarChart></ResponsiveContainer>}{res&&res.dV.length<=1&&<div style={{padding:12,color:C.amber,fontSize:12}}>Only one category in this disaggregator.</div>}</div>);}

function MissTab({cols}){const wm=cols.filter(c=>!["meta","kobo_dummy","empty","binary","constant"].includes(c.type)&&c.missing>0).sort((a,b)=>b.missing-a.missing).slice(0,20);if(!wm.length)return <div className="fu card" style={{background:"rgba(52,168,83,.06)",border:`1px solid rgba(52,168,83,.2)`}}><div style={{fontSize:14,fontWeight:600,color:C.green}}>No missing data in analyzable variables</div></div>;const cd=wm.map(c=>({name:trunc(c.name,28),missing:parseFloat(c.missPct)}));
return <div className="fu card"><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:10}}>Missing Data</div><ResponsiveContainer width="100%" height={Math.max(120,cd.length*24+30)}><BarChart data={cd} layout="vertical" margin={{left:10,right:20}}><CartesianGrid strokeDasharray="3 3" stroke={C.off} horizontal={false}/><XAxis type="number" domain={[0,100]} tick={{fontSize:10,fill:C.text2}} unit="%"/><YAxis type="category" dataKey="name" width={170} tick={{fontSize:10,fill:C.slateL}}/><Tooltip contentStyle={{fontSize:11,borderRadius:6,background:"#0f1f38",border:`1px solid ${C.offB}`}}/><Bar dataKey="missing" fill={C.coral} name="Missing %" radius={[0,3,3,0]} barSize={14}/></BarChart></ResponsiveContainer></div>;}

function CBTab({cols}){const[sk,setSk]=useState("idx");const[sd,setSd]=useState(1);const tog=k=>{if(sk===k)setSd(d=>-d);else{setSk(k);setSd(1);}};const rows=cols.filter(c=>!["meta","kobo_dummy","empty","binary"].includes(c.type)).map((c,i)=>{const u=new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim()));return{...c,idx:i,uC:u.size,samp:[...u].slice(0,3).map(s=>trunc(s,16))};});const sorted=[...rows].sort((a,b)=>{if(sk==="idx")return(a.idx-b.idx)*sd;if(sk==="type")return a.type.localeCompare(b.type)*sd;if(sk==="miss")return(parseFloat(a.missPct)-parseFloat(b.missPct))*sd;if(sk==="uniq")return(a.uC-b.uC)*sd;return 0;});const tc={categorical:C.teal,likert:C.purple,numeric:C.amber,ordinal_numeric:C.amber,date:C.tealD,text:C.slate,constant:"#444"};const th=(l,k)=><th className="sort-th" onClick={()=>tog(k)} style={{textAlign:"left",padding:"5px 8px",color:C.text2,fontWeight:600,background:C.navy}}>{l}{sk===k?(sd===1?" \u25b2":" \u25bc"):""}</th>;
return <div className="fu card" style={{overflowX:"auto",maxHeight:500,overflow:"auto"}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:10}}>Codebook <span style={{fontSize:10,fontWeight:400,color:C.text2}}>Click headers to sort</span></div><table className="sth" style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}><thead><tr style={{borderBottom:`1px solid ${C.offB}`}}>{th("#","idx")}{th("Variable","idx")}{th("Type","type")}<th style={{textAlign:"center",padding:"5px 8px",color:C.text2,fontWeight:600,background:C.navy}}>n</th>{th("Missing","miss")}{th("Unique","uniq")}<th style={{padding:"5px 8px",color:C.text2,fontWeight:600,background:C.navy}}>Samples</th></tr></thead><tbody>{sorted.map((r,i)=><tr key={i} style={{borderBottom:`1px solid ${C.off}`}}><td style={{padding:"4px 8px",color:C.slate}}>{r.idx+1}</td><td style={{padding:"4px 8px",fontWeight:500,maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:C.slateL}} title={r.name}>{trunc(r.name,40)}</td><td style={{padding:"4px 8px"}}><span style={{padding:"1px 6px",borderRadius:3,fontSize:9,fontWeight:700,color:"#fff",background:tc[r.type]||C.slate}}>{r.type}</span></td><td style={{textAlign:"center",padding:"4px 8px",color:C.slateL}}>{r.nonNull}</td><td style={{padding:"4px 8px",color:r.missing>0?C.coral:C.green}}>{r.missPct}%</td><td style={{textAlign:"center",padding:"4px 8px",color:C.slateL}}>{r.uC}</td><td style={{padding:"4px 8px",color:C.slate,fontSize:10}}>{r.samp.join(", ")}</td></tr>)}</tbody></table></div>;}

function LikertTab({a,data}){
  const grp={};a.likert.forEach(c=>{const r=scRng(c.values);const k=`${r.mn}-${r.mx}`;if(!grp[k])grp[k]={r,cs:[]};grp[k].cs.push(c);});
  return <div className="fu">{Object.entries(grp).map(([k,g])=>{const{r}=g;const colors=r.pts===4?C.lik4:C.lik5;const labels=r.pts===5?["Strongly Disagree","Disagree","Neutral","Agree","Strongly Agree"]:r.pts===4?["Very uncomfortable","Uncomfortable","Comfortable","Very comfortable"]:Array.from({length:r.pts},(_,i)=>String(i+r.mn));
    const items=g.cs.map(c=>{const ct={};for(let i=r.mn;i<=r.mx;i++)ct[i]=0;let tot=0,unp=0;c.values.forEach(v=>{if(v==null||!String(v).trim())return;const lv=detLik(v);if(lv!==null&&lv>=r.mn&&lv<=r.mx){ct[lv]++;tot++;}else unp++;});const mn=tot?Object.entries(ct).reduce((s,[k,v])=>s+Number(k)*v,0)/tot:0;const pc={};for(let i=r.mn;i<=r.mx;i++)pc[i]=tot?((ct[i]/tot)*100).toFixed(1):"0";return{nm:trunc(c.name,52),fn:c.name,tot,mn:mn.toFixed(2),ct,pc,unp};}).sort((x,y)=>+y.mn-+x.mn);
    return <div key={k} className="card"><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}><div style={{fontSize:14,fontWeight:700,color:C.text}}>{r.pts}-point Scale <span style={{fontWeight:400,color:C.text2}}>({g.cs.length} items)</span></div>{data.rows<30&&<div style={{fontSize:10,color:C.coral,background:"rgba(232,93,93,.1)",padding:"4px 12px",borderRadius:20,fontWeight:600,border:"1px solid rgba(232,93,93,.2)"}}>Small sample (n={data.rows})</div>}</div>
      {items.map((it,idx)=><div key={idx} style={{marginBottom:14}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4,gap:8}}><div style={{fontSize:11,color:C.slateL,fontWeight:500,flex:1,lineHeight:1.4}} title={it.fn}>{it.nm}</div><div style={{display:"flex",gap:8,alignItems:"center",whiteSpace:"nowrap"}}><span style={{fontSize:10,color:C.slate}}>n={it.tot}</span><span style={{fontSize:12,color:C.teal,fontWeight:700}}>Mean {it.mn}</span></div></div><div style={{display:"flex",height:22,borderRadius:4,overflow:"hidden",background:"rgba(255,255,255,.05)"}}>{Array.from({length:r.mx-r.mn+1},(_,i)=>i+r.mn).map((v,vi)=>{const p=parseFloat(it.pc[v]);if(!p)return null;return <div key={v} title={`${labels[vi]}: ${p}% (n=${it.ct[v]})`} style={{width:`${p}%`,background:colors[vi],display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,color:vi===2&&r.pts===5?"#0B1A2E":"#fff",fontWeight:600,transition:"width .5s ease"}}>{p>=9?`${p}%`:""}</div>;})}</div>{it.unp>0&&<div style={{fontSize:9,color:C.amber,marginTop:2}}>{it.unp} excluded (NA/refuse)</div>}</div>)}
      <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>{labels.map((l,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:10,height:10,borderRadius:2,background:colors[i]}}/><span style={{fontSize:10,color:C.text2}}>{l}</span></div>)}</div></div>;})}</div>;
}

  const hFile=useCallback(f=>{if(!f)return;const x=f.name.split(".").pop().toLowerCase();if(!["xlsx","xls","csv"].includes(x)){setErr("Upload .xlsx, .xls, or .csv");return;}setLoading(true);setErr(null);const r=new FileReader();r.onload=e=>{try{const d=pFile(new Uint8Array(e.target.result),f.name);if(!d||!d.rows)setErr("Could not read data.");else{setData(d);setTab("overview");setOvr({});}}catch(er){setErr("Error: "+er.message);}setLoading(false);};r.readAsArrayBuffer(f);},[]);

          {loading?<div className="fu" style={{padding:48}}><div style={{width:48,height:48,border:`3px solid ${C.off}`,borderTopColor:C.teal,borderRadius:"50%",margin:"0 auto 16px",animation:"spin .7s linear infinite"}}/><div style={{fontSize:14,fontWeight:600,color:C.text}}>Analyzing your data...</div><div style={{display:"flex",gap:8,justifyContent:"center",marginTop:14}}>{[1,2,3,4].map(i=><div key={i} className="skel" style={{width:70,height:10,animationDelay:`${i*200}ms`}}/>)}</div></div>

            style={{border:`2px dashed ${drag?"rgba(46,196,182,.6)":"rgba(46,196,182,.2)"}`,borderRadius:16,padding:"52px 28px",cursor:"pointer",background:drag?"rgba(46,196,182,.06)":"rgba(255,255,255,.02)",transition:"all .25s",animation:drag?"none":"glow 3s ease-in-out infinite"}}>

        {tab==="likert"&&(a.likert.length===0?<Empty type="likert" a={a} go={setTab}/>:<LikertTab a={a} data={data}/>)}

        {tab==="numeric"&&(a.numeric.length===0?<Empty type="numeric" a={a} go={setTab}/>:<div className="fu card" style={{overflowX:"auto"}}><table className="sth" style={{width:"100%",fontSize:11,borderCollapse:"collapse"}}><thead><tr style={{borderBottom:`1px solid ${C.offB}`}}>{["Variable","n","Mean","SD","Median","Min","Max"].map(h=><th key={h} style={{textAlign:h==="Variable"?"left":"center",padding:"5px 8px",color:C.text2,fontWeight:600,background:C.navy}}>{h}</th>)}</tr></thead><tbody>{a.numeric.map((c,i)=>{const st=cStats(c.values.filter(v=>v!=null&&!isNaN(Number(v))).map(Number));return <tr key={i} style={{borderBottom:`1px solid ${C.off}`}}><td style={{padding:"4px 8px",fontWeight:500,maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:C.slateL}} title={c.name}>{trunc(c.name,35)}</td><td style={{textAlign:"center",padding:"4px 8px",color:C.text2}}>{st.n}</td><td style={{textAlign:"center",padding:"4px 8px",fontWeight:600,color:C.teal}}>{st.mean}</td><td style={{textAlign:"center",padding:"4px 8px",color:C.text2}}>{st.sd}</td><td style={{textAlign:"center",padding:"4px 8px",color:C.slateL}}>{st.med}</td><td style={{textAlign:"center",padding:"4px 8px",color:C.slate}}>{st.min}</td><td style={{textAlign:"center",padding:"4px 8px",color:C.slate}}>{st.max}</td></tr>;})}</tbody></table></div>)}

        {tab==="groupby"&&<GroupByTab cols={cols} a={a} data={data}/>}
