  const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const bar=(pct,color,w=200)=>`<span style="display:inline-block;background:${color};height:14px;width:${Math.max(2,Math.round(pct/100*w))}px;border-radius:2px;vertical-align:middle"></span>`;
  const likBar=(pcts,colors)=>{let h='<table style="width:100%;border-collapse:collapse;margin:2pt 0"><tr>';pcts.forEach((p,i)=>{if(p>0)h+=`<td style="background:${colors[i]};width:${p}%;height:16px;border:none;padding:0;text-align:center;font-size:7pt;color:${i===2&&pcts.length===5?'#333':'#fff'};font-weight:bold">${p>=10?p+'%':''}</td>`;});h+='</tr></table>';return h;};

  const hdr=`<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word" xmlns="http://www.w3.org/TR/REC-html40"><head><meta charset="utf-8"><title>Data Analysis Report</title>
<style>@page{size:A4;margin:2.2cm}body{font-family:Garamond,'Times New Roman',Georgia,serif;font-size:11pt;color:#1a1a1a;line-height:1.55}h1{font-family:Garamond,serif;font-size:20pt;color:#0B1A2E;border-bottom:2.5pt solid #2EC4B6;padding-bottom:8pt;margin-bottom:6pt}h2{font-family:Garamond,serif;font-size:14pt;color:#0B1A2E;margin-top:22pt;margin-bottom:8pt;border-bottom:1pt solid #ccc;padding-bottom:4pt}h3{font-family:Garamond,serif;font-size:12pt;color:#1a3050;margin-top:16pt;margin-bottom:4pt}table{border-collapse:collapse;width:100%;margin:6pt 0}th{background:#0B1A2E;color:white;padding:7pt 9pt;text-align:left;font-size:9.5pt;font-weight:bold}td{border:1px solid #d9d9d9;padding:5pt 9pt;font-size:10pt}tr:nth-child(even) td{background:#f6f8fa}.hl td{background:#e4f7f4;font-weight:bold}.note{background:#f0f5f8;border-left:3pt solid #2EC4B6;padding:10pt 14pt;margin:10pt 0;font-size:10pt;font-style:italic}.footer{margin-top:28pt;padding-top:8pt;border-top:1pt solid #ccc;font-size:8.5pt;color:#888;text-align:center}.meta{color:#555;font-size:10pt;margin-bottom:6pt}.teal{color:#1a9e92;font-weight:bold}.chart-bar td{border:none;padding:2pt 4pt;font-size:9pt}</style></head><body>`;

  let html=hdr;let secNum=0;
  html+=`<h1>Data Analysis Report</h1>`;
  html+=`<p class="meta"><b>File:</b> ${esc(data.fn)}<br><b>Sheet:</b> ${esc(data.sheet)} | <b>Rows:</b> ${data.rows.toLocaleString()} | <b>Columns:</b> ${data.colN}<br><b>Date:</b> ${today}<br><b>Generated by:</b> PRAXIS Data Explorer v4 &mdash; <span class="teal">emmanuelneneodjidja.org/praxis</span></p>`;

  if(sections.overview){
    secNum++;const comp=Math.round(cols.reduce((s,c)=>s+(100-parseFloat(c.missPct)),0)/cols.length);
    html+=`<h2>${secNum}. Dataset Overview</h2>`;
    html+=`<table><tr><th style="width:55%">Metric</th><th>Value</th></tr>`;
    html+=`<tr><td>Total observations</td><td><b>${data.rows.toLocaleString()}</b></td></tr>`;
    html+=`<tr><td>Categorical variables</td><td>${a.categorical.length}</td></tr>`;
    html+=`<tr><td>Likert scale items</td><td>${a.likert.length}</td></tr>`;
    html+=`<tr><td>Numeric variables</td><td>${a.numeric.length}</td></tr>`;
    html+=`<tr><td>Date/time variables</td><td>${a.date.length}</td></tr>`;
    html+=`<tr class="hl"><td>Overall data completeness</td><td>${bar(comp,'#2EC4B6',120)} <b>${comp}%</b></td></tr></table>`;
  }

  if(sections.frequencies&&a.categorical.length>0){
    secNum++;html+=`<h2>${secNum}. Frequency Distributions</h2>`;
    a.categorical.forEach(col=>{const fr=freqT(col.values);const maxCount=fr.length>0?fr[0].count:1;
      html+=`<h3>${esc(col.name)}</h3><p class="meta">n = ${col.nonNull} | ${fr.length} categories</p>`;
      html+='<table class="chart-bar" style="border:none;margin-bottom:4pt">';
      fr.slice(0,15).forEach(f=>{const pct=(f.count/maxCount)*100;html+=`<tr class="chart-bar"><td style="border:none;width:160px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:9pt;color:#555">${esc(f.value)}</td><td style="border:none;width:60%">${bar(pct,'#2EC4B6',180)}</td><td style="border:none;font-size:9pt;white-space:nowrap"><b>${f.count}</b> (${f.pct}%)</td></tr>`;});
      html+='</table>';
    });
  }

  if(sections.likert&&a.likert.length>0){
    secNum++;html+=`<h2>${secNum}. Likert Scale Analysis</h2>`;
    const grp={};a.likert.forEach(c=>{const r=scRng(c.values);const k=`${r.mn}-${r.mx}`;if(!grp[k])grp[k]={r,cs:[]};grp[k].cs.push(c);});
    const likColors5=['#E85D5D','#FBBC04','#A0AEC0','#34A853','#1a6b5a'],likColors4=['#E85D5D','#FBBC04','#34A853','#1a6b5a'];
    Object.entries(grp).forEach(([k,g])=>{
      const{r}=g;const colors=r.pts===4?likColors4:likColors5;
      const labels=r.pts===5?['Str. Disagree','Disagree','Neutral','Agree','Str. Agree']:r.pts===4?['Very uncomf.','Uncomf.','Comf.','Very comf.']:Array.from({length:r.pts},(_,i)=>String(i+r.mn));
      html+=`<h3>${r.pts}-point Scale (${g.cs.length} items)</h3>`;
      g.cs.map(c=>{const ct={};for(let i=r.mn;i<=r.mx;i++)ct[i]=0;let tot=0;c.values.forEach(v=>{if(v==null||!String(v).trim())return;const lv=detLik(v);if(lv!==null&&lv>=r.mn&&lv<=r.mx){ct[lv]++;tot++;}});const mn=tot?Object.entries(ct).reduce((s,[k,v])=>s+Number(k)*v,0)/tot:0;const pcts=[];for(let i=r.mn;i<=r.mx;i++)pcts.push(tot?Math.round((ct[i]/tot)*100):0);return{name:c.name,tot,mn,pcts};}).sort((x,y)=>y.mn-x.mn).forEach(item=>{
        html+=`<table style="border:none;margin:3pt 0;width:100%"><tr><td style="border:none;width:42%;font-size:9.5pt;padding:3pt 6pt">${esc(item.name)}</td><td style="border:none;width:44%;padding:2pt">${likBar(item.pcts,colors)}</td><td style="border:none;width:14%;text-align:right;padding:3pt 6pt;font-size:9.5pt"><b class="teal">${item.mn.toFixed(2)}</b><br><span style="font-size:8pt;color:#888">n=${item.tot}</span></td></tr></table>`;
      });
    });
  }

  if(sections.numeric&&a.numeric.length>0){
    secNum++;html+=`<h2>${secNum}. Descriptive Statistics</h2>`;
    html+="<table><tr><th>Variable</th><th>n</th><th>Mean</th><th>SD</th><th>Median</th><th>IQR</th><th>Min</th><th>Max</th><th>Skew</th></tr>";
    a.numeric.forEach(c=>{const nums=c.values.filter(v=>v!=null&&!isNaN(Number(v))).map(Number);const st=descriptiveStats(nums);if(st)html+=`<tr><td style="font-size:9.5pt">${esc(c.name)}</td><td style="text-align:center">${st.n}</td><td style="text-align:center"><b>${st.mean.toFixed(2)}</b></td><td style="text-align:center">${st.sd.toFixed(2)}</td><td style="text-align:center">${st.median.toFixed(2)}</td><td style="text-align:center">${st.iqr.toFixed(2)}</td><td style="text-align:center">${st.min}</td><td style="text-align:center">${st.max}</td><td style="text-align:center">${st.skewness.toFixed(2)}</td></tr>`;});
    html+="</table>";
  }

  if(sections.missing){
    secNum++;const wm=cols.filter(c=>!["meta","kobo_dummy","empty","binary","constant"].includes(c.type)&&c.missing>0).sort((x,y)=>y.missing-x.missing);
    html+=`<h2>${secNum}. Missing Data</h2>`;
    if(wm.length>0){html+="<table><tr><th>Variable</th><th>Valid n</th><th>Missing</th><th>%</th></tr>";wm.forEach(c=>{html+=`<tr><td>${esc(c.name)}</td><td style="text-align:center">${c.nonNull}</td><td style="text-align:center">${c.missing}</td><td style="text-align:center;color:#E85D5D;font-weight:bold">${c.missPct}%</td></tr>`;});html+="</table>";}
    else html+='<div class="note">No missing data detected. All variables have 100% completeness.</div>';
  }

  if(sections.codebook){
    secNum++;html+=`<h2>${secNum}. Variable Codebook</h2>`;
    html+="<table><tr><th>#</th><th>Variable</th><th>Type</th><th>Valid n</th><th>Missing %</th><th>Unique</th><th>Samples</th></tr>";
    cols.filter(c=>!["meta","kobo_dummy","empty","binary"].includes(c.type)).forEach((c,i)=>{const u=new Set(c.values.filter(v=>v!=null).map(v=>String(v).trim()));const samp=[...u].slice(0,3).map(s=>esc(s.length>25?s.substring(0,25)+'...':s)).join(', ');
      const tc3={categorical:'#2EC4B6',likert:'#7B61FF',numeric:'#E8A317',ordinal_numeric:'#E8A317',date:'#1a9e92',text:'#888'}[c.type]||'#888';
      html+=`<tr><td style="text-align:center">${i+1}</td><td style="font-size:9.5pt">${esc(c.name)}</td><td><span style="background:${tc3};color:#fff;padding:1pt 6pt;border-radius:3pt;font-size:8pt;font-weight:bold">${c.type}</span></td><td style="text-align:center">${c.nonNull}</td><td style="text-align:center">${c.missPct}%</td><td style="text-align:center">${u.size}</td><td style="font-size:8.5pt;color:#666">${samp}</td></tr>`;});
    html+="</table>";
  }

  // Methodological notes
  secNum++;html+=`<h2>${secNum}. Methodological Notes</h2>`;
  html+=`<div class="note">All analyses were performed client-side using PRAXIS Data Explorer v4. Statistical tests include: proper t-distribution CDF for OLS p-values, chi-squared distribution for cross-tabulation tests, normal CDF (Abramowitz &amp; Stegun approximation) for logistic regression z-tests, and Cronbach's alpha for reliability analysis. Confidence intervals use t-critical values via bisection search. Fisher's exact test is available for 2&times;2 tables. All p-values use proper distribution functions with degrees of freedom.</div>`;

  html+=`<div class="footer">Generated by PRAXIS Data Explorer v4 &mdash; <b>emmanuelneneodjidja.org/praxis</b><br>${today} | All analysis performed client-side. No data was transmitted.</div></body></html>`;

  const blob=new Blob([html],{type:"application/msword"});const url=URL.createObjectURL(blob);const el=document.createElement("a");
  el.href=url;el.download="praxis-analysis-"+data.fn.replace(/\.[^.]+$/,"")+".doc";document.body.appendChild(el);el.click();document.body.removeChild(el);URL.revokeObjectURL(url);
}

function App(){

  const[tab,setTab]=useState("overview");const[ovr,setOvr]=useState({});

    if(!f)return;const x=f.name.split(".").pop().toLowerCase();
    if(!["xlsx","xls","csv"].includes(x)){setErr("Upload .xlsx, .xls, or .csv");return;}
    setLoading(true);setErr(null);
    const reader=new FileReader();
    reader.onload=e=>{
      const buf=new Uint8Array(e.target.result);
      parseWithWorker(buf,f.name).then(d=>{
        if(!d||!d.rows)setErr("Could not read data.");else{setData(d);setTab("overview");setOvr({});}
        setLoading(false);
      }).catch(er=>{
        // Fallback to main thread
        try{const d=pFile(buf,f.name);if(!d||!d.rows)setErr("Could not read data.");else{setData(d);setTab("overview");setOvr({});}}catch(e2){setErr("Error: "+e2.message);}
        setLoading(false);

  const cols=useMemo(()=>data?data.cols.map(c=>ovr[c.name]?{...c,type:ovr[c.name],ovrd:true}:c):[],[data,ovr]);

  const tabDefs=[

  // ── UPLOAD SCREEN ──

    <div style={{fontFamily:"'DM Sans',sans-serif",background:"linear-gradient(145deg,#060e1a 0%,#0B1A2E 40%,#0f2240 100%)",minHeight:"100vh",color:C.text,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"12px 28px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.off}`,flexWrap:'wrap'}}>
        <a href="../" style={{color:C.text2,fontSize:12,textDecoration:"none",display:"flex",alignItems:"center",gap:4,marginRight:4,opacity:.7}}><svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>Tools</a>
        <span style={{color:C.off}}>|</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:600,letterSpacing:".1em",color:C.teal}}>PRAXIS</span><span style={{color:C.text2,fontSize:13}}>Data Explorer</span>
        <span style={{marginLeft:"auto",fontSize:10,color:C.teal,background:"rgba(46,196,182,.1)",padding:"4px 14px",borderRadius:20,fontWeight:700,border:"1px solid rgba(46,196,182,.25)"}}>FREE &middot; OPEN SOURCE</span>
      </div>
      <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",padding:28}}>

            <input ref={fRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={e=>hFile(e.target.files[0])} aria-hidden="true" tabIndex={-1}/>
          </div>}
          {err&&<div className="fu" style={{marginTop:14,padding:"10px 14px",background:"rgba(232,93,93,.1)",borderRadius:8,color:C.error,fontSize:13,border:"1px solid rgba(232,93,93,.2)"}}>{err}</div>}
          <div className="fu" style={{marginTop:24,display:"flex",gap:16,justifyContent:"center",flexWrap:"wrap"}}>
            {["Frequencies & charts","Likert with reliability","Distribution analysis","Time series & trends","OLS & logistic regression","Cross-tabs with \u03c7\u00b2","Correlation matrix","Grouped aggregation","Word report export"].map(t=><span key={t} style={{fontSize:11,color:C.text2,display:"flex",alignItems:"center",gap:4}}><span style={{color:C.teal}}>&#10003;</span> {t}</span>)}
          </div>
          <div className="fu" style={{marginTop:28,fontSize:12,color:C.textTertiary,background:"rgba(255,255,255,.03)",border:`1px solid ${C.off}`,borderRadius:10,padding:"12px 18px",display:"inline-block"}}><strong style={{color:C.text2}}>Privacy first:</strong> All processing happens locally in your browser. Zero data transmission.</div>
        </div>
      </div>
    </div>
  );

  // ── ANALYSIS VIEW ──
  return(
    <div style={{fontFamily:"'DM Sans',sans-serif",background:C.navy,minHeight:"100vh",color:C.text}}>
      <div style={{background:"rgba(0,0,0,.2)",padding:"8px 24px",display:"flex",alignItems:"center",gap:10,borderBottom:`1px solid ${C.off}`,flexWrap:"wrap"}}>
        <a href="../" style={{color:C.text2,fontSize:11,textDecoration:"none",display:"flex",alignItems:"center",gap:3,opacity:.6}}><svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>Tools</a>
        <span style={{color:C.off}}>|</span><span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,letterSpacing:".1em",color:C.teal}}>PRAXIS</span><span style={{color:C.text2,fontSize:12}}>Data Explorer</span>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:10,flexWrap:'wrap'}}>
          <span style={{fontSize:11,color:C.textTertiary,maxWidth:180,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{data.fn}</span>
          <span style={{fontSize:10,color:C.text2}}>{data.rows.toLocaleString()} rows</span>
          <button onClick={()=>setShowExport(true)} style={{background:"rgba(46,196,182,.15)",border:"1px solid rgba(46,196,182,.3)",color:C.teal,padding:"4px 12px",borderRadius:6,fontSize:11,cursor:"pointer",fontWeight:600,fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}}>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><path d="M8 2v8m0 0l3-3m-3 3L5 7" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/><path d="M2 12v2h12v-2" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/></svg>Export \u25bc
          </button>
          <button onClick={()=>{setData(null);setErr(null);}} style={{background:"rgba(255,255,255,.06)",border:`1px solid ${C.off}`,color:C.text2,padding:"4px 12px",borderRadius:6,fontSize:11,cursor:"pointer",fontWeight:600,fontFamily:"inherit"}}>New file</button>
        </div>
      </div>

      <TabBar tabs={tabDefs} activeTab={tab} onChange={setTab}/>

      <div style={{padding:"16px 24px",maxWidth:1060,margin:"0 auto"}}>
        <div role="tabpanel" aria-labelledby={`tab-${tab}`} id={`panel-${tab}`}>

          {tab==="overview"&&<ErrorBoundary><OverviewTab data={data} cols={cols} a={a} setTab={setTab} ovr={ovr} setOvr={setOvr} tc={tc}/></ErrorBoundary>}
          {tab==="frequencies"&&<ErrorBoundary><FrequenciesTab a={a} setTab={setTab}/></ErrorBoundary>}
          {tab==="likert"&&<ErrorBoundary><LikertTab a={a} data={data} setTab={setTab}/></ErrorBoundary>}
          {tab==="numeric"&&<ErrorBoundary><NumericTab a={a} setTab={setTab}/></ErrorBoundary>}
          {tab==="crosstab"&&<ErrorBoundary><CrossTabTab cols={cols} a={a}/></ErrorBoundary>}
          {tab==="correlation"&&<ErrorBoundary><CorrelationTab a={a}/></ErrorBoundary>}
          {tab==="regression"&&<ErrorBoundary><RegressionTab cols={cols} a={a}/></ErrorBoundary>}
          {tab==="groupby"&&<ErrorBoundary><GroupByTab cols={cols} a={a} data={data}/></ErrorBoundary>}
          {tab==="timeseries"&&<ErrorBoundary><TimeSeriesTab cols={cols} a={a} data={data}/></ErrorBoundary>}
          {tab==="codebook"&&<ErrorBoundary><CodebookTab cols={cols} data={data}/></ErrorBoundary>}

        </div>
      </div>

      <div style={{textAlign:"center",padding:"16px",fontSize:10,color:C.textTertiary}}>
        PRAXIS Data Explorer v4 | Client-side only | <a href="https://emmanuelneneodjidja.org/praxis/" style={{color:C.tealD,textDecoration:"none"}}>emmanuelneneodjidja.org/praxis</a>
      </div>

      <ExportModal show={showExport} onClose={()=>setShowExport(false)} onExport={(sections)=>{exportToWord(data,cols,a,sections);setShowExport(false);}}/>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════════════
// MOUNT
// ═══════════════════════════════════════════════════════════════════════════

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
