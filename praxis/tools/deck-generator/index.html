<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deck Generator | PRAXIS Evaluation Toolkit</title>
<meta name="description" content="Evaluation deck generator. Inception and Findings briefs built from your Workbench project, with presenter mode, speaker notes, and print-quality PDF export.">
<meta property="og:title" content="Deck Generator | PRAXIS Evaluation Toolkit">
<meta property="og:description" content="Inception and Findings briefs built from your Workbench project, with presenter mode and print-quality PDF export.">
<meta property="og:url" content="https://www.emmanuelneneodjidja.org/praxis/tools/deck-generator/">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'">
<link rel="icon" type="image/svg+xml" href="../../logo.svg">
<link rel="alternate icon" type="image/png" href="../../logo-32.png">
<meta name="theme-color" content="#081221">
<link rel="stylesheet" href="../vendor/fonts/fonts.css">
<script defer src="../vendor/react.production.min.js"></script>
<script defer src="../vendor/react-dom.production.min.js"></script>
<style>
:root{
  /* PRAXIS toolkit canvas (shared with the Evaluation Workbench and Indicator Bank) */
  --chrome:#081221;
  --chrome-line:rgba(255,255,255,0.08);
  --chrome-text:#E7EDF5;
  --chrome-dim:#9FB0C6;
  --bg:#FAFBFC;
  --surface:#FFFFFF;
  --surface-muted:#F8FAFC;
  --border:#E2E8F0;
  --border-strong:#CBD5E1;
  --ink:#0B1A2E;
  --text:#101827;
  --text-2:#3F4C61;
  --text-3:#64748B;
  --teal:#2EC4B6;
  --teal-ink:#0F766E;
  --teal-deep:#115E59;
  --amber-text:#92400E;
  --amber-border:#FDBA74;
  --amber-bg:#FFF7ED;
  --red:#B91C1C;
  --red-bg:#FEE2E2;
  --font-sans:'DM Sans',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',ui-monospace,monospace;
  --font-display:'Fraunces',Georgia,serif;
  --shadow-md:0 2px 8px rgba(11,26,46,.08);
  --shadow-lg:0 8px 28px rgba(11,26,46,.14);
  /* Slide paper (the deck artifact, slightly warm against the cool app canvas) */
  --paper:#FBFAF8;
  --paper-line:#E5E1D8;
  --paper-line-strong:#C9C3B4;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit}
input,textarea,select{font-family:inherit;color:inherit}
a{color:var(--teal-ink);text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px}
a:hover{color:var(--teal-deep)}
::selection{background:var(--ink);color:#fff}
:focus-visible{outline:2px solid var(--teal-ink);outline-offset:2px}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* ================= Top chrome ================= */
.topbar{min-height:52px;background:var(--chrome);border-bottom:1px solid var(--chrome-line);display:flex;align-items:stretch;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:100}
.topbar-brand{display:flex;align-items:center;gap:12px;color:var(--chrome-text);font-size:13.5px;font-weight:600;text-decoration:none;padding:12px 0}
.topbar-brand:hover{color:#fff}
.wordmark{font-family:var(--font-mono);font-size:11px;font-weight:700;letter-spacing:0.18em;color:var(--teal)}
.brand-rule{width:1px;height:15px;background:rgba(255,255,255,0.18)}
.topbar-links{display:flex;gap:22px;align-items:center}
.topbar-links a{font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--chrome-dim);text-decoration:none}
.topbar-links a:hover{color:var(--chrome-text);text-decoration:underline;text-underline-offset:3px}

/* ================= Home ================= */
.main{max-width:1020px;margin:0 auto;padding:48px 32px 80px}
.eyebrow{font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.16em;text-transform:uppercase;color:var(--teal-ink);margin-bottom:14px}
.masthead-title{font-family:var(--font-display);font-weight:600;font-size:38px;line-height:1.08;letter-spacing:-0.01em;color:var(--ink);margin-bottom:12px;text-wrap:balance}
.masthead-sub{font-size:15px;line-height:1.6;color:var(--text-2);max-width:66ch;text-wrap:pretty;margin-bottom:26px}
.ledger{display:flex;flex-wrap:wrap;row-gap:6px;border-top:2px solid var(--ink);border-bottom:1px solid var(--border-strong);padding:10px 0;margin-bottom:34px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);font-variant-numeric:tabular-nums}
.ledger-seg{display:inline-flex;align-items:center;gap:6px;padding:0 16px;border-left:1px solid var(--border)}
.ledger-seg:first-child{border-left:none;padding-left:0}
.ledger-seg strong{color:var(--ink);font-weight:600}
.ledger-seg a{color:var(--teal-ink)}
.deck-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:22px}
.deck-card{background:var(--surface);border:1px solid var(--border-strong);border-radius:3px;padding:24px 24px 18px;text-align:left;display:flex;flex-direction:column;transition:border-color .12s;position:relative}
.deck-card:hover{border-color:var(--ink)}
.deck-card:hover .deck-card-go{color:var(--ink)}
.deck-card-badge{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:12px}
.deck-card h3{font-family:var(--font-display);font-size:23px;font-weight:600;color:var(--ink);margin-bottom:8px;letter-spacing:-0.01em}
.deck-card .deck-card-sub{font-size:13.5px;color:var(--text-2);line-height:1.55;margin-bottom:18px;flex:1}
.deck-card .deck-card-meta{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--border);font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);font-variant-numeric:tabular-nums}
.deck-card-go{color:var(--text-3);display:flex;transition:color .12s}
.home-divider{display:flex;align-items:center;gap:12px;margin:26px 0 18px;color:var(--text-3);font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase}
.home-divider::before,.home-divider::after{content:"";flex:1;height:1px;background:var(--border)}
.start-own{display:flex;align-items:center;justify-content:space-between;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:16px 20px;width:100%;text-align:left;transition:border-color .12s}
.start-own:hover{border-color:var(--ink)}
.start-own .so-title{display:block;font-size:14px;font-weight:600;color:var(--ink);margin-bottom:3px}
.start-own .so-desc{display:block;font-size:12.5px;color:var(--text-2);line-height:1.5}
.home-foot{margin-top:22px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.06em;color:var(--text-3)}
.home-foot kbd{display:inline-block;padding:1px 6px;border-radius:2px;font-size:10px;background:var(--surface);border:1px solid var(--border-strong);font-family:var(--font-mono);color:var(--text)}

/* ================= Setup form ================= */
.setup-wrap{max-width:720px;margin:0 auto;padding:48px 32px 80px}
.setup-card{background:var(--surface);border:1px solid var(--border-strong);border-radius:3px;padding:22px 24px;margin-bottom:16px}
.setup-card h3{font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--ink)}
.setup-card h3 .hint{font-family:var(--font-mono);font-weight:400;color:var(--text-3);letter-spacing:0.06em;text-transform:none;font-size:10px;margin-left:8px}
.setup-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.setup-row.one{grid-template-columns:1fr}
.setup-field label{display:block;font-family:var(--font-mono);font-size:9.5px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);margin-bottom:6px}
.setup-field input,.setup-field select,.setup-field textarea{width:100%;padding:9px 11px;border:1px solid var(--border-strong);border-radius:3px;font-size:13.5px;color:var(--text);background:var(--surface);transition:border-color .12s,box-shadow .12s}
.setup-field input:focus,.setup-field select:focus,.setup-field textarea:focus{outline:none;border-color:var(--teal-ink);box-shadow:0 0 0 3px rgba(46,196,182,.18)}
.eq-row-setup{display:grid;grid-template-columns:1fr 160px 34px;gap:10px;margin-bottom:8px;align-items:start}
.eq-row-setup textarea{min-height:42px;font-size:12.5px;padding:7px 10px;resize:vertical;border:1px solid var(--border-strong);border-radius:3px;width:100%}
.eq-row-setup textarea:focus{outline:none;border-color:var(--teal-ink);box-shadow:0 0 0 3px rgba(46,196,182,.18)}
.eq-row-setup select{padding:8px 10px;font-size:12.5px;border:1px solid var(--border-strong);border-radius:3px;width:100%;background:var(--surface)}
.eq-remove{background:var(--surface);border:1px solid var(--border-strong);border-radius:3px;color:var(--text-3);width:34px;height:34px;display:flex;align-items:center;justify-content:center;transition:border-color .12s,color .12s}
.eq-remove:hover:not(:disabled){border-color:var(--red);color:var(--red)}
.eq-remove:disabled{opacity:.4;cursor:not-allowed}
.eq-add{display:inline-flex;align-items:center;gap:7px;padding:8px 13px;border:1px dashed var(--border-strong);border-radius:3px;font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-2);background:transparent;transition:border-color .12s,color .12s}
.eq-add:hover{border-color:var(--teal-ink);color:var(--teal-ink)}
.setup-actions{display:flex;justify-content:space-between;align-items:center;margin-top:22px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:3px;background:var(--surface);border:1px solid var(--border-strong);font-family:var(--font-mono);font-size:10.5px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink);transition:border-color .12s,background .12s,color .12s;white-space:nowrap}
.btn:hover{border-color:var(--ink)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:#122240}
.btn.primary:disabled{background:var(--border-strong);border-color:var(--border-strong);cursor:not-allowed}
.btn.quiet{background:transparent;border-color:transparent;color:var(--text-3)}
.btn.quiet:hover{color:var(--ink);border-color:var(--border-strong)}

/* ================= Editor ================= */
.editor-wrap{max-width:1240px;margin:0 auto;padding:20px 24px 80px}
.editor-toolbar{position:sticky;top:52px;z-index:60;background:rgba(250,251,252,.94);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);display:flex;align-items:center;gap:8px;padding:10px 0;margin-bottom:6px;border-bottom:1px solid var(--border-strong)}
.editor-toolbar .deck-label{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--ink);margin-right:4px}
.editor-toolbar .tsep{width:1px;height:18px;background:var(--border-strong);margin:0 6px}
.editor-toolbar .tspacer{flex:1}
.editor-annot{font-family:var(--font-mono);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);padding:8px 0 18px;display:flex;align-items:center;gap:8px}
.editor-annot .dot{width:6px;height:6px;background:var(--teal-ink);flex-shrink:0}
.slide-wrap{display:flex;flex-direction:column;gap:8px;margin-bottom:30px}
.slide-meta{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);font-variant-numeric:tabular-nums}
.slide-meta .snum{font-weight:700;color:var(--ink)}
.slide-scale{display:flex;justify-content:center}
.slide-scale-inner{transform-origin:top left}

/* ================= Slide canvas: the monograph ================= */
.slide-canvas{width:1280px;height:720px;background:var(--paper);color:var(--text);display:flex;flex-direction:column;position:relative;overflow:hidden;font-family:var(--font-sans);border:1px solid var(--border);box-shadow:var(--shadow-md)}
.slide-canvas .s-head{display:flex;align-items:baseline;justify-content:space-between;padding:30px 56px 0}
.slide-canvas .s-eyebrow{font-family:var(--font-mono);font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--teal-ink);font-variant-numeric:tabular-nums}
.slide-canvas .s-mark{font-family:var(--font-mono);font-size:10.5px;font-weight:700;letter-spacing:0.18em;color:var(--paper-line-strong);text-transform:uppercase}
.slide-canvas .s-rule{height:2px;background:var(--ink);margin:12px 56px 0}
.slide-canvas .s-body{flex:1;padding:26px 56px 20px;display:flex;flex-direction:column;min-height:0}
.slide-canvas .s-foot{display:flex;justify-content:space-between;align-items:center;padding:0 56px 22px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-3);font-variant-numeric:tabular-nums}
.slide-canvas .s-foot::before{content:"";position:absolute;left:56px;right:56px;bottom:52px;height:1px;background:var(--paper-line)}
.slide-canvas h2.headline{font-family:var(--font-display);font-size:34px;font-weight:600;color:var(--ink);letter-spacing:-0.01em;line-height:1.12;margin-bottom:10px;max-width:1050px;text-wrap:balance}
.slide-canvas .lede{font-size:15px;color:var(--text-2);line-height:1.55;margin-bottom:20px;max-width:920px}

/* Ink slides (cover, dividers, Q&A) */
.slide-canvas.ink{background:var(--chrome);color:var(--chrome-text);border-color:var(--chrome);justify-content:center;align-items:center;text-align:center;padding:0 120px}
.slide-canvas.ink .ink-eyebrow{font-family:var(--font-mono);font-size:12px;font-weight:500;letter-spacing:0.22em;color:var(--teal);text-transform:uppercase;margin-bottom:22px}
.slide-canvas.ink h2{font-family:var(--font-display);font-size:54px;font-weight:600;line-height:1.1;letter-spacing:-0.015em;margin-bottom:22px;text-wrap:balance}
.slide-canvas.ink .ink-rule{width:56px;height:2px;background:var(--teal);margin:0 auto 22px}
.slide-canvas.ink .ink-sub{font-size:16px;color:var(--chrome-dim);max-width:640px;line-height:1.55;margin:0 auto}
.slide-canvas.ink .ink-foot{position:absolute;bottom:22px;left:120px;right:120px;display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:rgba(231,237,245,.38);font-variant-numeric:tabular-nums}
.slide-canvas.ink .dial{position:absolute;top:-160px;right:-160px;pointer-events:none}

/* Param panels (hairline, no glow) */
.param-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.param-grid.cols-2{grid-template-columns:1fr 1fr}
.param-grid.cols-4{grid-template-columns:repeat(4,1fr)}
.param{background:#fff;border:1px solid var(--paper-line);border-radius:2px;padding:13px 15px}
.param .k{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px}
.param .v{font-size:15px;font-weight:600;color:var(--ink);line-height:1.35}
.param .v.num{font-family:var(--font-mono);font-size:24px;font-weight:700;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.param.caution{border-left:2px solid var(--amber-border)}

/* Ledger tables on slides */
.ltable{display:flex;flex-direction:column}
.ltable .lrow{display:grid;gap:14px;padding:10px 2px;border-bottom:1px solid var(--paper-line);align-items:baseline;font-size:13.5px;line-height:1.45}
.ltable .lrow.lhead{border-top:2px solid var(--ink);border-bottom:1px solid var(--paper-line-strong);padding:7px 2px}
.ltable .lrow.lhead span{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3)}
.ltable .lnum{font-family:var(--font-mono);font-size:11.5px;font-weight:700;color:var(--teal-ink);font-variant-numeric:tabular-nums}
.ltable .lstrong{font-weight:600;color:var(--ink)}
.ltable .lmono{font-family:var(--font-mono);font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums}

/* Agenda */
.agenda-grid{list-style:none;display:grid;grid-template-columns:1fr 1fr;column-gap:56px;row-gap:0;margin-top:6px}
.agenda-grid li{display:flex;align-items:baseline;gap:16px;padding:11px 2px;border-bottom:1px solid var(--paper-line);font-size:15px}
.agenda-grid li .an{font-family:var(--font-mono);font-size:11.5px;font-weight:700;color:var(--teal-ink);min-width:26px;font-variant-numeric:tabular-nums}
.agenda-grid li .at{color:var(--text);font-weight:500}

/* Criterion tag */
.crit-tag{display:inline-flex;align-items:center;gap:7px;font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-2);white-space:nowrap}
.crit-tag .sq{width:7px;height:7px;background:var(--teal-ink);flex-shrink:0}

/* Rating scale */
.rating{display:inline-flex;align-items:center;gap:10px}
.rating .cells{display:inline-flex;gap:3px}
.rating .cell{width:13px;height:13px;border:1px solid var(--paper-line-strong);background:transparent}
.rating .cell.on-4{background:var(--teal-ink);border-color:var(--teal-ink)}
.rating .cell.on-3{background:var(--ink);border-color:var(--ink)}
.rating .cell.on-2{background:#D97706;border-color:#D97706}
.rating .cell.on-1{background:var(--red);border-color:var(--red)}
.rating .band{font-family:var(--font-mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700}
.rating .band.b4{color:var(--teal-ink)}
.rating .band.b3{color:var(--ink)}
.rating .band.b2{color:var(--amber-text)}
.rating .band.b1{color:var(--red)}
.rating.editable .cell{cursor:pointer}
.rating.editable .cell:hover{border-color:var(--ink)}

/* Evidence chip */
.ev-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-3);white-space:nowrap}
.ev-chip .sq{width:7px;height:7px;flex-shrink:0}
.ev-chip.strong .sq{background:var(--teal-ink)}
.ev-chip.moderate .sq{background:#D97706}
.ev-chip.limited .sq{background:var(--paper-line-strong)}

/* Headline findings */
.hf-row{display:grid;grid-template-columns:44px 1fr 150px;gap:18px;padding:15px 2px;border-bottom:1px solid var(--paper-line);align-items:start}
.hf-row .hf-num{font-family:var(--font-mono);font-size:12px;font-weight:700;color:var(--teal-ink);padding-top:6px;font-variant-numeric:tabular-nums}
.hf-row .hf-title{font-family:var(--font-display);font-size:20.5px;font-weight:600;color:var(--ink);line-height:1.22;letter-spacing:-0.005em;margin-bottom:5px}
.hf-row .hf-body{font-size:13px;color:var(--text-2);line-height:1.5;max-width:820px}
.hf-row .hf-side{display:flex;justify-content:flex-end;padding-top:8px}

/* Criterion findings layout */
.crit-cols{display:grid;grid-template-columns:400px 1fr;gap:36px;flex:1;min-height:0}
.crit-block-label{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px;padding-bottom:5px;border-bottom:2px solid var(--ink)}
.crit-eq-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--paper-line);font-size:12.5px;line-height:1.45;color:var(--text-2)}
.crit-eq-item .n{font-family:var(--font-mono);font-size:10.5px;font-weight:700;color:var(--teal-ink);flex-shrink:0;padding-top:1px}
.crit-body{font-size:13.5px;line-height:1.6;color:var(--text-2)}
.crit-body strong{color:var(--ink)}

/* Effect-size interval plot */
.fx-plot .fx-zero{stroke:var(--paper-line-strong);stroke-width:1;stroke-dasharray:3 3}
.fx-plot .fx-axis{stroke:var(--paper-line);stroke-width:1}
.fx-plot .fx-ci{stroke-width:2}
.fx-plot .fx-ci.sig{stroke:var(--teal-ink)}
.fx-plot .fx-ci.ns{stroke:#D97706}
.fx-plot .fx-dot.sig{fill:var(--teal-ink)}
.fx-plot .fx-dot.ns{fill:#D97706}
.fx-plot .fx-label{font-family:var(--font-sans);font-size:12.5px;font-weight:500;fill:var(--text)}
.fx-plot .fx-eq{font-family:var(--font-mono);font-size:10px;fill:var(--text-3)}
.fx-plot .fx-val{font-family:var(--font-mono);font-size:11.5px;font-weight:700;fill:var(--ink)}
.fx-plot .fx-tick{font-family:var(--font-mono);font-size:9.5px;fill:var(--text-3)}

/* Sample achievement bars */
.ach-row{display:grid;grid-template-columns:210px 1fr 190px;gap:18px;align-items:center;padding:13px 2px;border-bottom:1px solid var(--paper-line)}
.ach-row .ach-name{font-weight:600;color:var(--ink);font-size:14px}
.ach-row .ach-name .sub{display:block;font-weight:400;font-size:11.5px;color:var(--text-3);margin-top:2px}
.ach-track{position:relative;height:18px;background:transparent;border:1px solid var(--paper-line-strong)}
.ach-fill{position:absolute;top:0;left:0;bottom:0;background:var(--ink)}
.ach-nums{font-family:var(--font-mono);font-size:12px;color:var(--text-2);font-variant-numeric:tabular-nums;text-align:right}
.ach-nums strong{color:var(--ink);font-weight:700}

/* ToC tree (ink on paper) */
.toc-tree .col-label{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;fill:var(--text-3)}
.toc-tree .col-count{font-family:var(--font-mono);font-size:10px;fill:var(--paper-line-strong)}
.toc-tree .node-box{fill:#fff;stroke:var(--paper-line-strong);stroke-width:1}
.toc-tree .node-box.impact{fill:var(--ink);stroke:var(--ink)}
.toc-tree .node-box.outcome{fill:#fff;stroke:var(--teal-ink)}
.toc-tree .node-box.output{fill:#fff;stroke:var(--paper-line-strong)}
.toc-tree .node-box.activity{fill:var(--paper);stroke:var(--paper-line)}
.toc-tree .link{stroke:var(--paper-line);stroke-width:1;fill:none}
.toc-tree .overflow-chip{fill:var(--paper);stroke:var(--paper-line);stroke-width:1;stroke-dasharray:3 3}
.toc-tree .overflow-text{font-family:var(--font-mono);font-size:10px;fill:var(--text-3)}

/* Evaluability */
.eval-layout{display:grid;grid-template-columns:400px 1fr;gap:40px;align-items:start;flex:1;min-height:0}
.eval-hero{display:flex;align-items:baseline;gap:12px}
.eval-hero .sval{font-family:var(--font-mono);font-size:84px;font-weight:700;color:var(--ink);line-height:1;letter-spacing:-0.04em;font-variant-numeric:tabular-nums}
.eval-hero .scap{font-family:var(--font-mono);font-size:15px;color:var(--text-3)}
.eval-band{display:inline-flex;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:5px 10px;border:1px solid;border-radius:2px;margin-top:14px}
.eval-band.high{color:var(--teal-ink);border-color:var(--teal-ink)}
.eval-band.moderate{color:var(--amber-text);border-color:var(--amber-border);background:var(--amber-bg)}
.eval-band.low{color:var(--red);border-color:var(--red)}
.eval-blockers{margin-top:22px;padding-top:14px;border-top:2px solid var(--ink)}
.eval-blockers .bk{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:8px}
.eval-blockers .bitem{font-size:13px;color:var(--text-2);padding:5px 0;display:flex;gap:9px;align-items:baseline;line-height:1.5}
.eval-blockers .bitem::before{content:"";width:7px;height:7px;background:#D97706;flex-shrink:0;transform:translateY(1px)}
.eval-radar svg{width:100%;height:auto;max-height:470px}
.eval-radar .axis{stroke:var(--paper-line);stroke-width:1;fill:none}
.eval-radar .ring{stroke:var(--paper-line);stroke-width:1;stroke-dasharray:3 3;fill:none}
.eval-radar .poly{fill:rgba(15,118,110,.12);stroke:var(--teal-ink);stroke-width:1.5}
.eval-radar .pt{fill:var(--teal-ink);stroke:var(--paper);stroke-width:2}
.eval-radar .alabel{font-family:var(--font-sans);font-size:11.5px;font-weight:600;fill:var(--ink)}
.eval-radar .ascore{font-family:var(--font-mono);font-size:10px;fill:var(--text-3)}

.gantt{display:grid;grid-template-columns:170px repeat(12,1fr);gap:2px;margin-top:8px}
.gantt .gh{padding:6px 4px;font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-3);text-align:center}
.gantt .gh.label-col{text-align:left;padding-left:2px}
.gantt .phase-label{padding:9px 2px;font-size:13px;font-weight:600;color:var(--ink);display:flex;align-items:center;border-top:1px solid var(--paper-line)}
.gantt .phase-cell{height:34px;background:#fff;border:1px solid var(--paper-line)}
.gantt .phase-cell.on{background:var(--ink);border-color:var(--ink)}
.gantt.editable .phase-cell{cursor:pointer}
.gantt.editable .phase-cell:hover{border-color:var(--ink)}

/* Sampling */
.samp-bar-row{display:grid;grid-template-columns:200px 1fr 64px;align-items:center;gap:14px;padding:9px 2px;border-bottom:1px solid var(--paper-line);font-size:13px}
.samp-bar-row .method{font-weight:500;color:var(--text)}
.samp-bar-row .bar{position:relative;height:13px;border:1px solid var(--paper-line-strong)}
.samp-bar-row .bar-fill{position:absolute;top:0;left:0;bottom:0;background:var(--teal-ink)}
.samp-bar-row .count{font-family:var(--font-mono);font-weight:700;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums}

.edit-on .etext{cursor:text;border-radius:2px}
.edit-on .etext:hover{box-shadow:0 0 0 1px var(--teal-ink);}
.etext-input{width:100%;background:#fff;border:1px solid var(--teal-ink);border-radius:2px;padding:4px 6px;font:inherit;color:inherit;line-height:inherit;letter-spacing:inherit;resize:vertical;box-shadow:0 0 0 3px rgba(46,196,182,.15)}
.etext-empty{color:var(--text-3);font-style:italic}

/* ================= Presenter ================= */
body.presenting{background:#000;overflow:hidden}
.presenter-root{position:fixed;inset:0;background:#000;z-index:1000;display:flex;align-items:center;justify-content:center}
.presenter-root .stage{position:relative;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh}
.presenter-root .click-zone{position:absolute;top:0;bottom:0;width:50%;z-index:2;cursor:pointer}
.presenter-root .click-zone.left{left:0}
.presenter-root .click-zone.right{right:0}
.presenter-root .hud{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;padding:9px 16px;background:rgba(8,18,33,.85);backdrop-filter:blur(12px);border:1px solid var(--chrome-line);border-radius:3px;color:var(--chrome-dim);font-family:var(--font-mono);font-size:10.5px;letter-spacing:0.06em;opacity:0;transition:opacity .2s;z-index:3;pointer-events:none;text-transform:uppercase}
.presenter-root:hover .hud{opacity:1}
.presenter-root .hud .hkey{background:rgba(255,255,255,.1);padding:2px 6px;border-radius:2px;font-size:10px;color:var(--chrome-text)}
.presenter-root .hud .hsep{opacity:.3}
.presenter-root .slide-canvas{box-shadow:none;border:none}

/* Speaker view */
.speaker-root{position:fixed;inset:0;background:var(--chrome);z-index:1000;color:var(--chrome-text);display:grid;grid-template-columns:1.2fr 1fr;grid-template-rows:1fr auto;gap:20px;padding:24px}
.speaker-root .sv-main{display:flex;align-items:center;justify-content:center;overflow:hidden}
.speaker-root .sv-side{display:flex;flex-direction:column;gap:16px;min-width:0}
.speaker-root .sv-notes{background:rgba(255,255,255,.04);border:1px solid var(--chrome-line);border-radius:3px;padding:18px 22px;flex:1;min-height:0;overflow-y:auto}
.speaker-root .sv-notes-title{font-family:var(--font-mono);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
.speaker-root .sv-next{border:1px solid var(--chrome-line);border-radius:3px;padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.speaker-root .sv-next .nlab{font-family:var(--font-mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--chrome-dim)}
.speaker-root .sv-next .ntitle{font-size:14px;font-weight:600}
.speaker-root .sv-bottom{grid-column:1 / -1;display:flex;justify-content:space-between;align-items:center;color:var(--chrome-dim);font-family:var(--font-mono);font-size:11px;font-variant-numeric:tabular-nums}
.speaker-root .sv-clock{font-size:15px;font-weight:700;color:var(--chrome-text)}

/* Overview */
.overview-root{position:fixed;inset:0;background:var(--chrome);z-index:1000;display:flex;flex-direction:column;padding:28px}
.overview-title{color:var(--chrome-text);font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;margin-bottom:18px}
.overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;overflow-y:auto;padding-bottom:20px}
.overview-thumb{background:transparent;border:1px solid var(--chrome-line);border-radius:3px;overflow:hidden;cursor:pointer;transition:border-color .12s}
.overview-thumb:hover{border-color:var(--teal)}
.overview-thumb.active{border-color:var(--teal)}
.overview-thumb .olabel{color:var(--chrome-dim);font-family:var(--font-mono);font-size:10px;padding:7px 10px;background:var(--chrome);border-top:1px solid var(--chrome-line);letter-spacing:0.04em}
.overview-thumb .olabel .on{color:var(--teal);font-weight:700;margin-right:7px;font-variant-numeric:tabular-nums}

/* Shortcuts modal */
.shortcuts-modal{position:fixed;inset:0;background:rgba(8,18,33,.55);z-index:200;display:flex;align-items:center;justify-content:center}
.shortcuts-modal .smbody{background:var(--surface);border:1px solid var(--border-strong);border-radius:3px;padding:24px 28px;max-width:420px;width:92%;box-shadow:var(--shadow-lg)}
.shortcuts-modal h3{font-family:var(--font-mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink);margin-bottom:14px;padding-bottom:9px;border-bottom:2px solid var(--ink)}
.shortcuts-modal .shrow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-2)}
.shortcuts-modal .shrow:last-child{border-bottom:none}
.shortcuts-modal kbd{display:inline-block;padding:2px 8px;border-radius:2px;background:var(--surface-muted);border:1px solid var(--border-strong);font-family:var(--font-mono);font-size:10.5px;font-weight:600;color:var(--ink)}

/* ================= Print ================= */
@media print {
  @page { size: A4 landscape; margin: 0 }
  body { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact }
  .topbar, .editor-toolbar, .editor-annot, .slide-meta, .hud, .presenter-root .click-zone, .shortcuts-modal { display: none !important }
  .editor-wrap { max-width: none; padding: 0; margin: 0 }
  .slide-wrap { margin: 0; break-inside: avoid; page-break-inside: avoid; page-break-after: always }
  .slide-wrap:last-child { page-break-after: auto }
  .slide-scale { margin: 0; padding: 0 }
  .slide-scale-inner { transform: none !important; width: 100% !important; height: auto !important; margin-bottom: 0 !important }
  .slide-canvas { width: 100%; height: auto; aspect-ratio: 16 / 9; border: none; box-shadow: none; page-break-inside: avoid }
  .slide-canvas, .slide-canvas * { -webkit-print-color-adjust: exact; print-color-adjust: exact }
  .edit-on .etext:hover { box-shadow: none }
}

@media (max-width: 900px){
  .deck-cards{grid-template-columns:1fr}
  .main{padding:36px 20px 60px}
  .topbar{padding:0 18px}
}
