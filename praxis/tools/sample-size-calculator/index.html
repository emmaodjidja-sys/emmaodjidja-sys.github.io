<style>
/* ── CSS Custom Properties ──────────────────────────────────────── */
:root {
  --p-navy: #0B1A2E;
  --p-navy-mid: #122240;
  --p-teal: #2EC4B6;
  --p-teal-dark: #1a9e92;

  --p-surface: #FFFFFF;

  --p-text2: #64748B;
  --p-text3: #94A3B8;
  --p-border: #E2E8F0;
  --p-border2: #CBD5E1;
  --p-error: #EF4444;
  --p-error-bg: rgba(239,68,68,0.06);
  --p-warning: #F59E0B;
  --p-warning-bg: rgba(245,158,11,0.06);
  --p-warning-border: rgba(245,158,11,0.25);
  --p-success: #10B981;
  --p-success-bg: rgba(16,185,129,0.06);
  --p-font: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --p-shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --p-shadow-lg: 0 4px 12px rgba(0,0,0,0.08);
  --p-focus: 0 0 0 2px var(--p-teal), 0 0 0 4px rgba(46,196,182,0.25);
  --p-transition: 0.2s ease;
}

/* ── Reset & Base ───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--p-font); font-size: 14px; color: var(--p-text); background: var(--p-bg); line-height: 1.6; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; cursor: pointer; border: none; background: none; font-size: inherit; }

:focus-visible { outline: none; box-shadow: var(--p-focus); border-radius: var(--p-radius-sm); }

/* ── Topbar ─────────────────────────────────────────────────────── */
.topbar { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 10px 24px; background: rgba(250,251,252,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--p-border); }

  .main-content { padding: 0 16px 120px; }
  .results-card .rc-big { font-size: 32px; }

  .design-grid { grid-template-columns: 1fr; }
  .ctx-grid { grid-template-columns: 1fr; }
}

<script>

/* ── Strings (localisation-ready) ─────────────────────────────── */

  title: 'Sample Size Calculator',

  sections: { quant: 'Quantitative Sample Size', qual: 'Qualitative Sample Planning', combined: 'Combined Sample Plan' },

/* ── Utility: inverse normal CDF ──────────────────────────────── */
function zScore(p){if(p<=0||p>=1)return 0;var a1=-39.69683028665376,a2=220.9460984245205,a3=-275.9285104469687,a4=138.357751867269,a5=-30.66479806614716,a6=2.506628277459239,b1=-54.47609879822406,b2=161.5858368580409,b3=-155.6989798598866,b4=66.80131188771972,b5=-13.28068155288572,c1=-0.007784894002430293,c2=-0.3223964580411365,c3=-2.400758277161838,c4=-2.549732539343734,c5=4.374664141464968,c6=2.938163982698783,d1=0.007784695709041462,d2=0.3224671290700398,d3=2.445134137142996,d4=3.754408661907416,pL=0.02425,pH=1-pL,q,r;if(p<pL){q=Math.sqrt(-2*Math.log(p));return(((((c1*q+c2)*q+c3)*q+c4)*q+c5)*q+c6)/((((d1*q+d2)*q+d3)*q+d4)*q+1);}else if(p<=pH){q=p-0.5;r=q*q;return(((((a1*r+a2)*r+a3)*r+a4)*r+a5)*r+a6)*q/(((((b1*r+b2)*r+b3)*r+b4)*r+b5)*r+1);}else{q=Math.sqrt(-2*Math.log(1-p));return -(((((c1*q+c2)*q+c3)*q+c4)*q+c5)*q+c6)/((((d1*q+d2)*q+d3)*q+d4)*q+1);}}

function binP(n,k,p){var c=1;for(var i=0;i<k;i++)c*=(n-i)/(i+1);return c*Math.pow(p,k)*Math.pow(1-p,n-k);}

/* Non-central t CDF approximation for ITS power */
function ntCDF(t,df,ncp){
  /* Patnaik approximation */
  var v = df;
  var x = t - ncp;
  var p = 0.5 * (1 + erf(x / Math.sqrt(2 * (1 + ncp*ncp/(2*v)))));
  return p;
}
function erf(x){var a1=0.254829592,a2=-0.284496736,a3=1.421413741,a4=-1.453152027,a5=1.061405429,p=0.3275911;var s=1;if(x<0)s=-1;x=Math.abs(x);var t=1/(1+p*x);var y=1-(((((a5*t+a4)*t)+a3)*t+a2)*t+a1)*t*Math.exp(-x*x);return s*y;}

/* ── Calculators ──────────────────────────────────────────────── */
var calc = {
  singleProportion: function(p) {
    var z=getZ(p.alpha),pr=p.proportion/100,d=p.precision/100;

  twoProportions: function(p) {
    var za=getZ(p.alpha),zb=getZB(p.power),r1=p.p1/100,r2=p.p2/100;

    /* Yates continuity correction */
    if (p.continuityCorrection && n1 < 30) {
      n1 = Math.ceil(n1/4 * Math.pow(1 + Math.sqrt(1 + 4/(n1*Math.abs(r1-r2))), 2));
    }
    var n2=Math.ceil(n1*p.ratio);
    var f1=Math.ceil(n1/(1-p.nonResponse/100)),f2=Math.ceil(n2/(1-p.nonResponse/100));

  },
  twoMeans: function(p) {
    var za=getZ(p.alpha),zb=getZB(p.power);
    var n1=Math.ceil(Math.pow(za+zb,2)*p.sd*p.sd*(1+1/p.ratio)/(p.delta*p.delta));
    var n2=Math.ceil(n1*p.ratio);
    var f1=Math.ceil(n1/(1-p.nonResponse/100)),f2=Math.ceil(n2/(1-p.nonResponse/100));
    return {n1:n1,n2:n2,final1:f1,final2:f2,finalTotal:f1+f2,primary:f1+f2,label:'respondents'};
  },
  clusterRCT: function(p) {
    var za=getZ(p.alpha),zb=getZB(p.power),r1=p.p1/100,r2=p.p2/100;
    var nI=Math.ceil(Math.pow(za+zb,2)*(r1*(1-r1)+r2*(1-r2))/Math.pow(r1-r2,2));
    var deff=1+(p.clusterSize-1)*p.icc;
    var deffAdj=deff*(1+p.clusterSizeCV*p.clusterSizeCV);
    var nC=Math.ceil(nI*deffAdj);
    var cpa=Math.ceil(nC/p.clusterSize);
    var tpa=cpa*p.clusterSize;
    var fpa=Math.ceil(tpa/(1-p.nonResponse/100));

  },
  clusterSurvey: function(p) {
    var z=getZ(p.alpha),pr=p.proportion/100,d=p.precision/100;
    var nB=Math.ceil(z*z*pr*(1-pr)/(d*d));
    var nD=Math.ceil(nB*p.deff);
    var cl=Math.ceil(nD/p.clusterSize);
    var tot=cl*p.clusterSize;
    var fin=Math.ceil(tot/(1-p.nonResponse/100));

  },
  steppedWedge: function(p) {

    var deSW=num/den;
    var nP=Math.ceil(Math.pow(za+zb,2)*poolVar/(eff*eff));
    var deff=1+(m-1)*rho;
    var deffAdj=deff*(1+p.clusterSizeCV*p.clusterSizeCV);
    var nPC=Math.ceil(nP*deffAdj);
    var totC=Math.ceil(nPC*deSW/m);
    var cps=Math.max(1,Math.ceil(totC/K));
    var ac=cps*K;
    var totN=ac*m*T;
    var fin=Math.ceil(totN/(1-p.nonResponse/100));
    return {deff:deff.toFixed(2),deffAdj:deffAdj.toFixed(2),deSwFactor:deSW.toFixed(3),totalClusters:ac,clustersPerStep:cps,periods:T,final:fin,primary:fin,label:'observations'};
  },
  lqas: function(p) {
    var uT=p.upperThreshold/100,lT=p.lowerThreshold/100;
    var found=false,bN=0,bD=0,bA=0,bB=0;

  did: function(p) {
    var za=getZ(p.alpha),zb=getZB(p.power);
    var nB=Math.ceil(Math.pow(za+zb,2)*2*p.sd*p.sd/(p.delta*p.delta));
    var nA=Math.ceil(nB*(1-p.rSquared));
    var pgp=Math.ceil(nA/p.periods);

  }
};

/* ── Feasibility checks ──────────────────────────────────────── */
function checkFeasibility(designId, result) {
  var warnings = [];
  if (designId === 'clusterRCT' && result.clustersPerArm > 30) {
    warnings.push('This design requires ' + result.clustersPerArm + ' clusters per arm (' + result.totalClusters + ' total). Most health evaluations in LMIC settings have fewer than 30 clusters per arm. Consider: reducing the detectable effect, using a stepped-wedge design, or a quasi-experimental approach.');
  }
  if (designId === 'steppedWedge' && (result.totalClusters > 50 || result.periods > 8)) {
    warnings.push('This design requires ' + result.totalClusters + ' clusters across ' + result.periods + ' periods. This may exceed implementation capacity. Consider reducing steps or increasing cluster size.');
  }
  if (designId === 'did' && result.perGroupPerPeriod < 30) {
    warnings.push('Each group-period cell has only ' + result.perGroupPerPeriod + ' observations. Below 30, asymptotic assumptions may not hold.');
  }
  if (designId === 'its' && result.totalPoints) {
    var pre = parseInt(result.totalPoints) - 12; /* rough check */
    if (result.totalPoints < 24) {
      warnings.push('Fewer than 24 total data points limits ability to model trends and seasonal patterns.');
    }
  }
  return warnings;
}

  }

  if (isCollapsed) {
    return h('button',{className:'sens-toggle',onClick:function(){setCollapsed(false);}},'\u2728 Help me choose a design \u203A');
  }

  var current = WIZARD_FLOW[step];
  return h('div',{className:'wizard-box'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'4px'}},
      h('div',{style:{fontSize:'11px',color:'var(--p-text3)'}},'Step '+(step+1)+' of 3'),
      step > 0 ? h('button',{className:'reset-btn',onClick:function(){setStep(step-1);}},'Back') : null
    ),
    h('div',{className:'wizard-q'},current.q),
    h('div',{className:'wizard-opts'},
      current.opts.map(function(opt,i){
        return h('button',{key:i,className:'wizard-opt',onClick:function(){
          if (opt.filter) { setFilter(opt.filter); props.onFilter(opt.filter); }
          else if (opt.next !== undefined) { setStep(opt.next); }
        }},opt.label);
      })
    )
  );
}

/* ── Results Card ─────────────────────────────────────────────── */
function ResultsCard(props) {
  var r = props.result;
  var d = props.design;
  if (!r) return null;

  if (d === 'its') {
    var pwr = parseFloat(r.power);
    var pwrColor = pwr >= 80 ? '#10B981' : pwr >= 60 ? '#F59E0B' : '#EF4444';
    return h('div',{className:'results-card'},
      h('div',{className:'rc-label'},'Statistical Power'),
      h('div',{className:'rc-big',style:{color:pwrColor}},r.power + '%'),
      h('div',{className:'rc-sub'},pwr >= 80 ? 'Adequate power to detect the specified effect' : pwr >= 60 ? 'Marginal power \u2014 consider more time points or larger effect' : 'Insufficient power \u2014 increase time points or relax effect size'),
      h('div',{className:'results-row'},
        h('div',{className:'results-item'}, h('div',{className:'ri-val'},r.totalPoints), h('div',{className:'ri-label'},'Total data points')),
        h('div',{className:'results-item'}, h('div',{className:'ri-val'},r.nEff), h('div',{className:'ri-label'},'Effective n')),
        h('div',{className:'results-item'}, h('div',{className:'ri-val'},r.mde80), h('div',{className:'ri-label'},'MDE at 80% (SD units)')),
        h('div',{className:'results-item'}, h('div',{className:'ri-val'},r.mde90), h('div',{className:'ri-label'},'MDE at 90%'))
      )
    );
  }

  if (d === 'lqas') {
    return h('div',{className:'results-card'},
      h('div',{className:'rc-label'},'Sample per Lot'),
      h('div',{className:'rc-big'},String(r.sampleSize)),
      h('div',{className:'rc-sub'},r.interpretation),
      h('div',{className:'results-row'},
        h('div',{className:'results-item'}, h('div',{className:'ri-val'},'d = '+r.decisionRule), h('div',{className:'ri-label'},'Decision rule')),
        h('div',{className:'results-item'}, h('div',{className:'ri-val'},r.alphaError+'%'), h('div',{className:'ri-label'},'Alpha error')),
        h('div',{className:'results-item'}, h('div',{className:'ri-val'},r.betaError+'%'), h('div',{className:'ri-label'},'Beta error'))
      )
    );
  }

  /* Generic results for other designs */
  var mainVal = r.finalTotal || r.final || r.primary || 0;
  var mainLabel = r.label || 'respondents';

  var subItems = [];
  if (d === 'singleProportion') {
    subItems = [
      {v:r.base,l:'Base (SRS)'}, {v:r.withDeff,l:'With DEFF'},
      r.withFPC !== r.withDeff ? {v:r.withFPC,l:'With FPC'} : null
    ].filter(Boolean);
  } else if (d === 'twoProportions' || d === 'twoMeans') {
    subItems = [{v:r.final1,l:'Control'},{v:r.final2,l:'Intervention'}];
    if (r.bonferroni) subItems.push({v:r.bonferroni.toFixed(4),l:'Adj. \u03B1'});
  } else if (d === 'clusterRCT') {
    subItems = [{v:r.clustersPerArm,l:'Clusters/arm'},{v:r.totalClusters,l:'Total clusters'},{v:r.deffAdj,l:'Adj. DEFF'}];
  } else if (d === 'clusterSurvey') {
    subItems = [{v:r.base,l:'Base (SRS)'},{v:r.clusters,l:'Clusters'}];
  } else if (d === 'steppedWedge') {
    subItems = [{v:r.totalClusters,l:'Total clusters'},{v:r.clustersPerStep,l:'Per step'},{v:r.periods,l:'Periods'},{v:r.deffAdj,l:'Adj. DEFF'}];
  } else if (d === 'did') {
    subItems = [{v:r.perGroupPerPeriod,l:'Per group/period'},{v:r.periods,l:'Periods'}];
  }

  return h('div',{className:'results-card'},
    h('div',{className:'rc-label'},'Required Sample Size'),
    h('div',{className:'rc-big'},mainVal.toLocaleString()),
    h('div',{className:'rc-sub'},'total ' + mainLabel + ' (adjusted for non-response)'),
    subItems.length > 0 ? h('div',{className:'results-row'},
      subItems.map(function(s,i){
        return h('div',{key:i,className:'results-item'},h('div',{className:'ri-val'},String(s.v)),h('div',{className:'ri-label'},s.l));
      })
    ) : null
  );
}

/* ── Warning Cards ────────────────────────────────────────────── */
function Warnings(props) {
  if (!props.warnings || props.warnings.length === 0) return null;
  return h('div',null,
    props.warnings.map(function(w,i){
      return h('div',{key:i,className:'warn-card'},
        h('span',{className:'warn-icon'},'\u26A0'),
        h('div',{className:'warn-text'},w)
      );
    })
  );
}

/* ── Qualitative Method Card ──────────────────────────────────── */
function QualMethodCard(props) {
  var method = props.method;
  var ctx = props.context;
  var purpose = props.purpose;
  var hMult = HETERO_MULT[ctx.heterogeneity] || 1;
  var defaults = QUAL_DEFAULTS[purpose] || QUAL_DEFAULTS.summative;

  if (method === 'fgd') {
    var groups = ctx.fgdGroups || 3;
    var genderSplit = ctx.genderSplit ? 2 : 1;
    var sites = ctx.sites || 1;
    var perGroup = defaults.fgdPerGroup;
    var total = Math.max(1, Math.round(groups * perGroup * genderSplit * sites * hMult));
    var groupSize = FGD_SIZE[ctx.sensitivity] || FGD_SIZE.moderate;
    var participants = total * Math.round((groupSize[0]+groupSize[1])/2);
    var accessM = ACCESS_MULT[ctx.access] || 1;
    var days = Math.ceil(total * accessM);

    return h('div',{className:'qual-card'},
      h('div',{className:'qual-card-header'},
        h('div',{className:'qual-card-title'},'Focus Group Discussions'),
        h('div',{className:'qual-result'},h('span',{className:'qr-big'},String(total)),h('span',{className:'qr-label'},' FGDs'))
      ),
      h('div',{className:'ctx-grid'},
        h('div',{className:'ctx-item'},
          h('label',null,'Stakeholder groups'),
          h('input',{type:'number',className:'ctx-select',min:1,max:10,value:ctx.fgdGroups||3,
            onChange:function(e){props.onCtx('fgdGroups',parseInt(e.target.value)||1);}})
        ),
        h('div',{className:'ctx-item'},
          h('label',null,'Gender-disaggregated'),
          h('select',{className:'ctx-select',value:ctx.genderSplit?'yes':'no',
            onChange:function(e){props.onCtx('genderSplit',e.target.value==='yes');}},
            h('option',{value:'no'},'No'),h('option',{value:'yes'},'Yes'))
        ),
        h('div',{className:'ctx-item'},
          h('label',null,'Number of sites'),
          h('input',{type:'number',className:'ctx-select',min:1,max:20,value:ctx.sites||1,
            onChange:function(e){props.onCtx('sites',parseInt(e.target.value)||1);}})
        )
      ),
      h('div',{style:{fontSize:'13px',color:'var(--p-text2)',lineHeight:'1.6'}},
        'Participants per FGD: ',groupSize[0],'\u2013',groupSize[1],' \u00B7 ',
        'Total participants: ~',participants,' \u00B7 ',
        'Est. fieldwork days: ',days
      )
    );
  }

  if (method === 'kii') {
    var cats = ctx.kiiCategories || 5;
    var depth = defaults.kiiDepth;
    var range = KII_PER_CAT[depth] || KII_PER_CAT.moderate;
    var perCat = Math.round((range[0]+range[1])/2);
    var total = Math.max(1, Math.round(cats * perCat * hMult));
    var accessM = ACCESS_MULT[ctx.access] || 1;
    var perDay = ctx.access === 'difficult' ? 1.5 : ctx.access === 'moderate' ? 2 : 3;
    var days = Math.ceil(total / perDay * accessM / accessM); /* perDay already accounts for access */

    return h('div',{className:'qual-card'},
      h('div',{className:'qual-card-header'},
        h('div',{className:'qual-card-title'},'Key Informant Interviews'),
        h('div',{className:'qual-result'},h('span',{className:'qr-big'},String(total)),h('span',{className:'qr-label'},' KIIs'))
      ),
      h('div',{className:'ctx-grid'},
        h('div',{className:'ctx-item'},
          h('label',null,'Respondent categories'),
          h('input',{type:'number',className:'ctx-select',min:1,max:15,value:ctx.kiiCategories||5,
            onChange:function(e){props.onCtx('kiiCategories',parseInt(e.target.value)||1);}})
        )
      ),
      h('div',{style:{fontSize:'13px',color:'var(--p-text2)'}},
        range[0],'\u2013',range[1],' per category (',depth,' depth) \u00B7 ',
        'Est. fieldwork days: ',Math.ceil(total/perDay)
      )
    );
  }

  if (method === 'idi') {
    var scope = ctx.scope || 'moderate';
    var range = IDI_RANGES[scope] || IDI_RANGES.moderate;
    var mid = Math.round((range[0]+range[1])/2 * hMult);
    var accessM = ACCESS_MULT[ctx.access] || 1;
    var days = Math.ceil(mid / 2 * accessM);

    return h('div',{className:'qual-card'},
      h('div',{className:'qual-card-header'},
        h('div',{className:'qual-card-title'},'In-Depth Interviews'),
        h('div',{className:'qual-result'},h('span',{className:'qr-big'},range[0]+'\u2013'+range[1]),h('span',{className:'qr-label'},' IDIs'))
      ),
      h('div',{style:{fontSize:'13px',color:'var(--p-text2)'}},
        'Scope: ',scope,' \u00B7 Adjusted for heterogeneity: ~',mid,' \u00B7 ',
        'Est. fieldwork days: ',days
      ),
      h('div',{style:{fontSize:'11px',color:'var(--p-text3)',marginTop:'6px',fontStyle:'italic'}},
        'Informed by Vasileiou et al. (2018) and Malterud et al. (2016). Monitor saturation during fieldwork.'
      )
    );
  }

  if (method === 'observation') {
    var obsSites = ctx.obsSites || 3;
    var sessPerSite = ctx.obsSessionsPerSite || 2;
    var total = obsSites * sessPerSite;
    return h('div',{className:'qual-card'},
      h('div',{className:'qual-card-header'},
        h('div',{className:'qual-card-title'},'Direct Observation'),
        h('div',{className:'qual-result'},h('span',{className:'qr-big'},String(total)),h('span',{className:'qr-label'},' sessions'))
      ),
      h('div',{className:'ctx-grid'},
        h('div',{className:'ctx-item'},
          h('label',null,'Observation sites'),
          h('input',{type:'number',className:'ctx-select',min:1,max:20,value:obsSites,
            onChange:function(e){props.onCtx('obsSites',parseInt(e.target.value)||1);}})
        ),
        h('div',{className:'ctx-item'},
          h('label',null,'Sessions per site'),
          h('input',{type:'number',className:'ctx-select',min:1,max:5,value:sessPerSite,
            onChange:function(e){props.onCtx('obsSessionsPerSite',parseInt(e.target.value)||1);}})
        )
      )
    );
  }

  return null;
}

/* ════════════════════════════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════════════════════════════ */
function App() {
  /* ── State ─────────────────────────────────────────────────── */
  var tierSt = useState('practitioner'); var tier = tierSt[0]; var setTier = tierSt[1];
  var designSt = useState('singleProportion'); var activeDesign = designSt[0]; var setActiveDesign = designSt[1];
  var filterSt = useState(null); var wizardFilter = filterSt[0]; var setWizardFilter = filterSt[1];

  /* Per-design params */
  var paramsSt = useState(function(){
    var init = {};
    DESIGNS.forEach(function(d){ init[d.id] = Object.assign({}, DEFAULT_PARAMS[d.id]); });
    return init;
  });
  var allParams = paramsSt[0]; var setAllParams = paramsSt[1];

  /* Qualitative state */
  var purposeSt = useState('summative'); var qualPurpose = purposeSt[0]; var setQualPurpose = purposeSt[1];
  var methodsSt = useState({fgd:true,kii:true,idi:false,observation:false});
  var qualMethods = methodsSt[0]; var setQualMethods = methodsSt[1];
  var ctxSt = useState({
    scope:'moderate', heterogeneity:'moderate', sensitivity:'low', access:'easy',
    fgdGroups:3, genderSplit:false, sites:2,
    kiiCategories:5, obsSites:3, obsSessionsPerSite:2
  });
  var qualCtx = ctxSt[0]; var setQualCtx = ctxSt[1];

  /* ── Derived ───────────────────────────────────────────────── */
  var currentParams = allParams[activeDesign] || {};

  var result = useMemo(function(){
    try {
      if (calc[activeDesign]) return calc[activeDesign](currentParams);
    } catch(e) { return {error: e.message}; }
    return null;
  }, [activeDesign, currentParams]);

  var warnings = useMemo(function(){
    if (!result || result.error) return [];
    return checkFeasibility(activeDesign, result);
  }, [activeDesign, result]);

  /* ── Handlers ──────────────────────────────────────────────── */
  function updateParam(name, val) {
    setAllParams(function(prev){
      var next = Object.assign({}, prev);
      next[activeDesign] = Object.assign({}, prev[activeDesign]);
      next[activeDesign][name] = val;
      return next;
    });
  }

  function resetDesign() {
    setAllParams(function(prev){
      var next = Object.assign({}, prev);
      next[activeDesign] = Object.assign({}, DEFAULT_PARAMS[activeDesign]);
      return next;
    });
  }

  function updateCtx(key, val) {
    setQualCtx(function(prev){ var n = Object.assign({},prev); n[key]=val; return n; });
  }

  function toggleMethod(m) {
    setQualMethods(function(prev){ var n=Object.assign({},prev); n[m]=!n[m]; return n; });
  }

  /* ── Qual totals ───────────────────────────────────────────── */
  var qualTotals = useMemo(function(){
    var hM = HETERO_MULT[qualCtx.heterogeneity]||1;
    var aM = ACCESS_MULT[qualCtx.access]||1;
    var defs = QUAL_DEFAULTS[qualPurpose]||QUAL_DEFAULTS.summative;
    var t = {fgds:0,fgdPart:0,kiis:0,idis:0,obs:0,days:0};

    if (qualMethods.fgd) {
      var gs = qualCtx.fgdGroups||3, gen=qualCtx.genderSplit?2:1, sites=qualCtx.sites||1;
      t.fgds = Math.max(1,Math.round(gs*defs.fgdPerGroup*gen*sites*hM));
      var sz = FGD_SIZE[qualCtx.sensitivity]||FGD_SIZE.moderate;
      t.fgdPart = t.fgds * Math.round((sz[0]+sz[1])/2);
      t.days += Math.ceil(t.fgds * aM);
    }
    if (qualMethods.kii) {
      var cats=qualCtx.kiiCategories||5;
      var r=KII_PER_CAT[defs.kiiDepth]||KII_PER_CAT.moderate;
      t.kiis = Math.max(1,Math.round(cats*((r[0]+r[1])/2)*hM));
      var perDay = qualCtx.access==='difficult'?1.5:qualCtx.access==='moderate'?2:3;
      t.days += Math.ceil(t.kiis/perDay);
    }
    if (qualMethods.idi) {
      var scope = qualCtx.scope||'moderate';
      var ir = IDI_RANGES[scope]||IDI_RANGES.moderate;
      t.idis = Math.round((ir[0]+ir[1])/2*hM);
      t.days += Math.ceil(t.idis/2*aM);
    }
    if (qualMethods.observation) {
      t.obs = (qualCtx.obsSites||3)*(qualCtx.obsSessionsPerSite||2);
      t.days += Math.ceil(t.obs*0.5*aM);
    }
    return t;
  }, [qualMethods, qualCtx, qualPurpose]);

  var quantN = (result && !result.error) ? (result.primary || 0) : 0;
  var qualN = qualTotals.fgdPart + qualTotals.kiis + qualTotals.idis;

  /* ── Render ────────────────────────────────────────────────── */
  return h('div',null,
    /* Topbar */
    h(Topbar),

    /* Page Header */
    h('div',{className:'page-header'},
      h('h1',null,S.title),
      h('div',{className:'subtitle'},S.subtitle),
      h(TierSelector, {tier:tier, onChange:setTier})
    ),

    /* Main Content */
    h('div',{className:'main-content'},

      /* ═══ SECTION A: QUANTITATIVE ═══ */
      h('section',{className:'section','aria-label':S.sections.quant},
        h('div',{className:'section-title'},
          h('span',{className:'section-badge badge-quant'},'A'),
          S.sections.quant
        ),

        /* Wizard */
        h(DesignWizard, {tier:tier, onFilter:function(f){
          setWizardFilter(f);
          if (f && f.length > 0) setActiveDesign(f[0]);
        }}),

        /* Design Grid */
        h('div',{className:'design-grid',role:'radiogroup','aria-label':'Select evaluation design'},
          DESIGNS.map(function(d){
            var show = !wizardFilter || wizardFilter.indexOf(d.id) >= 0;
            if (wizardFilter && !show) return null;
            return h('div',{
              key:d.id,
              className:'design-card'+(activeDesign===d.id?' active':''),
              role:'radio', 'aria-checked':activeDesign===d.id?'true':'false',
              tabIndex:0,
              onClick:function(){setActiveDesign(d.id);},
              onKeyDown:function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();setActiveDesign(d.id);}}
            },
              h('div',{className:'dc-name'},
                h('div',{className:'dc-check'},h(CheckIcon,{size:10})),
                d.name
              ),
              h('div',{className:'dc-desc'},d.desc)
            );
          })
        ),

        /* Collapsed designs when filtered */
        wizardFilter ? h('details',{style:{marginBottom:'20px'}},
          h('summary',{style:{fontSize:'12px',color:'var(--p-text3)',cursor:'pointer'}},'Show all designs'),
          h('div',{className:'design-grid',style:{marginTop:'10px'}},
            DESIGNS.filter(function(d){return wizardFilter.indexOf(d.id)<0;}).map(function(d){
              return h('div',{
                key:d.id, className:'design-card'+(activeDesign===d.id?' active':''),
                role:'radio','aria-checked':activeDesign===d.id?'true':'false', tabIndex:0,
                onClick:function(){setActiveDesign(d.id);},
                onKeyDown:function(e){if(e.key==='Enter'||e.key===' '){e.preventDefault();setActiveDesign(d.id);}}
              },
                h('div',{className:'dc-name'},h('div',{className:'dc-check'},h(CheckIcon,{size:10})),d.name),
                h('div',{className:'dc-desc'},d.desc)
              );
            })
          )
        ) : null,

        /* Parameters */
        h('div',{className:'card'},
          h('div',{className:'flex-between'},
            h('div',{className:'card-title'},DESIGNS.find(function(d){return d.id===activeDesign;}).name + ' Parameters'),
            h('button',{className:'reset-btn',onClick:resetDesign},'Reset defaults')
          ),
          h('div',{className:'param-grid'},
            (DESIGN_PARAMS[activeDesign]||[]).map(function(pName){
              var meta = PARAM_META[pName];
              if (!meta) return null;
              /* Hide advanced-only params for foundation */
              if (tier === 'foundation' && (pName === 'continuityCorrection' || pName === 'primaryOutcomes' || pName === 'clusterSizeCV')) return null;
              if (tier === 'practitioner' && pName === 'primaryOutcomes') return null;
              return h(ParamInput, {
                key:pName, name:pName, value:currentParams[pName],
                tier:tier, onChange:function(v){updateParam(pName,v);}
              });
            })
          )
        ),

        /* Results */
        result && !result.error ? h(ResultsCard, {result:result, design:activeDesign}) : null,
        result && result.error ? h('div',{className:'warn-card'},
          h('span',{className:'warn-icon'},'\u26A0'),
          h('div',{className:'warn-text'},'Calculation error: '+result.error+'. Try adjusting your parameters.')
        ) : null,

        /* Feasibility warnings */
        h(Warnings, {warnings:warnings})
      ),

      /* ═══ SECTION B: QUALITATIVE ═══ */
      h('section',{className:'section','aria-label':S.sections.qual},
        h('div',{className:'section-title'},
          h('span',{className:'section-badge badge-qual'},'B'),
          S.sections.qual
        ),
        h('div',{className:'section-subtitle'},S.qualNote),

        /* Purpose selector */
        h('div',{style:{marginBottom:'6px',fontSize:'12px',fontWeight:'600',color:'var(--p-text2)'}},'Evaluation Purpose'),
        h('div',{className:'purpose-grid'},
          ['formative','summative','developmental','expost'].map(function(p){
            return h('button',{key:p,className:'purpose-btn'+(qualPurpose===p?' active':''),
              onClick:function(){setQualPurpose(p);}
            },S.purposes[p]);
          })
        ),

        /* Method selector */
        h('div',{style:{marginBottom:'6px',fontSize:'12px',fontWeight:'600',color:'var(--p-text2)'}},'Select Methods'),
        h('div',{className:'method-checks'},
          [{id:'fgd',label:'FGDs'},{id:'kii',label:'KIIs'},{id:'idi',label:'IDIs'},{id:'observation',label:'Observation'}].map(function(m){
            return h('label',{key:m.id,className:'method-check'+(qualMethods[m.id]?' active':'')},
              h('input',{type:'checkbox',checked:!!qualMethods[m.id],onChange:function(){toggleMethod(m.id);}}),
              m.label
            );
          })
        ),

        /* Context parameters */
        h('div',{className:'ctx-grid'},
          h('div',{className:'ctx-item'},
            h('label',null,'Scope'), h('select',{className:'ctx-select',value:qualCtx.scope,onChange:function(e){updateCtx('scope',e.target.value);}},
              h('option',{value:'narrow'},'Narrow'),h('option',{value:'moderate'},'Moderate'),h('option',{value:'broad'},'Broad'))
          ),
          h('div',{className:'ctx-item'},
            h('label',null,'Heterogeneity'), h('select',{className:'ctx-select',value:qualCtx.heterogeneity,onChange:function(e){updateCtx('heterogeneity',e.target.value);}},
              h('option',{value:'low'},'Low (\u00D70.8)'),h('option',{value:'moderate'},'Moderate (\u00D71.0)'),h('option',{value:'high'},'High (\u00D71.3)'))
          ),
          h('div',{className:'ctx-item'},
            h('label',null,'Sensitivity'), h('select',{className:'ctx-select',value:qualCtx.sensitivity,onChange:function(e){updateCtx('sensitivity',e.target.value);}},
              h('option',{value:'low'},'Low'),h('option',{value:'moderate'},'Moderate'),h('option',{value:'high'},'High'))
          ),
          h('div',{className:'ctx-item'},
            h('label',null,'Field Access'), h('select',{className:'ctx-select',value:qualCtx.access,onChange:function(e){updateCtx('access',e.target.value);}},
              h('option',{value:'easy'},'Easy (\u00D71.0)'),h('option',{value:'moderate'},'Moderate (\u00D71.5)'),h('option',{value:'difficult'},'Difficult (\u00D72.0)'))
          )
        ),

        /* Sensitivity warning */
        qualCtx.sensitivity === 'high' ? h('div',{className:'warn-card'},
          h('span',{className:'warn-icon'},'\u26A0'),
          h('div',{className:'warn-text'},'Sensitive context detected. Consider: anonymised stakeholder categories in reports; separate FGD groups by power dynamics; enhanced informed consent; secure data handling protocols.')
        ) : null,

        /* Per-method cards */
        qualMethods.fgd ? h(QualMethodCard,{method:'fgd',context:qualCtx,purpose:qualPurpose,onCtx:updateCtx}) : null,
        qualMethods.kii ? h(QualMethodCard,{method:'kii',context:qualCtx,purpose:qualPurpose,onCtx:updateCtx}) : null,
        qualMethods.idi ? h(QualMethodCard,{method:'idi',context:qualCtx,purpose:qualPurpose,onCtx:updateCtx}) : null,
        qualMethods.observation ? h(QualMethodCard,{method:'observation',context:qualCtx,purpose:qualPurpose,onCtx:updateCtx}) : null
      ),

      /* ═══ SECTION C: COMBINED SUMMARY ═══ */
      h('section',{className:'section','aria-label':S.sections.combined},
        h('div',{className:'section-title'},
          h('span',{className:'section-badge badge-combined'},'C'),
          S.sections.combined
        ),

        h('div',{className:'card'},
          h('table',{className:'summary-table'},
            h('thead',null,h('tr',null,
              h('th',null,'Component'),h('th',null,'Sample'),h('th',null,'Details')
            )),
            h('tbody',null,
              h('tr',{className:'st-section'},h('td',{colSpan:3},'Quantitative')),
              h('tr',null,
                h('td',null,DESIGNS.find(function(d){return d.id===activeDesign;}).name),
                h('td',null,h('strong',null,quantN.toLocaleString())),
                h('td',null,(result && result.label) || '')
              ),
              h('tr',{className:'st-section'},h('td',{colSpan:3},'Qualitative')),
              qualMethods.fgd ? h('tr',null,h('td',null,'FGDs'),h('td',null,h('strong',null,String(qualTotals.fgds))),h('td',null,'~'+qualTotals.fgdPart+' participants')) : null,
              qualMethods.kii ? h('tr',null,h('td',null,'KIIs'),h('td',null,h('strong',null,String(qualTotals.kiis))),h('td',null,'across '+(qualCtx.kiiCategories||5)+' categories')) : null,
              qualMethods.idi ? h('tr',null,h('td',null,'IDIs'),h('td',null,h('strong',null,String(qualTotals.idis))),h('td',null,qualCtx.scope+' scope')) : null,
              qualMethods.observation ? h('tr',null,h('td',null,'Observation'),h('td',null,h('strong',null,String(qualTotals.obs))),h('td',null,'sessions')) : null,
              h('tr',{className:'st-total'},
                h('td',null,'Total Fieldwork'),
                h('td',null,h('strong',null,String(qualTotals.days)+' days')),
                h('td',null,'qualitative component')
              )
            )
          ),

          /* Export */
          h('div',{className:'export-row'},
            h('button',{className:'export-btn export-btn-primary',onClick:function(){window.print();}},'Export PDF'),
            h('button',{className:'export-btn export-btn-secondary',onClick:function(){
              /* JSON export */
              var data = {station:'sample_size',version:'2.0',timestamp:new Date().toISOString(),
                tier:tier,
                quantitative:{design:activeDesign,parameters:currentParams,result:result},
                qualitative:{purpose:qualPurpose,methods:qualMethods,context:qualCtx,totals:qualTotals},
                combined:{quantN:quantN,qualN:qualN,fieldDays:qualTotals.days}
              };
              var blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
              var url = URL.createObjectURL(blob);
              var a = document.createElement('a');a.href=url;a.download='praxis-sample-plan.json';a.click();URL.revokeObjectURL(url);
            }},'Export JSON')
          )
        ),

        /* Methodology notes */
        h('details',{style:{marginTop:'16px'}},
          h('summary',{style:{fontSize:'13px',fontWeight:'500',color:'var(--p-teal-dark)',cursor:'pointer'}},'Methodology & References'),
          h('div',{style:{padding:'16px',fontSize:'12px',color:'var(--p-text2)',lineHeight:'1.7'}},
            h('p',null,h('strong',null,'Quantitative: '),'Formulas verified against published references. Fleiss (1981) for proportions; Eldridge et al. (2006) for unequal cluster correction; Hussey & Hughes (2007) for stepped-wedge; Huitema, McKean & Laraway (2007) for ITS power.'),
            h('p',{style:{marginTop:'8px'}},h('strong',null,'Qualitative: '),'Planning heuristics informed by Guest et al. (2020), Hennink et al. (2017), Vasileiou et al. (2018), and Malterud et al. (2016). These are starting points \u2014 monitor saturation during fieldwork.'),
            h('p',{style:{marginTop:'8px'}},h('strong',null,'Limitations: '),'All calculations assume standard distributional assumptions. Actual required samples may differ based on local context, data quality, and fieldwork conditions.')
          )
        )
      )
    ),

    /* Footer */
    h('div',{className:'page-footer'},
      'No data leaves your device. No analytics. No cookies. No accounts. All calculations run in your browser.',
      h('br'),
      h('a',{href:'https://emmanuelneneodjidja.org/praxis'},'PRAXIS Evaluation Toolkit'),
      ' \u00B7 Sample Size Calculator v2'
    ),

    /* Sticky bar */
    h('div',{className:'sticky-bar',role:'status','aria-live':'polite','aria-label':'Sample plan summary'},
      h('div',{className:'sb-item'},h('span',{className:'sb-val'},quantN.toLocaleString()),h('span',{className:'sb-label'},' quant')),
      h('div',{className:'sb-sep'}),
      qualMethods.fgd ? h('div',{className:'sb-item'},h('span',{className:'sb-val'},String(qualTotals.fgds)),h('span',{className:'sb-label'},' FGDs')) : null,
      qualMethods.kii ? h('div',{className:'sb-item'},h('span',{className:'sb-val'},String(qualTotals.kiis)),h('span',{className:'sb-label'},' KIIs')) : null,
      qualMethods.idi ? h('div',{className:'sb-item'},h('span',{className:'sb-val'},String(qualTotals.idis)),h('span',{className:'sb-label'},' IDIs')) : null,
      h('div',{className:'sb-sep'}),
      h('div',{className:'sb-item'},h('span',{className:'sb-val'},String(qualTotals.days)),h('span',{className:'sb-label'},' field days'))
    )
  );
}

/* ── Mount ────────────────────────────────────────────────────── */

// ── PRAXIS Workbench Bridge ──
(function() {
  if (window.self === window.top) return;

  window.parent.postMessage({ type: 'SAMPLE_READY' }, '*');

  window.addEventListener('message', function(e) {
    if (!e.data || !e.data.type) return;
    if (e.data.type === 'PRAXIS_INIT' && e.data.payload) {
      window._praxisInitSample = e.data.payload;
      window.dispatchEvent(new CustomEvent('praxis-init-sample', { detail: e.data.payload }));
    }
  });

  window._praxisExportSample = function(data) {
    window.parent.postMessage({ type: 'SAMPLE_EXPORT', payload: data }, '*');
  };
})();

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function(){});
}
