{id:'HSS09',sector:'hss',subsector:'Service Delivery',name:'Inpatient bed occupancy rate',definition:'Percentage of available inpatient beds occupied on average over a defined period.',numerator:'Total inpatient bed-days used',denominator:'Total available bed-days',unit:'%',level:'Process',frequency:'Monthly',disagg:['Geography/Admin','Facility level'],sources:['DHIS2/HMIS','Facility Assessment'],frameworks:['WHO 100 Core'],tools:['DHIS2 Inpatient Module: bed census dataset','WHO HHFA Module 3: inpatient statistics section','Facility inpatient register (daily bed census form)'],notes:'Target 80-90%. Below 60% = underutilisation; above 90% = overcrowding and infection risk. Calculate as (total occupied bed-days / total available bed-days) x 100.'},
{id:'HSS10',sector:'hss',subsector:'Service Delivery',name:'Caesarean section rate (population-level)',definition:'Proportion of all live births delivered by caesarean section.',numerator:'C-sections performed (all facilities)',denominator:'Total estimated live births',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Geography/Admin','Wealth Quintile','Urban/Rural'],sources:['DHIS2/HMIS','DHS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Woman Questionnaire: m17 (delivery by caesarean)','DHIS2 Delivery Module: C-section dataset','Maternity Register: mode of delivery column','WHO Robson Classification Tool for C-section auditing'],notes:'WHO reference range 10-15%. Below 5% = unmet obstetric need. Above 15-20% = possible overuse. Robson classification disaggregates by clinical indication.'},
{id:'HSS11',sector:'hss',subsector:'Service Delivery',name:'Health facility density (per 10,000 population)',definition:'Number of health facilities per 10,000 population, by facility level.',numerator:'Total health facilities',denominator:'Total population',unit:'per 10,000',level:'Output',frequency:'Annual',disagg:['Geography/Admin','Urban/Rural','Facility level'],sources:['Admin Records','Facility Assessment'],frameworks:['WHO 100 Core'],tools:['Master Health Facility List (MHFL) / Master Facility Registry','WHO HHFA: facility enumeration module','DHIS2 Organisation Unit hierarchy','GIS mapping: facility location + catchment area population'],notes:'No universal threshold. Compare within country across districts. Combine with travel time analysis for access mapping. MHFL is gold standard for completeness.'},
{id:'HSS12',sector:'hss',subsector:'Health Workforce',name:'Community health worker density (per 10,000 population)',definition:'Number of trained and active community health workers per 10,000 population.',numerator:'Active trained CHWs',denominator:'Total population',unit:'per 10,000',level:'Output',frequency:'Annual',disagg:['Geography/Admin','Urban/Rural','Sex'],sources:['Admin Records'],frameworks:['WHO 100 Core','Global Fund'],tools:['National CHW Registry / iHRIS Community module','CHW monthly activity reporting form (MOH standard)','WHO Guideline on Health Policy and System Support to Optimize CHW Programmes (2018): monitoring framework'],notes:'WHO recommends integration into NHWA. "Active" = submitted report in past quarter. Key for last-mile delivery in LMICs. Distinguish paid vs. volunteer CHWs.'},
{id:'HSS13',sector:'hss',subsector:'Health Information Systems',name:'HMIS reporting timeliness',definition:'Percentage of expected facility monthly reports received at district level within the designated reporting deadline.',numerator:'Reports received within deadline',denominator:'Reports expected',unit:'%',level:'Process',frequency:'Monthly',disagg:['Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund'],tools:['DHIS2 Timeliness Dashboard (built-in analytics module)','WHO DQR Toolkit: Module 1 - Timeliness assessment','Global Fund RDQA Tool: timeliness verification section'],notes:'Complements completeness. A report can be complete but late (unusable for decision-making). Target >80% within deadline. Assess alongside completeness for overall HMIS performance.'},
{id:'HSS14',sector:'hss',subsector:'Health Financing',name:'Domestic general government health expenditure as % of GDP',definition:'General government expenditure on health from domestic sources as a share of gross domestic product.',numerator:'Domestic general government health expenditure',denominator:'GDP',unit:'%',level:'Impact',frequency:'Annual',disagg:[],sources:['Admin Records'],frameworks:['WHO 100 Core','SDG'],tools:['WHO Global Health Expenditure Database (GHED)','SHA 2011 (System of Health Accounts) production tool','National Health Accounts: government health expenditure tracking','WHO GHED Country Health Financing Profiles'],notes:'Abuja target: 15% of government budget to health (not same as % GDP). WHO recommends >= 5% GDP. Track alongside donor dependency ratio (external health expenditure as % THE).'},
{id:'HSS15',sector:'hss',subsector:'Health Financing',name:'Catastrophic health expenditure (10% threshold)',definition:'Percentage of population spending more than 10% of household total consumption or income on out-of-pocket health payments.',numerator:'Households with OOP >10% of consumption/income',denominator:'Total households',unit:'%',level:'Impact',frequency:'Annual',disagg:['Wealth Quintile','Urban/Rural','Geography/Admin'],sources:['Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['SDG 3.8.2 methodology: WHO/World Bank Technical Note','World Bank ADePT Health Financing module','WHO GHED catastrophic expenditure analytical tool','National Household Budget Survey / LSMS: health expenditure module'],notes:'SDG 3.8.2. Two thresholds monitored: 10% (broader) and 25% (severe) of household consumption. Impoverishing expenditure (pushed below poverty line) is a complementary indicator.'},
// ── DISEASE ADDITIONS: HIV ────────────────────────────────
{id:'HIV06',sector:'disease',subsector:'HIV/AIDS',name:'Retention on ART at 12 months',definition:'Percentage of adults and children known to be on ART 12 months after initiation.',numerator:'Patients on ART at 12 months',denominator:'Patients who initiated ART 12 months prior',unit:'%',level:'Outcome',frequency:'Annual (cohort)',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS','Admin Records'],frameworks:['PEPFAR MER','Global Fund','WHO 100 Core'],tools:['PEPFAR MER Indicator: TX_RET (Retention)','ART Cohort Register: 12-month outcome tracking','DHIS2 HIV Module: cohort retention dataset','WHO Patient Monitoring Guidelines: ART cohort analysis template'],notes:'Target >85%. Distinguish LTFU (lost to follow-up) from transfer-out and death. Silent transfers inflate LTFU. Back-to-care interventions target patients with missed appointments.'},
{id:'HIV07',sector:'disease',subsector:'HIV/AIDS',name:'Early infant diagnosis (EID) coverage',definition:'Percentage of HIV-exposed infants who received a virological HIV test within 2 months of birth.',numerator:'HIV-exposed infants tested by 2 months',denominator:'Estimated HIV-exposed infants',unit:'%',level:'Outcome',frequency:'Quarterly',disagg:['Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['PEPFAR MER','Global Fund','WHO 100 Core'],tools:['PEPFAR MER Indicator: PMTCT_EID','DBS (Dried Blood Spot) collection form and register','PCR laboratory results register','DHIS2 PMTCT Module: EID dataset','WHO EID Testing Algorithm and reporting form'],notes:'Virological test = PCR (DNA or RNA). Rapid antibody tests not valid in infants <18 months due to maternal antibodies. Track turnaround time (sample collection to result return to caregiver).'},
{id:'HIV08',sector:'disease',subsector:'HIV/AIDS',name:'HIV testing coverage among key populations',definition:'Percentage of key population members (sex workers, MSM, PWID, transgender persons, prisoners) who were tested for HIV in the past 12 months and know their result.',numerator:'KP members tested and received results',denominator:'Estimated KP population size',unit:'%',level:'Output',frequency:'Annual',disagg:['KP type','Age','Geography/Admin'],sources:['Sentinel Surveillance','Routine Monitoring'],frameworks:['PEPFAR MER','Global Fund'],tools:['PEPFAR MER Indicator: KP_PREV, HTS_TST (KP disaggregation)','IBBS (Integrated Bio-Behavioural Surveillance) Survey protocol','RDS (Respondent-Driven Sampling) methodology for KP surveys','KP programme register and unique identifier code (UIC) system','Global Fund KP Programmatic Mapping tool'],notes:'KP size estimation is the critical denominator challenge. Methods: multiplier, capture-recapture, Bayesian, mapping. IBBS provides direct testing data but is survey-based, not programmatic.'},
{id:'HIV09',sector:'disease',subsector:'HIV/AIDS',name:'PrEP effective coverage',definition:'Number/proportion of people at substantial HIV risk who have been prescribed oral PrEP and are effectively using it.',numerator:'People currently on PrEP (refills within period)',denominator:'Estimated population at substantial risk',unit:'number or %',level:'Output',frequency:'Quarterly',disagg:['Sex','Age','KP type','Geography/Admin'],sources:['DHIS2/HMIS','Admin Records'],frameworks:['PEPFAR MER','WHO 100 Core'],tools:['PEPFAR MER Indicator: PrEP_NEW, PrEP_CT (current)','PrEP register and dispensing log','DHIS2 HIV Prevention Module','WHO PrEP Implementation Tool: monitoring framework and registers'],notes:'Effective coverage = currently taking (not just initiated). Persistence is low globally. Track PrEP cascade: eligible → offered → initiated → currently using → event-free.'},
{id:'HIV10',sector:'disease',subsector:'HIV/AIDS',name:'ART coverage among co-infected TB/HIV patients',definition:'Percentage of HIV-positive TB patients who received ART during TB treatment.',numerator:'TB/HIV patients on ART',denominator:'HIV-positive TB patients registered',unit:'%',level:'Outcome',frequency:'Annual (cohort)',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund'],tools:['WHO TB Treatment Card (TB 01): HIV section (test result, ART status, CPT status)','WHO TB/HIV Register / joint TB-HIV reporting form','DHIS2 TB Module: HIV co-management dataset','Global Fund TB/HIV Results Framework indicators'],notes:'Target 100%. TB is the leading cause of death among PLHIV. ART should be initiated within 2 weeks of TB treatment start (8 weeks for TB meningitis). Track CPT (cotrimoxazole preventive therapy) alongside.'},
// ── DISEASE ADDITIONS: TB ─────────────────────────────────
{id:'TB04',sector:'disease',subsector:'Tuberculosis',name:'Drug-resistant TB (RR/MDR-TB) detection rate',definition:'Percentage of bacteriologically confirmed TB cases tested for rifampicin resistance, and proportion of those found resistant.',numerator:'BC-TB cases with DST result',denominator:'Total bacteriologically confirmed TB cases',unit:'%',level:'Process',frequency:'Quarterly',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund'],tools:['GeneXpert MTB/RIF results register','WHO DR-TB Treatment Card and Register','WHO Second-line DST laboratory reporting form','DHIS2 TB Module: DR-TB dataset','Global Fund DR-TB Results Framework indicators'],notes:'WHO recommends universal DST (all BC-TB cases tested). GeneXpert provides rifampicin resistance result in 2 hours. Rifampicin resistance is proxy for MDR-TB (>90% concordance). Track enrolment on DR-TB treatment alongside.'},
{id:'TB05',sector:'disease',subsector:'Tuberculosis',name:'TB preventive treatment (TPT) coverage among PLHIV',definition:'Percentage of people living with HIV newly enrolled in care who completed TB preventive treatment.',numerator:'PLHIV completing TPT',denominator:'PLHIV newly enrolled in HIV care eligible for TPT',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['PEPFAR MER','WHO 100 Core','Global Fund'],tools:['PEPFAR MER Indicator: TB_PREV','WHO TPT Register and Patient Card','DHIS2 HIV Module: TPT dataset','WHO Operational Handbook on TB Module 1 (Prevention): TPT monitoring forms','3HP, 1HP, 6H regimen completion tracking form'],notes:'WHO recommends TPT for all PLHIV without active TB. Track initiation AND completion (3HP = 12 doses/3 months; 6H = 180 doses/6 months). Completion rates typically 60-80%.'},
{id:'TB06',sector:'disease',subsector:'Tuberculosis',name:'TB contact investigation coverage',definition:'Percentage of index TB cases whose household contacts were evaluated for TB.',numerator:'Household contacts evaluated',denominator:'Expected household contacts of index TB cases',unit:'%',level:'Process',frequency:'Quarterly',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund'],tools:['WHO Contact Investigation Form','WHO TB Register: contact investigation column','DHIS2 TB Module: contact investigation dataset','WHO Operational Handbook on TB Module 1 (Prevention): contact investigation protocol'],notes:'WHO recommends investigation of all HH contacts, especially children <5 and PLHIV. Cascade: index cases identified → contacts listed → contacts evaluated → contacts with TB → contacts on TPT. Under-5 contacts without TB should receive TPT.'},
{id:'TB07',sector:'disease',subsector:'Tuberculosis',name:'TB mortality rate (per 100,000)',definition:'Estimated number of deaths due to TB (including among HIV-positive) per 100,000 population per year.',numerator:'TB deaths (estimated)',denominator:'Total population',unit:'per 100,000',level:'Impact',frequency:'Annual',disagg:['Sex','HIV status','Geography/Admin'],sources:['CRVS','Admin Records'],frameworks:['WHO 100 Core','SDG'],tools:['WHO Global TB Database: modelled mortality estimates','WHO Verbal Autopsy Instrument: TB cause of death assignment','CRVS death certificates with ICD-10 coding (A15-A19)','Spectrum/TIME model TB mortality estimation'],notes:'SDG 3.3.2. Usually modelled (direct measurement requires strong CRVS with medical certification). WHO/IHME estimates diverge. Disaggregate HIV-negative and HIV-associated TB deaths.'},
// ── DISEASE ADDITIONS: MALARIA ────────────────────────────
{id:'MAL05',sector:'disease',subsector:'Malaria',name:'Parasitaemia prevalence in children 6-59 months',definition:'Percentage of children aged 6-59 months with malaria parasites detected by microscopy or RDT in a population-based survey.',numerator:'Children 6-59 months testing positive',denominator:'Children 6-59 months tested',unit:'%',level:'Impact',frequency:'2-3 years',disagg:['Sex','Age','Wealth Quintile','Urban/Rural','Geography/Admin'],sources:['DHS','MICS','Household Survey'],frameworks:['Global Fund','WHO 100 Core'],tools:['DHS-8 Malaria Biomarker Module: RDT and blood smear protocol','MIS (Malaria Indicator Survey): parasitaemia module','MICS6 Malaria Module (where included)','WHO Malaria Indicator Survey field manual: sampling and biomarker protocol'],notes:'Gold standard prevalence measure. DHS and MIS use RDT (HRP2-based for P. falciparum). Blood smear confirms species. Seasonal timing matters: conduct during high transmission season.'},
{id:'MAL06',sector:'disease',subsector:'Malaria',name:'Malaria case fatality rate (facility-based)',definition:'Percentage of admitted malaria cases that result in death at health facility level.',numerator:'Malaria inpatient deaths',denominator:'Total malaria inpatient admissions',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Age','Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['Global Fund','WHO 100 Core'],tools:['DHIS2 Malaria Module: inpatient malaria dataset (admissions, deaths)','Facility Inpatient Register: malaria admission and outcome columns','WHO Malaria Case Management Guidelines: severe malaria case record form'],notes:'Target <1% with optimal case management. Higher CFR signals treatment quality gaps (delayed referral, stock-outs of artesunate, inadequate nursing care). Track alongside severe malaria proportion.'},
{id:'MAL07',sector:'disease',subsector:'Malaria',name:'IRS coverage (population protected by indoor residual spraying)',definition:'Percentage of population in targeted areas living in structures sprayed with IRS in the most recent spray round.',numerator:'Population in sprayed structures',denominator:'Target population for IRS',unit:'%',level:'Output',frequency:'Annual',disagg:['Geography/Admin'],sources:['Admin Records','Routine Monitoring'],frameworks:['Global Fund','WHO 100 Core'],tools:['IRS Spray Operator Form: structure-level spraying data','IRS Campaign Summary Report (district/national)','DHIS2 Malaria Vector Control Module','PMI (President\'s Malaria Initiative) IRS monitoring forms','Entomological monitoring: WHO wall bioassay and cone test protocols'],notes:'Operational target: >85% of structures in targeted areas. Effective duration depends on insecticide and surface type (3-12 months). Track alongside entomological indicators (mosquito density, resistance).'},
{id:'MAL08',sector:'disease',subsector:'Malaria',name:'Proportion of febrile children receiving ACT within 24 hours',definition:'Percentage of children under 5 with fever in the past 2 weeks who received artemisinin-based combination therapy (ACT) within 24 hours of fever onset.',numerator:'Febrile children <5 receiving ACT same/next day',denominator:'Children <5 with fever in past 2 weeks',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Wealth Quintile','Urban/Rural','Geography/Admin'],sources:['DHS','MICS'],frameworks:['Global Fund','WHO 100 Core'],tools:['DHS-8 Child Health Module: ml13 (treatment for fever), ml_fevtx variables','MICS6 Child Questionnaire: CA module (CA6-CA10: fever treatment)','iCCM Register: malaria treatment section','WHO T3 (Test. Treat. Track.) monitoring template'],notes:'WHO guideline: test before treat. This indicator captures treatment regardless of testing. Increasingly replaced by "tested and treated" cascade. ACT within 24h = prompt treatment; within 48h still acceptable.'},
// ── DISEASE ADDITIONS: NCD ────────────────────────────────
{id:'NCD04',sector:'disease',subsector:'NCDs',name:'Current tobacco use prevalence (adults 15+)',definition:'Percentage of adults aged 15 and older who currently use any tobacco product (smoked or smokeless).',numerator:'Adults currently using tobacco',denominator:'All adults 15+ surveyed',unit:'%',level:'Impact',frequency:'3-5 years',disagg:['Sex','Age','Urban/Rural','Education'],sources:['Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['WHO STEPS Survey: Module T (Tobacco Use) - Core and Expanded','Global Adult Tobacco Survey (GATS): standardised instrument','DHS-8 tobacco module (where included)','WHO STEPwise instrument v3.2: tobacco section T1-T12','WHO FCTC Indicator Framework'],notes:'SDG 3.a. MPOWER measures (Monitor, Protect, Offer, Warn, Enforce, Raise). GATS is the gold standard but expensive. STEPS tobacco module is shorter. Distinguish smoked (cigarettes, pipes, shisha) from smokeless (chewing, snuff).'},
{id:'NCD05',sector:'disease',subsector:'NCDs',name:'Harmful use of alcohol (heavy episodic drinking)',definition:'Percentage of adults (15+) who engaged in heavy episodic drinking (60+ grams pure alcohol on at least one occasion) in the past 30 days.',numerator:'Adults with heavy episodic drinking in past 30 days',denominator:'All adults 15+ surveyed',unit:'%',level:'Impact',frequency:'3-5 years',disagg:['Sex','Age','Urban/Rural'],sources:['Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['WHO STEPS Survey: Module A (Alcohol Consumption) - Core and Expanded','WHO AUDIT (Alcohol Use Disorders Identification Test): 10-item screening tool','WHO STEPwise instrument v3.2: alcohol section A1-A6','WHO Global Information System on Alcohol and Health (GISAH)'],notes:'SDG 3.5.2. Heavy episodic drinking = binge drinking. 60g pure alcohol = approximately 6 standard drinks. AUDIT score >= 8 indicates hazardous use. Gender-specific thresholds may apply.'},
{id:'NCD06',sector:'disease',subsector:'NCDs',name:'Premature mortality from NCDs (probability of dying 30-70 years)',definition:'Unconditional probability of dying between ages 30 and 70 from cardiovascular disease, cancer, diabetes, or chronic respiratory disease.',numerator:'Deaths from 4 main NCDs in 30-69 age group',denominator:'Person-years lived in 30-69 age group',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Geography/Admin'],sources:['CRVS','Admin Records'],frameworks:['WHO 100 Core','SDG'],tools:['WHO NCD Country Profiles: methodology for 4x4 NCD mortality calculation','CRVS with ICD-10 coding: CVD (I00-I99), cancer (C00-C97), diabetes (E10-E14), CRD (J30-J98)','WHO Verbal Autopsy Instrument: NCD cause of death assignment','WHO Global NCD Target calculation tool'],notes:'SDG 3.4.1. WHO target: 25% relative reduction by 2025 (since revised to 33% by 2030). Requires functioning CRVS with medical certification. Where CRVS is weak, use WHO modelled estimates.'},
{id:'NCD07',sector:'disease',subsector:'NCDs',name:'Mental health treatment gap',definition:'Percentage of people with a specified mental disorder who do not receive treatment.',numerator:'People with disorder minus those receiving treatment',denominator:'People with the specified mental disorder',unit:'%',level:'Impact',frequency:'3-5 years',disagg:['Sex','Age','Disorder type','Geography/Admin'],sources:['Household Survey'],frameworks:['WHO 100 Core'],tools:['WHO World Mental Health Survey Initiative (WMHS): CIDI (Composite International Diagnostic Interview)','WHO mhGAP-IG (Mental Health Gap Action Programme - Intervention Guide): screening tools','PHQ-9 (Patient Health Questionnaire): depression screening (9 items, validated globally)','GAD-7 (Generalised Anxiety Disorder): anxiety screening (7 items)','WHO Service Assessment Instrument for Mental Health Systems (WHO-AIMS)'],notes:'Treatment gap exceeds 75% in most LMICs for severe mental disorders, >90% for common mental disorders. PHQ-9 and GAD-7 are validated screening tools suitable for population surveys and primary care.'},
{id:'NCD08',sector:'disease',subsector:'NCDs',name:'Depression prevalence (current episode)',definition:'Percentage of adults screening positive for a current depressive episode using a validated screening instrument.',numerator:'Adults scoring above clinical threshold',denominator:'Adults screened',unit:'%',level:'Impact',frequency:'3-5 years',disagg:['Sex','Age','Urban/Rural'],sources:['Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['PHQ-9 (Patient Health Questionnaire-9): 9 items, 4-point Likert (0-27 score), threshold >= 10 for moderate depression','PHQ-2 (ultra-brief screening): 2 items, threshold >= 3','WHO STEPS optional mental health module','DASS-21 (Depression Anxiety Stress Scales): 21 items, 3 subscales','CES-D (Centre for Epidemiological Studies Depression Scale): 20 items'],notes:'PHQ-9 is the most widely validated screening tool globally (40+ languages). Not a diagnostic instrument. Clinical diagnosis requires clinical interview (SCID, MINI). Prevalence typically 5-15% in LMICs.'},
// ── DISEASE ADDITIONS: NTD, AMR ───────────────────────────
{id:'NTD01',sector:'disease',subsector:'NTDs',name:'Preventive chemotherapy coverage for NTDs',definition:'Percentage of population requiring preventive chemotherapy (PC) for at least one NTD who received it.',numerator:'People receiving PC',denominator:'Population requiring PC',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Sex','Geography/Admin','NTD type'],sources:['DHIS2/HMIS','Admin Records'],frameworks:['WHO 100 Core','SDG'],tools:['WHO PCT Databank: national reporting forms for NTDs','WHO Joint Reporting Form (JRF) for PC-NTDs','NTD Mass Drug Administration (MDA) register and tally sheet','WHO ESPEN (Expanded Special Project for Elimination of NTDs) data portal','Coverage evaluation survey: cluster-based post-MDA coverage assessment'],notes:'SDG 3.3.5. Five PC-NTDs: lymphatic filariasis, onchocerciasis, soil-transmitted helminths, schistosomiasis, trachoma. Report by disease. Effective coverage threshold varies by disease (typically 65-80%). WHO road map 2021-2030.'},
// ── RMNCAH ADDITIONS ──────────────────────────────────────
{id:'RMN09',sector:'rmncah',subsector:'Antenatal Care',name:'ANC first visit in first trimester',definition:'Percentage of women with a live birth in the past 2 years who had their first ANC visit during the first trimester of pregnancy (<12 weeks).',numerator:'Women with ANC1 in first trimester',denominator:'Women with live birth in past 2 years',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Wealth Quintile','Urban/Rural','Geography/Admin'],sources:['DHS','MICS','DHIS2/HMIS'],frameworks:['WHO 100 Core'],tools:['DHS-8 Woman Questionnaire Module 4: m13 (timing of first ANC visit in months)','MICS6 Woman Questionnaire: MN module (MN5 - months pregnant at first visit)','ANC Register: gestational age at first visit column','DHIS2 ANC Module: ANC1 first trimester dataset'],notes:'WHO 2016 ANC model recommends first contact in first 12 weeks. Early ANC enables: early HIV/syphilis testing, BP monitoring, nutrition counselling, dating scan. Late booking limits intervention window.'},
{id:'RMN10',sector:'rmncah',subsector:'Antenatal Care',name:'Iron-folic acid supplementation in pregnancy (90+ days)',definition:'Percentage of women with a live birth in the past 2 years who received and consumed iron-folic acid supplements for 90 or more days during pregnancy.',numerator:'Women taking IFA for 90+ days during pregnancy',denominator:'Women with live birth in past 2 years',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Wealth Quintile','Urban/Rural'],sources:['DHS','MICS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Woman Questionnaire Module 4: m45 (iron tablets/syrup during pregnancy), m46 (number of days)','MICS6 Woman Questionnaire: MN module (MN8-MN10: iron supplementation)','ANC Register: IFA supplementation column'],notes:'WHO recommends daily IFA throughout pregnancy (minimum 180 days). 90+ days is a conservative threshold. IFA prevents anaemia and neural tube defects. Supply chain and adherence are key barriers.'},
{id:'RMN11',sector:'rmncah',subsector:'Delivery & Newborn',name:'Uterotonic administration immediately after birth',definition:'Percentage of women who received a uterotonic drug (oxytocin, misoprostol, or other) immediately after birth for prevention of postpartum haemorrhage.',numerator:'Women receiving uterotonic within 1 minute of delivery',denominator:'Women delivering at facility',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Geography/Admin','Facility level'],sources:['Facility Assessment','DHIS2/HMIS'],frameworks:['WHO 100 Core'],tools:['WHO EmONC Needs Assessment: signal function 6 (parenteral oxytocics)','SPA (Service Provision Assessment): delivery observation checklist','Maternity Register: active management of third stage column','WHO Quality of Care standards: labour and birth observation checklist','WHO Labour Care Guide (partograph successor): uterotonic administration recording'],notes:'Part of AMTSL (Active Management of Third Stage of Labour). PPH is leading cause of maternal death. Oxytocin preferred; misoprostol where oxytocin not available. Measure at facility level via observation or register review.'},
{id:'RMN12',sector:'rmncah',subsector:'Delivery & Newborn',name:'Early initiation of breastfeeding (within 1 hour)',definition:'Percentage of newborns put to the breast within one hour of birth.',numerator:'Newborns breastfed within 1 hour of birth',denominator:'Total live births',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Delivery mode','Geography/Admin','Wealth Quintile'],sources:['DHS','MICS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Woman Questionnaire Module 5: v426 (time to first breastfeed)','MICS6 Breastfeeding Module: BD2 (how long after birth first put to breast)','Maternity Register: breastfeeding initiation column','WHO Ten Steps to Successful Breastfeeding: assessment tool'],notes:'Reduces neonatal mortality by 22% if within 1 hour. Particularly low after C-sections. Include skin-to-skin contact as complementary indicator. WHO/UNICEF BFHI assessment monitors at facility level.'},
{id:'RMN13',sector:'rmncah',subsector:'Delivery & Newborn',name:'Stillbirth rate',definition:'Number of third-trimester stillbirths (>=28 weeks or >=1000g) per 1,000 total births.',numerator:'Stillbirths >=28 weeks',denominator:'Total births (live births + stillbirths)',unit:'per 1,000 total births',level:'Impact',frequency:'Annual',disagg:['Geography/Admin','Facility vs. community'],sources:['DHIS2/HMIS','CRVS','DHS'],frameworks:['WHO 100 Core'],tools:['CRVS: stillbirth registration (where mandatory)','Maternity Register: birth outcome column (live birth, fresh stillbirth, macerated stillbirth)','DHIS2 Delivery Module: stillbirth dataset','WHO Perinatal Death Surveillance and Response (PDSR) tools','DHS-8 pregnancy history module (limited for stillbirths)'],notes:'Global target: <=12 per 1,000 by 2030 (ENAP). Distinguish fresh (intrapartum, likely preventable) from macerated (antepartum). Most underreported mortality indicator. PDSR identifies modifiable factors.'},
{id:'RMN14',sector:'rmncah',subsector:'Child Health',name:'Maternal mortality ratio',definition:'Number of maternal deaths per 100,000 live births during pregnancy or within 42 days of termination of pregnancy.',numerator:'Maternal deaths',denominator:'Live births',unit:'per 100,000 live births',level:'Impact',frequency:'Annual',disagg:['Geography/Admin','Cause of death'],sources:['CRVS','DHS','Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['CRVS with ICD-MM (International Classification of Diseases for Maternal Mortality)','DHS-8 Sibling Survival Module: maternal mortality estimation','WHO MMEIG (Maternal Mortality Estimation Inter-agency Group) modelling','RAMOS (Reproductive Age Mortality Study): active surveillance methodology','MDSR (Maternal Death Surveillance and Response): WHO tool kit for facility and community review','WHO Verbal Autopsy Instrument: maternal cause of death assignment'],notes:'SDG 3.1.1. Target: <70 per 100,000 by 2030. Direct measurement requires strong CRVS. DHS sibling module provides estimates with wide CIs. MDSR provides facility-level learning from deaths.'},
{id:'RMN15',sector:'rmncah',subsector:'Family Planning',name:'Adolescent birth rate (15-19 years)',definition:'Number of births per 1,000 women aged 15-19 years.',numerator:'Births to women 15-19',denominator:'Women aged 15-19',unit:'per 1,000',level:'Impact',frequency:'Annual',disagg:['Geography/Admin','Wealth Quintile','Urban/Rural','Education'],sources:['DHS','MICS','CRVS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Birth History Module: age-specific fertility rate calculation','MICS6 Birth History Module','CRVS birth registration by age of mother','UN Population Division: World Fertility Data methodology'],notes:'SDG 3.7.2. Also called age-specific fertility rate (ASFR) 15-19. Track alongside early marriage prevalence. High rates concentrated among poorest and least educated.'},
{id:'RMN16',sector:'rmncah',subsector:'Delivery & Newborn',name:'EmONC signal function availability',definition:'Percentage of health facilities expected to provide emergency obstetric and newborn care (EmONC) that perform all required signal functions.',numerator:'Facilities performing all required signal functions',denominator:'Expected EmONC facilities (per population norm)',unit:'%',level:'Output',frequency:'Annual',disagg:['Geography/Admin','Facility level (BEmONC/CEmONC)'],sources:['Facility Assessment'],frameworks:['WHO 100 Core'],tools:['WHO/UNFPA/UNICEF/Amref EmONC Needs Assessment Tool: signal function verification','BEmONC 7 signal functions checklist (parenteral antibiotics, uterotonics, anticonvulsants, manual placenta removal, retained products removal, assisted vaginal delivery, neonatal resuscitation)','CEmONC +2: surgery (C-section) and blood transfusion','WHO Monitoring EmONC Handbook (2009): process indicators'],notes:'WHO norm: >=5 EmONC facilities per 500,000 population (at least 1 CEmONC). Signal functions assessed over past 3 months. Availability ≠ quality: combine with case fatality rate and fresh stillbirth rate.'},
{id:'RMN17',sector:'rmncah',subsector:'Child Health',name:'Diarrhea treatment with ORS and zinc',definition:'Percentage of children under 5 with diarrhea in the past 2 weeks who received ORS and zinc supplementation.',numerator:'Children with diarrhea receiving ORS + zinc',denominator:'Children <5 with diarrhea in past 2 weeks',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Wealth Quintile','Urban/Rural'],sources:['DHS','MICS'],frameworks:['WHO 100 Core'],tools:['DHS-8 Child Health Module: h11-h15 (diarrhea occurrence), h13-h15t (treatment including ORS, zinc)','MICS6 Child Questionnaire: CA module (CA1-CA5c: diarrhea treatment)','WHO/UNICEF iCCM Register: diarrhea treatment protocol','Pharmacy/drug shop survey for ORS/zinc availability'],notes:'WHO/UNICEF recommend ORS + zinc for all childhood diarrhea. ORS coverage is moderate globally; zinc coverage remains very low (<5% in many countries). Track separately and combined.'},
{id:'RMN18',sector:'rmncah',subsector:'Child Health',name:'Vitamin A supplementation coverage (6-59 months)',definition:'Percentage of children 6-59 months who received 2 doses of vitamin A supplementation in the past year.',numerator:'Children 6-59 months receiving 2 VAS doses per year',denominator:'Children 6-59 months',unit:'%',level:'Outcome',frequency:'Semi-annual',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS','Admin Records'],frameworks:['WHO 100 Core','UNICEF WASH'],tools:['VAS campaign tally sheet (mass distribution event)','Child Health Card: VAS recording section','DHIS2 Nutrition Module: VAS dataset','UNICEF VAS coverage monitoring tool','Post-event coverage survey (PEC): cluster-based rapid assessment'],notes:'Two high-dose VAS per year (4-6 months apart). Delivered via campaigns, child health weeks, or routine contacts. Two-dose coverage is typically lower than single-dose. Transition from campaigns to routine platforms is ongoing.'},
// ── IMMUNISATION ADDITIONS ────────────────────────────────
{id:'IMM07',sector:'immunisation',subsector:'Coverage',name:'BCG coverage',definition:'Percentage of surviving infants who received BCG vaccine.',numerator:'Children receiving BCG',denominator:'Surviving infants',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Sex','Geography/Admin'],sources:['DHIS2/HMIS','DHS','MICS'],frameworks:['WHO 100 Core','Gavi 5.0/5.1'],tools:['EPI Tally Sheet: BCG column','Child Health Card: BCG dose date and scar check','DHIS2 EPI Module: BCG dataset','DHS-8 Child Questionnaire: h2 (BCG vaccination)'],notes:'Usually given at birth or first facility contact. BCG scar used as verification. BCG coverage typically higher than Penta1 (given earlier). Gap between BCG and Penta1 indicates access without follow-up.'},
{id:'IMM08',sector:'immunisation',subsector:'Coverage',name:'Polio vaccine coverage (OPV3 or IPV)',definition:'Percentage of surviving infants who received 3 doses of oral polio vaccine (OPV3) and/or at least 1 dose of inactivated polio vaccine (IPV).',numerator:'Children receiving OPV3/IPV',denominator:'Surviving infants',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Sex','Geography/Admin'],sources:['DHIS2/HMIS','DHS','MICS'],frameworks:['WHO 100 Core','Gavi 5.0/5.1'],tools:['EPI Tally Sheet: OPV/IPV columns','Child Health Card: polio dose dates','DHIS2 EPI Module: OPV/IPV dataset','DHS-8 Child Questionnaire: h4-h8 (polio vaccination by dose)','MICS6 IM module: polio items'],notes:'Global polio eradication requires >95% OPV3 + IPV1 coverage. IPV introduced to prevent VDPV. Track both OPV3 and IPV separately. Environmental surveillance (sewage) complements AFP surveillance.'},
{id:'IMM09',sector:'immunisation',subsector:'Coverage',name:'PCV3 coverage (pneumococcal conjugate vaccine)',definition:'Percentage of surviving infants who received 3 doses of pneumococcal conjugate vaccine.',numerator:'Children receiving PCV3',denominator:'Surviving infants',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Sex','Geography/Admin'],sources:['DHIS2/HMIS','DHS'],frameworks:['Gavi 5.0/5.1','WHO 100 Core'],tools:['EPI Tally Sheet: PCV column','Child Health Card: PCV dose dates','DHIS2 EPI Module: PCV dataset','Gavi PCV monitoring and reporting template'],notes:'Key for pneumonia prevention (leading cause of child death after neonatal period). Gavi supports PCV introduction in LICs. Track alongside care-seeking for pneumonia symptoms.'},
{id:'IMM10',sector:'immunisation',subsector:'Coverage',name:'Rotavirus vaccine coverage',definition:'Percentage of surviving infants who completed the rotavirus vaccination series (2 or 3 doses depending on product).',numerator:'Children completing rotavirus series',denominator:'Surviving infants',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Sex','Geography/Admin'],sources:['DHIS2/HMIS','DHS'],frameworks:['Gavi 5.0/5.1','WHO 100 Core'],tools:['EPI Tally Sheet: Rotavirus column','Child Health Card: rotavirus dose dates','DHIS2 EPI Module: Rotavirus dataset','Gavi Rotavirus monitoring template'],notes:'Key for diarrhea prevention. Two products: Rotarix (2 doses) and RotaTeq (3 doses). Strict age limits for administration. Track alongside diarrhea mortality and ORS/zinc treatment.'},
{id:'IMM11',sector:'immunisation',subsector:'Coverage',name:'HPV vaccine coverage (girls)',definition:'Percentage of girls in the target age group (typically 9-14) who completed the HPV vaccination series.',numerator:'Girls completing HPV series',denominator:'Girls in target age cohort',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Geography/Admin','School vs. out-of-school'],sources:['DHIS2/HMIS','Admin Records'],frameworks:['Gavi 5.0/5.1','WHO 100 Core'],tools:['School-based vaccination register (HPV)','Health facility HPV register','DHIS2 EPI Module: HPV dataset','WHO Cervical Cancer Elimination Strategy: 90-70-90 monitoring framework','Gavi HPV monitoring and reporting template'],notes:'WHO target: 90% coverage by 2030 (cervical cancer elimination strategy). 1-dose schedule now recommended (2022). School-based delivery is most effective but misses out-of-school girls. Track by delivery platform.'},
{id:'IMM12',sector:'immunisation',subsector:'Coverage',name:'Full immunisation coverage (FIC)',definition:'Percentage of children 12-23 months who received all vaccines in the national schedule (BCG, DTP3, OPV3/IPV, MCV1, and others as per schedule).',numerator:'Children 12-23 months with all scheduled doses',denominator:'Children 12-23 months surveyed',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Wealth Quintile','Urban/Rural','Geography/Admin','Education'],sources:['DHS','MICS'],frameworks:['WHO 100 Core','Gavi 5.0/5.1'],tools:['DHS-8 Child Questionnaire: constructed FIC variable from vaccination history (h2-h9 series)','MICS6 IM module: FIC tabulation','WHO/UNICEF WUENIC methodology','EPI Coverage Survey: cluster-based methodology (WHO 2018 protocol)'],notes:'Definition varies by country schedule. Typically includes BCG + DTP3 + OPV3 + MCV1. Card + recall. FIC is always lower than individual antigen coverage. Wealth and urban/rural equity gaps are largest for FIC.'},
{id:'IMM13',sector:'immunisation',subsector:'Cold Chain',name:'Vaccine wastage rate',definition:'Percentage of vaccine doses wasted (opened but unused, expired, damaged by heat/freeze, broken vials) relative to total doses used and wasted.',numerator:'Doses wasted (unused in opened vials + expired + VVM stage 3/4 + broken)',denominator:'Doses used + doses wasted',unit:'%',level:'Process',frequency:'Monthly',disagg:['Antigen type','Geography/Admin'],sources:['Admin Records','DHIS2/HMIS'],frameworks:['Gavi 5.0/5.1'],tools:['Vaccine Stock Management Tool (SMT): wastage tracking module','WHO Vaccine Wastage Rates Reference Guide','DHIS2 EPI Module: wastage dataset (doses received, administered, destroyed)','EVM Assessment Tool: wastage monitoring section','Multi-dose vial policy (MDVP) monitoring form'],notes:'WHO wastage rate benchmarks vary by antigen and vial size. BCG (10-dose lyophilised): up to 50%. Pentavalent (10-dose): 5-10%. High wastage drives procurement costs and cold chain load. Open vial policy reduces wastage.'},
{id:'IMM14',sector:'immunisation',subsector:'Surveillance',name:'Non-polio AFP rate (per 100,000 children <15)',definition:'Annualised rate of non-polio acute flaccid paralysis (AFP) cases detected per 100,000 children under 15 years.',numerator:'AFP cases detected (non-polio)',denominator:'Population under 15 years',unit:'per 100,000',level:'Process',frequency:'Annual',disagg:['Geography/Admin'],sources:['Sentinel Surveillance'],frameworks:['WHO 100 Core'],tools:['WHO AFP Case Investigation Form','WHO AFP Surveillance Performance Indicators monitoring tool','Stool adequacy rate: 2 adequate stool specimens within 14 days of paralysis onset','National AFP Surveillance Reference Laboratory Network','WHO AFRO/SEARO weekly AFP reporting template'],notes:'Target: >=2 per 100,000 children <15 for polio-free certification. Stool adequacy >= 80%. AFP surveillance is the backbone of polio eradication. Environmental surveillance complements where implemented.'},
// ── NUTRITION ADDITIONS ───────────────────────────────────
{id:'NUT12',sector:'nutrition',subsector:'Anthropometry',name:'Overweight prevalence in children under 5',definition:'Percentage of children under 5 with weight-for-height z-score > +2 SD.',numerator:'Children with WHZ > +2',denominator:'Children under 5 measured',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Age','Urban/Rural','Wealth Quintile'],sources:['DHS','MICS','SMART Survey'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Child Anthropometry Module: constructed from hw-series (WHZ flags)','MICS6 Anthropometry Module','SMART Survey Protocol: weight-for-height calculation','WHO Anthro software / WHO Anthro Survey Analyser'],notes:'SDG 2.2.2 (linked to WHA target: no increase). Double burden of malnutrition: coexisting stunting and overweight in same population. Rising in LMICs, especially urban areas.'},
{id:'NUT13',sector:'nutrition',subsector:'Anthropometry',name:'Low birth weight prevalence (<2500g)',definition:'Percentage of live births weighing less than 2,500 grams at birth.',numerator:'Live births <2500g',denominator:'Live births with recorded birth weight',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Geography/Admin','Wealth Quintile'],sources:['DHS','MICS','DHIS2/HMIS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Child Module: m19 (birth weight in grams), m19a (weight from card or recall)','MICS6 Birth weight module: BW1-BW2','Maternity Register: birth weight column','WHO/UNICEF LBW estimation methodology (2023 revision)','DHIS2 Delivery Module: birth weight dataset'],notes:'SDG 2.2 / WHA target: 30% reduction by 2025. Heaping at round numbers (e.g., 2500g, 3000g) is common in LBW data. >50% of births in many LMICs not weighed. Combine with size-at-birth recall (DHS: very small, small, average, large).'},
{id:'NUT14',sector:'nutrition',subsector:'Micronutrients',name:'Iodized salt coverage (households using adequately iodized salt)',definition:'Percentage of households using salt with adequate iodine content (>=15 ppm).',numerator:'Households with adequately iodized salt',denominator:'Total households tested',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Urban/Rural','Geography/Admin','Wealth Quintile'],sources:['DHS','MICS','Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['MICS6 Iodized Salt Module: SI1 (salt test kit result)','DHS-8 Household Questionnaire: hv234a (salt iodine test)','Rapid iodine test kit (WYD kit): field-level testing','Titration method (quantitative iodine testing): laboratory level','WHO/UNICEF/IGN Joint Database on Iodized Salt'],notes:'WHO/UNICEF target: >90% household coverage with adequately iodized salt (USI - Universal Salt Iodization). Rapid test kit gives qualitative result (no iodine / <15ppm / >=15ppm). Iodine deficiency is leading preventable cause of intellectual disability.'},
{id:'NUT15',sector:'nutrition',subsector:'IYCF',name:'Minimum dietary diversity for women of reproductive age (MDD-W)',definition:'Percentage of women 15-49 who consumed foods from 5 or more out of 10 food groups in the previous day.',numerator:'Women consuming >=5 of 10 food groups',denominator:'Women 15-49 surveyed',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Wealth Quintile','Urban/Rural','Geography/Admin'],sources:['Household Survey'],frameworks:['SDG'],tools:['FAO/FHI 360 MDD-W Module: 10 food group open recall and list-based questionnaire','FAO Minimum Dietary Diversity for Women Guide (2016): full instrument, scoring, and analysis protocol','WFP VAM: MDD-W integration into food security assessments'],notes:'10 food groups: grains/roots/tubers, pulses, nuts/seeds, dairy, meat/poultry/fish, eggs, dark leafy greens, other vitamin A-rich fruits/vegetables, other vegetables, other fruits. Proxy for micronutrient adequacy of diet.'},
{id:'NUT16',sector:'nutrition',subsector:'CMAM/IMAM',name:'CMAM default rate',definition:'Percentage of children admitted to CMAM/OTP who defaulted (absent for 3 consecutive visits without follow-up).',numerator:'Children who defaulted',denominator:'Total exits (cured + defaulted + died + non-recovered)',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS','Routine Monitoring'],frameworks:['SPHERE'],tools:['OTP Treatment Card: attendance tracking section','CMAM Monthly Reporting Form (UNICEF/Valid International standard)','DHIS2 Nutrition Module: CMAM outcome dataset','Community follow-up register: defaulter tracking form'],notes:'SPHERE maximum: <15%. High default signals access barriers, distance, opportunity cost, or dissatisfaction. Track alongside average length of stay. Community follow-up of defaulters is key programme quality indicator.'},
{id:'NUT17',sector:'nutrition',subsector:'CMAM/IMAM',name:'CMAM death rate',definition:'Percentage of children admitted to CMAM/OTP who died during treatment.',numerator:'Deaths during CMAM treatment',denominator:'Total exits (cured + defaulted + died + non-recovered)',unit:'%',level:'Impact',frequency:'Monthly',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS','Routine Monitoring'],frameworks:['SPHERE'],tools:['OTP Treatment Card: outcome section','CMAM Monthly Reporting Form','DHIS2 Nutrition Module: CMAM outcome dataset','SC (Stabilisation Centre) Inpatient Register: death audit form'],notes:'SPHERE maximum: <10% (OTP) and <10% (SC). Deaths should be reviewed individually (death audit). Most deaths occur within first week. Track median MUAC at admission alongside to assess late presentation.'},
// ── FOOD SECURITY ADDITIONS ───────────────────────────────
{id:'FS08',sector:'food_security',subsector:'Food Consumption',name:'Household Dietary Diversity Score (HDDS)',definition:'Number of food groups (out of 12) consumed by the household in the past 24 hours.',numerator:'Count of food groups consumed (12-group classification)',denominator:'N/A (score 0-12)',unit:'score 0-12',level:'Outcome',frequency:'Quarterly',disagg:['Sex','Geography/Admin','Wealth Quintile'],sources:['Household Survey'],frameworks:['WFP/VAM'],tools:['FANTA/FAO HDDS Module: 12 food group 24-hour recall questionnaire','FAO Guidelines for Measuring Household and Individual Dietary Diversity (2010): HDDS instrument','WFP CFSVA: dietary diversity section','KoBoToolbox/ODK: standard HDDS XLSForm template'],notes:'12 food groups: cereals, roots/tubers, vegetables, fruits, meat, eggs, fish, pulses/legumes/nuts, milk, oil/fat, sugar, condiments. No universal threshold; mean HDDS <4.5 generally indicates poor dietary diversity. Context-specific terciles recommended.'},
{id:'FS09',sector:'food_security',subsector:'IPC/CH & CARI',name:'Food expenditure share',definition:'Proportion of total household expenditure spent on food.',numerator:'Household food expenditure',denominator:'Total household expenditure',unit:'%',level:'Outcome',frequency:'Quarterly',disagg:['Geography/Admin','Urban/Rural','Wealth Quintile'],sources:['Household Survey'],frameworks:['WFP/VAM'],tools:['WFP Economic Vulnerability Module: food and non-food expenditure questionnaire (7-day food recall + 30-day non-food recall)','WFP CARI Console: economic vulnerability input (food expenditure share)','World Bank LSMS: household consumption expenditure module'],notes:'Engel law: food expenditure share declines as income rises. >65% = severe economic vulnerability (WFP threshold). >75% = critical. Key component of CARI classification and IPC convergence evidence.'},
{id:'FS10',sector:'food_security',subsector:'Livelihoods',name:'Emergency food assistance coverage',definition:'Percentage of the targeted food-insecure population receiving food or cash/voucher assistance in a given period.',numerator:'Beneficiaries receiving food/CBT assistance',denominator:'Targeted food-insecure population',unit:'%',level:'Output',frequency:'Monthly',disagg:['Sex','Geography/Admin','Transfer modality'],sources:['Routine Monitoring','Admin Records'],frameworks:['WFP/VAM','SPHERE'],tools:['WFP COMET (Country Office Tool for Managing Effectively): beneficiary tracking','WFP SCOPE (beneficiary identity and transfer management platform)','Distribution monitoring form: ration tracking','PDM (Post-Distribution Monitoring) Survey: standard WFP questionnaire','SPHERE Minimum Standards: food assistance quantity and quality benchmarks'],notes:'Distinguish food in-kind, cash, and voucher modalities. Track ration composition against SPHERE nutrition standards (2,100 kcal/person/day). PDM assesses utilisation, satisfaction, and market impact.'},
{id:'FS11',sector:'food_security',subsector:'Livelihoods',name:'Asset depletion index',definition:'Proportion of households that have sold productive assets (livestock, land, tools) or non-productive assets (household goods, jewelry) in the past 12 months as a coping strategy.',numerator:'Households reporting asset sales as coping',denominator:'Total households',unit:'% by asset type',level:'Outcome',frequency:'Annual',disagg:['Sex','Geography/Admin','Wealth Quintile'],sources:['Household Survey'],frameworks:['WFP/VAM'],tools:['WFP LCSI Module: asset-related coping strategies (selling livestock, productive assets, land)','HEA (Household Economy Analysis): asset baseline and depletion tracking','World Bank LSMS: asset module (livestock, durable goods, land)','UNHCR socio-economic assessment: asset ownership and disposal section'],notes:'Asset depletion is a crisis-level coping strategy (LCSI). Distinguish productive (livelihood-sustaining) from non-productive assets. Asset depletion is slow to reverse and signals deepening vulnerability.'},
// ── P/CVE ADDITIONS ───────────────────────────────────────
{id:'PVE16',sector:'pcve',subsector:'Radicalisation Risk (VEEM Push/Pull)',name:'Perceived group threat',definition:'Individual-level score measuring perceived threat from other identity groups (economic, cultural, safety threat dimensions).',numerator:'Mean score on perceived threat scale',denominator:'N/A (continuous score)',unit:'mean score',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Ethnicity','Geography/Admin'],sources:['Household Survey'],frameworks:['UNDP'],tools:['Integrated Threat Theory Scale (Stephan & Stephan 2000): realistic and symbolic threat subscales','VEEM Framework: Push Factor domain - perceived threat and insecurity','Perceived Group Threat Scale (Scheepers et al. 2002): adapted for intergroup conflict settings','SCORE Index: perceived threat sub-dimension items'],notes:'Integrated Threat Theory distinguishes realistic threat (economic, safety) from symbolic threat (values, identity). Both predict prejudice and support for exclusion. Context-specific outgroup definition required.'},
{id:'PVE17',sector:'pcve',subsector:'Radicalisation Risk (VEEM Push/Pull)',name:'Social exclusion and marginalisation',definition:'Proportion of individuals reporting experiences of social exclusion based on identity (ethnic, religious, clan, political affiliation).',numerator:'Respondents reporting exclusion experiences above threshold',denominator:'Total respondents',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Ethnicity','Geography/Admin'],sources:['Household Survey'],frameworks:['UNDP','USAID'],tools:['Social Exclusion Scale: multi-dimensional (economic, political, social, cultural) items','UNDP Journey to Extremism Survey: discrimination and marginalisation section','Horizontal Inequality Index (Stewart 2008): group-based inequality measurement framework','VEEM Framework: Push Factor domain - marginalisation','USAID YouthPower: belonging and exclusion module'],notes:'Marginalisation is consistently identified as a primary push factor in P/CVE research (UNDP Journey to Extremism). Measure both perceived and objective exclusion. Disaggregate by domain: economic, political, social, spatial.'},
{id:'PVE18',sector:'pcve',subsector:'Resilience & Protective Factors',name:'Economic opportunity perception',definition:'Self-reported assessment of current and future economic opportunities, including employment, livelihoods, and upward mobility.',numerator:'Respondents rating opportunities above threshold',denominator:'Total respondents',unit:'% or mean score',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Education','Geography/Admin'],sources:['Household Survey','Community Survey'],frameworks:['UNDP','USAID'],tools:['Afrobarometer: economic conditions and opportunity perception items (Q4a-Q4e)','UNDP Journey to Extremism Survey: economic grievance and aspiration section','USAID YouthPower PYD Survey: economic empowerment module','ILO School-to-Work Transition Survey: youth aspiration and perception section','VEEM Framework: Push Factor domain - economic drivers'],notes:'Perceived lack of opportunity (relative deprivation) is a stronger predictor of radicalisation than absolute poverty. Measure perception relative to aspirations and reference group, not just objective metrics.'},
{id:'PVE19',sector:'pcve',subsector:'Social Cohesion & Trust',name:'Community safety and security perception',definition:'Percentage of population feeling safe or very safe walking in their community at night, and perception of security force presence and conduct.',numerator:'Respondents feeling safe/very safe',denominator:'Total respondents',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Ethnicity','Urban/Rural','Geography/Admin'],sources:['Household Survey','Community Survey'],frameworks:['UNDP','SDG'],tools:['Afrobarometer Round 9: personal security items (Q8-Q10)','SCORE Index: personal security dimension','SDG 16.1.4 methodology: "proportion of population feeling safe walking alone"','UNDP Community Security Survey: safety perception and experience module','Victimisation survey: direct experience vs. perceived risk'],notes:'SDG 16.1.4. Distinguish between perceived safety (subjective) and direct victimisation experience (objective). Gender-disaggregated safety data is critical. Safety perception correlates with trust in institutions and community engagement.'},
{id:'PVE20',sector:'pcve',subsector:'Social Cohesion & Trust',name:'Direct exposure to violence',definition:'Proportion of population reporting direct exposure to violence (witnessing, victimisation, or perpetration) in the past 12 months.',numerator:'Respondents reporting direct violence exposure',denominator:'Total respondents',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Age','Violence type','Geography/Admin'],sources:['Household Survey'],frameworks:['UNDP','SDG'],tools:['WHO Violence Against Women/Men Survey instrument','SDG 16.1.3 methodology: "proportion subjected to physical, psychological, sexual violence"','Harvard Trauma Questionnaire (HTQ): exposure to traumatic events section (16 items)','Conflict Experiences Scale (adapted per context)','ACLED / UCDP data for macro-level violence exposure mapping'],notes:'SDG 16.1. Direct violence exposure is both an outcome (programme effectiveness) and a risk factor (for radicalisation, mental health). Distinguish types: political, criminal, domestic, community. Ethical protocols mandatory: informed consent, referral pathways, do-no-harm assessment.'},
{id:'PVE21',sector:'pcve',subsector:'Governance & Accountability',name:'Women\'s participation in peacebuilding and governance',definition:'Proportion of women among participants in local peacebuilding structures, community decision-making bodies, and governance platforms.',numerator:'Women in peacebuilding/governance structures',denominator:'Total members of structures',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Geography/Admin','Structure type'],sources:['Community Survey','Admin Records'],frameworks:['UNDP','SDG'],tools:['SDG 5.5.1 methodology: women in decision-making positions','UN 1325 National Action Plan monitoring framework: women\'s participation indicators','Community scorecard: gender participation tracking section','GCERF Monitoring Framework: gender-sensitive community resilience indicators','USAID Women, Peace, and Security Monitoring Toolkit'],notes:'UNSCR 1325 and SDG 5. Women\'s meaningful participation (not just presence) in peacebuilding is protective. Track both presence (seats) and influence (agenda-setting, resource allocation power). Intersectional analysis by age/ethnicity.'},
{id:'PVE22',sector:'pcve',subsector:'Resilience & Protective Factors',name:'Media and information literacy',definition:'Proportion of target population able to critically evaluate media messages, identify misinformation, and use diverse information sources.',numerator:'Respondents scoring above threshold on MIL assessment',denominator:'Total respondents',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Education','Geography/Admin'],sources:['Household Survey'],frameworks:['UNDP','USAID'],tools:['UNESCO MIL Assessment Framework: knowledge, skills, attitudes instrument','IREX Media Literacy Index: adapted country-level assessment','Digital media literacy questionnaire: misinformation identification vignettes','VEEM Framework: Protective Factor domain - critical thinking and media literacy','Custom assessment: present 5-10 real/fake news items, score ability to distinguish'],notes:'Critical media literacy is a key protective factor against extremist recruitment (online and offline). Vignette-based measurement is more valid than self-reported skills. Include platform-specific literacy (WhatsApp, Facebook, TikTok per context).'},
// ── CLIMATE ADDITIONS ─────────────────────────────────────
{id:'CLI05',sector:'climate',subsector:'Adaptation',name:'Adaptive capacity index',definition:'Composite score measuring household/community capacity to anticipate, absorb, adapt to, and recover from climate shocks.',numerator:'Weighted composite of adaptive capacity dimensions',denominator:'N/A (index 0-100)',unit:'index 0-100',level:'Outcome',frequency:'Annual',disagg:['Sex','Geography/Admin','Wealth Quintile'],sources:['Household Survey'],frameworks:['GCF/AF','UNDP'],tools:['BRACED (Building Resilience and Adaptation to Climate Extremes and Disasters) 3As Framework: anticipatory, absorptive, adaptive capacities','ACCRA (Africa Climate Change Resilience Alliance) Local Adaptive Capacity Framework: 5 dimensions (asset base, innovation, knowledge, governance, flexible planning)','TAMD (Tracking Adaptation and Measuring Development) Framework: process and outcome indicators','FAO SHARP (Self-evaluation and Holistic Assessment of climate Resilience of farmers and Pastoralists)'],notes:'Multiple frameworks exist. Choose based on context and donor. Ensure dimensional weighting is explicit and justified. Track change over time (pre-post or panel) rather than cross-sectional comparison only.'},
{id:'CLI06',sector:'climate',subsector:'Mitigation',name:'Climate finance mobilized (international and domestic)',definition:'Total climate finance (adaptation and mitigation) mobilized in a country or programme, disaggregated by source and channel.',numerator:'Climate finance committed/disbursed (USD)',denominator:'N/A',unit:'USD',level:'Output',frequency:'Annual',disagg:['Adaptation vs. mitigation','Source (public/private/bilateral/multilateral)','Geography/Admin'],sources:['Admin Records'],frameworks:['GCF/AF','SDG'],tools:['OECD DAC Rio Markers: climate finance tracking methodology','GCF/AF project financial reporting templates','National Climate Finance Tracking System (where established)','Climate Policy Initiative (CPI): Global Landscape of Climate Finance methodology','UNFCCC Biennial Transparency Reports: climate finance reporting'],notes:'SDG 13.a. Tracking is complex: additionality, Rio Marker accuracy, adaptation/mitigation overlap. MDB joint methodology for private finance mobilization. Compare pledged vs. committed vs. disbursed.'},
{id:'CLI07',sector:'climate',subsector:'Environmental Health',name:'Forest cover change (annual rate)',definition:'Annual rate of change in forest area (deforestation and reforestation/afforestation combined).',numerator:'Forest area change (hectares/year)',denominator:'Total forest area at baseline',unit:'% change per year',level:'Impact',frequency:'Annual',disagg:['Geography/Admin','Forest type'],sources:['Admin Records','Routine Monitoring'],frameworks:['SDG'],tools:['Global Forest Watch (Hansen/UMD): satellite-based tree cover loss/gain data','FAO Global Forest Resources Assessment (FRA): national reporting questionnaire','UNFCCC REDD+ reference levels and monitoring','Collect Earth / Open Foris: FAO open-source land monitoring tool','National forest inventory methodology'],notes:'SDG 15.1.1. Distinguish deforestation, degradation, reforestation, afforestation, and regeneration. Remote sensing provides spatially explicit data. Ground-truthing required for accuracy.'},
{id:'CLI08',sector:'climate',subsector:'DRR',name:'Climate-related internal displacement',definition:'Number of people internally displaced by climate-related disasters (floods, storms, droughts, wildfires) in a given year.',numerator:'People newly displaced by climate events',denominator:'N/A (absolute number)',unit:'number',level:'Impact',frequency:'Annual',disagg:['Disaster type','Geography/Admin','Sex'],sources:['Admin Records'],frameworks:['SDG'],tools:['IDMC (Internal Displacement Monitoring Centre): Global Internal Displacement Database','IOM Displacement Tracking Matrix (DTM): event tracking and flow monitoring','National disaster management authority displacement reports','DesInventar Sendai: disaster loss database (UNDRR)','OCHA Humanitarian Needs Overview (HNO): displacement figures'],notes:'IDMC distinguishes disaster displacement from conflict displacement. Track new displacements (events) and total IDPs (stock). Climate attribution is complex: some disasters have mixed climate/non-climate drivers. Link to adaptation effectiveness.'},

/* ════════════════════════════════════════════════════════════════
   CSV EXPORT UTILITY
   ════════════════════════════════════════════════════════════════ */
function exportCSV(indicators, filename){
  const esc = v => `"${String(v||'').replace(/"/g,'""')}"`;
  const hdr = ['ID','Sector','Subsector','Name','Definition','Numerator','Denominator','Unit','Level','Frequency','Disaggregation','Frameworks','Data Sources','Data Collection Instruments','Practitioner Notes'];
  const rows = indicators.map(i => [i.id,i.sector,i.subsector,i.name,i.definition,i.numerator,i.denominator,i.unit,i.level,i.frequency,i.disagg.join('; '),i.frameworks.join('; '),i.sources.join('; '),i.tools.join('; '),i.notes].map(esc).join(','));
  const csv = [hdr.map(esc).join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = filename || 'praxis-indicators.csv';
  link.click();
}

function copyIndicator(ind){
  const txt = `${ind.id}: ${ind.name}\nDefinition: ${ind.definition}\nNumerator: ${ind.numerator}\nDenominator: ${ind.denominator}\nUnit: ${ind.unit} | Level: ${ind.level} | Frequency: ${ind.frequency}\nDisaggregation: ${ind.disagg.join(', ')}\nFrameworks: ${ind.frameworks.join(', ')}\nData Sources: ${ind.sources.join(', ')}\nData Collection Instruments: ${ind.tools.join('; ')}\nNote: ${ind.notes}`;
  navigator.clipboard.writeText(txt);
}
