              {inBasket ? '★ In selection' : '☆ Add to selection'}
            </button>
            <button onClick={(e)=>{e.stopPropagation();onCopy(ind)}} style={{cursor:'pointer',background:'rgba(136,153,170,.06)',border:'1px solid rgba(136,153,170,.1)',color:'#8899AA',padding:'6px 14px',borderRadius:6,fontSize:11,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>
              {showCopied ? '✓ Copied' : '⎘ Copy'}
            </button>
          </div>
        </div>
      </div>
    )}
  </div>
);

/* ════════════════════════════════════════════════════════════════
   MAIN APP
   ════════════════════════════════════════════════════════════════ */
const App = () => {
  const [sector, setSector] = useState(null);
  const [search, setSearch] = useState('');
  const [globalSearch, setGlobalSearch] = useState('');
  const [fLevel, setFLevel] = useState(null);
  const [fSub, setFSub] = useState(null);
  const [filtersOpen, setFiltersOpen] = useState(false);
  const [expanded, setExpanded] = useState(new Set());
  const [basket, setBasket] = useState([]);
  const [basketOpen, setBasketOpen] = useState(false);
  const [copiedId, setCopiedId] = useState(null);
  const searchRef = useRef(null);

  // Keyboard shortcut
  useEffect(()=>{
    const handler = (e)=>{
      if((e.ctrlKey||e.metaKey) && e.key==='k'){e.preventDefault();searchRef.current?.focus();}
      if(e.key==='Escape'){setBasketOpen(false);}
    };
    window.addEventListener('keydown',handler);
    return ()=>window.removeEventListener('keydown',handler);
  },[]);

  const toggleExpand = (id)=> setExpanded(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const toggleBasket = (id)=> setBasket(prev=>prev.includes(id)?prev.filter(b=>b!==id):[...prev,id]);
  const handleCopy = (ind)=>{copyIndicator(ind);setCopiedId(ind.id);setTimeout(()=>setCopiedId(null),1500);};
  const resetFilters = ()=>{setSearch('');setFLevel(null);setFSub(null);};
  const enterSector = (id)=>{setSector(id);resetFilters();setExpanded(new Set());};

  const sectorObj = SECTORS.find(s=>s.id===sector);
  const sColor = sectorObj?.color || '#2EC4B6';

  const sectorCounts = useMemo(()=>{const c={};SECTORS.forEach(s=>{c[s.id]=DB.filter(i=>i.sector===s.id).length;});return c;},[]);

  // Global search results (cross-sector)
  const globalResults = useMemo(()=>{
    if(!globalSearch || globalSearch.length<2) return [];
    const q = globalSearch.toLowerCase();
    return DB.filter(i=>i.name.toLowerCase().includes(q)||i.definition.toLowerCase().includes(q)||i.id.toLowerCase().includes(q)||i.subsector.toLowerCase().includes(q)||i.tools.some(t=>t.toLowerCase().includes(q)));
  },[globalSearch]);

  // Sector-filtered indicators
  const sectorInds = useMemo(()=>DB.filter(i=>i.sector===sector),[sector]);
  const filteredInds = useMemo(()=>{
    let list = sectorInds;
    if(search){const q=search.toLowerCase();list=list.filter(i=>i.name.toLowerCase().includes(q)||i.definition.toLowerCase().includes(q)||i.id.toLowerCase().includes(q)||i.subsector.toLowerCase().includes(q)||i.frameworks.some(f=>f.toLowerCase().includes(q))||i.sources.some(s=>s.toLowerCase().includes(q))||i.tools.some(t=>t.toLowerCase().includes(q)));}
    if(fLevel) list=list.filter(i=>i.level===fLevel);
    if(fSub) list=list.filter(i=>i.subsector===fSub);
    return list;
  },[sectorInds,search,fLevel,fSub]);

  const availableSubs = useMemo(()=>[...new Set(sectorInds.map(i=>i.subsector))],[sectorInds]);

  const basketInds = useMemo(()=>DB.filter(i=>basket.includes(i.id)),[basket]);

  // ── LANDING PAGE ──────────────────────────────────────────
  if(!sector) return (
    <div style={{minHeight:'100vh'}}>
      <Topbar onBack={null} sectorName={null} basket={basket} onBasketClick={()=>setBasketOpen(true)} />

      {/* Hero with GLOBAL SEARCH */}
      <div style={{background:'linear-gradient(170deg,#0B1A2E,#122240 50%,#0B1A2E)',padding:'64px 24px 56px',position:'relative',overflow:'hidden',textAlign:'center'}}>
        <div style={{position:'absolute',inset:0,opacity:.03,backgroundImage:'linear-gradient(rgba(46,196,182,.5) 1px, transparent 1px), linear-gradient(90deg, rgba(46,196,182,.5) 1px, transparent 1px)',backgroundSize:'48px 48px',pointerEvents:'none'}} />
        <div style={{position:'relative',zIndex:1,maxWidth:680,margin:'0 auto'}}>
          <div style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(46,196,182,.08)',border:'1px solid rgba(46,196,182,.15)',borderRadius:20,padding:'5px 16px',marginBottom:20,animation:'fadeSlide .4s ease both'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'#2EC4B6',animation:'pulse 2s ease infinite'}} />
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:600,color:'#2EC4B6',letterSpacing:'.08em'}}>{DB.length} INDICATORS · {SECTORS.length} SECTORS · INSTRUMENT-LINKED</span>
          </div>
          <h1 style={{fontSize:'clamp(26px,4vw,40px)',fontWeight:800,color:'#E8ECF0',lineHeight:1.15,marginBottom:14,letterSpacing:'-.02em',animation:'fadeSlide .4s ease .1s both'}}>Indicator Bank & Selector</h1>
          <p style={{fontSize:15,color:'#8899AA',lineHeight:1.6,maxWidth:540,margin:'0 auto 24px',animation:'fadeSlide .4s ease .2s both'}}>Every indicator linked to its validated data collection instrument. Search across all sectors or browse by domain.</p>

          {/* Global search */}
          <div style={{maxWidth:520,margin:'0 auto',position:'relative',animation:'fadeSlide .4s ease .3s both'}}>
            <input ref={searchRef} value={globalSearch} onChange={e=>setGlobalSearch(e.target.value)}
              placeholder="Search all indicators... (Ctrl+K)"
              style={{width:'100%',background:'rgba(255,255,255,.05)',border:'1px solid rgba(46,196,182,.15)',borderRadius:10,padding:'12px 18px 12px 40px',color:'#E8ECF0',fontSize:14,fontFamily:"'DM Sans',sans-serif",outline:'none',transition:'border-color .15s'}}
              onFocus={e=>e.target.style.borderColor='rgba(46,196,182,.4)'}
              onBlur={e=>e.target.style.borderColor='rgba(46,196,182,.15)'}
            />
            <span style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',color:'#5a6d7e',fontSize:14}}>⌕</span>
            {globalSearch.length>=2 && (
              <div style={{position:'absolute',top:'calc(100% + 6px)',left:0,right:0,maxHeight:400,overflowY:'auto',background:'#122240',border:'1px solid rgba(46,196,182,.15)',borderRadius:10,zIndex:100,boxShadow:'0 16px 48px rgba(0,0,0,.5)'}}>
                {globalResults.length===0 ? (
                  <div style={{padding:20,textAlign:'center',color:'#5a6d7e',fontSize:13}}>No indicators match "{globalSearch}"</div>
                ) : (
                  globalResults.slice(0,15).map(ind=>{
                    const sec = SECTORS.find(s=>s.id===ind.sector);
                    return (
                      <div key={ind.id} onClick={()=>{enterSector(ind.sector);setGlobalSearch('');setTimeout(()=>{setSearch(ind.name.slice(0,20));setExpanded(new Set([ind.id]));},100);}}
                        style={{padding:'10px 16px',cursor:'pointer',borderBottom:'1px solid rgba(136,153,170,.06)',display:'flex',alignItems:'center',gap:10,transition:'background .1s'}}
                        onMouseEnter={e=>e.currentTarget.style.background='rgba(255,255,255,.03)'}
                        onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                        <span style={{fontSize:14}}>{sec?.icon}</span>
                        <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:sec?.color,minWidth:40}}>{ind.id}</span>
                        <span style={{fontSize:12.5,color:'#E8ECF0',flex:1}}>{ind.name}</span>
                        <span style={{fontSize:9,color:'#5a6d7e',fontFamily:"'JetBrains Mono',monospace"}}>{ind.subsector}</span>
                      </div>
                    );
                  })
                )}
                {globalResults.length>15 && <div style={{padding:'8px 16px',textAlign:'center',color:'#5a6d7e',fontSize:11}}>{globalResults.length-15} more results. Narrow your search.</div>}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Sector Grid */}
      <div style={{maxWidth:1100,margin:'-20px auto 0',padding:'0 24px 80px',position:'relative',zIndex:2}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(280px, 1fr))',gap:14}}>
          {SECTORS.map((s,i)=><SectorCard key={s.id} sector={s} count={sectorCounts[s.id]} onClick={enterSector} delay={80+i*50} />)}
        </div>
        {basket.length>0 && (
          <div style={{marginTop:28,textAlign:'center'}}>
            <button onClick={()=>setBasketOpen(true)} style={{cursor:'pointer',background:'rgba(232,163,23,.1)',border:'1px solid rgba(232,163,23,.2)',color:'#E8A317',padding:'10px 24px',borderRadius:8,fontSize:13,fontWeight:600,fontFamily:"'DM Sans',sans-serif"}}>
              ★ View {basket.length} selected indicator{basket.length>1?'s':''}
            </button>
          </div>
        )}
      </div>

      {/* Basket drawer */}
      {basketOpen && <BasketDrawer inds={basketInds} onClose={()=>setBasketOpen(false)} onRemove={toggleBasket} onExport={()=>exportCSV(basketInds,'praxis-selected-indicators.csv')} />}

      <Footer />
    </div>
  );

  // ── SECTOR VIEW ───────────────────────────────────────────
  return (
    <div style={{minHeight:'100vh'}}>
      <Topbar onBack={()=>{setSector(null);resetFilters();}} sectorName={sectorObj?.name} basket={basket} onBasketClick={()=>setBasketOpen(true)} />

      {/* Header */}
      <div style={{background:'linear-gradient(170deg,#0B1A2E,#122240)',padding:'32px 24px 24px',borderBottom:`1px solid ${sColor}15`}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8,flexWrap:'wrap'}}>
            <span style={{fontSize:26}}>{sectorObj?.icon}</span>
            <h2 style={{fontSize:22,fontWeight:800,color:'#E8ECF0'}}>{sectorObj?.name}</h2>
            <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,fontWeight:600,color:sColor,background:sColor+'15',padding:'3px 10px',borderRadius:10}}>{filteredInds.length} result{filteredInds.length!==1?'s':''}</span>
            <button onClick={()=>exportCSV(filteredInds,`praxis-${sector}-indicators.csv`)} style={{cursor:'pointer',marginLeft:'auto',background:'rgba(46,196,182,.08)',border:'1px solid rgba(46,196,182,.15)',color:'#2EC4B6',padding:'5px 14px',borderRadius:6,fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>↓ Export CSV</button>
          </div>
          <p style={{fontSize:12.5,color:'#8899AA',maxWidth:600}}>{sectorObj?.desc}</p>
        </div>
      </div>

      {/* Search + collapsible filters */}
      <div style={{background:'rgba(11,26,46,.95)',backdropFilter:'blur(8px)',borderBottom:'1px solid rgba(136,153,170,.06)',padding:'12px 24px',position:'sticky',top:41,zIndex:50}}>
        <div style={{maxWidth:1100,margin:'0 auto'}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search within sector..."
              style={{flex:1,background:'rgba(255,255,255,.04)',border:'1px solid rgba(136,153,170,.08)',borderRadius:7,padding:'8px 14px',color:'#E8ECF0',fontSize:12.5,fontFamily:"'DM Sans',sans-serif",outline:'none'}}
            />
            <button onClick={()=>setFiltersOpen(!filtersOpen)} style={{cursor:'pointer',background:filtersOpen?'rgba(46,196,182,.12)':'rgba(136,153,170,.06)',border:`1px solid ${filtersOpen?'rgba(46,196,182,.2)':'rgba(136,153,170,.08)'}`,color:filtersOpen?'#2EC4B6':'#8899AA',padding:'8px 14px',borderRadius:7,fontSize:11,fontWeight:600,fontFamily:"'JetBrains Mono',monospace",whiteSpace:'nowrap'}}>
              ⚙ Filters {(fLevel||fSub)?`(${[fLevel,fSub].filter(Boolean).length})` : ''}
            </button>
            {(fLevel||fSub||search) && <button onClick={resetFilters} style={{cursor:'pointer',background:'rgba(232,93,93,.06)',border:'1px solid rgba(232,93,93,.15)',color:'#E85D5D',padding:'8px 12px',borderRadius:7,fontSize:10,fontWeight:600,fontFamily:"'JetBrains Mono',monospace"}}>✕</button>}
          </div>
          {filtersOpen && (
            <div style={{marginTop:10,paddingTop:10,borderTop:'1px solid rgba(136,153,170,.06)'}}>
              <div style={{display:'flex',flexWrap:'wrap',gap:5,alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:9,color:'#5a6d7e',fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',fontFamily:"'JetBrains Mono',monospace",marginRight:4}}>Level</span>
                {ALL_LEVELS.map(l=><Pill key={l} label={l} active={fLevel===l} onClick={()=>setFLevel(fLevel===l?null:l)} color={sColor} />)}
              </div>
              {availableSubs.length>1 && (
                <div style={{display:'flex',flexWrap:'wrap',gap:5,alignItems:'center'}}>
                  <span style={{fontSize:9,color:'#5a6d7e',fontWeight:700,letterSpacing:'.5px',textTransform:'uppercase',fontFamily:"'JetBrains Mono',monospace",marginRight:4}}>Area</span>
                  {availableSubs.map(s=><Pill key={s} label={s} active={fSub===s} onClick={()=>setFSub(fSub===s?null:s)} color={sColor} />)}
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* Indicator list */}
      <div style={{maxWidth:1100,margin:'0 auto',padding:'20px 24px 80px'}}>
        {filteredInds.length===0 ? (
          <div style={{textAlign:'center',padding:'48px 20px',color:'#5a6d7e'}}>
            <div style={{fontSize:28,marginBottom:10,opacity:.4}}>⌕</div>
            <p style={{fontSize:13,marginBottom:8}}>No indicators match your filters.</p>
            <button onClick={resetFilters} style={{cursor:'pointer',background:'none',border:'1px solid rgba(46,196,182,.2)',color:'#2EC4B6',padding:'7px 18px',borderRadius:6,fontSize:11,fontWeight:600}}>Reset</button>
          </div>
        ) : filteredInds.map((ind,i)=>(
          <div key={ind.id} style={{animation:`fadeSlide .3s ease ${Math.min(i*25,250)}ms both`}}>
            <IndicatorRow ind={ind} color={sColor} expanded={expanded.has(ind.id)} onToggle={()=>toggleExpand(ind.id)} inBasket={basket.includes(ind.id)} onBasketToggle={toggleBasket} onCopy={handleCopy} showCopied={copiedId===ind.id} />
          </div>
        ))}
      </div>

      {basketOpen && <BasketDrawer inds={basketInds} onClose={()=>setBasketOpen(false)} onRemove={toggleBasket} onExport={()=>exportCSV(basketInds,'praxis-selected-indicators.csv')} />}
      <Footer />
    </div>
  );
};

// ── Basket Drawer ────────────────────────────────────────────
const BasketDrawer = ({inds,onClose,onRemove,onExport}) => (
  <div style={{position:'fixed',inset:0,zIndex:9999,display:'flex',justifyContent:'flex-end'}}>
    <div onClick={onClose} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.5)'}} />
    <div style={{position:'relative',width:'100%',maxWidth:480,background:'#0d1f35',borderLeft:'1px solid rgba(46,196,182,.12)',padding:24,overflowY:'auto',display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <h3 style={{fontSize:16,fontWeight:700,color:'#E8ECF0'}}>Selected Indicators ({inds.length})</h3>
        <button onClick={onClose} style={{cursor:'pointer',background:'none',border:'none',color:'#8899AA',fontSize:18}}>✕</button>
      </div>
      {inds.length===0 ? (
        <p style={{color:'#5a6d7e',fontSize:13,textAlign:'center',padding:40}}>No indicators selected yet. Open any indicator and click "Add to selection."</p>
      ) : (
        <>
          <button onClick={onExport} style={{cursor:'pointer',background:'rgba(46,196,182,.1)',border:'1px solid rgba(46,196,182,.2)',color:'#2EC4B6',padding:'10px 20px',borderRadius:8,fontSize:12,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",marginBottom:16,width:'100%'}}>↓ Export {inds.length} indicators as CSV</button>
          <div style={{flex:1}}>
            {inds.map(ind=>{
              const sec = SECTORS.find(s=>s.id===ind.sector);
              return (
                <div key={ind.id} style={{padding:'10px 12px',borderBottom:'1px solid rgba(136,153,170,.06)',display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:14}}>{sec?.icon}</span>
                  <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:9,color:sec?.color,minWidth:36}}>{ind.id}</span>
                  <span style={{fontSize:12,color:'#E8ECF0',flex:1,lineHeight:1.3}}>{ind.name}</span>
                  <button onClick={()=>onRemove(ind.id)} style={{cursor:'pointer',background:'none',border:'none',color:'#E85D5D',fontSize:12,padding:4}}>✕</button>
                </div>
              );
            })}
          </div>
        </>
      )}
    </div>
  </div>
);

// ── Footer ───────────────────────────────────────────────────
const Footer = () => (
  <div style={{borderTop:'1px solid rgba(136,153,170,.08)',padding:24,textAlign:'center',fontSize:12,color:'#5a6d7e'}}>
    © 2026 PRAXIS · An open-source project by <a href="https://www.emmanuelneneodjidja.org/" style={{color:'#2EC4B6',textDecoration:'none'}}>Emmanuel Nene Odjidja</a> · <a href="https://github.com/emmaodjidja-sys/praxis" style={{color:'#2EC4B6',textDecoration:'none'}}>GitHub</a>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
