   desc:'VEEM-aligned radicalisation risk, resilience, social cohesion, and governance indicators. Validated psychometric scales: BRAVE-14, ARIS, SCORE Index, Moral Disengagement, Quest for Significance, Identity Fusion.',
   subsectors:['Radicalisation Risk (VEEM Push/Pull)','Resilience & Protective Factors','Social Cohesion & Trust','Governance & Accountability','Rule of Law & Justice']},
  {id:'climate',name:'Climate & Environment',icon:'🌱',color:'#6DB65B',
   desc:'Climate adaptation, mitigation, DRR, and environmental health. GCF/AF core indicators with specific measurement protocols.',

  {id:'education',name:'Education',icon:'📚',color:'#5B8FDB',

/* ════════════════════════════════════════════════════════════════
   FULL INDICATOR DATABASE
   Each indicator has: id, sector, subsector, name, definition,
   numerator, denominator, unit, level, frequency, disagg[],
   sources[], frameworks[], tools[] (SPECIFIC INSTRUMENTS), notes
   ════════════════════════════════════════════════════════════════ */
const DB = [
// ──────────────────────────────────────────────────────────────
// HEALTH SYSTEMS
// ──────────────────────────────────────────────────────────────
{id:'HSS01',sector:'hss',subsector:'Service Delivery',name:'Outpatient attendance rate (new visits per 10,000)',definition:'Number of new outpatient visits per 10,000 population per year at health facilities.',numerator:'Total new outpatient visits in period',denominator:'Total catchment population',unit:'per 10,000',level:'Output',frequency:'Monthly',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund'],tools:['DHIS2 Tracker: OPD Tally Sheet (MOH standard)','WHO HHFA Module 3: Service Utilisation Statistics'],notes:'Compare across districts to identify access gaps. Seasonal variation expected. Exclude repeat visits.'},
{id:'HSS02',sector:'hss',subsector:'Health Workforce',name:'Health worker density (physicians, nurses, midwives per 10,000)',definition:'Number of physicians, nurses, and midwives per 10,000 population.',numerator:'Total physicians + nurses + midwives',denominator:'Total population',unit:'per 10,000',level:'Impact',frequency:'Annual',disagg:['Geography/Admin','Urban/Rural'],sources:['Admin Records','Facility Assessment'],frameworks:['WHO 100 Core','SDG','Global Fund'],tools:['WHO National Health Workforce Accounts (NHWA)','iHRIS (open-source HR information system)','WHO SARA Module 2: Health Workforce Roster'],notes:'WHO threshold: 44.5 per 10,000 for essential coverage. Most LMICs below 23 per 10,000. SDG 3.c.1.'},
{id:'HSS03',sector:'hss',subsector:'Health Workforce',name:'Health worker absenteeism rate',definition:'Percentage of expected work-days where assigned health workers were absent from their posts, measured by unannounced spot-checks.',numerator:'Absent worker-days observed',denominator:'Expected worker-days',unit:'%',level:'Process',frequency:'Quarterly',disagg:['Geography/Admin','Urban/Rural','Cadre'],sources:['Facility Assessment'],frameworks:['Global Fund'],tools:['World Bank SDI (Service Delivery Indicators) Survey: Absenteeism Module','Unannounced facility spot-check protocol (Chaudhury et al. 2006 methodology)'],notes:'SDI methodology: visit facilities unannounced, compare staff present vs. scheduled. Rates >25% signal systemic problems.'},
{id:'HSS04',sector:'hss',subsector:'Health Information Systems',name:'HMIS reporting completeness',definition:'Percentage of expected facility monthly reports received at district level by the reporting deadline.',numerator:'Reports received on time',denominator:'Reports expected',unit:'%',level:'Process',frequency:'Monthly',disagg:['Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund','Gavi 5.0/5.1'],tools:['DHIS2 Completeness Dashboard (built-in analytics)','WHO Data Quality Review (DQR) Toolkit: Module 1 Completeness','Global Fund RDQA (Routine Data Quality Assessment) Tool'],notes:'Target >90%. Core data quality indicator. Low completeness invalidates all coverage denominators calculated from HMIS.'},
{id:'HSS05',sector:'hss',subsector:'Health Information Systems',name:'HMIS data accuracy (verification factor)',definition:'Ratio of recounted records from source documents to reported HMIS values.',numerator:'Recounted value from registers/tally sheets',denominator:'HMIS reported value',unit:'ratio',level:'Process',frequency:'Annual',disagg:['Geography/Admin'],sources:['DHIS2/HMIS','Facility Assessment'],frameworks:['Global Fund','Gavi 5.0/5.1'],tools:['Global Fund RDQA Tool: Verification Protocol','WHO DQR Toolkit: Module 2 Internal Consistency','Gavi DQS (Data Quality Self-Assessment) Protocol','DHIS2 vs. register recount form (standard DQA template)'],notes:'Ideal = 1.0. >1.05 = under-reporting. <0.95 = over-reporting. Conduct at random sample of facilities.'},
{id:'HSS06',sector:'hss',subsector:'Supply Chain',name:'Tracer medicine availability',definition:'Percentage of health facilities with no stock-out of a defined basket of tracer medicines on the day of assessment.',numerator:'Facilities with all tracers in stock',denominator:'Total facilities assessed',unit:'%',level:'Output',frequency:'Quarterly',disagg:['Geography/Admin','Urban/Rural','Facility level'],sources:['Facility Assessment','DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund'],tools:['WHO SARA Module 4: Medicines and Commodities Checklist','WHO/HAI Medicine Price and Availability Survey','eLMIS stock status reports (e.g., OpenLMIS, mSupply)','Global Fund WAMBO procurement tracking'],notes:'Standard tracer basket: ORS, amoxicillin, ACTs, oxytocin, magnesium sulfate, injectable antibiotics. Adapt to national essential medicines list.'},
{id:'HSS07',sector:'hss',subsector:'Health Financing',name:'Out-of-pocket expenditure as % of total health expenditure',definition:'Proportion of total health expenditure financed directly by households at point of care.',numerator:'Total OOP health spending',denominator:'Total health expenditure (THE)',unit:'%',level:'Impact',frequency:'Annual',disagg:['Wealth Quintile'],sources:['Household Survey','Admin Records'],frameworks:['WHO 100 Core','SDG'],tools:['WHO System of Health Accounts (SHA 2011) methodology','National Health Accounts (NHA) production tool','World Bank Living Standards Measurement Survey (LSMS): Health expenditure module'],notes:'SDG 3.8.2 linked. Above 20% indicates high financial burden. Catastrophic health expenditure threshold: OOP >10% or >25% of household consumption.'},
{id:'HSS08',sector:'hss',subsector:'Governance',name:'UHC service coverage index',definition:'Composite index (0-100) of essential health service coverage based on 14 tracer interventions across RMNCH, infectious disease, NCDs, and service capacity.',numerator:'Geometric mean of 14 tracer coverages',denominator:'N/A (composite)',unit:'index 0-100',level:'Impact',frequency:'Annual',disagg:['Geography/Admin','Wealth Quintile'],sources:['DHS','MICS','DHIS2/HMIS'],frameworks:['WHO 100 Core','SDG'],tools:['WHO/World Bank UHC monitoring framework','DHS-8 STATcompiler (automated UHC index calculation)','WHO Global Health Observatory (GHO) UHC data portal'],notes:'SDG 3.8.1. Includes FP satisfied, ANC4+, DTP3, TB treatment, ART, ITN, at least basic sanitation, NCD management. Geometric mean penalises low outliers.'},

// ──────────────────────────────────────────────────────────────
// DISEASE PROGRAMMES
// ──────────────────────────────────────────────────────────────
// HIV/AIDS
{id:'HIV01',sector:'disease',subsector:'HIV/AIDS',name:'HIV testing yield (% positive among tested)',definition:'Percentage of individuals tested for HIV who receive a positive result, by testing modality.',numerator:'Positive HIV tests',denominator:'Total HIV tests conducted',unit:'%',level:'Output',frequency:'Quarterly',disagg:['Sex','Age','Testing modality','Geography/Admin'],sources:['DHIS2/HMIS','Sentinel Surveillance'],frameworks:['PEPFAR MER','Global Fund','WHO 100 Core'],tools:['PEPFAR MER Indicator: HTS_TST_POS / HTS_TST','National HIV Testing Register (MOH standard)','DHIS2 HIV Testing Module','WHO Consolidated Guidelines on HIV Testing Services (Annex: Reporting form)'],notes:'Disaggregate by modality: VCT, PITC, index testing, community, PMTCT. Index testing typically has highest yield (>10%). Low yield in general population (<2%) expected.'},
{id:'HIV02',sector:'disease',subsector:'HIV/AIDS',name:'ART coverage (% of PLHIV on treatment)',definition:'Percentage of all people living with HIV who are currently receiving antiretroviral therapy.',numerator:'People currently on ART',denominator:'Estimated PLHIV (Spectrum/EPP model)',unit:'%',level:'Outcome',frequency:'Quarterly',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS','Admin Records'],frameworks:['PEPFAR MER','Global Fund','WHO 100 Core','SDG'],tools:['PEPFAR MER Indicator: TX_CURR','UNAIDS Spectrum/EPP modelling software (denominator estimation)','DHIS2 ART Register Module','WHO Patient Monitoring Guidelines: ART Cohort Register'],notes:'Second "95" in 95-95-95. Denominator is modelled, not directly observed. Numerator from ART registers. Distinguish current on ART vs. ever initiated.'},
{id:'HIV03',sector:'disease',subsector:'HIV/AIDS',name:'Viral load suppression (% of ART patients with VL <1000 copies/ml)',definition:'Percentage of people on ART for at least 6 months with a suppressed viral load (<1000 copies/ml).',numerator:'ART patients with VL <1000 copies/ml',denominator:'ART patients with VL test result',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS','Sentinel Surveillance'],frameworks:['PEPFAR MER','Global Fund','WHO 100 Core'],tools:['PEPFAR MER Indicator: TX_PVLS (Numerator/Denominator)','DHIS2 Viral Load Module','Laboratory Information System (LIMS) VL results register','WHO Patient Monitoring Guidelines: VL cascade template'],notes:'Third "95" in 95-95-95. Target: >95% among those tested. VL testing coverage (denominator) is itself a key indicator. <80% suppression signals adherence or resistance problems.'},
{id:'HIV04',sector:'disease',subsector:'HIV/AIDS',name:'PMTCT coverage (ART among HIV+ pregnant women)',definition:'Percentage of HIV-positive pregnant women who received ART to reduce MTCT during pregnancy.',numerator:'HIV+ pregnant women receiving ART',denominator:'Estimated HIV+ pregnant women',unit:'%',level:'Outcome',frequency:'Quarterly',disagg:['Age','Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['PEPFAR MER','Global Fund','WHO 100 Core'],tools:['PEPFAR MER Indicator: PMTCT_ART','DHIS2 PMTCT Register Module','ANC Register: HIV testing and ART initiation columns','WHO PMTCT Patient Monitoring Tool'],notes:'Denominator estimated from ANC1 attendance x HIV prevalence. Gap analysis: compare ANC HIV testing coverage to ART uptake among positives.'},
{id:'HIV05',sector:'disease',subsector:'HIV/AIDS',name:'HIV incidence rate (new infections per 1,000 uninfected)',definition:'Estimated number of new HIV infections per 1,000 uninfected population per year.',numerator:'New HIV infections in the period',denominator:'Uninfected person-years at risk',unit:'per 1,000',level:'Impact',frequency:'Annual',disagg:['Sex','Age','Geography/Admin'],sources:['Sentinel Surveillance','Household Survey'],frameworks:['PEPFAR MER','Global Fund','SDG'],tools:['UNAIDS Spectrum/EPP modelling software','PHIA (Population-based HIV Impact Assessment) Survey','DHS-8 HIV biomarker module with recent infection testing algorithm (RITA)','Shiny90 model (UNAIDS)'],notes:'SDG 3.3.1. Direct measurement requires recent infection testing (LAg avidity assay). Usually modelled from Spectrum. PHIA surveys provide direct estimates for PEPFAR countries.'},
// Tuberculosis
{id:'TB01',sector:'disease',subsector:'Tuberculosis',name:'TB case notification rate (new and relapse)',definition:'Number of new and relapse TB cases notified per 100,000 population per year.',numerator:'New + relapse TB cases notified',denominator:'Total population',unit:'per 100,000',level:'Outcome',frequency:'Quarterly',disagg:['Sex','Age','Geography/Admin','HIV status'],sources:['DHIS2/HMIS','Admin Records'],frameworks:['WHO 100 Core','Global Fund','SDG'],tools:['WHO TB recording and reporting forms (2013 revision): TB Treatment Card (TB 01), TB Register (TB 03)','DHIS2 TB Module: Case notification dataset','WHO e-TB Manager','Global Fund TB Results Framework Indicator: TB cases notified'],notes:'SDG 3.3.2. Compare notification to estimated incidence (WHO) to calculate detection gap. Bacteriologically confirmed proportion should be >85%.'},
{id:'TB02',sector:'disease',subsector:'Tuberculosis',name:'TB treatment success rate',definition:'Percentage of TB cases successfully treated (cured + treatment completed) among cases registered in a specified cohort.',numerator:'Cured + treatment completed',denominator:'All TB cases registered in cohort (excl. transferred out)',unit:'%',level:'Outcome',frequency:'Annual (cohort)',disagg:['Sex','Age','HIV status','Drug resistance status','Geography/Admin'],sources:['DHIS2/HMIS','Admin Records'],frameworks:['WHO 100 Core','Global Fund','SDG'],tools:['WHO TB Treatment Card (TB 01): outcome section','WHO TB Register (TB 03): cohort analysis form','DHIS2 TB Module: Treatment outcome dataset','WHO Quarterly TB Cohort Analysis Form (TB 08)'],notes:'Target >=90% for drug-susceptible TB. Disaggregate outcomes: cured, completed, failed, died, lost to follow-up, not evaluated. DR-TB has lower targets.'},
{id:'TB03',sector:'disease',subsector:'Tuberculosis',name:'Bacteriologically confirmed TB proportion',definition:'Percentage of pulmonary TB cases that are bacteriologically confirmed (smear, culture, or GeneXpert/molecular test).',numerator:'Pulmonary TB cases bacteriologically confirmed',denominator:'Total pulmonary TB cases notified',unit:'%',level:'Process',frequency:'Quarterly',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund'],tools:['WHO TB Laboratory Register (TB 04)','GeneXpert results register','DHIS2 TB Module: laboratory results dataset','WHO laboratory request and results form'],notes:'Target >85%. Low proportion indicates over-reliance on clinical diagnosis. Track Xpert coverage and utilisation alongside.'},
// Malaria
{id:'MAL01',sector:'disease',subsector:'Malaria',name:'Malaria test positivity rate (TPR)',definition:'Percentage of suspected malaria cases tested (RDT or microscopy) that are confirmed positive.',numerator:'Confirmed malaria positive tests',denominator:'Total malaria tests performed',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Age','Geography/Admin','Test type'],sources:['DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund'],tools:['DHIS2 Malaria Module: outpatient register malaria section','WHO Malaria Case Surveillance Form','RDT/microscopy register (health facility)','WHO Test. Treat. Track. (T3) reporting template'],notes:'Key malaria burden indicator when case data is reliable. Seasonal variation expected. >5% TPR = high burden; <5% = pre-elimination threshold. TPR preferred over incidence where testing coverage is inconsistent.'},
{id:'MAL02',sector:'disease',subsector:'Malaria',name:'ITN access (% of population with access to an ITN)',definition:'Proportion of the population that could sleep under an ITN if each ITN in the household were used by up to two people.',numerator:'Potential ITN users (ITN count x 2)',denominator:'De facto household population',unit:'%',level:'Output',frequency:'Annual',disagg:['Urban/Rural','Wealth Quintile','Geography/Admin'],sources:['DHS','MICS','Household Survey'],frameworks:['Global Fund','WHO 100 Core'],tools:['DHS-8 Household Questionnaire: Net Roster Module (hv227, ml0-series variables)','MIS (Malaria Indicator Survey): Household net module','MICS6 Household Questionnaire: Mosquito net module (TN1-TN12)'],notes:'Access ≠ use. Access is availability-adjusted. Use is self-reported sleeping under ITN previous night. Gap = behavioural; inform SBCC design.'},
{id:'MAL03',sector:'disease',subsector:'Malaria',name:'ITN use among children under 5',definition:'Percentage of children under five who slept under an insecticide-treated net the previous night.',numerator:'Children <5 who slept under ITN last night',denominator:'Children <5 in surveyed households',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Wealth Quintile','Urban/Rural','Geography/Admin'],sources:['DHS','MICS','Household Survey'],frameworks:['Global Fund','WHO 100 Core','SDG'],tools:['DHS-8 Child Recode: variable ml_netc','MIS (Malaria Indicator Survey): child net use section','MICS6 Child Questionnaire: TN11-TN12'],notes:'Conditional on access. Report as use-to-access ratio for behavioural insight. SDG 3.3.3 linked.'},
{id:'MAL04',sector:'disease',subsector:'Malaria',name:'IPTp3 coverage (3+ doses sulfadoxine-pyrimethamine in pregnancy)',definition:'Percentage of women who received 3 or more doses of IPTp-SP during their last pregnancy.',numerator:'Women receiving 3+ IPTp-SP doses',denominator:'Women with a live birth in past 2 years',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Geography/Admin','Wealth Quintile','Urban/Rural'],sources:['DHS','MICS','DHIS2/HMIS'],frameworks:['Global Fund','WHO 100 Core'],tools:['DHS-8 Woman Questionnaire: ANC module (m49a-series)','ANC Register: IPTp column (doses 1-3+)','DHIS2 ANC Module: IPTp dataset','MICS6 Woman Questionnaire: MN module (IPTp items)'],notes:'WHO recommends IPTp at each ANC visit from 13 weeks. IPTp3 preferred over IPTp2. Large drop-off from IPTp1→IPTp3 signals missed opportunities at ANC.'},
// NCDs
{id:'NCD01',sector:'disease',subsector:'NCDs',name:'Raised blood pressure prevalence (SBP >=140 and/or DBP >=90)',definition:'Percentage of adults aged 18+ with raised blood pressure or currently on medication for hypertension.',numerator:'Adults with SBP >=140 and/or DBP >=90, or on BP medication',denominator:'All adults 18+ measured',unit:'%',level:'Impact',frequency:'3-5 years',disagg:['Sex','Age','Urban/Rural','Wealth Quintile'],sources:['Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['WHO STEPS Survey: Module M (Physical Measurements) - BP measurement protocol','WHO STEPwise approach instrument v3.2: Section P (Blood Pressure)','DHS-8 Biomarker module: Blood pressure (where included)','WHO HEARTS Technical Package: Screening protocol'],notes:'SDG 3.4.1 linked. WHO STEPS is the gold standard. Three seated readings, average of last two. Prevalence typically 20-35% in LMICs, rising.'},
{id:'NCD02',sector:'disease',subsector:'NCDs',name:'Diabetes prevalence (raised fasting glucose or on medication)',definition:'Percentage of adults aged 18+ with fasting plasma glucose >=126 mg/dL, or HbA1c >=6.5%, or currently on diabetes medication.',numerator:'Adults meeting glucose/HbA1c threshold or on medication',denominator:'All adults 18+ tested',unit:'%',level:'Impact',frequency:'3-5 years',disagg:['Sex','Age','Urban/Rural'],sources:['Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['WHO STEPS Survey: Module B (Biochemical Measurements) - FPG/HbA1c protocol','WHO STEPwise instrument v3.2: Section B1-B5','WHO HEARTS Technical Package: Diabetes screening module','WHO PEN (Package of Essential NCD interventions): Screening protocols'],notes:'SDG 3.4.1 linked. FPG requires fasting (8-12hrs). HbA1c does not require fasting but needs lab capacity. Point-of-care HbA1c expanding in LMICs.'},
{id:'NCD03',sector:'disease',subsector:'NCDs',name:'Cervical cancer screening coverage',definition:'Percentage of women aged 30-49 who have been screened for cervical cancer at least once, or more often per national protocol.',numerator:'Women 30-49 screened for cervical cancer',denominator:'Total women aged 30-49',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Geography/Admin','Urban/Rural'],sources:['DHIS2/HMIS','Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['WHO Cervical Cancer Screening Register','DHIS2 Cancer Screening Module','WHO Guide to Introduce HPV Vaccination and Cervical Cancer Screening: Recording tools','DHS Woman Questionnaire (where cancer screening module included)'],notes:'WHO 90-70-90 targets by 2030. Methods: VIA, HPV DNA testing, cytology. HPV DNA preferred. Track screening-to-treatment cascade.'},

// ──────────────────────────────────────────────────────────────
// RMNCAH
// ──────────────────────────────────────────────────────────────
{id:'RMN01',sector:'rmncah',subsector:'Antenatal Care',name:'ANC4+ coverage',definition:'Percentage of women aged 15-49 with a live birth in the past 2 years who received 4 or more ANC visits during pregnancy.',numerator:'Women with 4+ ANC visits',denominator:'Women with live birth in past 2 years',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Wealth Quintile','Urban/Rural','Geography/Admin'],sources:['DHS','MICS','DHIS2/HMIS'],frameworks:['WHO 100 Core','Global Fund','SDG'],tools:['DHS-8 Woman Questionnaire Module 4 (Antenatal Care): m14 variable','MICS6 Woman Questionnaire: MN module (MN2-MN17)','ANC Register (MOH): visit tracking columns','DHIS2 ANC Module: ANC visit dataset (ANC1/ANC4/ANC8)'],notes:'WHO now recommends 8+ contacts (2016 model). ANC4+ still widely reported. Track ANC1 to ANC4+ dropout for access vs. continuity analysis.'},
{id:'RMN02',sector:'rmncah',subsector:'Delivery & Newborn',name:'Skilled birth attendance',definition:'Percentage of live births attended by skilled health personnel (doctor, nurse, or midwife).',numerator:'Live births with skilled attendant',denominator:'Total live births',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Wealth Quintile','Urban/Rural','Geography/Admin','Education'],sources:['DHS','MICS','DHIS2/HMIS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Woman Questionnaire Module 4: m3a-m3g (birth attendant)','MICS6 Woman Questionnaire: MN module (MN18-MN20)','Maternity Register (MOH): delivery attendant column','DHIS2 Delivery Module'],notes:'SDG 3.1.2. Definition of "skilled" varies by country. WHO 2018 definition: competent maternal and newborn health professional.'},
{id:'RMN03',sector:'rmncah',subsector:'Delivery & Newborn',name:'Institutional delivery rate',definition:'Percentage of live births that took place in a health facility.',numerator:'Facility-based live births',denominator:'Total live births',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Wealth Quintile','Urban/Rural','Geography/Admin'],sources:['DHS','MICS','DHIS2/HMIS'],frameworks:['WHO 100 Core'],tools:['DHS-8 Woman Questionnaire: m15 (place of delivery)','MICS6 Woman Questionnaire: MN18','Maternity Register','DHIS2 Delivery Module: facility delivery dataset'],notes:'Proxy for access to EmONC. Distinguish between primary facility and hospital delivery. Track C-section rate alongside (reference range 10-15%).'},
{id:'RMN04',sector:'rmncah',subsector:'Postnatal Care',name:'Postnatal care within 48 hours (mother)',definition:'Percentage of women who received postnatal care within 2 days of delivery.',numerator:'Women with PNC check within 48 hours',denominator:'Women with live birth in past 2 years',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Wealth Quintile','Urban/Rural'],sources:['DHS','MICS'],frameworks:['WHO 100 Core'],tools:['DHS-8 Woman Questionnaire Module 4: m50-m52 (postnatal health checks)','MICS6 Woman Questionnaire: PN module (PN1-PN6)','Postnatal Register (MOH)','WHO Postnatal Care Checklist'],notes:'One of the most neglected coverage gaps globally. Distinguish between PNC for mothers vs. newborns. WHO recommends first PNC within 24 hours.'},
{id:'RMN05',sector:'rmncah',subsector:'Family Planning',name:'Demand for family planning satisfied with modern methods',definition:'Percentage of women of reproductive age (15-49) who have their demand for family planning satisfied by modern contraceptive methods.',numerator:'Women using modern contraception',denominator:'Women using any method + women with unmet need',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Age','Wealth Quintile','Urban/Rural','Marital status'],sources:['DHS','MICS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Woman Questionnaire Module 3 (Family Planning): v312, v313, v625','MICS6 Woman Questionnaire: CP module (CP1-CP5)','FP2030 Track20 data system','PMA (Performance Monitoring for Action) Survey: FP module'],notes:'SDG 3.7.1. Captures both use and need. More meaningful than CPR alone. Disaggregate by method mix to inform programming.'},
{id:'RMN06',sector:'rmncah',subsector:'Child Health',name:'Neonatal mortality rate',definition:'Number of deaths during the first 28 days of life per 1,000 live births.',numerator:'Deaths in first 28 days',denominator:'Total live births',unit:'per 1,000 live births',level:'Impact',frequency:'Annual',disagg:['Sex','Geography/Admin','Wealth Quintile'],sources:['DHS','MICS','CRVS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Birth History Module: full birth history (b-series variables)','MICS6 Birth History Module','Civil Registration and Vital Statistics (CRVS) death certificates','WHO Verbal Autopsy Instrument (2016 revision): neonatal cause of death'],notes:'SDG 3.2.2. Target: <=12 per 1,000 by 2030. Requires complete birth history (not summary). Early neonatal (0-6 days) vs. late neonatal (7-27 days) distinction is key.'},
{id:'RMN07',sector:'rmncah',subsector:'Child Health',name:'Under-5 mortality rate',definition:'Probability of dying between birth and age 5, expressed per 1,000 live births.',numerator:'Deaths under age 5',denominator:'Live births',unit:'per 1,000 live births',level:'Impact',frequency:'Annual',disagg:['Sex','Geography/Admin','Wealth Quintile','Urban/Rural'],sources:['DHS','MICS','CRVS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Birth History Module: full birth history','MICS6 Birth History Module','UN IGME (Inter-agency Group for Mortality Estimation) model','WHO Verbal Autopsy Instrument (2016): child cause of death'],notes:'SDG 3.2.1. Target: <=25 per 1,000 by 2030. Calculated as 1q0 synthetic cohort life table. Disaggregate by age: neonatal, infant, child mortality for programmatic targeting.'},
{id:'RMN08',sector:'rmncah',subsector:'Child Health',name:'Care-seeking for pneumonia (children under 5)',definition:'Percentage of children under 5 with suspected pneumonia (cough with fast/difficult breathing) taken to appropriate health provider.',numerator:'Children with ARI symptoms taken to health provider',denominator:'Children under 5 with ARI symptoms in past 2 weeks',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Wealth Quintile','Urban/Rural'],sources:['DHS','MICS'],frameworks:['WHO 100 Core'],tools:['DHS-8 Woman Questionnaire Module 5 (Child Health): h31-h32 (ARI symptoms and treatment seeking)','MICS6 Child Questionnaire: CA module (CA1-CA5: ARI symptoms and treatment)','WHO/UNICEF iCCM Register: pneumonia treatment protocol'],notes:'Major driver of under-5 mortality. "Appropriate provider" definition varies by context. Proxy for iCCM effectiveness. Track antibiotic treatment rate alongside.'},

// ──────────────────────────────────────────────────────────────
// IMMUNISATION
// ──────────────────────────────────────────────────────────────
{id:'IMM01',sector:'immunisation',subsector:'Coverage',name:'DTP3/Penta3 coverage',definition:'Percentage of surviving infants who received 3 doses of DTP-containing vaccine by 12 months of age.',numerator:'Children receiving DTP3',denominator:'Surviving infants (target population)',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Sex','Geography/Admin','Urban/Rural','Wealth Quintile'],sources:['DHIS2/HMIS','DHS','MICS'],frameworks:['Gavi 5.0/5.1','WHO 100 Core','SDG','Global Fund'],tools:['EPI Tally Sheet: DTP/Penta column (facility + outreach)','Child Health Card/Vaccination Card: DTP dose dates','DHIS2 EPI Module: DTP1/DTP3 dataset','DHS-8 Child Questionnaire: vaccination history (h3-h9 variables)','MICS6 Child Questionnaire: IM module (IM3-IM12)','WHO/UNICEF WUENIC estimation methodology'],notes:'Gold standard EPI indicator. Admin vs survey gap often >10pp in weak HMIS. WUENIC provides official estimates reconciling both sources.'},
{id:'IMM02',sector:'immunisation',subsector:'Coverage',name:'MCV1 coverage',definition:'Percentage of children who received first dose of measles-containing vaccine by 12-23 months.',numerator:'Children receiving MCV1',denominator:'Surviving infants',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Sex','Geography/Admin','Urban/Rural'],sources:['DHIS2/HMIS','DHS','MICS'],frameworks:['Gavi 5.0/5.1','WHO 100 Core'],tools:['EPI Tally Sheet: Measles column','Child Health Card: MCV dose dates','DHIS2 EPI Module','DHS-8 Child Questionnaire: h9 (measles vaccination)','MICS6 IM module'],notes:'Target >=95% for herd immunity/measles elimination. MCV1-MCV2 gap tracks booster dropout.'},
{id:'IMM03',sector:'immunisation',subsector:'Dropout & Equity',name:'DTP1-DTP3 dropout rate',definition:'Percentage of children who started the vaccination series (DTP1) but did not complete it (DTP3).',numerator:'DTP1 doses minus DTP3 doses',denominator:'DTP1 doses',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Sex','Geography/Admin','Urban/Rural'],sources:['DHIS2/HMIS'],frameworks:['Gavi 5.0/5.1','WHO 100 Core'],tools:['DHIS2 EPI Dashboard: dropout rate indicator (auto-calculated)','WHO RED/REC categorisation matrix (dropout vs. access)','EPI Coverage Survey Cluster Sampling Protocol (WHO 2018)'],notes:'>10% = significant utilisation barrier. Used in RED/REC categorisation: high dropout + low access = Category A (worst).'},
{id:'IMM04',sector:'immunisation',subsector:'Dropout & Equity',name:'Zero-dose children (no DTP doses)',definition:'Number/proportion of children who have not received any dose of DTP-containing vaccine by 12 months.',numerator:'Children with zero DTP doses',denominator:'Surviving infants in target population',unit:'% or number',level:'Impact',frequency:'Annual',disagg:['Sex','Geography/Admin','Urban/Rural','Wealth Quintile'],sources:['DHS','MICS','Household Survey'],frameworks:['Gavi 5.0/5.1','SDG'],tools:['DHS-8 Child Questionnaire: vaccination history (h3=0 or no card + no recall)','MICS6 IM module: zero-dose tabulation','Gavi Zero-Dose Learning Hub methodology','Geo-spatial modelling (WorldPop/GRID3 + DHS geospatial data)'],notes:'Gavi 5.0/5.1 primary equity indicator. Concentrated in: conflict zones, urban slums, remote/nomadic populations, cross-border areas. Overlaps with missed communities for other services.'},
{id:'IMM05',sector:'immunisation',subsector:'Cold Chain',name:'Cold chain equipment functionality rate',definition:'Percentage of cold chain equipment (refrigerators, freezers, cold boxes) functioning on the day of assessment.',numerator:'Functional CCE units',denominator:'Total CCE units inventoried',unit:'%',level:'Process',frequency:'Quarterly',disagg:['Geography/Admin','Equipment type'],sources:['Facility Assessment','Admin Records'],frameworks:['Gavi 5.0/5.1'],tools:['WHO EVM (Effective Vaccine Management) Assessment Tool','CCE inventory register (national)','WHO PQS (Performance, Quality, Safety) equipment database','Gavi Cold Chain Equipment Optimisation Platform (CCEOP) monitoring forms'],notes:'Target >90%. Non-functional CCE = vaccine wastage + missed opportunities. EVM assesses across 9 criteria: arrival, storage, distribution, etc.'},
{id:'IMM06',sector:'immunisation',subsector:'Surveillance',name:'Non-measles non-rubella discard rate',definition:'Number of suspected measles/rubella cases investigated and discarded per 100,000 population.',numerator:'Discarded suspected cases',denominator:'Total population',unit:'per 100,000',level:'Process',frequency:'Annual',disagg:['Geography/Admin'],sources:['Sentinel Surveillance'],frameworks:['WHO 100 Core'],tools:['WHO Case-Based Measles Surveillance Form (Integrated Surveillance)','National measles/rubella case investigation form','WHO Measles Surveillance Reference Laboratory Network','WHO AFRO ISS (Integrated Supportive Supervision) tool'],notes:'Target >=2 per 100,000 for elimination certification. Measures surveillance sensitivity. Low rate = cases being missed, not fewer cases.'},

// ──────────────────────────────────────────────────────────────
// NUTRITION (expanded with FIES, HHS, HFIAS)
// ──────────────────────────────────────────────────────────────
{id:'NUT01',sector:'nutrition',subsector:'Anthropometry',name:'GAM prevalence (weight-for-height z-score < -2)',definition:'Percentage of children 6-59 months with WHZ < -2 SD and/or bilateral pitting oedema.',numerator:'Children with WHZ < -2 or oedema',denominator:'Children 6-59 months measured',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Age','Geography/Admin'],sources:['SMART Survey','DHS','MICS'],frameworks:['SPHERE','WHO 100 Core','SDG'],tools:['SMART Survey Protocol (ACF/SMART Initiative): anthropometry module with standardisation test','ENA for SMART software (data entry and plausibility checks)','WHO Anthro software / WHO Anthro Survey Analyser','DHS-8 Child Anthropometry Module: hw-series variables','MICS6 Anthropometry Module: AN1-AN4'],notes:'WHO thresholds: <5% acceptable, 5-9% poor, 10-14% serious, >=15% critical (SPHERE emergency). SMART methodology requires 2-stage cluster sampling, minimum 25 clusters x 8-15 children.'},
{id:'NUT02',sector:'nutrition',subsector:'Anthropometry',name:'SAM prevalence (weight-for-height z-score < -3)',definition:'Percentage of children 6-59 months with WHZ < -3 SD and/or bilateral pitting oedema.',numerator:'Children with WHZ < -3 or oedema',denominator:'Children 6-59 months measured',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Age','Geography/Admin'],sources:['SMART Survey'],frameworks:['SPHERE','WHO 100 Core'],tools:['SMART Survey Protocol: same anthropometry module as GAM','MUAC tape measurement: <115mm = SAM (community screening)','ENA for SMART software','WHO/UNICEF Community-Based Management of Acute Malnutrition guidelines: admission criteria'],notes:'SAM carries 5-9x mortality risk. SPHERE: death rate <10%, cure >75%, default <15%. MUAC-only programming increasingly adopted for SAM admission.'},
{id:'NUT03',sector:'nutrition',subsector:'Anthropometry',name:'Stunting prevalence (height-for-age z-score < -2)',definition:'Percentage of children under 5 with HAZ < -2 SD.',numerator:'Children with HAZ < -2',denominator:'Children under 5 measured',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Age','Wealth Quintile','Urban/Rural'],sources:['DHS','MICS','SMART Survey'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Child Anthropometry Module: hw-series variables','MICS6 Anthropometry Module','SMART Survey Protocol: length/height measurement procedure','WHO Anthro Survey Analyser','WHO Child Growth Standards (2006) reference population'],notes:'SDG 2.2.1. WHA target: 40% reduction by 2025. Reflects chronic deprivation. Not responsive to short-term nutrition interventions. Requires >3 years to detect programme-level change.'},
{id:'NUT04',sector:'nutrition',subsector:'IYCF',name:'Exclusive breastfeeding rate (0-5 months)',definition:'Percentage of infants 0-5 months exclusively breastfed.',numerator:'Infants 0-5 months exclusively breastfed (24-hour recall)',denominator:'Infants 0-5 months',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Wealth Quintile','Urban/Rural'],sources:['DHS','MICS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Woman Questionnaire Module 5 (Breastfeeding): v404-v409 (liquids/foods in last 24 hours)','MICS6 Breastfeeding Module: BD1-BD7','WHO IYCF Indicators Measurement Guide (2021 revision): EBF calculation protocol','KAP Survey: breastfeeding practices section (standard questions)'],notes:'WHA target >=50%. 24-hour recall method (status quo, not since-birth). Most cost-effective nutrition intervention known.'},
{id:'NUT05',sector:'nutrition',subsector:'IYCF',name:'Minimum acceptable diet (6-23 months)',definition:'Percentage of children 6-23 months who receive both minimum dietary diversity (>=5 food groups) and minimum meal frequency.',numerator:'Children 6-23 months meeting both MAD criteria',denominator:'Children 6-23 months surveyed',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Wealth Quintile'],sources:['DHS','MICS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Woman Questionnaire Module 5: dietary diversity questions (v414a-v414w)','MICS6 Infant and Young Child Feeding Module: MN1-MN18','WHO IYCF Indicators Guide (2021): MAD, MDD, MMF calculation procedures'],notes:'Composite: MDD (>=5 of 8 food groups) AND MMF (varies by BF status and age). Typically very low in LMICs (<20%).'},
{id:'NUT06',sector:'nutrition',subsector:'Micronutrients',name:'Anaemia prevalence in women of reproductive age',definition:'Percentage of non-pregnant women 15-49 with Hb < 12 g/dL (altitude-adjusted).',numerator:'Women with Hb < 12 g/dL',denominator:'Non-pregnant women 15-49 tested',unit:'%',level:'Impact',frequency:'Annual',disagg:['Age','Wealth Quintile','Urban/Rural'],sources:['DHS','MICS'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Biomarker Module: HemoCue Hb 301 analyser protocol','MICS6 Anaemia Module: blood specimen collection protocol','WHO Haemoglobin Concentrations for Diagnosis of Anaemia (altitude adjustment tables)','WHO VMNIS (Vitamin and Mineral Nutrition Information System)'],notes:'SDG 2.2.3. WHA target: 50% reduction. Altitude-adjusted thresholds required. Prevalence >40% = severe public health problem.'},
{id:'NUT07',sector:'nutrition',subsector:'CMAM/IMAM',name:'CMAM cure rate',definition:'Percentage of children admitted to CMAM/OTP discharged as cured.',numerator:'Children discharged cured',denominator:'Total exits (cured + defaulted + died + non-recovered)',unit:'%',level:'Outcome',frequency:'Monthly',disagg:['Sex','Age','Geography/Admin'],sources:['DHIS2/HMIS','Routine Monitoring'],frameworks:['SPHERE'],tools:['OTP Treatment Card (individual patient card)','CMAM Monthly Reporting Form (UNICEF/Valid International standard template)','DHIS2 Nutrition Module: CMAM dataset','Valid International CMAM Training Manual: monitoring and reporting forms'],notes:'SPHERE minimum: >75% cure. Track alongside default <15% and death <10%. Report cohort-based or monthly aggregate depending on programme maturity.'},
{id:'NUT08',sector:'nutrition',subsector:'CMAM/IMAM',name:'CMAM programme coverage (point coverage)',definition:'Proportion of SAM children in the catchment area currently enrolled in CMAM.',numerator:'SAM children enrolled in CMAM',denominator:'Estimated total SAM cases in area',unit:'%',level:'Output',frequency:'Annual',disagg:['Geography/Admin','Urban/Rural'],sources:['Community Survey'],frameworks:['SPHERE'],tools:['SQUEAC (Semi-Quantitative Evaluation of Access and Coverage) Protocol: Myatt et al.','SLEAC (Simplified LQAS Evaluation of Access and Coverage) Protocol','Coverage Monitoring Network (CMN) tools and training materials','Prior-posterior Bayesian estimation (conjugate Beta-Binomial model for SQUEAC Stage 3)'],notes:'SPHERE targets: rural >50%, urban >70%, camp >90%. SQUEAC combines qualitative barriers analysis with small-area surveys. SLEAC classifies coverage as high/moderate/low per district.'},
// Food insecurity scales (NEW - addressing FIES, HHS, HFIAS gap)
{id:'NUT09',sector:'nutrition',subsector:'Food Insecurity Scales',name:'Food Insecurity Experience Scale (FIES) prevalence',definition:'Percentage of population experiencing moderate or severe food insecurity based on the 8-item FIES scale.',numerator:'Individuals/HH classified as moderate-or-severe food insecure',denominator:'Total individuals/HH surveyed',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Geography/Admin','Wealth Quintile'],sources:['Household Survey'],frameworks:['SDG'],tools:['FAO FIES Survey Module: 8 standardised questions (WORRIED, HEALTHY, FEWFOOD, SKIPPED, ATELESS, RUNOUT, HUNGRY, WHLDAY)','FAO Voices of the Hungry (VoH) analytical framework','FAO FIES Analytical App (Rasch model calibration)','Gallup World Poll FIES module (global comparability reference)'],notes:'SDG 2.1.2. Rasch-model-calibrated. Global reference scale enables cross-country comparison. Individual- or household-referenced versions available. 30-day recall period.'},
{id:'NUT10',sector:'nutrition',subsector:'Food Insecurity Scales',name:'Household Hunger Scale (HHS)',definition:'Proportion of households experiencing moderate or severe hunger based on the 3-item HHS scale.',numerator:'Households with HHS score 2-6',denominator:'Total households surveyed',unit:'%',level:'Impact',frequency:'Quarterly',disagg:['Geography/Admin','Urban/Rural'],sources:['Household Survey','Routine Monitoring'],frameworks:['WFP/VAM','SPHERE'],tools:['HHS Questionnaire Module: 3 questions x 2 (occurrence + frequency): no food at all, went to sleep hungry, went whole day without eating','FANTA HHS Indicator Guide (Ballard et al. 2011)','WFP VAM Guidance on HHS: scoring protocol (0-6 scale)'],notes:'Cross-culturally validated (unlike HFIAS). Score 0-1: little/no hunger. 2-3: moderate. 4-6: severe. Appropriate for contexts where HFIAS is too long. 30-day recall.'},
{id:'NUT11',sector:'nutrition',subsector:'Food Insecurity Scales',name:'Household Food Insecurity Access Scale (HFIAS)',definition:'Prevalence of food insecurity (mild, moderate, severe) based on the 9-item HFIAS experience-based scale.',numerator:'Households classified in each HFIAS category',denominator:'Total households surveyed',unit:'% by severity',level:'Outcome',frequency:'Quarterly',disagg:['Geography/Admin','Wealth Quintile'],sources:['Household Survey'],frameworks:['WFP/VAM'],tools:['HFIAS Questionnaire Module: 9 questions x 2 (occurrence + frequency)','FANTA HFIAS Indicator Guide (Coates et al. 2007): full instrument and scoring protocol','HFIAS categorisation algorithm: food secure / mildly / moderately / severely food insecure'],notes:'9 items covering anxiety, quality, and quantity of food access. 4-week recall. Not validated for cross-cultural comparison (use FIES for that). HFIAS score (0-27) can be used as continuous outcome in regression.'},

// ──────────────────────────────────────────────────────────────
// FOOD SECURITY & LIVELIHOODS (expanded with CARI)
// ──────────────────────────────────────────────────────────────
{id:'FS01',sector:'food_security',subsector:'Food Consumption',name:'Food Consumption Score (FCS)',definition:'Composite score measuring dietary diversity and food frequency over past 7 days, weighted by nutrient density.',numerator:'Weighted sum of food group frequencies (8 groups x frequency x weight)',denominator:'N/A (composite 0-112)',unit:'score',level:'Outcome',frequency:'Quarterly',disagg:['Sex','Geography/Admin','Urban/Rural','Wealth Quintile'],sources:['Household Survey'],frameworks:['WFP/VAM','SDG'],tools:['WFP VAM FCS Module: 8 food group questions (cereals, pulses, vegetables, fruit, meat/fish, milk, sugar, oil) with 7-day frequency','WFP VAM Guidance: FCS Calculation and Thresholds document','ODK/KoBoToolbox: WFP standard FCS XLSForm','WFP mVAM (mobile VAM) phone survey: abbreviated FCS module'],notes:'Thresholds: poor (0-21), borderline (21.5-35), acceptable (>35). Context-specific threshold adjustment possible. Primary WFP food security outcome.'},
{id:'FS02',sector:'food_security',subsector:'Coping Strategies',name:'reduced Coping Strategies Index (rCSI)',definition:'Frequency and severity-weighted score of 5 food-based coping strategies over past 7 days.',numerator:'Sum of (strategy frequency x severity weight) for 5 strategies',denominator:'N/A (composite score)',unit:'score',level:'Outcome',frequency:'Monthly',disagg:['Sex','Geography/Admin'],sources:['Household Survey','Routine Monitoring'],frameworks:['WFP/VAM'],tools:['WFP rCSI Module: 5 standard questions (eat less preferred, borrow food, reduce portions, restrict adult eating, reduce number of meals) with frequency (0-7 days)','WFP VAM rCSI Guidance Note: standard weights (1.0, 2.0, 1.0, 3.0, 1.0)','WFP mVAM phone survey: rCSI module'],notes:'Higher = worse. No universal thresholds; compare to baseline or seasonal norms. Five standard strategies with fixed weights ensure comparability across WFP operations.'},
{id:'FS03',sector:'food_security',subsector:'Coping Strategies',name:'Livelihood Coping Strategies Index (LCSI)',definition:'Proportion of households employing stress, crisis, or emergency livelihood-based coping strategies.',numerator:'Households by highest severity strategy employed',denominator:'Total households',unit:'% by severity',level:'Outcome',frequency:'Quarterly',disagg:['Sex','Geography/Admin'],sources:['Household Survey'],frameworks:['WFP/VAM'],tools:['WFP LCSI Module: 10 strategies classified by severity (stress: sold HH assets, spent savings, borrowed; crisis: sold productive assets, reduced health/education; emergency: sold land/house, begging)','WFP VAM LCSI Guidance Note: severity classification and module design','IPC Chronic Food Insecurity analysis: LCSI as convergence evidence'],notes:'Classify HH by most severe strategy used. Feeds IPC analysis as convergence evidence. Distinguish between stress (reversible), crisis (productive capacity loss), emergency (irreversible).'},
{id:'FS04',sector:'food_security',subsector:'IPC/CH & CARI',name:'IPC Phase 3+ population',definition:'Estimated number/proportion of population classified in IPC Phase 3 (Crisis), 4 (Emergency), or 5 (Famine).',numerator:'Population in IPC Phase 3+',denominator:'Total analysed population',unit:'% or number',level:'Impact',frequency:'Quarterly',disagg:['Geography/Admin'],sources:['IPC Analysis'],frameworks:['WFP/VAM','SPHERE'],tools:['IPC Analytical Framework: convergence of evidence protocol','IPC Acute Food Insecurity Reference Table (Phase 1-5 criteria)','IPC Population Estimation Spreadsheet','IPC Chronic Food Insecurity Classification tool','Cadre Harmonise (CH) analysis framework (Sahel/West Africa equivalent)'],notes:'Phase 3+ = crisis requiring urgent action. Phase 5 = famine (requires evidence of all 3: >20% GAM, >2/10,000/day CDR, near-complete food access failure). Drives humanitarian response scale.'},
{id:'FS05',sector:'food_security',subsector:'IPC/CH & CARI',name:'CARI classification (WFP consolidated food security status)',definition:'Proportion of households classified by WFP Consolidated Approach for Reporting Indicators (CARI) into food security categories.',numerator:'Households by CARI category',denominator:'Total households assessed',unit:'% by category',level:'Outcome',frequency:'Quarterly',disagg:['Sex','Geography/Admin','Urban/Rural'],sources:['Household Survey'],frameworks:['WFP/VAM'],tools:['WFP CARI Console (Excel-based tool): combines FCS + LCSI + food expenditure share','WFP VAM CARI Guidance: technical document on console operation','Requires: FCS module + LCSI module + economic vulnerability module (food expenditure share)'],notes:'4 categories: food secure, marginally food secure, moderately food insecure, severely food insecure. Primary WFP outcome reporting mechanism. Requires all three component indicators.'},
{id:'FS06',sector:'food_security',subsector:'Market & Prices',name:'Terms of trade: wage to staple cereal',definition:'Ratio of daily agricultural wage to price per kg of main staple cereal.',numerator:'Daily agricultural wage (local currency)',denominator:'Price per kg of main staple',unit:'kg/day wage',level:'Outcome',frequency:'Monthly',disagg:['Geography/Admin'],sources:['Market Monitoring'],frameworks:['WFP/VAM'],tools:['WFP Market Monitor: monthly price collection form','WFP VAM Market Assessment and Monitoring Guidance','FEWS NET Price Bulletin and Market Monitoring System','National market price collection form (MOA/Bureau of Statistics)'],notes:'Declining ToT = worsening purchasing power. Compare to 5-year average. Key early warning indicator. Disaggregate by crop season.'},
{id:'FS07',sector:'food_security',subsector:'Livelihoods',name:'Income source diversification',definition:'Average number of income sources per household.',numerator:'Sum of distinct income sources reported',denominator:'Total households',unit:'mean count',level:'Outcome',frequency:'Annual',disagg:['Sex','Geography/Admin','Wealth Quintile'],sources:['Household Survey'],frameworks:['WFP/VAM','UNDP'],tools:['Household Economy Analysis (HEA/IPC) Livelihood Zone Baseline: income and food source matrix','WFP Comprehensive Food Security & Vulnerability Analysis (CFSVA): livelihoods module','World Bank LSMS: income and labour modules'],notes:'Higher diversification = greater shock resilience. Disaggregate by source category: on-farm, off-farm, non-farm, transfers/remittances.'},

// ──────────────────────────────────────────────────────────────
// P/CVE, PEACEBUILDING & GOVERNANCE (VEEM-aligned, validated scales)
// ──────────────────────────────────────────────────────────────
// Radicalisation Risk (VEEM Push/Pull Factors)
{id:'PVE01',sector:'pcve',subsector:'Radicalisation Risk (VEEM Push/Pull)',name:'Perceived injustice and grievance',definition:'Individual-level score on perceived injustice, discrimination, and blocked aspirations. Measures push factor: sense of unfair treatment by state or dominant group.',numerator:'Mean/proportion scoring above threshold on injustice scale',denominator:'Total respondents',unit:'mean score or %',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Ethnicity','Geography/Admin'],sources:['Household Survey','Community Survey'],frameworks:['UNDP','USAID'],tools:['VEEM Framework: Push Factor domain - Injustice dimension','Perceived Injustice Scale (Schmitt et al. 2010): 8 items, 6-point Likert','UNDP Journey to Extremism Survey Instrument: Section on perceived discrimination','USAID YouthPower PYD (Positive Youth Development) Survey: civic engagement and perceived barriers module','Mercy Corps USAID-funded P/CVE survey instruments: grievance battery'],notes:'VEEM classifies perceived injustice as a primary push factor. Scale measures personal and group-based injustice. Administer alongside economic opportunity and governance measures for triangulation.'},
{id:'PVE02',sector:'pcve',subsector:'Radicalisation Risk (VEEM Push/Pull)',name:'Moral disengagement',definition:'Individual-level score on cognitive mechanisms that allow people to justify harmful conduct (moral justification, displacement/diffusion of responsibility, dehumanisation).',numerator:'Mean score on moral disengagement scale',denominator:'N/A (continuous score)',unit:'mean score',level:'Outcome',frequency:'Annual',disagg:['Sex','Age'],sources:['Household Survey'],frameworks:['UNDP'],tools:['Moral Disengagement Scale (Bandura et al. 1996): 32 items, 5-point Likert, 8 subscales','VEEM Framework: Individual Factor domain - Cognitive mechanism','Shortened Moral Disengagement Scale (Caprara et al. 2006): 14 items for adolescent samples','NOTE: Requires back-translation and cultural adaptation. Pilot in context before full deployment.'],notes:'Bandura construct. 8 mechanisms: moral justification, euphemistic labelling, advantageous comparison, displacement of responsibility, diffusion of responsibility, distortion of consequences, dehumanisation, attribution of blame. Higher scores = greater risk.'},
{id:'PVE03',sector:'pcve',subsector:'Radicalisation Risk (VEEM Push/Pull)',name:'Quest for significance / need for personal significance',definition:'Individual-level score measuring the motivation to matter, to be someone of importance and value, particularly after significance loss experiences.',numerator:'Mean score on significance quest scale',denominator:'N/A (continuous score)',unit:'mean score',level:'Outcome',frequency:'Annual',disagg:['Sex','Age'],sources:['Household Survey'],frameworks:['UNDP'],tools:['Significance Quest Scale (Kruglanski et al. 2014): 6 items, 7-point Likert','VEEM Framework: Individual/Pull Factor domain - Personal significance','Need for Cognitive Closure Scale (Webster & Kruglanski 1994): complementary measure','Significance Loss Scale (Webber et al. 2018): measures triggers (humiliation, shame, social exclusion)'],notes:'Kruglanski significance quest theory. High significance need + significance loss + radical narrative = radicalisation pathway. Always pair with significance loss measurement and narrative exposure indicators.'},
{id:'PVE04',sector:'pcve',subsector:'Radicalisation Risk (VEEM Push/Pull)',name:'Identity fusion with group',definition:'Degree of visceral connection between individual identity and group identity, measuring willingness to fight and die for the group.',numerator:'Proportion scoring fused on identity fusion measures',denominator:'Total respondents',unit:'% fused / mean score',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Ethnicity'],sources:['Household Survey'],frameworks:['UNDP'],tools:['Identity Fusion Scale - Pictorial (Swann et al. 2009): 5 overlapping circles task, 1 item','Identity Fusion Scale - Verbal (Gomez et al. 2011): 7 items, 7-point Likert','VEEM Framework: Pull Factor domain - Group identity and belonging','Fighting and Dying Measure (Swann et al. 2010): 3-item willingness to sacrifice scale'],notes:'Swann construct. Fused individuals are more likely to endorse extreme pro-group action. Pictorial version (overlapping circles) is cross-culturally robust and literacy-independent. Verbal version provides continuous scores for regression analysis.'},
{id:'PVE05',sector:'pcve',subsector:'Radicalisation Risk (VEEM Push/Pull)',name:'Legitimacy of political violence',definition:'Percentage of respondents who endorse or justify the use of violence for political, religious, or social aims under specified conditions.',numerator:'Respondents endorsing violence items',denominator:'Total respondents',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Age','Ethnicity','Geography/Admin'],sources:['Household Survey'],frameworks:['UNDP'],tools:['VEEM Framework: Attitudinal outcome indicator','Activism and Radicalism Intention Scale - ARIS (Moskalenko & McCauley 2009): 4 subscales (activism, radicalism, activism intention, radicalism intention), 5-point Likert','Militant Extremist Mindset Scale - MEMS (Stankov et al. 2010): pro-violence subscale','Vignette-based measurement: context-specific scenarios with force-choice or Likert response (reduces social desirability bias vs. direct questions)'],notes:'Sensitive indicator. Vignette-based approaches reduce social desirability bias. ARIS distinguishes legal activism from illegal radicalism, essential for avoiding conflation. Ethical protocols mandatory: informed consent, data protection, do-no-harm review.'},
{id:'PVE06',sector:'pcve',subsector:'Radicalisation Risk (VEEM Push/Pull)',name:'Exposure to violent extremist narratives and recruitment',definition:'Self-reported frequency and channel of exposure to violent extremist messaging, propaganda, or direct recruitment attempts.',numerator:'Respondents reporting exposure (by frequency/channel)',denominator:'Total respondents',unit:'%',level:'Process',frequency:'Annual',disagg:['Sex','Age','Geography/Admin'],sources:['Household Survey'],frameworks:['UNDP','USAID'],tools:['VEEM Framework: Enabling Environment domain - narrative exposure','UNDP Journey to Extremism Survey: media and messaging exposure section','USAID Guide to P/CVE Monitoring and Evaluation: online/offline exposure module','Custom survey battery: channels (social media, mosque/church, peer, community, family) x frequency x perceived persuasiveness'],notes:'Not a validated psychometric scale but a descriptive survey module. Distinguish channels: online (platform-specific), community (religious spaces, gatherings), interpersonal (family, friends, recruiters). Pair with digital media literacy indicators.'},

// Resilience & Protective Factors
{id:'PVE07',sector:'pcve',subsector:'Resilience & Protective Factors',name:'BRAVE-14 community resilience to violent extremism',definition:'Community-level resilience score based on the BRAVE-14 scale measuring 14 protective factors against radicalisation.',numerator:'Mean BRAVE-14 score',denominator:'N/A (continuous score 14-70)',unit:'mean score',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Geography/Admin'],sources:['Community Survey'],frameworks:['UNDP'],tools:['BRAVE-14 Scale (Bhui et al. 2014/2020): 14 items, 5-point Likert','Covers: social support, agency, cultural identity, meaning, community cohesion, hope','BRAVE-14 Administration Guide: sampling, translation, and scoring protocol','VEEM Framework: Resilience/Protective Factor domain'],notes:'One of the few validated resilience scales specific to VE contexts. Developed and validated in UK, adapted for East Africa and South Asia. Requires cultural adaptation and pilot testing before deployment.'},
{id:'PVE08',sector:'pcve',subsector:'Resilience & Protective Factors',name:'Critical thinking and cognitive openness',definition:'Individual-level score on openness to alternative viewpoints and resistance to black-and-white thinking.',numerator:'Mean score on cognitive openness scale',denominator:'N/A (continuous score)',unit:'mean score',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Education'],sources:['Household Survey'],frameworks:['UNDP','USAID'],tools:['Cognitive Openness Scale / Openness to Experience (Costa & McCrae NEO-PI-R, adapted short form)','Actively Open-minded Thinking Scale (Baron 2019): 7 items','Need for Cognitive Closure Scale (Webster & Kruglanski 1994): 42 items, 6-point Likert (reverse-scored)','VEEM Framework: Protective Factor domain - cognitive flexibility'],notes:'High need for cognitive closure is a risk factor for extremism (Kruglanski). Cognitive openness is protective. Use shortened scales in field settings. Combine with media literacy and perspective-taking measures.'},
{id:'PVE09',sector:'pcve',subsector:'Resilience & Protective Factors',name:'Youth agency and civic engagement',definition:'Proportion of youth (15-29) reporting meaningful participation in civic, economic, or social activities and a sense of personal agency.',numerator:'Youth scoring above threshold on agency/engagement measures',denominator:'Total youth respondents',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Education','Geography/Admin'],sources:['Household Survey','Community Survey'],frameworks:['UNDP','USAID'],tools:['USAID YouthPower PYD Survey: agency, contribution, and belonging scales','Measure of Adolescent Connectedness (Karcher 2011): community and civic subscales','VEEM Framework: Protective Factor domain - positive engagement','Mercy Corps/USAID REVIVE program evaluation instruments: economic and civic participation battery'],notes:'Agency and civic engagement are core protective factors in P/CVE programming. Distinguish passive membership from active participation. Economic engagement (employment, skills) is both a protective factor and a programme outcome.'},

// Social Cohesion & Trust
{id:'PVE10',sector:'pcve',subsector:'Social Cohesion & Trust',name:'SCORE social cohesion index',definition:'Multi-dimensional index measuring social cohesion and reconciliation across 6 dimensions: out-group trust, in-group identity, participation, political trust, personal security, institutional fairness.',numerator:'Composite SCORE index score',denominator:'N/A (index 0-100)',unit:'index 0-100',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Ethnicity','Geography/Admin'],sources:['Household Survey'],frameworks:['UNDP'],tools:['UNDP SCORE (Social Cohesion and Reconciliation) Index: standardised survey instrument','SCORE Survey Module: 6 dimensions, ~60 items total, 5-point Likert','SCORE Data Analysis Protocol: factor analysis and dimension scoring','SCORE Sampling Guide: multi-stage cluster with oversampling of minority groups','Validated across 15+ countries including Bosnia, Sri Lanka, South Sudan, Nepal, Fiji'],notes:'Most comprehensive validated social cohesion measurement tool for peacebuilding/P/CVE contexts. Requires 45-60 minute interview. Enables between-community and over-time comparison. UNDP provides training for local adaptation.'},
{id:'PVE11',sector:'pcve',subsector:'Social Cohesion & Trust',name:'Intergroup contact quality and frequency',definition:'Self-reported frequency and quality (positive vs. negative) of meaningful interactions with members of other identity groups.',numerator:'Respondents reporting positive intergroup contact',denominator:'Total respondents',unit:'% or mean score',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Ethnicity','Geography/Admin'],sources:['Household Survey','Community Survey'],frameworks:['UNDP'],tools:['Intergroup Contact Scale (Islam & Hewstone 1993; adapted): frequency, quality, and depth sub-dimensions','Allport Contact Conditions Checklist: equal status, common goals, cooperation, institutional support','SCORE Index: intergroup contact sub-dimension items','Custom survey module: contact frequency by context (market, school, workplace, social, religious)'],notes:'Based on Allport contact hypothesis. Positive intergroup contact reduces prejudice; negative contact can increase it. Measure both frequency AND quality. Context-specific: define relevant outgroup(s) clearly.'},

// Governance & Accountability
{id:'PVE12',sector:'pcve',subsector:'Governance & Accountability',name:'Citizen satisfaction with local government services',definition:'Percentage of citizens satisfied/very satisfied with quality of services provided by local government.',numerator:'Respondents satisfied/very satisfied',denominator:'Total respondents',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Urban/Rural','Geography/Admin'],sources:['Household Survey','Community Survey'],frameworks:['UNDP','SDG'],tools:['Afrobarometer Round 9 Survey: service delivery satisfaction module (Q54-Q65)','World Bank Governance Indicators citizen perception module','SDG 16.6.2 measurement guide: "proportion of population satisfied with public service experience"','Custom citizen scorecard/community scorecard methodology','VEEM Framework: Governance/Push Factor domain - state legitimacy'],notes:'SDG 16.6.2. Disaggregate by service: security, justice, health, education, water, roads. Weak governance is a primary push factor for radicalisation (VEEM). Perception measures complement objective service delivery data.'},
{id:'PVE13',sector:'pcve',subsector:'Governance & Accountability',name:'Perception of corruption in local institutions',definition:'Percentage of citizens who perceive corruption as widespread or prevalent in local government and public institutions.',numerator:'Respondents perceiving widespread corruption',denominator:'Total respondents',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Geography/Admin'],sources:['Household Survey'],frameworks:['UNDP','SDG'],tools:['Transparency International Global Corruption Barometer (GCB) Survey Module','Afrobarometer: corruption perception and experience items (Q47-Q53)','SDG 16.5: "substantially reduce corruption and bribery" measurement guide','VEEM Framework: Governance Push Factor - corruption and impunity'],notes:'SDG 16.5. Corruption is a primary push factor for radicalisation and conflict. Distinguish perception (attitudes) from experience (direct bribery). Both matter for different reasons.'},

// Rule of Law & Justice
{id:'PVE14',sector:'pcve',subsector:'Rule of Law & Justice',name:'Access to justice (formal and informal)',definition:'Percentage of adults experiencing a legal problem who accessed a dispute resolution mechanism.',numerator:'Adults who accessed dispute resolution',denominator:'Adults reporting a legal problem in past 2 years',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Wealth Quintile','Geography/Admin'],sources:['Household Survey'],frameworks:['SDG','UNDP'],tools:['SDG 16.3.3 measurement guide: "access to civil justice" survey module','World Justice Project (WJP) Rule of Law Index: Access to Justice sub-index and survey instrument','UNDP Access to Justice Assessment Tool','Hague Institute for Innovation of Law (HiiL) Justice Needs and Satisfaction Survey: full instrument available online'],notes:'SDG 16.3.3. Include formal (courts, police, legal aid) AND informal (traditional, religious, community mediation). Gender barriers to justice access are critical to measure separately.'},
{id:'PVE15',sector:'pcve',subsector:'Rule of Law & Justice',name:'Trust in security forces',definition:'Percentage of population expressing trust (a lot / somewhat) in police and military/security forces.',numerator:'Respondents expressing trust',denominator:'Total respondents',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Age','Ethnicity','Geography/Admin'],sources:['Household Survey'],frameworks:['UNDP'],tools:['Afrobarometer Round 9: trust in police item (Q43)','SCORE Index: political trust and institutional trust sub-dimensions','Latinobarometro / Asiabarometer: institutional trust batteries','VEEM Framework: Governance Push Factor - security sector legitimacy','Custom trust battery: police, military, judiciary, local government (separate items)'],notes:'Low trust in security forces is both an outcome of poor governance and a push factor for armed group recruitment. Disaggregate police from military. Track alongside perceptions of security force conduct (human rights).'},

// ──────────────────────────────────────────────────────────────
// CLIMATE & ENVIRONMENT
// ──────────────────────────────────────────────────────────────
{id:'CLI01',sector:'climate',subsector:'Adaptation',name:'Households adopting climate-resilient agricultural practices',definition:'Percentage of farming households that have adopted at least one CSA practice.',numerator:'Households adopting >=1 CSA practice',denominator:'Total farming households',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Geography/Admin','Wealth Quintile'],sources:['Household Survey'],frameworks:['GCF/AF','SDG'],tools:['FAO CSA Rapid Appraisal (CSA-RA): practice adoption checklist','GCF Results Measurement Framework: Indicator A1.0 adaptation beneficiaries','Adaptation Fund Core Impact Indicator Methodology: adaptation asset measurement','World Bank LSMS: agriculture module (crop practices and input use section)'],notes:'SDG 2.4.1. Define CSA practice list contextually. Include adoption AND sustained use (2+ seasons).'},
{id:'CLI02',sector:'climate',subsector:'DRR',name:'Population covered by early warning systems',definition:'Percentage of population in disaster-prone areas with access to multi-hazard EWS and capacity to act.',numerator:'Population with EWS access + response capacity',denominator:'Population in disaster-prone areas',unit:'%',level:'Output',frequency:'Annual',disagg:['Sex','Geography/Admin','Urban/Rural'],sources:['Household Survey','Admin Records'],frameworks:['SDG'],tools:['Sendai Framework Monitor: Target G indicator methodology','UNDRR Early Warning System Checklist: 4 elements (risk knowledge, monitoring, dissemination, response capability)','SDG 13.1.2 / 1.5.3 measurement guide','Community-based Disaster Preparedness survey module'],notes:'SDG 13.1.2 / Sendai Target G. "Access" must include understanding AND capacity to act. Measure all 4 EWS elements per UNDRR framework.'},
{id:'CLI03',sector:'climate',subsector:'Mitigation',name:'GHG emissions reduced/avoided (tCO2e)',definition:'Tonnes of CO2-equivalent greenhouse gas emissions reduced or avoided from programme activities.',numerator:'Estimated tCO2e reduced/avoided',denominator:'N/A',unit:'tCO2e',level:'Outcome',frequency:'Annual',disagg:['Geography/Admin'],sources:['Routine Monitoring','Admin Records'],frameworks:['GCF/AF'],tools:['GCF Results Measurement Framework: Indicator M1.0 methodology','UNFCCC Clean Development Mechanism (CDM) approved methodologies','Gold Standard for the Global Goals: GHG accounting protocols','IPCC Emission Factor Database and Guidelines for National GHG Inventories'],notes:'Requires robust counterfactual. GCF requires ex-ante and ex-post calculation. Report cumulative and annual. Distinguish scope 1/2/3 where relevant.'},
{id:'CLI04',sector:'climate',subsector:'Environmental Health',name:'Households using clean cooking fuels',definition:'Percentage of households primarily using clean fuels (electricity, LPG, biogas, solar) for cooking.',numerator:'Households using clean cooking fuels',denominator:'Total households',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Urban/Rural','Wealth Quintile','Geography/Admin'],sources:['DHS','MICS','Household Survey'],frameworks:['WHO 100 Core','SDG'],tools:['DHS-8 Household Questionnaire: hv226 (cooking fuel type)','MICS6 Household Questionnaire: HC6 (cooking fuel)','WHO Household Energy Survey Module','SDG 7.1.2 measurement methodology'],notes:'SDG 7.1.2. WHO tier classification for clean vs. polluting fuels. Health-climate co-benefit indicator. 2.4 billion still rely on solid fuels.'},

// ──────────────────────────────────────────────────────────────
// EDUCATION
// ──────────────────────────────────────────────────────────────
{id:'EDU01',sector:'education',subsector:'Access & Enrollment',name:'Net enrolment rate (primary)',definition:'Percentage of children of official primary school age enrolled in primary education.',numerator:'Primary-age children enrolled in primary',denominator:'Population of official primary school age',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Sex','Geography/Admin','Urban/Rural','Wealth Quintile','Disability'],sources:['Admin Records','Household Survey'],frameworks:['SDG','GPE'],tools:['EMIS (Education Management Information System): annual school census forms','DHS-8 Education Module: hv121-hv124 (attendance/enrolment)','MICS6 Education Module: ED1-ED9','UIS (UNESCO Institute for Statistics) technical guidelines for NER calculation','Washington Group Short Set on Functioning (WG-SS): disability disaggregation'],notes:'SDG 4.1. Distinguish NER from GER (GER can exceed 100%). Gender Parity Index (GPI = female NER / male NER) is key equity metric. WG-SS for disability-disaggregated reporting.'},
{id:'EDU02',sector:'education',subsector:'Access & Enrollment',name:'Out-of-school children rate',definition:'Percentage of children of official school age not enrolled in any level of education.',numerator:'School-age children not enrolled',denominator:'Population of official school age',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Age','Geography/Admin','Wealth Quintile','Disability'],sources:['Household Survey','Admin Records'],frameworks:['SDG','GPE'],tools:['UNICEF/UIS Out-of-School Children Initiative (OOSCI) methodology','DHS-8 / MICS6 education modules: attendance variables','EMIS: cross-reference enrolled population with census population','Washington Group Short Set: disability-disaggregated OOSC count'],notes:'Disaggregate by reason: distance, cost, conflict, disability, early marriage, child labour. SDG 4.1 linked.'},
{id:'EDU03',sector:'education',subsector:'Learning Outcomes',name:'Foundational reading proficiency (Grade 2/3)',definition:'Percentage of children in Grade 2 or 3 who can read with comprehension (oral reading fluency + comprehension) at grade level.',numerator:'Students meeting minimum proficiency benchmark',denominator:'Students assessed',unit:'%',level:'Impact',frequency:'Annual',disagg:['Sex','Geography/Admin','Wealth Quintile'],sources:['Admin Records','Household Survey'],frameworks:['SDG','GPE'],tools:['EGRA (Early Grade Reading Assessment): RTI International standard instrument','EGRA Toolkit (USAID/RTI): administration, scoring, and analysis manuals','ASER (Annual Status of Education Report) Tool: reading assessment module','PASEC (Programme for Analysis of Education Systems) assessment','SDG 4.1.1 measurement: Minimum Proficiency Level definition per country'],notes:'SDG 4.1.1. EGRA is the most widely used instrument. Subtasks: letter recognition, syllable reading, familiar word reading, connected text reading, comprehension. ASER uses simpler pass/fail at 4 levels.'},
{id:'EDU04',sector:'education',subsector:'Quality',name:'Pupil-teacher ratio',definition:'Average number of pupils per teacher.',numerator:'Total enrolled students',denominator:'Total teachers',unit:'ratio',level:'Process',frequency:'Annual',disagg:['Geography/Admin','Urban/Rural','Education level'],sources:['Admin Records'],frameworks:['SDG','GPE'],tools:['EMIS annual school census: teacher and enrolment data','UNESCO UIS technical guidelines for PTR calculation','Service Delivery Indicators (SDI) Survey: teacher presence and qualification module'],notes:'UNESCO benchmark: <=40:1 primary. Higher ratios compromise learning. Combine with teacher qualification data and classroom observation.'},
{id:'EDU05',sector:'education',subsector:'Quality',name:'Teacher classroom practice quality',definition:'Score on structured observation of teacher practices (time on task, pedagogical techniques, student engagement).',numerator:'Mean score on observation instrument',denominator:'N/A (composite score)',unit:'mean score',level:'Process',frequency:'Annual',disagg:['Geography/Admin','Education level'],sources:['Facility Assessment'],frameworks:['GPE'],tools:['TEACH (World Bank): 28-element structured classroom observation tool, 3 areas (time on task, teaching practices, socio-emotional skills)','Stallings Classroom Snapshot: time-on-task observation protocol','SDI Teacher Knowledge Assessment: math and language content knowledge test','TIPPS (Teacher Instructional Practices and Processes System)'],notes:'TEACH is the current World Bank standard. 2 observations per teacher minimum. Captures both pedagogical quality and classroom management. Training required for reliable inter-rater agreement.'},

// ──────────────────────────────────────────────────────────────
// WASH
// ──────────────────────────────────────────────────────────────
{id:'WSH01',sector:'wash',subsector:'Water Supply',name:'Population using safely managed drinking water',definition:'Percentage using improved source on premises, available when needed, and free from contamination.',numerator:'Population meeting all 3 criteria',denominator:'Total population',unit:'%',level:'Impact',frequency:'Annual',disagg:['Urban/Rural','Geography/Admin','Wealth Quintile'],sources:['DHS','MICS','Household Survey'],frameworks:['SDG','UNICEF WASH'],tools:['DHS-8 Household Questionnaire: water source (hv201), time to source (hv204), water treatment (hv237)','MICS6 Household Questionnaire: WS module (WS1-WS7)','JMP (Joint Monitoring Programme) service ladder methodology and classification algorithm','Water quality testing: portable E. coli field test kits (Compartment Bag Test, Aquagenx; or membrane filtration)'],notes:'SDG 6.1.1. JMP ladder: safely managed > basic > limited > unimproved > surface water. "Safely managed" requires water quality testing (E. coli) in addition to survey data.'},
{id:'WSH02',sector:'wash',subsector:'Sanitation',name:'Population using safely managed sanitation',definition:'Percentage using improved facility, not shared, where excreta are safely disposed in situ or treated off-site.',numerator:'Population meeting safely managed criteria',denominator:'Total population',unit:'%',level:'Impact',frequency:'Annual',disagg:['Urban/Rural','Geography/Admin','Wealth Quintile'],sources:['DHS','MICS','Household Survey'],frameworks:['SDG','UNICEF WASH'],tools:['DHS-8 Household Questionnaire: toilet type (hv205), shared (hv225)','MICS6 Household Questionnaire: WS module (WS8-WS11)','JMP service ladder: safely managed > basic > limited > unimproved > open defecation','Sanitary inspection form (WHO): facility condition assessment'],notes:'SDG 6.2.1. Open defecation elimination is a priority indicator. "Safely managed" requires information on excreta management (containment, emptying, treatment) beyond facility type.'},
{id:'WSH03',sector:'wash',subsector:'Hygiene',name:'Handwashing facility with soap and water',definition:'Percentage of population with a handwashing facility with soap and water observed at home.',numerator:'Population with functional handwashing station (soap + water observed)',denominator:'Total population surveyed',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Urban/Rural','Geography/Admin','Wealth Quintile'],sources:['DHS','MICS'],frameworks:['SDG','UNICEF WASH'],tools:['DHS-8 Household Questionnaire: handwashing observation (hv230-hv232)','MICS6 Household Questionnaire: HW1-HW4 (handwashing observation)','JMP hygiene ladder: basic (soap + water) > limited (without soap/water) > no facility','WHO Hand Hygiene in Community Settings guidance: observation protocol'],notes:'SDG 6.2.1b. Observation-based (not self-reported). Interviewer asks to see handwashing place. Critical for disease prevention and pandemic preparedness.'},
{id:'WSH04',sector:'wash',subsector:'WASH in HCF',name:'Health care facilities with basic water, sanitation, and hygiene',definition:'Percentage of HCFs with basic water service, basic sanitation, and basic hygiene (including waste management).',numerator:'HCFs meeting all three basic criteria',denominator:'Total HCFs assessed',unit:'%',level:'Output',frequency:'Annual',disagg:['Geography/Admin','Urban/Rural','Facility level'],sources:['Facility Assessment','DHIS2/HMIS'],frameworks:['WHO 100 Core','UNICEF WASH','SDG'],tools:['WHO/UNICEF JMP WASH in Health Care Facilities Core Indicators and Questions','WASH FIT (Water and Sanitation for Health Facility Improvement Tool): facility self-assessment','WHO SARA Module 1: General Service Readiness - WASH items','WHO HHFA (Harmonized Health Facility Assessment): WASH module','National WASH in HCF monitoring tool (country-specific adaptation of JMP core questions)'],notes:'WHO/UNICEF JMP monitors separately: water, sanitation, hygiene, waste management, environmental cleaning. Report disaggregated by each element and the composite.'},
{id:'WSH05',sector:'wash',subsector:'Water Quality',name:'E. coli contamination at point of use',definition:'Percentage of household drinking water samples testing positive for E. coli (>1 CFU or MPN per 100ml).',numerator:'Samples positive for E. coli',denominator:'Total household water samples tested',unit:'%',level:'Outcome',frequency:'Annual',disagg:['Urban/Rural','Geography/Admin','Water source type'],sources:['Household Survey'],frameworks:['SDG','UNICEF WASH'],tools:['Compartment Bag Test (Aquagenx CBT): field-deployable E. coli quantification','Membrane filtration: laboratory-grade E. coli enumeration','MICS Water Quality Module: household water sample collection and testing protocol','WHO Guidelines for Drinking Water Quality (4th edition): risk-based water safety framework','DHS water quality testing module (where included)'],notes:'WHO guideline: 0 CFU/100ml. Point-of-use contamination often worse than source due to handling and storage. Risk categories: <1 (conformity), 1-10 (low risk), 11-100 (intermediate), >100 (high risk/very high risk).'},

// ── HSS ADDITIONS ──────────────────────────────────────────
