ue?",type:"Paper"}],dataCollection:{overview:"Collect stories of change from beneficiaries and stakeholders, then systematically select and analyse the most significant ones.",steps:["Define domains of change through stakeholder consultation","Train story collectors in open-ended interviewing techniques","Collect stories: 'From your point of view, what was the most significant change?'","Record WHO telling the story, WHAT changed, WHY it matters","Convene selection panels at each programme level to select most significant stories","Document the selection rationale — WHY was this story chosen?","Feed back selected stories and rationale to all stakeholders"],tools:["Story collection guides","Story recording templates","Selection panel facilitation guides","Story analysis and feedback templates"]}},result_developmental:{name:"Developmental Evaluation",category:"Adaptive",color:"#D4A843",description:"Embeds the evaluator in the programme team to provide real-time feedback in complex, rapidly changing environments.",dimensions:["Complexity-responsive","Real-time feedback","Emergent design"],when:"When the programme is innovative, operating in highly uncertain environments, and needs evaluation to inform ongoing adaptation rather than summative judgement.",praxis:"PRAXIS supports developmental evaluation with complexity frameworks, feedback loop design, and adaptive learning protocols.",references:[{title:"Patton (2011) — Developmental Evaluation: Applying Complexity Concepts to Enhance Innovation and Use",type:"Book"},{title:"Gamble (2008) — A Developmental Evaluation Primer",type:"Manual"},{title:"Dozois, Langlois & Blanchet-Cohen (2010) — DE 201: A Practitioner's Guide to Developmental Evaluation",type:"Manual"}],dataCollection:{overview:"Continuous, adaptive data collection embedded in programme implementation — no fixed design, evolving with the programme.",steps:["Embed the evaluator in the programme team as a 'critical friend'","Establish rapid feedback loops — wee
