<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRAXIS — Evaluation Approach Finder</title>
  <meta name="description" content="An interactive tool to help M&E practitioners select the right evaluation approach. Powered by PRAXIS, an open-source AI skill for programme evaluation." />
  <meta name="author" content="Emmanuel Nene Odjidja" />
  <meta property="og:title" content="PRAXIS Evaluation Approach Finder" />
  <meta property="og:description" content="Find the right evaluation approach for your programme. 20+ methods from experimental to participatory." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { 
      min-height: 100vh;
      background: linear-gradient(170deg, #FAF6F1 0%, #F0EBE3 40%, #E8E0D5 100%);
      font-family: 'Libre Baskerville', Georgia, serif;
      color: #2C2C2C;
      -webkit-font-smoothing: antialiased;
    }
    #root { min-height: 100vh; }

    .grain-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0.03; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .option-card {
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
      position: relative; overflow: hidden;
    }
    .option-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.12);
      background: rgba(255,255,255,0.95) !important;
    }
    .option-card:active { transform: translateY(-1px); }

    .btn-nav {
      cursor: pointer; transition: all 0.2s ease;
      border: none; background: none; font-family: 'DM Sans', sans-serif;
    }
    .btn-nav:hover { background: rgba(0,0,0,0.06); }

    .fade-in {
      opacity: 0; transform: translateY(16px);
      animation: fadeUp 0.5s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.3); }
    }

    a { text-decoration: none; }
    a.cta-primary {
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      color: white; background: linear-gradient(135deg, #2D6A4F, #1B4332);
      padding: 10px 20px; border-radius: 8px; display: inline-flex;
      align-items: center; gap: 6px; transition: all 0.2s ease;
    }
    a.cta-primary:hover { box-shadow: 0 4px 16px rgba(27,67,50,0.3); }
  </style>
</head>
<body>
  <div class="grain-overlay"></div>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script>
    const { useState, useEffect, useRef, createElement: h } = React;

    // ─── DATA ──────────────────────────────────────────────
    const STEPS = {
      start: {
        question: "What is the primary purpose of your evaluation?",
        subtitle: "Select the goal that best matches your evaluation needs",
        options: [
          { label: "Measure impact & attribution", description: "Determine whether the programme caused observed changes", next: "impact_randomize", icon: "\u{1F4D0}" },
          { label: "Understand how & why it works", description: "Explore causal mechanisms, context, and implementation", next: "theory_type", icon: "\u{1F50D}" },
          { label: "Document outcomes & learning", description: "Capture emergent changes and stakeholder perspectives", next: "participatory_type", icon: "\u{1F4DD}" },
          { label: "Check evaluation readiness", description: "Assess whether conditions exist for a credible evaluation", next: "result_evaluability", icon: "\u2705" },
        ],
      },
      impact_randomize: {
        question: "Is randomisation of the intervention feasible and ethical?",
        subtitle: "Consider whether you can randomly assign participants to treatment and control groups",
        options: [
          { label: "Yes, randomisation is feasible", description: "We can ethically withhold or phase the intervention", next: "rct_type", icon: "\u{1F3B2}" },
          { label: "No, randomisation is not possible", description: "Ethical, political, or logistical constraints prevent it", next: "quasi_comparison", icon: "\u2696\uFE0F" },
        ],
      },
      rct_type: {
        question: "What type of randomised design fits your context?",
        subtitle: "Consider your unit of intervention and rollout strategy",
        options: [
          { label: "Individual-level assignment", description: "Individuals can be independently randomised", next: "result_rct", icon: "\u{1F464}" },
          { label: "Cluster-level assignment", description: "Randomise groups \u2014 facilities, schools, communities", next: "result_cluster_rct", icon: "\u{1F3D8}\uFE0F" },
          { label: "Phased rollout available", description: "All sites receive the intervention, but in random sequence", next: "result_stepped_wedge", icon: "\u{1F4CA}" },
        ],
      },
      quasi_comparison: {
        question: "Do you have access to a credible comparison group?",
        subtitle: "A group not receiving the programme but comparable to beneficiaries",
        options: [
          { label: "Yes, with baseline & endline data", description: "We can track changes over time in both groups", next: "quasi_baseline", icon: "\u{1F4C8}" },
          { label: "Yes, but only cross-sectional data", description: "We can compare groups at one point in time", next: "quasi_crosssection", icon: "\u{1F4CB}" },
          { label: "No comparison group available", description: "Only data on programme participants", next: "no_comparison", icon: "\u{1F6AB}" },
        ],
      },
      quasi_baseline: {
        question: "What best describes your data structure?",
        subtitle: "This determines which quasi-experimental method fits best",
        options: [
          { label: "Panel data, parallel pre-trends", description: "Same units observed over time with similar trends before intervention", next: "result_did", icon: "\u{1F4CA}" },
          { label: "Clear eligibility threshold", description: "There is a score or cutoff that determines programme eligibility", next: "result_rdd", icon: "\u2702\uFE0F" },
          { label: "Rich baseline covariates", description: "Many observable characteristics to match on, but no threshold", next: "result_psm", icon: "\u{1F517}" },
          { label: "Repeated time-series observations", description: "Many data points before and after the intervention", next: "result_its", icon: "\u{1F4C9}" },
        ],
      },
      quasi_crosssection: {
        question: "Can you construct a statistical comparison?",
        subtitle: "Even without longitudinal data, matching methods may help",
        options: [
          { label: "Yes, rich observable variables exist", description: "Enough covariates to match treated and untreated units", next: "result_psm", icon: "\u{1F517}" },
          { label: "An instrument or natural experiment exists", description: "An external factor affected treatment assignment", next: "result_iv", icon: "\u{1F9EA}" },
          { label: "Very few comparable units (< 20)", description: "Only aggregate-level data for a small number of units", next: "result_synthetic_control", icon: "\u{1F9EC}" },
        ],
      },
      no_comparison: {
        question: "Without a comparison group, how would you like to establish attribution?",
        subtitle: "Theory-based and case-based methods can still support causal claims",
        options: [
          { label: "Trace the causal chain step by step", description: "Test each link in the causal pathway with evidence", next: "result_contribution_analysis", icon: "\u{1F517}" },
          { label: "Test competing causal explanations", description: "Systematically rule out rival hypotheses", next: "result_process_tracing", icon: "\u{1F50E}" },
          { label: "Combine pre-post data with theory", description: "Use a before-after design strengthened by theory of change", next: "result_pre_post_theory", icon: "\u{1F4D0}" },
        ],
      },
      theory_type: {
        question: "What aspect of 'how and why' are you most interested in?",
        subtitle: "Different theory-based approaches illuminate different dimensions",
        options: [
          { label: "Context\u2013mechanism\u2013outcome patterns", description: "What works, for whom, in what circumstances?", next: "result_realist", icon: "\u2699\uFE0F" },
          { label: "Contribution to observed outcomes", description: "Build a credible causal story through evidence weighing", next: "result_contribution_analysis", icon: "\u{1F517}" },
          { label: "Cross-case causal conditions", description: "Identify necessary and sufficient conditions across cases", next: "result_qca", icon: "\u{1F522}" },
          { label: "Implementation & adaptation processes", description: "How the programme was delivered and adapted in practice", next: "result_process_eval", icon: "\u{1F504}" },
        ],
      },
      participatory_type: {
        question: "What kind of learning are you seeking?",
        subtitle: "Choose the approach that matches your documentation needs",
        options: [
          { label: "Capture unexpected outcomes", description: "Identify changes that were not pre-specified", next: "result_outcome_harvesting", icon: "\u{1F33E}" },
          { label: "Understand most valued changes", description: "Stakeholders define and select significant stories", next: "result_msc", icon: "\u{1F4AC}" },
          { label: "Real-time adaptation support", description: "Feed learning back into a complex, evolving programme", next: "result_developmental", icon: "\u{1F504}" },
          { label: "Empower communities in evaluation", description: "Communities drive the evaluation questions and process", next: "result_participatory", icon: "\u{1F91D}" },
        ],
      },
    };

    const RESULTS = {
      result_evaluability: { name: "Evaluability Assessment", category: "Readiness", color: "#2D6A4F", description: "A structured assessment using the Davies (2013) three-dimension framework to determine whether a programme is ready for formal evaluation.", dimensions: ["Programme design & logic", "Information availability & quality", "Institutional context & demand"], when: "Before committing resources to a full evaluation \u2014 especially when there are doubts about data quality, programme maturity, or stakeholder buy-in.", praxis: "PRAXIS generates full evaluability assessments with dimension-by-dimension analysis, traffic-light ratings, and go/no-go recommendations." },
      result_rct: { name: "Randomised Controlled Trial (RCT)", category: "Experimental", color: "#1B4332", description: "The gold standard for impact evaluation. Randomly assigns individuals to treatment and control groups to isolate programme effects.", dimensions: ["Internal validity", "Causal attribution", "Statistical power"], when: "When randomisation is ethical and feasible, sample sizes are adequate, and you need to make strong causal claims about programme impact.", praxis: "PRAXIS supports RCT design with power calculations, randomisation protocols, and analysis plans including ITT and CACE estimation." },
      result_cluster_rct: { name: "Cluster Randomised Trial", category: "Experimental", color: "#1B4332", description: "Randomises groups (clusters) rather than individuals \u2014 ideal when the intervention is delivered at community, facility, or school level.", dimensions: ["Cluster-level assignment", "ICC estimation", "Contamination prevention"], when: "When the intervention targets groups (health facilities, villages, schools) and individual randomisation would cause contamination.", praxis: "PRAXIS generates cluster RCT designs with ICC-adjusted power calculations, stratification strategies, and multi-level analysis plans." },
      result_stepped_wedge: { name: "Stepped Wedge Design", category: "Experimental", color: "#1B4332", description: "All clusters receive the intervention eventually, but the timing is randomised. Each cluster serves as its own control before crossover.", dimensions: ["Phased rollout", "Within-cluster comparison", "Temporal effects"], when: "When withholding the intervention entirely is unethical or impractical, but you can randomise the order of rollout.", praxis: "PRAXIS designs stepped wedge trials with period-specific analysis, carry-over effect testing, and transition scheduling." },
      result_did: { name: "Difference-in-Differences (DiD)", category: "Quasi-Experimental", color: "#40798C", description: "Compares changes over time between treatment and comparison groups, netting out common trends to isolate the programme effect.", dimensions: ["Parallel trends assumption", "Panel data structure", "Common shocks"], when: "When you have baseline and endline data for both groups and can plausibly argue that trends would have been parallel without the intervention.", praxis: "PRAXIS generates DiD designs with parallel trends testing, event study plots, and robustness checks including staggered adoption methods." },
      result_rdd: { name: "Regression Discontinuity Design (RDD)", category: "Quasi-Experimental", color: "#40798C", description: "Exploits a known eligibility threshold \u2014 units just above and below the cutoff are compared as if quasi-randomly assigned.", dimensions: ["Sharp or fuzzy cutoff", "Bandwidth selection", "Local treatment effect"], when: "When programme eligibility is determined by a continuous score with a clear threshold (poverty index, test score, distance).", praxis: "PRAXIS supports RDD with bandwidth selection, McCrary density tests, polynomial specifications, and fuzzy RDD adjustments." },
      result_psm: { name: "Propensity Score Matching (PSM)", category: "Quasi-Experimental", color: "#40798C", description: "Statistically constructs a comparison group by matching treated units to similar untreated units based on observable characteristics.", dimensions: ["Selection on observables", "Common support", "Balance diagnostics"], when: "When you have a comparison group with rich baseline data but no randomisation \u2014 and selection into the programme is driven by observable factors.", praxis: "PRAXIS generates PSM designs with matching algorithms (nearest-neighbour, kernel, caliper), balance tables, and sensitivity analysis (Rosenbaum bounds)." },
      result_its: { name: "Interrupted Time Series (ITS)", category: "Quasi-Experimental", color: "#40798C", description: "Analyses a series of repeated observations before and after an intervention to detect changes in level and trend.", dimensions: ["Multiple pre/post observations", "Level & slope change", "Autocorrelation"], when: "When you have many time points of routine data (e.g., HMIS, DHIS2) and a clearly defined intervention start date.", praxis: "PRAXIS designs ITS analyses with segmented regression, ARIMA modelling, and control series specifications." },
      result_iv: { name: "Instrumental Variables (IV)", category: "Quasi-Experimental", color: "#40798C", description: "Uses an external variable (instrument) that affects treatment assignment but not outcomes directly, to address selection bias.", dimensions: ["Exclusion restriction", "Instrument relevance", "LATE estimation"], when: "When a natural experiment or policy variation creates quasi-random variation in who receives the programme.", praxis: "PRAXIS supports IV designs with first-stage diagnostics, weak instrument tests, and 2SLS estimation strategies." },
      result_synthetic_control: { name: "Synthetic Control Method", category: "Quasi-Experimental", color: "#40798C", description: "Constructs a weighted combination of untreated units to create a synthetic counterfactual for a single treated unit.", dimensions: ["Few treated units", "Donor pool weighting", "Pre-treatment fit"], when: "When evaluating a programme implemented in one or very few units (a country, region, or large facility) with aggregate data.", praxis: "PRAXIS generates synthetic control designs with donor pool selection, placebo tests, and pre-treatment MSPE ratios." },
      result_contribution_analysis: { name: "Contribution Analysis", category: "Theory-Based", color: "#7B2D8E", description: "Builds and tests a contribution story \u2014 systematically assessing whether the programme made a credible contribution to observed outcomes.", dimensions: ["Contribution claim", "Theory of Change", "Evidence weighing"], when: "When you cannot isolate attribution experimentally but need to make a credible case for the programme's contribution using mixed evidence.", praxis: "PRAXIS structures contribution analysis with six-step protocols, evidence confidence ratings, and contribution claim narratives." },
      result_process_tracing: { name: "Process Tracing", category: "Theory-Based", color: "#7B2D8E", description: "Tests causal mechanisms within a single case by examining the chain of events and evidence for each link in the causal pathway.", dimensions: ["Causal mechanism", "Diagnostic evidence", "Bayesian updating"], when: "When you need to understand whether a specific causal mechanism operated in a particular case \u2014 especially useful alongside other methods.", praxis: "PRAXIS generates process tracing designs with hoop, smoking gun, doubly-decisive, and straw-in-the-wind tests mapped to evidence sources." },
      result_pre_post_theory: { name: "Theory-Based Pre\u2013Post Design", category: "Theory-Based", color: "#7B2D8E", description: "Combines before-after measurement with a detailed Theory of Change to strengthen causal inference without a comparison group.", dimensions: ["Pre-post measurement", "Theory of Change", "Assumption testing"], when: "When you only have data on programme participants but have a strong theory of change and can test its assumptions.", praxis: "PRAXIS combines contribution analysis with pre-post measurement, testing ToC assumptions at each step of the causal chain." },
      result_realist: { name: "Realist Evaluation", category: "Theory-Based", color: "#7B2D8E", description: "Asks 'what works, for whom, in what circumstances, and why?' by developing and testing Context\u2013Mechanism\u2013Outcome (CMO) configurations.", dimensions: ["CMO/ICAMO configurations", "Middle-range theory", "Retroductive analysis"], when: "When the programme operates differently across contexts and you need to understand the underlying mechanisms, not just average effects.", praxis: "PRAXIS generates realist evaluation designs with initial programme theories, CMO configurations, and cross-case pattern analysis." },
      result_qca: { name: "Qualitative Comparative Analysis (QCA)", category: "Theory-Based", color: "#7B2D8E", description: "A set-theoretic method that identifies which combinations of conditions are necessary or sufficient for an outcome across cases.", dimensions: ["Crisp/fuzzy/multi-value sets", "Truth tables", "Necessary & sufficient conditions"], when: "When you have 10\u201350 cases and want to identify which combinations of contextual and programmatic factors lead to success or failure.", praxis: "PRAXIS supports QCA with calibration guidance, truth table construction, consistency/coverage metrics, and solution interpretation." },
      result_process_eval: { name: "Process Evaluation", category: "Implementation", color: "#E07A2F", description: "Examines how a programme was implemented \u2014 what was delivered, to whom, how, and what adaptations occurred \u2014 using the MRC framework or similar.", dimensions: ["Fidelity & adaptation", "Reach & dose", "Context & mechanisms"], when: "When you need to understand implementation quality, explain impact findings, or improve programme delivery.", praxis: "PRAXIS designs process evaluations with implementation fidelity matrices, context mapping, and mechanism exploration protocols." },
      result_outcome_harvesting: { name: "Outcome Harvesting", category: "Participatory", color: "#C44536", description: "Identifies and verifies outcomes \u2014 including unintended ones \u2014 by working backwards from observed changes to programme contributions.", dimensions: ["Outcome statements", "Substantiation", "Contribution verification"], when: "When outcomes are emergent and unpredictable, and you want to capture the full range of changes the programme influenced.", praxis: "PRAXIS generates outcome harvesting protocols with outcome statement templates, substantiation panels, and analysis frameworks." },
      result_msc: { name: "Most Significant Change (MSC)", category: "Participatory", color: "#C44536", description: "Collects stories of change from stakeholders, then uses a deliberative process to select the most significant ones \u2014 revealing programme values.", dimensions: ["Story collection", "Selection panels", "Domains of change"], when: "When you want to capture diverse stakeholder perspectives on what changes matter most \u2014 especially valuable for complex or community-driven programmes.", praxis: "PRAXIS designs MSC processes with domain definition, story collection guides, and selection committee protocols." },
      result_developmental: { name: "Developmental Evaluation", category: "Adaptive", color: "#D4A843", description: "Embeds the evaluator in the programme team to provide real-time feedback in complex, rapidly changing environments.", dimensions: ["Complexity-responsive", "Real-time feedback", "Emergent design"], when: "When the programme is innovative, operating in highly uncertain environments, and needs evaluation to inform ongoing adaptation rather than summative judgement.", praxis: "PRAXIS supports developmental evaluation with complexity frameworks, feedback loop design, and adaptive learning protocols." },
      result_participatory: { name: "Participatory Evaluation", category: "Participatory", color: "#C44536", description: "Communities and stakeholders actively design, conduct, and interpret the evaluation \u2014 shifting power from external evaluators to those affected.", dimensions: ["Community ownership", "Capacity building", "Power dynamics"], when: "When empowerment and local ownership of the evaluation process are as important as the findings themselves.", praxis: "PRAXIS generates participatory evaluation designs with stakeholder engagement matrices, facilitation guides, and power analysis tools." },
    };

    const catIcons = { "Readiness": "\u2705", "Experimental": "\u{1F9EA}", "Quasi-Experimental": "\u{1F4CA}", "Theory-Based": "\u{1F50D}", "Implementation": "\u2699\uFE0F", "Participatory": "\u{1F91D}", "Adaptive": "\u{1F504}" };

    // ─── COMPONENTS ────────────────────────────────────────

    function FadeIn({ children, delay }) {
      return h("div", {
        className: "fade-in",
        style: { animationDelay: (delay || 0) + "ms" }
      }, children);
    }

    function Header({ historyLen, onBack, onReset, progress, hasResult }) {
      return h("div", { style: { position: "sticky", top: 0, zIndex: 10, background: "rgba(250,246,241,0.85)", backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)", borderBottom: "1px solid rgba(0,0,0,0.06)" } },
        h("div", { style: { maxWidth: 800, margin: "0 auto", padding: "16px 24px" } },
          h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between" } },
            h("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
              h("div", { style: { width: 36, height: 36, background: "linear-gradient(135deg,#2D6A4F,#1B4332)", borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 16, fontFamily: "'DM Sans',sans-serif", fontWeight: 700 } }, "P"),
              h("div", null,
                h("div", { style: { fontFamily: "'DM Sans',sans-serif", fontWeight: 700, fontSize: 15, letterSpacing: "-0.01em", color: "#1B4332" } }, "PRAXIS"),
                h("div", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "#888", letterSpacing: "0.04em", textTransform: "uppercase" } }, "Evaluation Approach Finder")
              )
            ),
            h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
              (historyLen > 1 || hasResult) && h("button", { className: "btn-nav", onClick: onBack, style: { fontSize: 13, color: "#666", padding: "6px 12px", borderRadius: 6 } }, "\u2190 Back"),
              (historyLen > 1 || hasResult) && h("button", { className: "btn-nav", onClick: onReset, style: { fontSize: 13, color: "#999", padding: "6px 12px", borderRadius: 6 } }, "Start over")
            )
          ),
          h("div", { style: { marginTop: 12, height: 2, background: "rgba(0,0,0,0.06)", borderRadius: 1, overflow: "hidden" } },
            h("div", { style: { height: "100%", width: progress + "%", background: "linear-gradient(90deg,#2D6A4F,#40798C)", borderRadius: 1, transition: "width 0.6s cubic-bezier(0.23,1,0.32,1)" } })
          )
        )
      );
    }

    function OptionCard({ option, onClick }) {
      const [hovered, setHovered] = useState(false);
      return h("div", {
        className: "option-card",
        onClick: onClick,
        onMouseEnter: () => setHovered(true),
        onMouseLeave: () => setHovered(false),
        style: { background: hovered ? "rgba(255,255,255,0.95)" : "rgba(255,255,255,0.7)", border: "1px solid rgba(0,0,0,0.08)", borderRadius: 12, padding: "20px 24px", display: "flex", alignItems: "flex-start", gap: 16 }
      },
        h("div", { style: { fontSize: 24, lineHeight: 1, flexShrink: 0, marginTop: 2 } }, option.icon),
        h("div", { style: { flex: 1 } },
          h("div", { style: { fontFamily: "'DM Sans',sans-serif", fontWeight: 600, fontSize: 15, marginBottom: 4, color: "#2C2C2C" } }, option.label),
          h("div", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 13, color: "#888", lineHeight: 1.4 } }, option.description)
        ),
        h("div", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 18, color: hovered ? "#2D6A4F" : "#CCC", flexShrink: 0, transition: "transform 0.2s ease, color 0.2s ease", transform: hovered ? "translateX(3px)" : "none" } }, "\u2192")
      );
    }

    function ResultCard({ result, selectedOptions, onReset }) {
      return h("div", null,
        h(FadeIn, null,
          h("div", null,
            h("div", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.12em", color: "#2D6A4F", marginBottom: 12, fontWeight: 600 } }, "Recommended Approach"),
            h("div", { style: { background: "rgba(255,255,255,0.85)", border: "1px solid rgba(0,0,0,0.08)", borderRadius: 16, overflow: "hidden" } },
              // Header
              h("div", { style: { background: "linear-gradient(135deg," + result.color + "," + result.color + "dd)", padding: "32px 32px 28px", color: "white" } },
                h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 12 } },
                  h("span", { style: { fontSize: 18 } }, catIcons[result.category]),
                  h("span", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 12, textTransform: "uppercase", letterSpacing: "0.1em", opacity: 0.85, fontWeight: 600 } }, result.category)
                ),
                h("h2", { style: { fontSize: "clamp(22px,4vw,30px)", fontWeight: 700, lineHeight: 1.2, letterSpacing: "-0.02em", marginBottom: 12 } }, result.name),
                h("p", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 14, lineHeight: 1.6, opacity: 0.9 } }, result.description)
              ),
              // Body
              h("div", { style: { padding: "28px 32px" } },
                h("div", { style: { marginBottom: 24 } },
                  h("h3", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: "#999", marginBottom: 12, fontWeight: 600 } }, "Key Dimensions"),
                  h("div", { style: { display: "flex", flexWrap: "wrap", gap: 8 } },
                    result.dimensions.map(function(d) {
                      return h("span", { key: d, style: { fontFamily: "'DM Sans',sans-serif", fontSize: 12, padding: "6px 14px", background: result.color + "0D", color: result.color, borderRadius: 20, fontWeight: 500, border: "1px solid " + result.color + "22" } }, d);
                    })
                  )
                ),
                h("div", { style: { marginBottom: 24 } },
                  h("h3", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: "#999", marginBottom: 8, fontWeight: 600 } }, "When to Use"),
                  h("p", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 14, lineHeight: 1.6, color: "#555" } }, result.when)
                ),
                h("div", { style: { background: "linear-gradient(135deg,#FAF6F1,#F5F0E8)", borderRadius: 10, padding: "20px 24px", border: "1px solid rgba(0,0,0,0.04)" } },
                  h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 8 } },
                    h("div", { style: { width: 20, height: 20, background: "linear-gradient(135deg,#2D6A4F,#1B4332)", borderRadius: 4, display: "flex", alignItems: "center", justifyContent: "center", color: "white", fontSize: 10, fontFamily: "'DM Sans',sans-serif", fontWeight: 700 } }, "P"),
                    h("span", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 12, fontWeight: 600, color: "#1B4332", letterSpacing: "0.02em" } }, "What PRAXIS Can Do")
                  ),
                  h("p", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 13, lineHeight: 1.6, color: "#666" } }, result.praxis)
                )
              ),
              // CTAs
              h("div", { style: { padding: "0 32px 28px", display: "flex", flexWrap: "wrap", gap: 10 } },
                h("a", { className: "cta-primary", href: "https://github.com/emmaodjidja-sys/praxis", target: "_blank", rel: "noopener noreferrer" }, "Get PRAXIS on GitHub \u2192"),
                h("button", { className: "btn-nav", onClick: onReset, style: { fontSize: 13, fontWeight: 500, color: "#777", padding: "10px 20px", borderRadius: 8, border: "1px solid rgba(0,0,0,0.1)", background: "white" } }, "Try another scenario")
              )
            ),

            // Decision path
            h("div", { style: { marginTop: 24, padding: "20px 24px", background: "rgba(255,255,255,0.5)", borderRadius: 12, border: "1px solid rgba(0,0,0,0.04)" } },
              h("h3", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.1em", color: "#999", marginBottom: 12, fontWeight: 600 } }, "Your Decision Path"),
              h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
                Object.entries(selectedOptions).map(function(entry, i) {
                  return h("div", { key: entry[0], style: { fontFamily: "'DM Sans',sans-serif", fontSize: 13, color: "#666", display: "flex", alignItems: "center", gap: 8 } },
                    h("span", { style: { width: 18, height: 18, borderRadius: "50%", background: result.color + "15", color: result.color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 600, flexShrink: 0 } }, i + 1),
                    entry[1]
                  );
                })
              )
            )
          )
        )
      );
    }

    // ─── APP ───────────────────────────────────────────────

    function App() {
      const [history, setHistory] = useState(["start"]);
      const [selectedOptions, setSelectedOptions] = useState({});
      const [result, setResult] = useState(null);
      const bottomRef = useRef(null);

      var currentStepId = history[history.length - 1];
      var currentStep = STEPS[currentStepId];

      useEffect(function() {
        if (bottomRef.current) bottomRef.current.scrollIntoView({ behavior: "smooth", block: "center" });
      }, [history, result]);

      function handleSelect(option) {
        var newSel = Object.assign({}, selectedOptions);
        newSel[currentStepId] = option.label;
        setSelectedOptions(newSel);
        if (option.next.startsWith("result_")) {
          setResult(RESULTS[option.next]);
        } else {
          setHistory(history.concat([option.next]));
        }
      }

      function handleBack() {
        if (result) { setResult(null); return; }
        if (history.length > 1) {
          var newHist = history.slice(0, -1);
          var newSel = Object.assign({}, selectedOptions);
          delete newSel[currentStepId];
          setHistory(newHist);
          setSelectedOptions(newSel);
        }
      }

      function handleReset() {
        setHistory(["start"]);
        setSelectedOptions({});
        setResult(null);
      }

      var progress = result ? 100 : Math.min(95, (history.length / 4) * 100);

      return h("div", { style: { minHeight: "100vh", position: "relative" } },
        h(Header, { historyLen: history.length, onBack: handleBack, onReset: handleReset, progress: progress, hasResult: !!result }),

        h("div", { style: { maxWidth: 800, margin: "0 auto", padding: "40px 24px 80px" } },

          // Breadcrumbs
          history.length > 1 && !result && h(FadeIn, null,
            h("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 32, alignItems: "center" } },
              history.slice(0, -1).map(function(stepId, i) {
                return h("span", { key: i, style: { display: "flex", alignItems: "center", gap: 6 } },
                  h("span", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 12, color: "#999", letterSpacing: "0.02em" } }, selectedOptions[stepId]),
                  h("span", { style: { color: "#CCC", fontSize: 10 } }, "\u2192")
                );
              }),
              h("span", { className: "pulse-dot", style: { width: 6, height: 6, borderRadius: "50%", background: "#2D6A4F", display: "inline-block" } })
            )
          ),

          // Question
          !result && currentStep && h("div", null,
            h(FadeIn, { key: currentStepId },
              h("div", { style: { marginBottom: 40 } },
                h("div", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 11, textTransform: "uppercase", letterSpacing: "0.12em", color: "#2D6A4F", marginBottom: 12, fontWeight: 600 } }, "Step " + history.length + " of ~" + (history.length + (history.length === 1 ? 2 : 1))),
                h("h1", { style: { fontSize: "clamp(24px,4vw,32px)", fontWeight: 700, lineHeight: 1.3, marginBottom: 8, letterSpacing: "-0.02em" } }, currentStep.question),
                h("p", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 15, color: "#777", lineHeight: 1.5 } }, currentStep.subtitle)
              )
            ),
            h("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
              currentStep.options.map(function(option, i) {
                return h(FadeIn, { key: option.label, delay: 100 + i * 80 },
                  h(OptionCard, { option: option, onClick: function() { handleSelect(option); } })
                );
              })
            )
          ),

          // Result
          result && h(ResultCard, { result: result, selectedOptions: selectedOptions, onReset: handleReset }),

          // Welcome hint
          history.length === 1 && !result && h(FadeIn, { delay: 400 },
            h("div", { style: { marginTop: 40, padding: "20px 24px", background: "rgba(45,106,79,0.04)", borderRadius: 12, borderLeft: "3px solid #2D6A4F" } },
              h("p", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 13, lineHeight: 1.6, color: "#666" } },
                "This tool guides you through selecting an evaluation approach based on your programme context. It covers 20+ methods \u2014 from RCTs to realist evaluation to outcome harvesting \u2014 drawn from the open-source ",
                h("a", { href: "https://github.com/emmaodjidja-sys/praxis", target: "_blank", rel: "noopener noreferrer", style: { color: "#2D6A4F", fontWeight: 600 } }, "PRAXIS"),
                " skill for programme evaluation."
              )
            )
          ),

          h("div", { ref: bottomRef })
        ),

        // Footer
        h("div", { style: { position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(250,246,241,0.8)", backdropFilter: "blur(10px)", WebkitBackdropFilter: "blur(10px)", borderTop: "1px solid rgba(0,0,0,0.04)", padding: "10px 24px", textAlign: "center" } },
          h("span", { style: { fontFamily: "'DM Sans',sans-serif", fontSize: 11, color: "#AAA", letterSpacing: "0.02em" } },
            "Built by ",
            h("a", { href: "https://www.emmanuelneneodjidja.org/", target: "_blank", rel: "noopener noreferrer", style: { color: "#888", fontWeight: 500 } }, "Emmanuel Nene Odjidja"),
            " \u00B7 Powered by ",
            h("a", { href: "https://github.com/emmaodjidja-sys/praxis", target: "_blank", rel: "noopener noreferrer", style: { color: "#2D6A4F", fontWeight: 500 } }, "PRAXIS")
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(h(App));
  </script>
</body>
</html>
